<h1>Chapter 3 Quiz</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<div id="bnc-quiz"></div>

<script>
window.QUIZ_DATA = {
  bookKey: "rtsa",
  chapterKey: "03",
  title: "Chapter 3 Quiz",
  questions: [
    {
      q: "Which formula describes how the first amplifier dominates the noise figure of a receiver?",
      options: [
        "Nyquist",
        "Friis",
        "Boltzmann",
        "Shannon"
      ],
      answer: 1,
      explain: "The Friis formula shows the first stage's gain reduces the noise contribution of every stage after it, so the front end dominates."
    },
    {
      q: "Why does an RTSA need preselection before the LNA?",
      options: [
        "To increase gain",
        "To prevent strong out-of-band signals from compressing the LNA",
        "To improve display brightness",
        "To synchronize the ADC"
      ],
      answer: 1,
      explain: "Preselection filters out strong out-of-band energy that would otherwise compress or overload the low-noise amplifier."
    },
    {
      q: "What is the purpose of quadrature (I/Q) downconversion?",
      options: [
        "To increase ADC bit depth",
        "To produce a complex baseband signal with a one-sided spectrum",
        "To raise the noise floor",
        "To increase the IF frequency"
      ],
      answer: 1,
      explain: "Quadrature downconversion yields a complex baseband signal whose one-sided spectrum preserves positive and negative frequencies separately."
    },
    {
      q: "The minimum complex sampling rate to capture an RTBW of B Hz is approximately:",
      options: [
        "B/2",
        "B",
        "2B",
        "4B"
      ],
      answer: 2,
      explain: "Complex sampling needs about 2B to capture a real bandwidth of B Hz across positive and negative frequencies."
    },
    {
      q: "ENOB is best described as:",
      options: [
        "The number of ADC bits before any noise",
        "The realistic resolution of an ADC after thermal and quantization noise",
        "The signal-to-noise ratio in dB",
        "The dynamic range of the entire receiver"
      ],
      answer: 1,
      explain: "Effective number of bits is the real-world resolution left after thermal and quantization noise are accounted for."
    },
    {
      q: "SFDR matters because:",
      options: [
        "It determines the maximum sample rate",
        "ADC-generated spurious tones can be confused with real signals",
        "It sets the receiver's noise figure",
        "It controls trace averaging speed"
      ],
      answer: 1,
      explain: "Spurious-free dynamic range tells you how far down the converter's own spurs sit, so you do not mistake them for real signals."
    },
    {
      q: "Decimation is performed in two stages:",
      options: [
        "Amplification followed by attenuation",
        "Filtering followed by sample-rate reduction",
        "FFT followed by IFFT",
        "A/D followed by D/A"
      ],
      answer: 1,
      explain: "Decimation first band-limits with a filter, then reduces the sample rate so no aliasing occurs."
    },
    {
      q: "What does a channelizer do?",
      options: [
        "Combines multiple narrowband signals into one wideband stream",
        "Splits a wideband stream into multiple narrower sub-band streams",
        "Adjusts the gain per channel",
        "Stores I/Q to disk"
      ],
      answer: 1,
      explain: "A channelizer divides one wideband stream into several narrower sub-band streams for parallel processing."
    },
    {
      q: "Scalloping loss in FFT processing is caused by:",
      options: [
        "ADC quantization",
        "Window taper attenuating signals near window boundaries",
        "Insufficient sample rate",
        "Phase noise on the LO"
      ],
      answer: 1,
      explain: "A tone falling between bin centers sits on the sloped part of the window response, so its measured amplitude drops."
    },
    {
      q: "In the SPECTRAN V6 PLUS signal path, where does I/Q imbalance correction typically occur?",
      options: [
        "In the antenna",
        "In the analog mixer",
        "In the FPGA, digitally",
        "On the host CPU"
      ],
      answer: 2,
      explain: "I/Q imbalance is corrected digitally in the FPGA, close to the data and at full rate."
    }
  ]
};
</script>
