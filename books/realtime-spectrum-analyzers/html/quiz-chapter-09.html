<h1>Chapter 9 Quiz</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<div id="bnc-quiz"></div>

<script>
window.QUIZ_DATA = {
  bookKey: "rtsa",
  chapterKey: "09",
  title: "Chapter 9 Quiz",
  questions: [
    {
      q: "Absolute amplitude accuracy on a typical RTSA across full frequency range is approximately:",
      options: [
        "plus or minus 0.01 dB",
        "plus or minus 0.5 to 2 dB",
        "plus or minus 10 dB",
        "None at all"
      ],
      answer: 1,
      explain: "Across the full frequency range, typical absolute amplitude accuracy is about plus or minus 0.5 to 2 dB."
    },
    {
      q: "An external 10 MHz reference input on a SPECTRAN V6 PLUS allows users to:",
      options: [
        "Increase RTBW",
        "Lock to a rubidium or GPSDO for high-precision frequency measurements",
        "Change ADC sample rate",
        "Bypass the FFT engine"
      ],
      answer: 1,
      explain: "The 10 MHz reference input lets you lock to a rubidium standard or GPSDO for precise frequency measurements."
    },
    {
      q: "Phase noise, expressed in dBc/Hz at an offset, describes:",
      options: [
        "Total carrier power",
        "The noise spectral density relative to the carrier at that offset",
        "The trigger latency",
        "The display refresh rate"
      ],
      answer: 1,
      explain: "Phase noise in dBc/Hz is the noise power density relative to the carrier at a given offset from it."
    },
    {
      q: "Reciprocal mixing causes:",
      options: [
        "ADC clipping",
        "Strong signals to smear via LO phase noise, limiting dynamic range close to carriers",
        "The waterfall to scroll faster",
        "Data corruption on disk"
      ],
      answer: 1,
      explain: "Reciprocal mixing convolves LO phase noise onto strong signals, raising the noise skirt and limiting close-in dynamic range."
    },
    {
      q: "The noise floor of an RTSA is determined by:",
      options: [
        "The display brightness",
        "The system noise figure and the resolution bandwidth",
        "The cable length",
        "The window function only"
      ],
      answer: 1,
      explain: "The displayed noise floor is set by the system noise figure together with the resolution bandwidth."
    },
    {
      q: "SFDR is:",
      options: [
        "The maximum sample rate",
        "The difference between the strongest signal and the strongest analyzer-generated spur",
        "The signal-to-noise ratio",
        "The carrier-to-interferer ratio"
      ],
      answer: 1,
      explain: "Spurious-free dynamic range is the gap between the strongest signal and the largest spur the analyzer itself generates."
    },
    {
      q: "IIP3 measures:",
      options: [
        "The maximum input before signal compression",
        "The (extrapolated) input power where third-order intermod products equal the input signals",
        "The noise figure",
        "The phase noise floor"
      ],
      answer: 1,
      explain: "The third-order input intercept point is the extrapolated input level where third-order products would equal the desired tones."
    },
    {
      q: "A measurement uncertainty budget combines individual error contributions by:",
      options: [
        "Adding them linearly",
        "Multiplying them",
        "Summing in quadrature, then applying a coverage factor",
        "Taking the maximum value"
      ],
      answer: 2,
      explain: "Independent contributions are summed in quadrature, then scaled by a coverage factor for the desired confidence."
    },
    {
      q: "The expanded uncertainty for 95 percent confidence is approximately:",
      options: [
        "The standard uncertainty divided by 2",
        "The standard uncertainty multiplied by 2 (k=2)",
        "The standard uncertainty multiplied by 10",
        "The standard uncertainty itself"
      ],
      answer: 1,
      explain: "A coverage factor of k equals 2 gives roughly 95 percent confidence, so expanded uncertainty is about twice the standard uncertainty."
    },
    {
      q: "RTSA Suite PRO's user calibration wizards support all the following except:",
      options: [
        "Image rejection calibration",
        "Frequency response calibration",
        "Amplitude calibration",
        "Mechanical alignment of antenna arrays"
      ],
      answer: 3,
      explain: "The calibration wizards cover image rejection, frequency response, and amplitude, but not mechanical alignment of antenna arrays."
    }
  ]
};
</script>
