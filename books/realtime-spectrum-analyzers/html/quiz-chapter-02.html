<script>
window.QUIZ_DATA = {
  bookKey: "rtsa",
  chapterKey: "02",
  title: "Chapter 2 Quiz",
  questions: [
    {
      q: "Which specification determines the width of spectrum captured simultaneously by an RTSA?",
      options: [
        "RBW",
        "RTBW",
        "IF bandwidth",
        "Sweep speed"
      ],
      answer: 1,
      explain: "Real-time bandwidth (RTBW) is the span the instrument digitizes and analyzes all at once, with no sweeping."
    },
    {
      q: "Why does increasing FFT length improve frequency resolution?",
      options: [
        "It increases ADC sample rate.",
        "It includes more samples per transform, narrowing each bin.",
        "It increases on-board memory.",
        "It reduces the noise figure of the front end."
      ],
      answer: 1,
      explain: "A longer transform spreads the same span across more bins, so each bin is narrower and resolution improves."
    },
    {
      q: "What does gap-free processing guarantee?",
      options: [
        "Faster display refresh.",
        "Continuous time coverage with no missed samples.",
        "Narrower IF filters.",
        "Higher display brightness."
      ],
      answer: 1,
      explain: "Gap-free processing means every incoming sample is analyzed, so no signal slips through between frames."
    },
    {
      q: "Approximately what is the resolution bandwidth of a 4096-point FFT at a 2 GS/s sample rate?",
      options: [
        "2 kHz",
        "50 kHz",
        "488 kHz",
        "2 MHz"
      ],
      answer: 2,
      explain: "Bin spacing is sample rate divided by FFT length: 2 GS/s / 4096 is about 488 kHz."
    },
    {
      q: "What is the published probability of intercept floor of Aaronia RTSA Suite PRO?",
      options: [
        "10 microseconds",
        "1 microsecond",
        "10 nanoseconds",
        "1 millisecond"
      ],
      answer: 2,
      explain: "The published probability of intercept floor is 10 nanoseconds."
    },
    {
      q: "Which display reveals rare emitters by accumulating hit probability over time?",
      options: [
        "Single FFT trace",
        "Waterfall",
        "Persistence",
        "Time domain"
      ],
      answer: 2,
      explain: "Persistence accumulates how often each frequency-amplitude point is hit, surfacing rare or intermittent emitters."
    },
    {
      q: "A frequency mask trigger fires when:",
      options: [
        "The trace updates more than 100 times per second.",
        "The spectrum violates a user-defined envelope.",
        "The ADC clips its input.",
        "The trace average exceeds the maximum hold."
      ],
      answer: 1,
      explain: "A frequency mask trigger fires the moment the live spectrum crosses the user-defined mask envelope."
    },
    {
      q: "What aggregate real-time bandwidth do four cascaded SPECTRAN V6 PLUS units produce?",
      options: [
        "80 MHz",
        "245 MHz",
        "490 MHz",
        "1 GHz"
      ],
      answer: 3,
      explain: "Four cascaded units combine to roughly 1 GHz of aggregate real-time bandwidth."
    },
    {
      q: "Which Aaronia patented display wraps a wide frequency span across multiple stacked lines for high-resolution viewing?",
      options: [
        "Heatmap View",
        "Wrapped Spectrum",
        "Persistence Cube",
        "Density Plot"
      ],
      answer: 1,
      explain: "The patented Wrapped Spectrum stacks a wide span across multiple lines so fine detail stays visible."
    },
    {
      q: "Continuous I/Q recording up to 245 MHz of bandwidth in RTSA Suite PRO is limited by:",
      options: [
        "CPU cycles",
        "The size of the attached storage",
        "The display refresh rate",
        "The ADC resolution"
      ],
      answer: 1,
      explain: "Streaming I/Q is written continuously, so the practical limit is how much storage is attached."
    }
  ]
