<h1>Chapter 5 Quiz</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<div id="bnc-quiz"></div>

<script>
window.QUIZ_DATA = {
  bookKey: "rtsa",
  chapterKey: "05",
  title: "Chapter 5 Quiz",
  questions: [
    {
      q: "What is the computational complexity of an FFT, compared to a naive DFT?",
      options: [
        "O(N^2) vs O(N log N), FFT is slower",
        "O(N log N) vs O(N^2), FFT is faster",
        "Both are O(N)",
        "O(N!) vs O(2^N)"
      ],
      answer: 1,
      explain: "The FFT runs in O(N log N) against the DFT's O(N squared), which is why it is far faster for large transforms."
    },
    {
      q: "The bin spacing of an FFT is given by:",
      options: [
        "fs times N",
        "fs / N",
        "N / fs",
        "fs + N"
      ],
      answer: 1,
      explain: "Bin spacing equals the sample rate divided by the FFT length."
    },
    {
      q: "Which window is best for accurate absolute amplitude measurements of a known tone?",
      options: [
        "Rectangular",
        "Hann",
        "Flat-top",
        "Blackman-Harris"
      ],
      answer: 2,
      explain: "The flat-top window has a broad, level main lobe that gives accurate amplitude readings even when the tone is off bin center."
    },
    {
      q: "Which window provides the highest dynamic range (lowest sidelobes) at the cost of a wider main lobe?",
      options: [
        "Hamming",
        "Rectangular",
        "Hann",
        "Blackman-Harris or Kaiser"
      ],
      answer: 3,
      explain: "Blackman-Harris and Kaiser windows push sidelobes very low for high dynamic range, trading a wider main lobe."
    },
    {
      q: "Spectral leakage is caused by:",
      options: [
        "ADC quantization",
        "Discontinuity at the boundary of an FFT window",
        "LO phase noise",
        "Antenna mismatch"
      ],
      answer: 1,
      explain: "When a tone is not periodic in the window, the boundary discontinuity smears energy into nearby bins as leakage."
    },
    {
      q: "Scalloping loss is the variation in measured amplitude as a signal:",
      options: [
        "Moves between FFT bin centers",
        "Sweeps across the full RTBW",
        "Drifts in temperature",
        "Triggers the FMT"
      ],
      answer: 0,
      explain: "Scalloping loss is the dip in measured level when a tone falls between bin centers rather than on one."
    },
    {
      q: "Welch's method reduces variance in a PSD estimate by:",
      options: [
        "Increasing the sample rate",
        "Averaging multiple windowed periodograms",
        "Using a longer FFT",
        "Decreasing overlap"
      ],
      answer: 1,
      explain: "Welch's method averages several overlapping windowed periodograms, smoothing the estimate at the cost of resolution."
    },
    {
      q: "For a 65,536-point FFT at 245 MS/s, the resolution bandwidth is approximately:",
      options: [
        "4 Hz",
        "4 kHz (about 3.7 kHz)",
        "4 MHz",
        "245 MHz"
      ],
      answer: 1,
      explain: "245 MS/s divided by 65,536 is about 3.7 kHz per bin."
    },
    {
      q: "To capture an intermittent burst, you should choose:",
      options: [
        "The longest FFT possible",
        "A short FFT (around 1024 points or fewer)",
        "A flat-top window",
        "No window at all"
      ],
      answer: 1,
      explain: "A short FFT gives fine time resolution, so a brief burst is not averaged away across a long frame."
    },
    {
      q: "What benefit do measurement presets in RTSA Suite PRO provide?",
      options: [
        "They limit user flexibility",
        "They preconfigure windows, FFT length, overlap, and averaging for specific measurement tasks while remaining editable",
        "They run at a faster sample rate",
        "They eliminate the need for windowing"
      ],
      answer: 1,
      explain: "Presets bundle window, FFT length, overlap, and averaging for a task, and stay editable for fine tuning."
    }
  ]
};
</script>
