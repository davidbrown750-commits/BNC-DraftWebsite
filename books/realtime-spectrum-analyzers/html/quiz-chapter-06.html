<h1>Chapter 6 Quiz</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<script>
window.QUIZ_DATA = {
  bookKey: "rtsa",
  chapterKey: "06",
  title: "Chapter 6 Quiz",
  questions: [
    {
      q: "The first stage of the demodulation chain in an RTSA is:",
      options: [
        "Symbol decision",
        "Channel selection",
        "EVM computation",
        "Equalization"
      ],
      answer: 1,
      explain: "Demodulation starts by selecting the channel of interest before any symbol-level processing."
    },
    {
      q: "Which modulation family encodes data in carrier phase only?",
      options: [
        "FSK",
        "ASK",
        "PSK",
        "OFDM"
      ],
      answer: 2,
      explain: "Phase shift keying carries data purely in the phase of the carrier."
    },
    {
      q: "OFDM is best described as:",
      options: [
        "A single carrier with very high QAM order",
        "A multiplexing scheme using many orthogonal narrowband subcarriers each carrying QAM",
        "A spread-spectrum coding technique",
        "A multipath equalization algorithm"
      ],
      answer: 1,
      explain: "OFDM spreads data across many orthogonal narrowband subcarriers, each typically carrying QAM."
    },
    {
      q: "Error Vector Magnitude (EVM) is:",
      options: [
        "The RMS of the complex difference between received and ideal symbols, normalized by reference power",
        "The peak signal amplitude",
        "The signal-to-noise ratio",
        "The carrier-to-noise ratio"
      ],
      answer: 0,
      explain: "EVM is the RMS error between received and ideal symbol points, normalized to a reference power."
    },
    {
      q: "A 5G NR 256-QAM transmitter typically requires EVM better than approximately:",
      options: [
        "30 percent",
        "10 percent",
        "3.5 percent",
        "0.1 percent"
      ],
      answer: 2,
      explain: "256-QAM packs symbols tightly, so 5G NR requires EVM around 3.5 percent or better."
    },
    {
      q: "A constellation rotated as a whole indicates:",
      options: [
        "PA compression",
        "Residual carrier frequency offset",
        "Thermal noise only",
        "Antenna damage"
      ],
      answer: 1,
      explain: "A uniform rotation of the whole constellation points to a residual carrier frequency or phase offset."
    },
    {
      q: "Which standard uses chirp spread spectrum with spreading factors 7 to 12?",
      options: [
        "Wi-Fi 7",
        "Bluetooth Low Energy",
        "LoRa",
        "Zigbee"
      ],
      answer: 2,
      explain: "LoRa uses chirp spread spectrum with spreading factors from 7 to 12 to trade data rate for range."
    },
    {
      q: "Wi-Fi 7 channel bandwidth maxes at:",
      options: [
        "80 MHz",
        "160 MHz",
        "320 MHz",
        "1 GHz"
      ],
      answer: 2,
      explain: "Wi-Fi 7 extends the maximum channel bandwidth to 320 MHz."
    },
    {
      q: "The RTSA Suite PRO modulation library covers up to which QAM order?",
      options: [
        "64-QAM",
        "256-QAM",
        "1024-QAM",
        "4096-QAM"
      ],
      answer: 3,
      explain: "The modulation library covers up to 4096-QAM."
    },
    {
      q: "In the worked Python EVM example, the matched filter applied is:",
      options: [
        "Hann window",
        "Root raised cosine with beta = 0.35",
        "Flat-top window",
        "Median filter"
      ],
      answer: 1,
      explain: "The worked example uses a root raised cosine matched filter with a roll-off of 0.35."
    }
  ]
