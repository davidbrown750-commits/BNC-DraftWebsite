      options: [
        "Amplitude DF",

      answer: 1,

      q: "The Aaronia IsoLOG 3D DF antenna covers:",

        "100 MHz to 1 GHz",

      ],
      answer: 1,
      explain: "The IsoLOG 3D DF antenna covers roughly 400 MHz to 40 GHz."
    },
    {
      q: "The flagship IsoLOG 3D DF has how many sectors and antennas?",
      options: [
        "8 sectors, 16 antennas",
        "12 sectors, 24 antennas",
        "16 sectors, 32 antennas",
        "24 sectors, 48 antennas"
      ],
      answer: 2,
      explain: "The flagship configuration uses 16 sectors with 32 antennas."
    },
    {
      q: "The angular accuracy of the IsoLOG 3D DF when paired with SPECTRAN V6 PLUS is approximately:",
      options: [
        "10 degrees",
        "5 degrees",

      ],
      answer: 2,
      explain: "Paired with the SPECTRAN V6 PLUS, angular accuracy is on the order of 1 degree."
    },
    {
      q: "Why does 3D direction finding (with elevation) improve counter-UAS performance?",
      options: [
        "Drones produce different colors on the waterfall.",
        "Elevation distinguishes airborne emitters from ground RF noise.",
        "Elevation lowers the noise figure.",
        "It does not."
      ],
      answer: 1,
      explain: "Adding elevation lets the system separate airborne drone emissions from clutter at ground level."
    },
    {
      q: "Two-site cross-bearing geometry is most accurate when:",
      options: [
        "The two sites are very close together.",
        "The two sites are spaced at roughly the range to the target, with bearings near 90 degrees.",
        "The bearing angles are nearly parallel.",
        "The target is very far away."
      ],
      answer: 1,
      explain: "Cross-bearing is sharpest when the baseline matches the target range and the bearings cross near a right angle."
    },
    {
      q: "TDOA geolocation requires synchronized clocks. GPS-disciplined oscillators provide approximately:",
      options: [
        "1 millisecond",
        "1 microsecond",
        "10 to 30 nanoseconds",

      ],
      answer: 2,
      explain: "GPS-disciplined oscillators hold timing to roughly 10 to 30 nanoseconds, tight enough for TDOA."
