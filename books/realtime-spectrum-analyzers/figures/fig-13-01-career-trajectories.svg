<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <text x="550" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">Figure 13-1: RF Career Trajectories and Salary Bands (US, 2026)</text>
  <text x="550" y="48" text-anchor="middle" font-size="12" fill="#486581">Six core RF careers, each with entry to senior salary bands and growth velocity through 2030.</text>

  <!-- Y-axis: salary -->
  <line x1="120" y1="80" x2="120" y2="440" stroke="#2C3E50" stroke-width="2"/>
  <text x="100" y="85" text-anchor="end" font-size="11" fill="#486581">$300K</text>
  <text x="100" y="125" text-anchor="end" font-size="11" fill="#486581">$250K</text>
  <text x="100" y="165" text-anchor="end" font-size="11" fill="#486581">$200K</text>
  <text x="100" y="205" text-anchor="end" font-size="11" fill="#486581">$150K</text>
  <text x="100" y="245" text-anchor="end" font-size="11" fill="#486581">$100K</text>
  <text x="100" y="305" text-anchor="end" font-size="11" fill="#486581">$50K</text>

  <!-- Horizontal grid lines -->
  <g stroke="#cbd2d9" stroke-width="0.5" stroke-dasharray="2,3">
    <line x1="120" y1="125" x2="1050" y2="125"/>
    <line x1="120" y1="165" x2="1050" y2="165"/>
    <line x1="120" y1="205" x2="1050" y2="205"/>
    <line x1="120" y1="245" x2="1050" y2="245"/>
    <line x1="120" y1="305" x2="1050" y2="305"/>
  </g>

  <!-- X-axis: career stages -->
  <line x1="120" y1="350" x2="1050" y2="350" stroke="#2C3E50" stroke-width="2"/>

  <!-- Career bars: Entry / Mid / Senior -->
  <!-- Layout: each career has 3 bars (entry, mid, senior), 6 careers × 3 = 18 bars -->
  <!-- Width per career: ~150px, with gap -->

  <!-- 1. RF Systems Engineer -->
  <g transform="translate(140,0)">
    <rect x="0" y="245" width="30" height="105" fill="#0078B6" opacity="0.7"/>
    <rect x="35" y="205" width="30" height="145" fill="#0078B6" opacity="0.85"/>
    <rect x="70" y="125" width="30" height="225" fill="#0078B6"/>
    <text x="50" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">RF Systems</text>
    <text x="50" y="384" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">Engineer</text>
    <text x="50" y="402" text-anchor="middle" font-size="9" fill="#486581">growth: steady</text>
  </g>

  <!-- 2. Field Engineer -->
  <g transform="translate(290,0)">
    <rect x="0" y="285" width="30" height="65" fill="#003D6B" opacity="0.7"/>
    <rect x="35" y="265" width="30" height="85" fill="#003D6B" opacity="0.85"/>
    <rect x="70" y="225" width="30" height="125" fill="#003D6B"/>
    <text x="50" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">Field</text>
    <text x="50" y="384" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">Engineer</text>
    <text x="50" y="402" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="600">growth: high (5G)</text>
  </g>

  <!-- 3. Compliance Officer -->
  <g transform="translate(440,0)">
    <rect x="0" y="265" width="30" height="85" fill="#003D6B" opacity="0.7"/>
    <rect x="35" y="225" width="30" height="125" fill="#003D6B" opacity="0.85"/>
    <rect x="70" y="180" width="30" height="170" fill="#003D6B"/>
    <text x="50" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">Compliance</text>
    <text x="50" y="384" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">Officer</text>
    <text x="50" y="402" text-anchor="middle" font-size="9" fill="#486581">growth: steady</text>
  </g>

  <!-- 4. RF Cybersecurity (HOT) -->
  <g transform="translate(590,0)">
    <rect x="0" y="225" width="30" height="125" fill="#c0392b" opacity="0.7"/>
    <rect x="35" y="185" width="30" height="165" fill="#c0392b" opacity="0.85"/>
    <rect x="70" y="105" width="30" height="245" fill="#c0392b"/>
    <text x="50" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">RF Cyber-</text>
    <text x="50" y="384" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">security</text>
    <text x="50" y="402" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="700">growth: 30-50% YoY</text>
  </g>

  <!-- 5. EW / Intel Analyst -->
  <g transform="translate(740,0)">
    <rect x="0" y="225" width="30" height="125" fill="#2C3E50" opacity="0.7"/>
    <rect x="35" y="183" width="30" height="167" fill="#2C3E50" opacity="0.85"/>
    <rect x="70" y="155" width="30" height="195" fill="#2C3E50"/>
    <text x="50" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">EW / Intel</text>
    <text x="50" y="384" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">Analyst</text>
    <text x="50" y="402" text-anchor="middle" font-size="9" fill="#486581">+clearance premium</text>
  </g>

  <!-- 6. Smart Infra RF Ops -->
  <g transform="translate(890,0)">
    <rect x="0" y="265" width="30" height="85" fill="#1b5e20" opacity="0.7"/>
    <rect x="35" y="215" width="30" height="135" fill="#1b5e20" opacity="0.85"/>
    <rect x="70" y="170" width="30" height="180" fill="#1b5e20"/>
    <text x="50" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">Smart Infra</text>
    <text x="50" y="384" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">RF Ops</text>
    <text x="50" y="402" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="600">new role, growing</text>
  </g>

  <!-- Legend -->
  <g transform="translate(120,460)">
    <rect x="0" y="0" width="20" height="14" fill="#486581" opacity="0.7"/>
    <text x="28" y="12" font-size="11" fill="#2C3E50">Entry-level</text>

    <rect x="120" y="0" width="20" height="14" fill="#486581" opacity="0.85"/>
    <text x="148" y="12" font-size="11" fill="#2C3E50">Mid-career</text>

    <rect x="240" y="0" width="20" height="14" fill="#486581"/>
    <text x="268" y="12" font-size="11" fill="#2C3E50">Senior</text>

    <text x="500" y="12" font-size="11" fill="#c0392b" font-weight="700">RF Cybersecurity</text>
    <text x="615" y="12" font-size="11" fill="#2C3E50">= fastest-growing specialty (top US salary up to $280K+)</text>
  </g>

  <text x="20" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="#003D6B" transform="rotate(-90 20 245)">Salary (US, 2026)</text>
</svg>
