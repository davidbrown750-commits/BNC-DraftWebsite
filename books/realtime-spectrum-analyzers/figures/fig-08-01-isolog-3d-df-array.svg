<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <radialGradient id="radomeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bcccdc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#486581" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <text x="550" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">Figure 8-1: IsoLOG 3D DF Sectored Array Geometry</text>
  <text x="550" y="48" text-anchor="middle" font-size="12" fill="#486581">16 sectors × 2 antennas (32 total) covering 400 MHz to 40 GHz with elevation</text>

  <!-- TOP-DOWN VIEW (left): 16 sector circular array -->
  <g transform="translate(280,280)">
    <text x="0" y="-200" text-anchor="middle" font-size="14" font-weight="700" fill="#2C3E50">Top-Down View (Azimuth)</text>

    <!-- Outer radome -->
    <circle cx="0" cy="0" r="160" fill="url(#radomeGrad)" stroke="#486581" stroke-width="2"/>

    <!-- 16 sectors as wedges -->
    <g stroke="#2C3E50" stroke-width="1" fill="#ECEFF1" fill-opacity="0.4">
      <!-- 16 sector lines -->
      <g>
        <line x1="0" y1="0" x2="160" y2="0"/>
        <line x1="0" y1="0" x2="148" y2="61"/>
        <line x1="0" y1="0" x2="113" y2="113"/>
        <line x1="0" y1="0" x2="61" y2="148"/>
        <line x1="0" y1="0" x2="0" y2="160"/>
        <line x1="0" y1="0" x2="-61" y2="148"/>
        <line x1="0" y1="0" x2="-113" y2="113"/>
        <line x1="0" y1="0" x2="-148" y2="61"/>
        <line x1="0" y1="0" x2="-160" y2="0"/>
        <line x1="0" y1="0" x2="-148" y2="-61"/>
        <line x1="0" y1="0" x2="-113" y2="-113"/>
        <line x1="0" y1="0" x2="-61" y2="-148"/>
        <line x1="0" y1="0" x2="0" y2="-160"/>
        <line x1="0" y1="0" x2="61" y2="-148"/>
        <line x1="0" y1="0" x2="113" y2="-113"/>
        <line x1="0" y1="0" x2="148" y2="-61"/>
      </g>
    </g>

    <!-- Antenna elements at each sector midpoint -->
    <g fill="#003D6B" stroke="#003D6B">
      <circle cx="138" cy="29" r="4"/>
      <circle cx="116" cy="83" r="4"/>
      <circle cx="83" cy="116" r="4"/>
      <circle cx="29" cy="138" r="4"/>
      <circle cx="-29" cy="138" r="4"/>
      <circle cx="-83" cy="116" r="4"/>
      <circle cx="-116" cy="83" r="4"/>
      <circle cx="-138" cy="29" r="4"/>
      <circle cx="-138" cy="-29" r="4"/>
      <circle cx="-116" cy="-83" r="4"/>
      <circle cx="-83" cy="-116" r="4"/>
      <circle cx="-29" cy="-138" r="4"/>
      <circle cx="29" cy="-138" r="4"/>
      <circle cx="83" cy="-116" r="4"/>
      <circle cx="116" cy="-83" r="4"/>
      <circle cx="138" cy="-29" r="4"/>
    </g>

    <!-- Highlighted sector showing one bearing -->
    <path d="M 0,0 L 138,-29 A 160,160 0 0,0 138,29 Z" fill="#1b5e20" opacity="0.5" stroke="#1b5e20" stroke-width="2"/>
    <text x="170" y="0" font-size="11" fill="#1b5e20" font-weight="700">Active sector</text>
    <text x="170" y="14" font-size="10" fill="#1b5e20">22.5° azimuth</text>

    <!-- Center marker -->
    <circle cx="0" cy="0" r="6" fill="#003D6B"/>
    <text x="0" y="-12" text-anchor="middle" font-size="10" fill="#003D6B" font-weight="600">Antenna axis</text>

    <!-- Compass directions -->
    <text x="0" y="-175" text-anchor="middle" font-size="11" fill="#627d98" font-weight="600">N</text>
    <text x="180" y="4" text-anchor="middle" font-size="11" fill="#627d98" font-weight="600">E</text>
    <text x="0" y="185" text-anchor="middle" font-size="11" fill="#627d98" font-weight="600">S</text>
    <text x="-180" y="4" text-anchor="middle" font-size="11" fill="#627d98" font-weight="600">W</text>
  </g>

  <!-- SIDE VIEW (right): elevation -->
  <g transform="translate(700,280)">
    <text x="0" y="-200" text-anchor="middle" font-size="14" font-weight="700" fill="#2C3E50">Side View (Elevation)</text>

    <!-- Ground line -->
    <line x1="-180" y1="100" x2="180" y2="100" stroke="#486581" stroke-width="2"/>
    <text x="170" y="115" text-anchor="end" font-size="10" fill="#627d98">ground</text>

    <!-- Antenna mast -->
    <line x1="0" y1="100" x2="0" y2="0" stroke="#2C3E50" stroke-width="3"/>

    <!-- Radome side profile -->
    <ellipse cx="0" cy="-15" rx="50" ry="80" fill="url(#radomeGrad)" stroke="#486581" stroke-width="2"/>

    <!-- Two antenna stack per sector showing elevation tilt -->
    <line x1="-50" y1="-50" x2="50" y2="-50" stroke="#003D6B" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#003D6B" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="65" y="-45" font-size="10" fill="#003D6B">upper antenna</text>
    <text x="65" y="5" font-size="10" fill="#003D6B">lower antenna</text>

    <!-- Elevation rays -->
    <line x1="0" y1="-25" x2="170" y2="-25" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="175" y="-22" font-size="11" fill="#1b5e20" font-weight="600">0° (horizon)</text>

    <line x1="0" y1="-25" x2="160" y2="-90" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="170" y="-90" font-size="11" fill="#1b5e20" font-weight="600">+30° (drone)</text>

    <line x1="0" y1="-25" x2="40" y2="-160" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="50" y="-160" font-size="11" fill="#1b5e20" font-weight="600">+80° (overhead)</text>

    <line x1="0" y1="-25" x2="170" y2="-5" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.7"/>
    <text x="170" y="8" font-size="10" fill="#c0392b">+5° (filtered out)</text>
  </g>

  <!-- KEY SPECS / LEGEND -->
  <g transform="translate(50,460)">
    <rect x="0" y="0" width="1000" height="60" fill="#ECEFF1" stroke="#0078B6" rx="6"/>
    <text x="20" y="22" font-size="13" font-weight="700" fill="#003D6B">Key Specs:</text>
    <text x="120" y="22" font-size="12" fill="#2C3E50"><tspan font-weight="600">16 sectors</tspan> × 2 antennas = <tspan font-weight="600">32 antennas total</tspan></text>
    <text x="400" y="22" font-size="12" fill="#2C3E50"><tspan font-weight="600">400 MHz - 40 GHz</tspan> coverage</text>
    <text x="650" y="22" font-size="12" fill="#2C3E50"><tspan font-weight="600">8 µs/sector</tspan> bearing speed</text>
    <text x="20" y="44" font-size="12" fill="#2C3E50"><tspan font-weight="600">1° accuracy</tspan> (with SPECTRAN V6 PLUS) | <tspan font-weight="600">60 dBi</tspan> max gain | <tspan font-weight="600">Ethernet + power</tspan> integration | <tspan font-weight="600">Watertight, shock and heat resistant</tspan> radome</text>
  </g>
</svg>
