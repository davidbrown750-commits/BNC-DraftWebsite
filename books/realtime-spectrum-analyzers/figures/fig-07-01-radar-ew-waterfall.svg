<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <linearGradient id="ampGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#003D6B"/>
      <stop offset="40%" stop-color="#0078B6"/>
      <stop offset="70%" stop-color="#0078B6"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>

  <text x="550" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">Figure 7-1: Radar and EW Signatures on a Waterfall Display</text>
  <text x="550" y="48" text-anchor="middle" font-size="12" fill="#486581">Each emitter type leaves a recognizable pattern in time-frequency space.</text>

  <!-- Waterfall area -->
  <rect x="60" y="80" width="700" height="380" fill="#003D6B" stroke="#2C3E50" stroke-width="2"/>

  <!-- X axis (frequency) -->
  <line x1="60" y1="465" x2="760" y2="465" stroke="#486581" stroke-width="1"/>
  <text x="60" y="485" text-anchor="middle" font-size="11" fill="#486581">2.40 GHz</text>
  <text x="200" y="485" text-anchor="middle" font-size="11" fill="#486581">2.45</text>
  <text x="410" y="485" text-anchor="middle" font-size="11" fill="#486581">5.50</text>
  <text x="620" y="485" text-anchor="middle" font-size="11" fill="#486581">9.0 GHz</text>
  <text x="410" y="505" text-anchor="middle" font-size="12" fill="#486581" font-weight="600">Frequency →</text>

  <!-- Y axis (time) -->
  <line x1="50" y1="80" x2="50" y2="460" stroke="#486581" stroke-width="1"/>
  <text x="40" y="85" text-anchor="end" font-size="11" fill="#486581">now</text>
  <text x="40" y="465" text-anchor="end" font-size="11" fill="#486581">10s ago</text>
  <text x="20" y="270" text-anchor="middle" font-size="12" fill="#486581" font-weight="600" transform="rotate(-90 20 270)">Time →</text>

  <!-- Background noise -->
  <g opacity="0.3">
    <rect x="60" y="80" width="700" height="380" fill="#2C3E50"/>
  </g>

  <!-- Continuous wave (CW) - vertical stripe at single frequency -->
  <rect x="180" y="80" width="3" height="380" fill="#0078B6" opacity="0.9"/>
  <text x="186" y="100" font-size="11" fill="#fff" font-weight="600">CW carrier</text>

  <!-- LFM chirp - diagonal stripes -->
  <line x1="220" y1="200" x2="280" y2="180" stroke="#0078B6" stroke-width="3"/>
  <line x1="220" y1="280" x2="280" y2="260" stroke="#0078B6" stroke-width="3"/>
  <line x1="220" y1="360" x2="280" y2="340" stroke="#0078B6" stroke-width="3"/>
  <text x="225" y="195" font-size="11" fill="#0078B6" font-weight="600">LFM chirp</text>
  <text x="225" y="395" font-size="10" fill="#0078B6" opacity="0.85">(slope = chirp rate)</text>

  <!-- Frequency-hopping radar - scattered dots -->
  <g fill="#c0392b">
    <circle cx="320" cy="120" r="3"/>
    <circle cx="350" cy="135" r="3"/>
    <circle cx="305" cy="155" r="3"/>
    <circle cx="365" cy="170" r="3"/>
    <circle cx="320" cy="185" r="3"/>
    <circle cx="345" cy="205" r="3"/>
    <circle cx="310" cy="220" r="3"/>
    <circle cx="360" cy="240" r="3"/>
    <circle cx="325" cy="255" r="3"/>
    <circle cx="350" cy="275" r="3"/>
    <circle cx="305" cy="295" r="3"/>
    <circle cx="365" cy="315" r="3"/>
    <circle cx="320" cy="335" r="3"/>
    <circle cx="345" cy="355" r="3"/>
    <circle cx="310" cy="375" r="3"/>
    <circle cx="360" cy="395" r="3"/>
    <circle cx="325" cy="415" r="3"/>
    <circle cx="350" cy="435" r="3"/>
  </g>
  <text x="305" y="105" font-size="11" fill="#c0392b" font-weight="600">FHSS hopper</text>

  <!-- Sweep jammer - sweeping diagonal -->
  <path d="M 410,80 L 500,460" stroke="#0078B6" stroke-width="2" opacity="0.85"/>
  <text x="430" y="100" font-size="11" fill="#0078B6" font-weight="600">Sweep jammer</text>

  <!-- Spot jammer - solid bright vertical stripe -->
  <rect x="540" y="80" width="6" height="380" fill="#c0392b" opacity="0.95"/>
  <text x="550" y="100" font-size="11" fill="#c0392b" font-weight="600">Spot jammer</text>

  <!-- Barrage jammer - wide noise field -->
  <rect x="600" y="200" width="150" height="160" fill="#0078B6" opacity="0.45"/>
  <text x="605" y="195" font-size="11" fill="#0078B6" font-weight="600">Barrage jammer</text>

  <!-- High-PRF radar - many short bright pulses -->
  <g fill="#0078B6" opacity="0.95">
    <rect x="450" y="180" width="3" height="3"/>
    <rect x="450" y="200" width="3" height="3"/>
    <rect x="450" y="220" width="3" height="3"/>
    <rect x="450" y="240" width="3" height="3"/>
    <rect x="450" y="260" width="3" height="3"/>
    <rect x="450" y="280" width="3" height="3"/>
    <rect x="450" y="300" width="3" height="3"/>
    <rect x="450" y="320" width="3" height="3"/>
    <rect x="450" y="340" width="3" height="3"/>
    <rect x="450" y="360" width="3" height="3"/>
    <rect x="450" y="380" width="3" height="3"/>
    <rect x="450" y="400" width="3" height="3"/>
    <rect x="450" y="420" width="3" height="3"/>
  </g>
  <text x="425" y="170" font-size="11" fill="#0078B6" font-weight="600">High-PRF radar (10 ns pulses)</text>

  <!-- LEGEND -->
  <g transform="translate(800,80)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#003D6B">Pattern → Source</text>

    <rect x="0" y="20" width="20" height="10" fill="#0078B6"/>
    <text x="28" y="29" font-size="11" fill="#2C3E50">Stationary tone (CW)</text>

    <line x1="0" y1="50" x2="20" y2="42" stroke="#0078B6" stroke-width="2"/>
    <text x="28" y="49" font-size="11" fill="#2C3E50">Diagonal = chirp / sweep</text>

    <g fill="#c0392b">
      <circle cx="5" cy="68" r="2"/><circle cx="14" cy="65" r="2"/><circle cx="20" cy="72" r="2"/>
    </g>
    <text x="28" y="71" font-size="11" fill="#2C3E50">Scattered = frequency hopping</text>

    <rect x="0" y="84" width="6" height="10" fill="#c0392b"/>
    <text x="28" y="93" font-size="11" fill="#2C3E50">Tall narrow = spot jammer</text>

    <rect x="0" y="104" width="20" height="10" fill="#0078B6" opacity="0.45"/>
    <text x="28" y="113" font-size="11" fill="#2C3E50">Wide cloud = barrage jammer</text>

    <g fill="#0078B6">
      <rect x="0" y="125" width="3" height="3"/>
      <rect x="0" y="131" width="3" height="3"/>
      <rect x="0" y="137" width="3" height="3"/>
    </g>
    <text x="10" y="135" font-size="11" fill="#2C3E50">Vertical dots = high-PRF radar</text>

    <text x="0" y="170" font-size="13" font-weight="700" fill="#003D6B">RTSA Capability</text>
    <text x="0" y="190" font-size="11" fill="#2C3E50">RTBW: 490 MHz captures all</text>
    <text x="0" y="205" font-size="11" fill="#2C3E50">simultaneously in this view.</text>
    <text x="0" y="225" font-size="11" fill="#2C3E50">POI: 10 ns catches every pulse</text>
    <text x="0" y="240" font-size="11" fill="#2C3E50">in the high-PRF train.</text>
    <text x="0" y="260" font-size="11" fill="#2C3E50">PDW extraction emits a stream</text>
    <text x="0" y="275" font-size="11" fill="#2C3E50">of timestamped pulse records</text>
    <text x="0" y="290" font-size="11" fill="#2C3E50">for downstream classification.</text>

    <text x="0" y="320" font-size="13" font-weight="700" fill="#003D6B">Add IsoLOG 3D DF:</text>
    <text x="0" y="340" font-size="11" fill="#2C3E50">Each detected pulse gets a</text>
    <text x="0" y="355" font-size="11" fill="#2C3E50">bearing + elevation. Result:</text>
    <text x="0" y="370" font-size="11" fill="#003D6B" font-weight="600">3D electromagnetic battlefield</text>
  </g>
</svg>
