<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <linearGradient id="watergrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#003D6B"/>
      <stop offset="20%" stop-color="#003D6B"/>
      <stop offset="40%" stop-color="#0078B6"/>
      <stop offset="60%" stop-color="#1b5e20"/>
      <stop offset="80%" stop-color="#0078B6"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>

  <text x="600" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">RTSA Suite PRO Display Mockup (Stylized)</text>
  <text x="600" y="48" text-anchor="middle" font-size="12" fill="#486581">Representative composite view: live trace, waterfall, persistence, and control panel.</text>

  <!-- Main window frame -->
  <rect x="40" y="70" width="1120" height="600" fill="#003D6B" rx="8"/>
  <rect x="40" y="70" width="1120" height="35" fill="#003D6B" rx="8"/>
  <text x="60" y="92" font-size="13" font-weight="700" fill="#fff">RTSA Suite PRO - SPECTRAN V6 PLUS 2000XA-6 - 2.45 GHz Center, 100 MHz Span</text>
  <circle cx="1120" cy="87" r="6" fill="#c0392b"/>
  <circle cx="1100" cy="87" r="6" fill="#0078B6"/>
  <circle cx="1080" cy="87" r="6" fill="#1b5e20"/>

  <!-- Live trace panel (top left) -->
  <rect x="55" y="120" width="540" height="220" fill="#1a1a1a" stroke="#486581"/>
  <text x="65" y="140" font-size="11" font-weight="700" fill="#7fb77e">LIVE TRACE - Hann window, 4096-pt FFT</text>

  <!-- Spectrum trace path -->
  <path d="M 60,310 Q 80,300 100,295 L 130,290 Q 160,275 180,265 L 220,250 Q 250,180 270,140 L 280,135 Q 290,140 295,180 L 310,260 Q 340,290 380,300 L 420,295 Q 440,250 460,200 L 470,210 Q 490,260 510,295 L 540,300 Q 560,290 580,295 L 590,300"
        fill="none" stroke="#7fb77e" stroke-width="1.5"/>

  <!-- Marker -->
  <line x1="280" y1="135" x2="280" y2="320" stroke="#0078B6" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="285" y="155" font-size="10" fill="#0078B6">M1: 2.437 GHz, -28 dBm</text>

  <!-- Grid -->
  <g stroke="#2C3E50" stroke-width="0.5">
    <line x1="60" y1="170" x2="585" y2="170"/>
    <line x1="60" y1="220" x2="585" y2="220"/>
    <line x1="60" y1="270" x2="585" y2="270"/>
  </g>
  <text x="58" y="172" text-anchor="end" font-size="9" fill="#bcccdc">-30</text>
  <text x="58" y="222" text-anchor="end" font-size="9" fill="#bcccdc">-60</text>
  <text x="58" y="272" text-anchor="end" font-size="9" fill="#bcccdc">-90 dBm</text>

  <!-- Waterfall panel (bottom left) -->
  <rect x="55" y="350" width="540" height="280" fill="#1a1a1a" stroke="#486581"/>
  <text x="65" y="370" font-size="11" font-weight="700" fill="#0078B6">WATERFALL - 30 sec history</text>

  <!-- Stylized waterfall using gradient noise -->
  <rect x="60" y="380" width="525" height="240" fill="url(#watergrad)" opacity="0.4"/>
  <!-- Wi-Fi channel -->
  <rect x="180" y="385" width="90" height="240" fill="#0078B6" opacity="0.35"/>
  <rect x="350" y="385" width="90" height="240" fill="#0078B6" opacity="0.35"/>
  <!-- Bluetooth hops -->
  <g fill="#0078B6" opacity="0.95">
    <rect x="100" y="410" width="3" height="3"/>
    <rect x="240" y="425" width="3" height="3"/>
    <rect x="380" y="445" width="3" height="3"/>
    <rect x="320" y="460" width="3" height="3"/>
    <rect x="450" y="475" width="3" height="3"/>
    <rect x="200" y="490" width="3" height="3"/>
    <rect x="500" y="505" width="3" height="3"/>
    <rect x="350" y="520" width="3" height="3"/>
    <rect x="120" y="535" width="3" height="3"/>
    <rect x="280" y="550" width="3" height="3"/>
    <rect x="420" y="565" width="3" height="3"/>
    <rect x="180" y="580" width="3" height="3"/>
    <rect x="330" y="595" width="3" height="3"/>
  </g>
  <text x="225" y="510" font-size="9" fill="#fff" font-weight="700" opacity="0.7">Wi-Fi ch 6</text>
  <text x="395" y="510" font-size="9" fill="#fff" font-weight="700" opacity="0.7">Wi-Fi ch 11</text>

  <!-- Persistence panel (top right) -->
  <rect x="610" y="120" width="270" height="280" fill="#1a1a1a" stroke="#486581"/>
  <text x="620" y="140" font-size="11" font-weight="700" fill="#003D6B">PERSISTENCE</text>

  <!-- Persistence dots scatter -->
  <g fill="#0078B6">
    <circle cx="700" cy="200" r="2"/>
    <circle cx="720" cy="220" r="3"/>
    <circle cx="730" cy="180" r="4"/>
    <circle cx="740" cy="240" r="2"/>
    <circle cx="750" cy="260" r="3"/>
    <circle cx="760" cy="190" r="4"/>
    <circle cx="780" cy="280" r="3"/>
    <circle cx="800" cy="220" r="2"/>
    <circle cx="810" cy="200" r="5"/>
    <circle cx="820" cy="240" r="3"/>
    <circle cx="830" cy="180" r="2"/>
  </g>
  <g fill="#c0392b">
    <circle cx="780" cy="170" r="6"/>
    <circle cx="785" cy="175" r="5"/>
  </g>
  <text x="790" y="160" font-size="9" fill="#c0392b" font-weight="700">rare burst</text>

  <!-- Control panel (right side) -->
  <rect x="610" y="410" width="270" height="220" fill="#2C3E50" stroke="#486581" rx="4"/>
  <text x="620" y="430" font-size="11" font-weight="700" fill="#fff">CONTROL PANEL</text>

  <text x="620" y="455" font-size="10" fill="#bcccdc">Center freq:</text>
  <rect x="700" y="445" width="170" height="18" fill="#003D6B" stroke="#7fb77e"/>
  <text x="785" y="458" text-anchor="middle" font-size="11" fill="#7fb77e" font-family="Courier New, monospace">2.45 GHz</text>

  <text x="620" y="480" font-size="10" fill="#bcccdc">Span:</text>
  <rect x="700" y="470" width="170" height="18" fill="#003D6B" stroke="#7fb77e"/>
  <text x="785" y="483" text-anchor="middle" font-size="11" fill="#7fb77e" font-family="Courier New, monospace">100 MHz</text>

  <text x="620" y="505" font-size="10" fill="#bcccdc">RBW:</text>
  <rect x="700" y="495" width="170" height="18" fill="#003D6B" stroke="#7fb77e"/>
  <text x="785" y="508" text-anchor="middle" font-size="11" fill="#7fb77e" font-family="Courier New, monospace">100 kHz</text>

  <text x="620" y="530" font-size="10" fill="#bcccdc">FFT length:</text>
  <rect x="700" y="520" width="170" height="18" fill="#003D6B" stroke="#7fb77e"/>
  <text x="785" y="533" text-anchor="middle" font-size="11" fill="#7fb77e" font-family="Courier New, monospace">4096</text>

  <text x="620" y="555" font-size="10" fill="#bcccdc">Window:</text>
  <rect x="700" y="545" width="170" height="18" fill="#003D6B" stroke="#7fb77e"/>
  <text x="785" y="558" text-anchor="middle" font-size="11" fill="#7fb77e" font-family="Courier New, monospace">Hann</text>

  <text x="620" y="580" font-size="10" fill="#bcccdc">Recording:</text>
  <rect x="700" y="570" width="170" height="18" fill="#1b5e20"/>
  <circle cx="715" cy="579" r="5" fill="#c0392b"/>
  <text x="780" y="583" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">REC 24/7</text>

  <text x="620" y="608" font-size="10" fill="#bcccdc">FMT:</text>
  <rect x="700" y="598" width="170" height="18" fill="#003D6B"/>
  <text x="785" y="611" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">ARMED</text>

  <!-- Bottom band: visual graph editor preview -->
  <rect x="900" y="120" width="245" height="510" fill="#1a1a1a" stroke="#486581"/>
  <text x="910" y="140" font-size="11" font-weight="700" fill="#7fb77e">VISUAL PIPELINE</text>

  <g transform="translate(910,160)">
    <rect x="0" y="0" width="220" height="35" fill="#1b5e20" rx="3"/>
    <text x="110" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">SPECTRAN Source</text>

    <line x1="110" y1="40" x2="110" y2="60" stroke="#7fb77e" stroke-width="2"/>
    <polygon points="105,55 115,55 110,65" fill="#7fb77e"/>

    <rect x="0" y="65" width="220" height="35" fill="#0078B6" rx="3"/>
    <text x="110" y="87" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Decimator (245→5 MHz)</text>

    <line x1="110" y1="105" x2="110" y2="125" stroke="#7fb77e" stroke-width="2"/>
    <polygon points="105,120 115,120 110,130" fill="#7fb77e"/>

    <rect x="0" y="130" width="220" height="35" fill="#0078B6" rx="3"/>
    <text x="110" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">RRC Matched Filter</text>

    <line x1="110" y1="170" x2="110" y2="190" stroke="#7fb77e" stroke-width="2"/>
    <polygon points="105,185 115,185 110,195" fill="#7fb77e"/>

    <rect x="0" y="195" width="220" height="35" fill="#003D6B" rx="3"/>
    <text x="110" y="217" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">QPSK Demod + EVM</text>

    <line x1="110" y1="235" x2="110" y2="255" stroke="#7fb77e" stroke-width="2"/>
    <polygon points="105,250 115,250 110,260" fill="#7fb77e"/>

    <rect x="0" y="260" width="220" height="35" fill="#c0392b" rx="3"/>
    <text x="110" y="282" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Constellation View</text>

    <line x1="110" y1="300" x2="110" y2="320" stroke="#7fb77e" stroke-width="2"/>
    <polygon points="105,315 115,315 110,325" fill="#7fb77e"/>

    <rect x="0" y="325" width="220" height="35" fill="#486581" rx="3"/>
    <text x="110" y="347" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">SigMF Recorder</text>

    <text x="110" y="385" text-anchor="middle" font-size="10" fill="#bcccdc">Drag &amp; drop blocks</text>
    <text x="110" y="402" text-anchor="middle" font-size="10" fill="#bcccdc">Edit parameters live</text>
    <text x="110" y="419" text-anchor="middle" font-size="10" fill="#bcccdc">Custom Python / C++</text>
    <text x="110" y="436" text-anchor="middle" font-size="10" fill="#bcccdc">blocks supported</text>
  </g>

  <text x="600" y="680" text-anchor="middle" font-size="10" fill="#486581" font-style="italic">Stylized representation. Actual screenshots require capture from RTSA Suite PRO running on Aaronia hardware.</text>
</svg>
