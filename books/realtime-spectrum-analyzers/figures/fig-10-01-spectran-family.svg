<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <text x="550" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">Figure 10-1: SPECTRAN V6 PLUS Family at a Glance</text>
  <text x="550" y="48" text-anchor="middle" font-size="12" fill="#486581">Four models, one software ecosystem, scaling from 44 MHz education tier to 490 MHz mmWave/EW.</text>

  <!-- Four product cards -->
  <!-- ECO 100XA-6 -->
  <g transform="translate(40,80)">
    <rect x="0" y="0" width="240" height="380" fill="#fff" stroke="#bcccdc" stroke-width="2" rx="8"/>
    <rect x="0" y="0" width="240" height="50" fill="#bcccdc" rx="8"/>
    <text x="120" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#003D6B">SPECTRAN V6</text>
    <text x="120" y="44" text-anchor="middle" font-size="13" font-weight="700" fill="#003D6B">ECO 100XA-6</text>

    <!-- Stylized USB form factor -->
    <rect x="40" y="65" width="160" height="60" fill="#2C3E50" rx="4"/>
    <rect x="190" y="80" width="20" height="30" fill="#627d98"/>
    <text x="120" y="100" text-anchor="middle" font-size="11" fill="#fff">USB</text>

    <text x="120" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#2C3E50">44 MHz RTBW</text>

    <line x1="20" y1="175" x2="220" y2="175" stroke="#bcccdc"/>

    <text x="20" y="200" font-size="11" fill="#486581">Frequency: 9 kHz - 6 GHz</text>
    <text x="20" y="220" font-size="11" fill="#486581">Vector SG: No</text>
    <text x="20" y="240" font-size="11" fill="#486581">Cascadable: Yes</text>
    <text x="20" y="260" font-size="11" fill="#486581">POI: 10 ns</text>
    <text x="20" y="280" font-size="11" fill="#486581">Software: RTSA Suite PRO</text>

    <line x1="20" y1="295" x2="220" y2="295" stroke="#bcccdc"/>

    <text x="120" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#1b5e20">Best for</text>
    <text x="120" y="340" text-anchor="middle" font-size="11" fill="#2C3E50">Education,</text>
    <text x="120" y="355" text-anchor="middle" font-size="11" fill="#2C3E50">hobbyist, budget</text>
    <text x="120" y="370" text-anchor="middle" font-size="11" fill="#2C3E50">monitoring</text>
  </g>

  <!-- PLUS 250XA-6 -->
  <g transform="translate(290,80)">
    <rect x="0" y="0" width="240" height="380" fill="#fff" stroke="#0078B6" stroke-width="2" rx="8"/>
    <rect x="0" y="0" width="240" height="50" fill="#0078B6" rx="8"/>
    <text x="120" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">SPECTRAN V6</text>
    <text x="120" y="44" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">PLUS 250XA-6</text>

    <rect x="40" y="65" width="160" height="60" fill="#003D6B" rx="4"/>
    <rect x="190" y="80" width="20" height="30" fill="#0078B6"/>
    <text x="120" y="100" text-anchor="middle" font-size="11" fill="#fff">USB-C</text>

    <text x="120" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#003D6B">80 MHz (120 opt)</text>

    <line x1="20" y1="175" x2="220" y2="175" stroke="#cbd2d9"/>

    <text x="20" y="200" font-size="11" fill="#486581">Frequency: 9 kHz - 6/8 GHz</text>
    <text x="20" y="220" font-size="11" fill="#486581">Vector SG: No</text>
    <text x="20" y="240" font-size="11" fill="#486581">Cascadable: Yes</text>
    <text x="20" y="260" font-size="11" fill="#486581">POI: 10 ns</text>
    <text x="20" y="280" font-size="11" fill="#486581">Software: RTSA Suite PRO</text>

    <line x1="20" y1="295" x2="220" y2="295" stroke="#cbd2d9"/>

    <text x="120" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#003D6B">Best for</text>
    <text x="120" y="340" text-anchor="middle" font-size="11" fill="#2C3E50">General field,</text>
    <text x="120" y="355" text-anchor="middle" font-size="11" fill="#2C3E50">ISM, BLE/Wi-Fi,</text>
    <text x="120" y="370" text-anchor="middle" font-size="11" fill="#2C3E50">interference hunt</text>
  </g>

  <!-- PLUS 500XA-6 -->
  <g transform="translate(540,80)">
    <rect x="0" y="0" width="240" height="380" fill="#fff" stroke="#003D6B" stroke-width="2" rx="8"/>
    <rect x="0" y="0" width="240" height="50" fill="#003D6B" rx="8"/>
    <text x="120" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">SPECTRAN V6</text>
    <text x="120" y="44" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">PLUS 500XA-6</text>

    <rect x="40" y="65" width="160" height="60" fill="#2C3E50" rx="4"/>
    <rect x="190" y="80" width="20" height="30" fill="#0078B6"/>
    <rect x="50" y="75" width="40" height="14" fill="#0078B6" rx="2"/>
    <text x="70" y="86" text-anchor="middle" font-size="9" fill="#2C3E50" font-weight="700">VSG</text>
    <text x="120" y="115" text-anchor="middle" font-size="11" fill="#fff">USB-C + Tx</text>

    <text x="120" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#003D6B">80 MHz + Vector SG</text>

    <line x1="20" y1="175" x2="220" y2="175" stroke="#cbd2d9"/>

    <text x="20" y="200" font-size="11" fill="#486581">Frequency: 9 kHz - 6/8 GHz</text>
    <text x="20" y="220" font-size="11" fill="#486581">Vector SG: YES</text>
    <text x="20" y="240" font-size="11" fill="#486581">Cascadable: Yes</text>
    <text x="20" y="260" font-size="11" fill="#486581">POI: 10 ns</text>
    <text x="20" y="280" font-size="11" fill="#486581">Software: RTSA Suite PRO</text>

    <line x1="20" y1="295" x2="220" y2="295" stroke="#cbd2d9"/>

    <text x="120" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#003D6B">Best for</text>
    <text x="120" y="340" text-anchor="middle" font-size="11" fill="#2C3E50">Tx/Rx test bench,</text>
    <text x="120" y="355" text-anchor="middle" font-size="11" fill="#2C3E50">transmitter validation,</text>
    <text x="120" y="370" text-anchor="middle" font-size="11" fill="#2C3E50">stimulus-response</text>
  </g>

  <!-- PLUS 2000XA-6 -->
  <g transform="translate(790,80)">
    <rect x="0" y="0" width="240" height="380" fill="#fff" stroke="#1b5e20" stroke-width="3" rx="8"/>
    <rect x="0" y="0" width="240" height="50" fill="#1b5e20" rx="8"/>
    <text x="120" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">SPECTRAN V6</text>
    <text x="120" y="44" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">PLUS 2000XA-6</text>
    <text x="220" y="14" font-size="9" fill="#fff" font-weight="700">FLAGSHIP</text>

    <rect x="40" y="65" width="160" height="60" fill="#0d3d0d" rx="4"/>
    <rect x="190" y="80" width="20" height="30" fill="#7fb77e"/>
    <rect x="50" y="75" width="40" height="14" fill="#7fb77e" rx="2"/>
    <text x="70" y="86" text-anchor="middle" font-size="9" fill="#0d3d0d" font-weight="700">VSG</text>
    <text x="120" y="115" text-anchor="middle" font-size="11" fill="#fff">USB-C + Tx</text>

    <text x="120" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">160/245/490 MHz + VSG</text>

    <line x1="20" y1="175" x2="220" y2="175" stroke="#cbd2d9"/>

    <text x="20" y="200" font-size="11" fill="#486581">Frequency: 9 kHz - high tier</text>
    <text x="20" y="220" font-size="11" fill="#486581">Vector SG: YES</text>
    <text x="20" y="240" font-size="11" fill="#486581">Cascadable: Yes (4× = 1 GHz)</text>
    <text x="20" y="260" font-size="11" fill="#486581">POI: 10 ns</text>
    <text x="20" y="280" font-size="11" fill="#486581">Software: RTSA Suite PRO</text>

    <line x1="20" y1="295" x2="220" y2="295" stroke="#cbd2d9"/>

    <text x="120" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#1b5e20">Best for</text>
    <text x="120" y="340" text-anchor="middle" font-size="11" fill="#2C3E50">5G FR2 mmWave,</text>
    <text x="120" y="355" text-anchor="middle" font-size="11" fill="#2C3E50">Wi-Fi 7 320 MHz,</text>
    <text x="120" y="370" text-anchor="middle" font-size="11" fill="#2C3E50">EW, broadband monitoring</text>
  </g>

  <!-- Bottom: scaling arrow -->
  <g transform="translate(0,475)">
    <line x1="120" y1="20" x2="980" y2="20" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowEnd)"/>
    <defs>
      <marker id="arrowEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#2C3E50"/>
      </marker>
    </defs>
    <text x="160" y="40" font-size="11" fill="#486581" font-weight="600">Education / Budget</text>
    <text x="550" y="40" text-anchor="middle" font-size="11" fill="#486581" font-weight="600">Capability scales →</text>
    <text x="900" y="40" text-anchor="end" font-size="11" fill="#486581" font-weight="600">mmWave / EW Flagship</text>
  </g>
</svg>
