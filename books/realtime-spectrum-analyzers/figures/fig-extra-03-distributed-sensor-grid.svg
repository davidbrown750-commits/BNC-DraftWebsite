<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <text x="600" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">City-Scale Distributed RTSA Sensor Grid</text>
  <text x="600" y="48" text-anchor="middle" font-size="12" fill="#486581">Star topology with central RTSA Suite PRO server, GPSDO-synchronized sensors, MQTT to ops dashboard.</text>

  <!-- Map background -->
  <rect x="40" y="70" width="800" height="500" fill="#e4e7eb" stroke="#bcccdc"/>
  <!-- Roads -->
  <line x1="40" y1="200" x2="840" y2="200" stroke="#9fb3c8" stroke-width="3"/>
  <line x1="40" y1="350" x2="840" y2="350" stroke="#9fb3c8" stroke-width="3"/>
  <line x1="200" y1="70" x2="200" y2="570" stroke="#9fb3c8" stroke-width="3"/>
  <line x1="450" y1="70" x2="450" y2="570" stroke="#9fb3c8" stroke-width="3"/>
  <line x1="650" y1="70" x2="650" y2="570" stroke="#9fb3c8" stroke-width="3"/>

  <!-- Buildings (gray rectangles) -->
  <g fill="#bcccdc" stroke="#627d98" stroke-width="0.5">
    <rect x="80" y="100" width="80" height="80"/>
    <rect x="240" y="120" width="60" height="60"/>
    <rect x="350" y="100" width="60" height="80"/>
    <rect x="500" y="100" width="100" height="80"/>
    <rect x="700" y="100" width="80" height="80"/>
    <rect x="80" y="240" width="100" height="80"/>
    <rect x="240" y="240" width="180" height="80"/>
    <rect x="500" y="240" width="120" height="80"/>
    <rect x="700" y="240" width="80" height="80"/>
    <rect x="80" y="400" width="80" height="120"/>
    <rect x="240" y="400" width="180" height="120"/>
    <rect x="500" y="400" width="120" height="120"/>
    <rect x="700" y="400" width="80" height="120"/>
  </g>

  <!-- Sensor 1: Downtown skyscraper -->
  <g transform="translate(120,140)">
    <circle r="14" fill="#1b5e20" stroke="#fff" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">S1</text>
    <circle r="40" fill="none" stroke="#1b5e20" stroke-width="1" opacity="0.4"/>
    <circle r="60" fill="none" stroke="#1b5e20" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- Sensor 2: City hall -->
  <g transform="translate(380,140)">
    <circle r="14" fill="#1b5e20" stroke="#fff" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">S2</text>
    <circle r="40" fill="none" stroke="#1b5e20" stroke-width="1" opacity="0.4"/>
    <circle r="60" fill="none" stroke="#1b5e20" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- Sensor 3: Business district -->
  <g transform="translate(550,140)">
    <circle r="14" fill="#1b5e20" stroke="#fff" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">S3</text>
    <circle r="40" fill="none" stroke="#1b5e20" stroke-width="1" opacity="0.4"/>
    <circle r="60" fill="none" stroke="#1b5e20" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- Sensor 4: Stadium -->
  <g transform="translate(740,280)">
    <circle r="14" fill="#1b5e20" stroke="#fff" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">S4</text>
    <circle r="40" fill="none" stroke="#1b5e20" stroke-width="1" opacity="0.4"/>
    <circle r="60" fill="none" stroke="#1b5e20" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- Sensor 5: Hospital -->
  <g transform="translate(330,280)">
    <circle r="14" fill="#1b5e20" stroke="#fff" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">S5</text>
    <circle r="40" fill="none" stroke="#1b5e20" stroke-width="1" opacity="0.4"/>
    <circle r="60" fill="none" stroke="#1b5e20" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- Sensor 6: Airport perimeter -->
  <g transform="translate(120,470)">
    <circle r="14" fill="#1b5e20" stroke="#fff" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">S6</text>
    <circle r="40" fill="none" stroke="#1b5e20" stroke-width="1" opacity="0.4"/>
    <circle r="60" fill="none" stroke="#1b5e20" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- Sensor 7: Power plant -->
  <g transform="translate(330,470)">
    <circle r="14" fill="#1b5e20" stroke="#fff" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">S7</text>
    <circle r="40" fill="none" stroke="#1b5e20" stroke-width="1" opacity="0.4"/>
    <circle r="60" fill="none" stroke="#1b5e20" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- Sensor 8: Port -->
  <g transform="translate(560,470)">
    <circle r="14" fill="#1b5e20" stroke="#fff" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">S8</text>
    <circle r="40" fill="none" stroke="#1b5e20" stroke-width="1" opacity="0.4"/>
    <circle r="60" fill="none" stroke="#1b5e20" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- Sensor 9: University -->
  <g transform="translate(740,470)">
    <circle r="14" fill="#1b5e20" stroke="#fff" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">S9</text>
    <circle r="40" fill="none" stroke="#1b5e20" stroke-width="1" opacity="0.4"/>
    <circle r="60" fill="none" stroke="#1b5e20" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- Central server (right panel) -->
  <rect x="900" y="100" width="260" height="450" fill="#003D6B" stroke="#003D6B" stroke-width="2" rx="6"/>
  <text x="1030" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Central Operations</text>

  <!-- Server illustration -->
  <rect x="950" y="155" width="160" height="100" fill="#2C3E50" rx="3"/>
  <line x1="950" y1="180" x2="1110" y2="180" stroke="#486581"/>
  <line x1="950" y1="205" x2="1110" y2="205" stroke="#486581"/>
  <line x1="950" y1="230" x2="1110" y2="230" stroke="#486581"/>
  <circle cx="965" cy="167" r="3" fill="#7fb77e"/>
  <circle cx="965" cy="192" r="3" fill="#7fb77e"/>
  <circle cx="965" cy="217" r="3" fill="#7fb77e"/>
  <circle cx="965" cy="242" r="3" fill="#7fb77e"/>
  <text x="1090" y="170" text-anchor="end" font-size="9" fill="#bcccdc">Server</text>

  <!-- Software stack listing -->
  <text x="1030" y="285" text-anchor="middle" font-size="11" font-weight="700" fill="#7fb77e">RTSA Suite PRO</text>
  <text x="1030" y="305" text-anchor="middle" font-size="10" fill="#bcccdc">Cross-bearing geolocation</text>
  <text x="1030" y="320" text-anchor="middle" font-size="10" fill="#bcccdc">AI classification</text>
  <text x="1030" y="335" text-anchor="middle" font-size="10" fill="#bcccdc">SigMF archive (84 TB)</text>
  <text x="1030" y="350" text-anchor="middle" font-size="10" fill="#bcccdc">3D map view</text>

  <text x="1030" y="385" text-anchor="middle" font-size="11" font-weight="700" fill="#0078B6">Outputs</text>
  <text x="1030" y="405" text-anchor="middle" font-size="10" fill="#bcccdc">MQTT → C2 dashboards</text>
  <text x="1030" y="420" text-anchor="middle" font-size="10" fill="#bcccdc">REST API → ops tools</text>
  <text x="1030" y="435" text-anchor="middle" font-size="10" fill="#bcccdc">KML → GIS</text>
  <text x="1030" y="450" text-anchor="middle" font-size="10" fill="#bcccdc">Email / SMS alerts</text>

  <text x="1030" y="485" text-anchor="middle" font-size="11" font-weight="700" fill="#0078B6">Time sync</text>
  <text x="1030" y="505" text-anchor="middle" font-size="10" fill="#bcccdc">GPSDO: ~10 ns</text>
  <text x="1030" y="520" text-anchor="middle" font-size="10" fill="#bcccdc">PTP: picoseconds</text>

  <!-- Connection lines from sensors to central -->
  <g stroke="#0078B6" stroke-width="1" stroke-dasharray="3,3" opacity="0.6">
    <line x1="120" y1="140" x2="900" y2="190"/>
    <line x1="380" y1="140" x2="900" y2="200"/>
    <line x1="550" y1="140" x2="900" y2="210"/>
    <line x1="740" y1="280" x2="900" y2="220"/>
    <line x1="330" y1="280" x2="900" y2="230"/>
    <line x1="120" y1="470" x2="900" y2="240"/>
    <line x1="330" y1="470" x2="900" y2="250"/>
    <line x1="560" y1="470" x2="900" y2="260"/>
    <line x1="740" y1="470" x2="900" y2="270"/>
  </g>

  <!-- Legend -->
  <g transform="translate(50,80)">
    <circle r="7" fill="#1b5e20"/>
    <text x="14" y="4" font-size="11" font-weight="600" fill="#2C3E50">SPECTRAN sensor (9 deployed)</text>
  </g>
  <g transform="translate(280,80)">
    <line x1="-12" y1="0" x2="0" y2="0" stroke="#0078B6" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="6" y="4" font-size="11" font-weight="600" fill="#2C3E50">Ethernet stream to central</text>
  </g>

  <text x="600" y="590" text-anchor="middle" font-size="10" fill="#486581" font-style="italic">Coverage from a few square kilometers (corporate campus) up to a metropolitan area (10s of sensors).</text>
</svg>
