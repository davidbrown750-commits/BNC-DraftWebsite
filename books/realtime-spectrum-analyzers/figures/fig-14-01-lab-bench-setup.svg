<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="ar14" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2C3E50"/>
    </marker>
  </defs>

  <text x="550" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">Figure 14-1: Standard Lab Bench Setup</text>
  <text x="550" y="48" text-anchor="middle" font-size="12" fill="#486581">All ten labs share this baseline equipment topology, with optional additions for advanced exercises.</text>

  <!-- Lab bench -->
  <rect x="50" y="320" width="1000" height="20" fill="#003D6B" opacity="0.6" stroke="#2C3E50"/>
  <rect x="50" y="335" width="1000" height="80" fill="#2C3E50" opacity="0.4" stroke="#2C3E50"/>

  <!-- Antenna (left, raised on stand) -->
  <g transform="translate(110,140)">
    <line x1="20" y1="0" x2="20" y2="180" stroke="#2C3E50" stroke-width="2"/>
    <polygon points="0,40 40,40 20,5" fill="#486581"/>
    <text x="20" y="60" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">Ant</text>
    <rect x="5" y="170" width="30" height="15" fill="#2C3E50"/>
    <text x="20" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">Antenna</text>
    <text x="20" y="215" text-anchor="middle" font-size="9" fill="#486581">HyperLOG / OmniLOG</text>
  </g>

  <!-- Coax cable -->
  <line x1="150" y1="190" x2="290" y2="270" stroke="#003D6B" stroke-width="3"/>
  <text x="220" y="225" text-anchor="middle" font-size="10" fill="#003D6B">SMA / N coax</text>

  <!-- SPECTRAN V6 PLUS -->
  <g transform="translate(290,260)">
    <rect x="0" y="0" width="120" height="60" fill="#1b5e20" rx="6"/>
    <rect x="100" y="20" width="20" height="20" fill="#7fb77e"/>
    <text x="60" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">SPECTRAN</text>
    <text x="60" y="38" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">V6 PLUS</text>
    <text x="60" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#1b5e20">RTSA</text>
    <text x="60" y="95" text-anchor="middle" font-size="9" fill="#486581">USB-C bus powered</text>
  </g>

  <!-- USB cable to host -->
  <line x1="410" y1="290" x2="540" y2="290" stroke="#2C3E50" stroke-width="3"/>
  <text x="475" y="280" text-anchor="middle" font-size="10" fill="#2C3E50">USB-C</text>

  <!-- Host computer -->
  <g transform="translate(540,240)">
    <rect x="0" y="0" width="180" height="100" fill="#2C3E50" rx="6"/>
    <rect x="10" y="10" width="160" height="80" fill="#003D6B"/>
    <rect x="10" y="85" width="160" height="5" fill="#486581"/>
    <text x="90" y="42" text-anchor="middle" font-size="12" font-weight="700" fill="#7fb77e">RTSA Suite PRO</text>
    <text x="90" y="58" text-anchor="middle" font-size="10" fill="#bcccdc">Waterfall • Persistence</text>
    <text x="90" y="72" text-anchor="middle" font-size="10" fill="#bcccdc">Modulation • DF • PDW</text>
    <text x="90" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">Host Computer</text>
    <text x="90" y="135" text-anchor="middle" font-size="9" fill="#486581">Windows / Linux / macOS</text>
  </g>

  <!-- Test signal source (right) -->
  <g transform="translate(800,260)">
    <rect x="0" y="0" width="120" height="60" fill="#003D6B" rx="6"/>
    <text x="60" y="22" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">Wi-Fi Router</text>
    <text x="60" y="36" text-anchor="middle" font-size="9" fill="#fff">/ VSG / Bluetooth</text>
    <text x="60" y="49" text-anchor="middle" font-size="9" fill="#fff">/ pulse generator</text>
    <text x="60" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#003D6B">Test Signal</text>
    <text x="60" y="95" text-anchor="middle" font-size="9" fill="#486581">Per-lab specific</text>

    <!-- Antenna sticking up -->
    <line x1="100" y1="0" x2="100" y2="-30" stroke="#2C3E50" stroke-width="2"/>
    <circle cx="100" cy="-30" r="4" fill="#003D6B"/>
  </g>

  <!-- Optional: external storage for Lab 9 -->
  <g transform="translate(540,420)">
    <rect x="0" y="0" width="120" height="40" fill="#486581" rx="4"/>
    <text x="60" y="25" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">External SSD/NAS</text>
    <text x="60" y="60" text-anchor="middle" font-size="9" fill="#486581">(Lab 9: 24/7 recording)</text>
    <line x1="60" y1="0" x2="60" y2="-15" stroke="#486581" stroke-width="2" stroke-dasharray="3,2"/>
  </g>

  <!-- Optional: IsoLOG 3D DF (above) -->
  <g transform="translate(880,80)">
    <ellipse cx="50" cy="40" rx="50" ry="35" fill="url(#radomeGrad14)" stroke="#486581" stroke-width="2"/>
    <defs>
      <radialGradient id="radomeGrad14">
        <stop offset="0%" stop-color="#bcccdc"/>
        <stop offset="100%" stop-color="#486581"/>
      </radialGradient>
    </defs>
    <text x="50" y="46" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">IsoLOG 3D DF</text>
    <text x="50" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#486581">Lab 8</text>
    <text x="50" y="115" text-anchor="middle" font-size="9" fill="#486581">Direction Finding</text>
    <line x1="50" y1="75" x2="50" y2="180" stroke="#486581" stroke-width="2" stroke-dasharray="4,3"/>
    <line x1="50" y1="180" x2="350" y2="280" stroke="#486581" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="240" y="195" font-size="9" fill="#486581" font-style="italic">Ethernet + power</text>
  </g>

  <!-- Optional: Second SPECTRAN for Lab 10 -->
  <g transform="translate(290,140)">
    <rect x="0" y="0" width="120" height="60" fill="#1b5e20" opacity="0.6" stroke="#1b5e20" stroke-dasharray="4,3" rx="6"/>
    <text x="60" y="32" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="700">Second</text>
    <text x="60" y="46" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="700">SPECTRAN</text>
    <text x="60" y="80" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="700">Lab 10: Cascading</text>
    <line x1="120" y1="50" x2="290" y2="270" stroke="#1b5e20" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="220" y="160" font-size="9" fill="#1b5e20" font-style="italic">10 MHz reference</text>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(60,490)">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#003D6B">Solid lines: baseline equipment for all 10 labs.</text>
    <text x="380" y="0" font-size="11" font-weight="700" fill="#486581">Dashed lines: optional additions for advanced labs (8, 9, 10).</text>
  </g>
</svg>
