<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <text x="550" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">Figure 11-1: Mission-Critical Applications by Sector</text>
  <text x="550" y="48" text-anchor="middle" font-size="12" fill="#486581">Eight sectors, each with characteristic RF problems and RTSA capabilities that address them.</text>

  <!-- Center hub -->
  <g transform="translate(550,290)">
    <circle r="80" fill="#003D6B" stroke="#fff" stroke-width="3"/>
    <text x="0" y="-8" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">RTSA-Based</text>
    <text x="0" y="10" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">RF Awareness</text>
    <text x="0" y="28" text-anchor="middle" font-size="11" fill="#bcccdc">SPECTRAN + IsoLOG</text>
  </g>

  <!-- Eight sector circles around the hub -->
  <!-- Top: Cellular/5G -->
  <g transform="translate(550,90)">
    <circle r="55" fill="#0078B6" opacity="0.9"/>
    <text x="0" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Cellular /</text>
    <text x="0" y="2" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">5G / 6G</text>
    <text x="0" y="22" text-anchor="middle" font-size="9" fill="#fff">100-400 MHz RTBW</text>
    <text x="0" y="34" text-anchor="middle" font-size="9" fill="#fff">EVM @ 1024-QAM</text>
  </g>
  <line x1="550" y1="155" x2="550" y2="200" stroke="#0078B6" stroke-width="2"/>

  <!-- Top-right: Aerospace -->
  <g transform="translate(770,170)">
    <circle r="55" fill="#003D6B" opacity="0.9"/>
    <text x="0" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Aerospace /</text>
    <text x="0" y="2" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Avionics</text>
    <text x="0" y="22" text-anchor="middle" font-size="9" fill="#fff">DO-160, ADS-B</text>
    <text x="0" y="34" text-anchor="middle" font-size="9" fill="#fff">Radar altimeter</text>
  </g>
  <line x1="725" y1="200" x2="640" y2="245" stroke="#003D6B" stroke-width="2"/>

  <!-- Right: Satellite/GNSS -->
  <g transform="translate(870,290)">
    <circle r="55" fill="#1b5e20" opacity="0.9"/>
    <text x="0" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Satellite /</text>
    <text x="0" y="2" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">GNSS</text>
    <text x="0" y="22" text-anchor="middle" font-size="9" fill="#fff">GPS spoofing det.</text>
    <text x="0" y="34" text-anchor="middle" font-size="9" fill="#fff">Phase coherent</text>
  </g>
  <line x1="815" y1="290" x2="640" y2="290" stroke="#1b5e20" stroke-width="2"/>

  <!-- Bottom-right: Defense/EW -->
  <g transform="translate(770,410)">
    <circle r="55" fill="#c0392b" opacity="0.9"/>
    <text x="0" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Defense /</text>
    <text x="0" y="2" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">EW</text>
    <text x="0" y="22" text-anchor="middle" font-size="9" fill="#fff">10 ns POI, 490 MHz</text>
    <text x="0" y="34" text-anchor="middle" font-size="9" fill="#fff">IsoLOG 3D DF + DRFM</text>
  </g>
  <line x1="725" y1="380" x2="640" y2="335" stroke="#c0392b" stroke-width="2"/>

  <!-- Bottom: Counter-UAS -->
  <g transform="translate(550,490)">
    <circle r="55" fill="#2C3E50" opacity="0.9"/>
    <text x="0" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Counter-UAS /</text>
    <text x="0" y="2" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Drones</text>
    <text x="0" y="22" text-anchor="middle" font-size="9" fill="#fff">2.4/5.8 GHz hopping</text>
    <text x="0" y="34" text-anchor="middle" font-size="9" fill="#fff">3D DF + elevation</text>
  </g>
  <line x1="550" y1="435" x2="550" y2="380" stroke="#2C3E50" stroke-width="2"/>

  <!-- Bottom-left: Stadiums/Venues -->
  <g transform="translate(330,410)">
    <circle r="55" fill="#003D6B" opacity="0.9"/>
    <text x="0" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Stadiums /</text>
    <text x="0" y="2" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Venues</text>
    <text x="0" y="22" text-anchor="middle" font-size="9" fill="#fff">Wi-Fi capacity</text>
    <text x="0" y="34" text-anchor="middle" font-size="9" fill="#fff">Drone perimeter</text>
  </g>
  <line x1="375" y1="380" x2="460" y2="335" stroke="#003D6B" stroke-width="2"/>

  <!-- Left: Medical -->
  <g transform="translate(230,290)">
    <circle r="55" fill="#9b1b30" opacity="0.9"/>
    <text x="0" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Medical /</text>
    <text x="0" y="2" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Hospital</text>
    <text x="0" y="22" text-anchor="middle" font-size="9" fill="#fff">WMTS protection</text>
    <text x="0" y="34" text-anchor="middle" font-size="9" fill="#fff">FMT alarms</text>
  </g>
  <line x1="285" y1="290" x2="460" y2="290" stroke="#9b1b30" stroke-width="2"/>

  <!-- Top-left: Regulatory -->
  <g transform="translate(330,170)">
    <circle r="55" fill="#486581" opacity="0.9"/>
    <text x="0" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Spectrum</text>
    <text x="0" y="2" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Regulatory</text>
    <text x="0" y="22" text-anchor="middle" font-size="9" fill="#fff">FCC/ETSI/ITU</text>
    <text x="0" y="34" text-anchor="middle" font-size="9" fill="#fff">Mobile DF trucks</text>
  </g>
  <line x1="375" y1="200" x2="460" y2="245" stroke="#486581" stroke-width="2"/>
</svg>
