<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Helvetica, Arial, sans-serif" font-size="12">
  <text x="600" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">Modern RF Spectrum Occupancy Map (Stylized)</text>
  <text x="600" y="48" text-anchor="middle" font-size="12" fill="#486581">A snapshot of who lives where, from HF to mmWave. The reason RTSAs need wide RTBW.</text>

  <!-- Frequency axis -->
  <line x1="60" y1="500" x2="1140" y2="500" stroke="#003D6B" stroke-width="2"/>
  <g font-size="10" fill="#486581">
    <line x1="60" y1="500" x2="60" y2="510" stroke="#486581"/>
    <text x="60" y="525" text-anchor="middle">3 MHz</text>
    <line x1="180" y1="500" x2="180" y2="510" stroke="#486581"/>
    <text x="180" y="525" text-anchor="middle">30 MHz</text>
    <line x1="300" y1="500" x2="300" y2="510" stroke="#486581"/>
    <text x="300" y="525" text-anchor="middle">300 MHz</text>
    <line x1="420" y1="500" x2="420" y2="510" stroke="#486581"/>
    <text x="420" y="525" text-anchor="middle">1 GHz</text>
    <line x1="540" y1="500" x2="540" y2="510" stroke="#486581"/>
    <text x="540" y="525" text-anchor="middle">3 GHz</text>
    <line x1="660" y1="500" x2="660" y2="510" stroke="#486581"/>
    <text x="660" y="525" text-anchor="middle">6 GHz</text>
    <line x1="780" y1="500" x2="780" y2="510" stroke="#486581"/>
    <text x="780" y="525" text-anchor="middle">10 GHz</text>
    <line x1="900" y1="500" x2="900" y2="510" stroke="#486581"/>
    <text x="900" y="525" text-anchor="middle">18 GHz</text>
    <line x1="1020" y1="500" x2="1020" y2="510" stroke="#486581"/>
    <text x="1020" y="525" text-anchor="middle">28 GHz</text>
    <line x1="1140" y1="500" x2="1140" y2="510" stroke="#486581"/>
    <text x="1140" y="525" text-anchor="middle">100 GHz</text>
  </g>
  <text x="600" y="555" text-anchor="middle" font-size="13" font-weight="700" fill="#003D6B">Frequency (log scale)</text>

  <!-- Band labels at top -->
  <g font-size="9" fill="#627d98" text-anchor="middle">
    <text x="120" y="80">HF</text>
    <text x="240" y="80">VHF</text>
    <text x="360" y="80">UHF</text>
    <text x="480" y="80">L/S</text>
    <text x="600" y="80">C</text>
    <text x="720" y="80">X</text>
    <text x="840" y="80">Ku</text>
    <text x="960" y="80">K/Ka</text>
    <text x="1080" y="80">V/W</text>
  </g>

  <!-- Service blocks -->
  <!-- HF: shortwave broadcasting + amateur -->
  <rect x="60" y="100" width="120" height="22" fill="#003D6B" opacity="0.85"/>
  <text x="120" y="115" text-anchor="middle" font-size="10" fill="#fff">HF broadcasting / amateur</text>

  <!-- VHF: FM broadcast, ATC, amateur, public safety -->
  <rect x="180" y="100" width="120" height="22" fill="#0078B6" opacity="0.85"/>
  <text x="240" y="115" text-anchor="middle" font-size="10" fill="#fff">FM 88-108 / ATC / public safety</text>

  <!-- UHF cellular bands -->
  <rect x="280" y="135" width="80" height="22" fill="#1b5e20" opacity="0.85"/>
  <text x="320" y="150" text-anchor="middle" font-size="10" fill="#fff">600/700 MHz cellular</text>

  <rect x="320" y="165" width="60" height="22" fill="#1b5e20" opacity="0.85"/>
  <text x="350" y="180" text-anchor="middle" font-size="10" fill="#fff">800/900 cellular</text>

  <!-- ISM 433 / 868 / 915 -->
  <rect x="345" y="195" width="20" height="22" fill="#0078B6" opacity="0.9"/>
  <text x="355" y="232" text-anchor="middle" font-size="9" fill="#003D6B">433</text>
  <rect x="395" y="195" width="20" height="22" fill="#0078B6" opacity="0.9"/>
  <text x="405" y="232" text-anchor="middle" font-size="9" fill="#003D6B">868/915 MHz LoRa</text>

  <!-- GPS / GNSS -->
  <rect x="430" y="135" width="40" height="22" fill="#c0392b" opacity="0.85"/>
  <text x="450" y="150" text-anchor="middle" font-size="10" fill="#fff">GPS L1/L2/L5</text>

  <!-- 1.5-2 GHz: GPS, satellite, cellular -->
  <rect x="455" y="165" width="60" height="22" fill="#1b5e20" opacity="0.85"/>
  <text x="485" y="180" text-anchor="middle" font-size="10" fill="#fff">PCS 1.9 GHz</text>

  <!-- 2.4 GHz ISM (Wi-Fi/BT) -->
  <rect x="510" y="135" width="50" height="22" fill="#0078B6"/>
  <text x="535" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#003D6B">2.4 GHz ISM</text>
  <text x="535" y="100" text-anchor="middle" font-size="9" fill="#003D6B">(Wi-Fi/BT/Zigbee/drones)</text>
  <line x1="535" y1="105" x2="535" y2="135" stroke="#003D6B" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 3.5 GHz CBRS / 5G n78 -->
  <rect x="545" y="165" width="50" height="22" fill="#1b5e20" opacity="0.85"/>
  <text x="570" y="180" text-anchor="middle" font-size="10" fill="#fff">5G n78 (3.5)</text>

  <!-- 5 GHz Wi-Fi U-NII -->
  <rect x="600" y="135" width="60" height="22" fill="#0078B6"/>
  <text x="630" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#003D6B">5 GHz Wi-Fi U-NII</text>

  <!-- 6 GHz Wi-Fi 6E -->
  <rect x="640" y="195" width="40" height="22" fill="#0078B6"/>
  <text x="660" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#003D6B">6 GHz Wi-Fi 6E/7</text>

  <!-- C-band radar -->
  <rect x="660" y="225" width="50" height="22" fill="#9b1b30" opacity="0.85"/>
  <text x="685" y="240" text-anchor="middle" font-size="10" fill="#fff">C-band radar</text>

  <!-- Satellite Ku/Ka -->
  <rect x="780" y="135" width="80" height="22" fill="#0078B6" opacity="0.85"/>
  <text x="820" y="150" text-anchor="middle" font-size="10" fill="#fff">Ku-band SatCom</text>

  <!-- Weather radar X-band -->
  <rect x="730" y="195" width="50" height="22" fill="#9b1b30" opacity="0.85"/>
  <text x="755" y="210" text-anchor="middle" font-size="10" fill="#fff">Weather/X-band</text>

  <!-- 5G FR2 mmWave (24-40 GHz) -->
  <rect x="940" y="135" width="100" height="22" fill="#1b5e20"/>
  <text x="990" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">5G FR2 mmWave (24-40 GHz)</text>

  <!-- Automotive radar 76-81 GHz -->
  <rect x="1080" y="195" width="50" height="22" fill="#1b5e20" opacity="0.85"/>
  <text x="1105" y="210" text-anchor="middle" font-size="10" fill="#fff">Auto radar</text>

  <!-- Starlink -->
  <rect x="800" y="225" width="80" height="22" fill="#0078B6" opacity="0.85"/>
  <text x="840" y="240" text-anchor="middle" font-size="10" fill="#fff">Starlink Ku/Ka</text>

  <!-- 6G research -->
  <rect x="1100" y="225" width="40" height="22" fill="#2C3E50" opacity="0.85"/>
  <text x="1120" y="240" text-anchor="middle" font-size="9" fill="#fff">6G research</text>

  <!-- SPECTRAN coverage indicators -->
  <g transform="translate(60,290)">
    <rect x="0" y="0" width="1080" height="6" fill="#1b5e20"/>
    <text x="540" y="-6" text-anchor="middle" font-size="11" font-weight="700" fill="#1b5e20">SPECTRAN V6 PLUS frequency coverage (9 kHz - 8 GHz / high tier)</text>

    <rect x="280" y="20" width="780" height="6" fill="#003D6B"/>
    <text x="670" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#003D6B">IsoLOG 3D DF coverage (400 MHz - 40 GHz)</text>
  </g>

  <!-- Highlight zones requiring monitoring -->
  <g transform="translate(60,330)">
    <rect x="0" y="0" width="1080" height="40" fill="#ECEFF1" stroke="#0078B6" rx="4"/>
    <text x="540" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#003D6B">Monitoring priorities by domain</text>
    <text x="540" y="36" text-anchor="middle" font-size="10" fill="#2C3E50">Counter-UAS: 2.4 / 5.8 GHz | GNSS protection: 1.2-1.6 GHz | Cellular EVM: 700 MHz - 6 GHz | EW: full band</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60,400)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#003D6B">Legend:</text>
    <rect x="80" y="-10" width="20" height="14" fill="#1b5e20"/>
    <text x="106" y="0" font-size="10" fill="#2C3E50">Cellular / 5G</text>

    <rect x="200" y="-10" width="20" height="14" fill="#0078B6"/>
    <text x="226" y="0" font-size="10" fill="#2C3E50">ISM (Wi-Fi/BT/drones)</text>

    <rect x="380" y="-10" width="20" height="14" fill="#0078B6"/>
    <text x="406" y="0" font-size="10" fill="#2C3E50">Satellite / SatCom</text>

    <rect x="540" y="-10" width="20" height="14" fill="#c0392b"/>
    <text x="566" y="0" font-size="10" fill="#2C3E50">GNSS</text>

    <rect x="640" y="-10" width="20" height="14" fill="#9b1b30"/>
    <text x="666" y="0" font-size="10" fill="#2C3E50">Radar (weather/military)</text>

    <rect x="830" y="-10" width="20" height="14" fill="#003D6B"/>
    <text x="856" y="0" font-size="10" fill="#2C3E50">Broadcast / public safety</text>
  </g>
</svg>
