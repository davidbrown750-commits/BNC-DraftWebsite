<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <text x="550" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">Figure 6-1: Constellation Diagrams and EVM</text>
  <text x="550" y="48" text-anchor="middle" font-size="12" fill="#486581">The pattern of error vectors is the diagnosis. Each fault leaves a signature.</text>

  <!-- Panel 1: Clean QPSK -->
  <g transform="translate(60,80)">
    <rect x="0" y="0" width="220" height="220" fill="#f0f4f8" stroke="#bcccdc" rx="4"/>
    <text x="110" y="-5" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">Clean QPSK</text>
    <text x="110" y="245" text-anchor="middle" font-size="11" fill="#1b5e20">EVM ≈ 1.5%</text>

    <line x1="110" y1="20" x2="110" y2="200" stroke="#bcccdc" stroke-width="1"/>
    <line x1="20" y1="110" x2="200" y2="110" stroke="#bcccdc" stroke-width="1"/>

    <!-- Ideal points -->
    <circle cx="60" cy="60" r="3" fill="none" stroke="#1b5e20" stroke-width="1.5"/>
    <circle cx="160" cy="60" r="3" fill="none" stroke="#1b5e20" stroke-width="1.5"/>
    <circle cx="60" cy="160" r="3" fill="none" stroke="#1b5e20" stroke-width="1.5"/>
    <circle cx="160" cy="160" r="3" fill="none" stroke="#1b5e20" stroke-width="1.5"/>

    <!-- Tight scatter -->
    <g fill="#1b5e20" opacity="0.7">
      <circle cx="59" cy="61" r="1.5"/><circle cx="62" cy="58" r="1.5"/><circle cx="58" cy="62" r="1.5"/><circle cx="61" cy="59" r="1.5"/><circle cx="60" cy="60" r="1.5"/>
      <circle cx="159" cy="61" r="1.5"/><circle cx="161" cy="58" r="1.5"/><circle cx="158" cy="60" r="1.5"/><circle cx="160" cy="62" r="1.5"/><circle cx="162" cy="61" r="1.5"/>
      <circle cx="59" cy="161" r="1.5"/><circle cx="62" cy="158" r="1.5"/><circle cx="58" cy="160" r="1.5"/><circle cx="61" cy="162" r="1.5"/><circle cx="60" cy="159" r="1.5"/>
      <circle cx="159" cy="161" r="1.5"/><circle cx="161" cy="158" r="1.5"/><circle cx="158" cy="160" r="1.5"/><circle cx="161" cy="162" r="1.5"/><circle cx="162" cy="159" r="1.5"/>
    </g>
  </g>

  <!-- Panel 2: Thermal noise -->
  <g transform="translate(310,80)">
    <rect x="0" y="0" width="220" height="220" fill="#f0f4f8" stroke="#bcccdc" rx="4"/>
    <text x="110" y="-5" text-anchor="middle" font-size="13" font-weight="700" fill="#0078B6">Thermal Noise (low SNR)</text>
    <text x="110" y="245" text-anchor="middle" font-size="11" fill="#0078B6">Symmetric scatter ≈ Gaussian</text>

    <line x1="110" y1="20" x2="110" y2="200" stroke="#bcccdc" stroke-width="1"/>
    <line x1="20" y1="110" x2="200" y2="110" stroke="#bcccdc" stroke-width="1"/>

    <circle cx="60" cy="60" r="3" fill="none" stroke="#0078B6" stroke-width="1.5"/>
    <circle cx="160" cy="60" r="3" fill="none" stroke="#0078B6" stroke-width="1.5"/>
    <circle cx="60" cy="160" r="3" fill="none" stroke="#0078B6" stroke-width="1.5"/>
    <circle cx="160" cy="160" r="3" fill="none" stroke="#0078B6" stroke-width="1.5"/>

    <!-- Wide symmetric scatter -->
    <g fill="#0078B6" opacity="0.6">
      <circle cx="55" cy="65" r="1.5"/><circle cx="68" cy="55" r="1.5"/><circle cx="50" cy="58" r="1.5"/><circle cx="65" cy="68" r="1.5"/><circle cx="58" cy="52" r="1.5"/>
      <circle cx="62" cy="68" r="1.5"/><circle cx="71" cy="62" r="1.5"/><circle cx="48" cy="65" r="1.5"/><circle cx="65" cy="50" r="1.5"/><circle cx="55" cy="55" r="1.5"/>
      <circle cx="155" cy="63" r="1.5"/><circle cx="168" cy="58" r="1.5"/><circle cx="150" cy="55" r="1.5"/><circle cx="165" cy="65" r="1.5"/><circle cx="158" cy="50" r="1.5"/>
      <circle cx="148" cy="68" r="1.5"/><circle cx="171" cy="65" r="1.5"/><circle cx="155" cy="51" r="1.5"/><circle cx="165" cy="55" r="1.5"/><circle cx="160" cy="70" r="1.5"/>
      <circle cx="55" cy="158" r="1.5"/><circle cx="68" cy="165" r="1.5"/><circle cx="50" cy="155" r="1.5"/><circle cx="65" cy="168" r="1.5"/><circle cx="58" cy="150" r="1.5"/>
      <circle cx="62" cy="172" r="1.5"/><circle cx="71" cy="158" r="1.5"/><circle cx="48" cy="162" r="1.5"/><circle cx="65" cy="148" r="1.5"/><circle cx="55" cy="170" r="1.5"/>
      <circle cx="155" cy="155" r="1.5"/><circle cx="168" cy="160" r="1.5"/><circle cx="150" cy="170" r="1.5"/><circle cx="165" cy="155" r="1.5"/><circle cx="158" cy="168" r="1.5"/>
      <circle cx="148" cy="160" r="1.5"/><circle cx="171" cy="165" r="1.5"/><circle cx="155" cy="148" r="1.5"/><circle cx="165" cy="172" r="1.5"/><circle cx="160" cy="151" r="1.5"/>
    </g>
  </g>

  <!-- Panel 3: Phase noise -->
  <g transform="translate(560,80)">
    <rect x="0" y="0" width="220" height="220" fill="#f0f4f8" stroke="#bcccdc" rx="4"/>
    <text x="110" y="-5" text-anchor="middle" font-size="13" font-weight="700" fill="#003D6B">Phase Noise</text>
    <text x="110" y="245" text-anchor="middle" font-size="11" fill="#003D6B">Smear along arcs around origin</text>

    <line x1="110" y1="20" x2="110" y2="200" stroke="#bcccdc" stroke-width="1"/>
    <line x1="20" y1="110" x2="200" y2="110" stroke="#bcccdc" stroke-width="1"/>

    <circle cx="60" cy="60" r="3" fill="none" stroke="#003D6B" stroke-width="1.5"/>
    <circle cx="160" cy="60" r="3" fill="none" stroke="#003D6B" stroke-width="1.5"/>
    <circle cx="60" cy="160" r="3" fill="none" stroke="#003D6B" stroke-width="1.5"/>
    <circle cx="160" cy="160" r="3" fill="none" stroke="#003D6B" stroke-width="1.5"/>

    <!-- Arc-shaped scatter (rotation around origin) -->
    <g fill="#003D6B" opacity="0.6">
      <circle cx="58" cy="63" r="1.5"/><circle cx="56" cy="65" r="1.5"/><circle cx="62" cy="58" r="1.5"/><circle cx="64" cy="56" r="1.5"/><circle cx="60" cy="60" r="1.5"/>
      <circle cx="55" cy="68" r="1.5"/><circle cx="66" cy="54" r="1.5"/>
      <circle cx="158" cy="63" r="1.5"/><circle cx="156" cy="65" r="1.5"/><circle cx="162" cy="58" r="1.5"/><circle cx="164" cy="56" r="1.5"/><circle cx="160" cy="60" r="1.5"/>
      <circle cx="155" cy="68" r="1.5"/><circle cx="166" cy="54" r="1.5"/>
      <circle cx="58" cy="157" r="1.5"/><circle cx="56" cy="155" r="1.5"/><circle cx="62" cy="162" r="1.5"/><circle cx="64" cy="164" r="1.5"/><circle cx="60" cy="160" r="1.5"/>
      <circle cx="55" cy="152" r="1.5"/><circle cx="66" cy="166" r="1.5"/>
      <circle cx="158" cy="157" r="1.5"/><circle cx="156" cy="155" r="1.5"/><circle cx="162" cy="162" r="1.5"/><circle cx="164" cy="164" r="1.5"/><circle cx="160" cy="160" r="1.5"/>
      <circle cx="155" cy="152" r="1.5"/><circle cx="166" cy="166" r="1.5"/>
    </g>
  </g>

  <!-- Panel 4: PA compression -->
  <g transform="translate(810,80)">
    <rect x="0" y="0" width="220" height="220" fill="#f0f4f8" stroke="#bcccdc" rx="4"/>
    <text x="110" y="-5" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">PA Compression (16-QAM)</text>
    <text x="110" y="245" text-anchor="middle" font-size="11" fill="#c0392b">Outer points scatter more</text>

    <line x1="110" y1="20" x2="110" y2="200" stroke="#bcccdc" stroke-width="1"/>
    <line x1="20" y1="110" x2="200" y2="110" stroke="#bcccdc" stroke-width="1"/>

    <!-- 16-QAM ideal grid -->
    <g fill="none" stroke="#c0392b" stroke-width="1">
      <circle cx="50" cy="50" r="3"/><circle cx="83" cy="50" r="3"/><circle cx="137" cy="50" r="3"/><circle cx="170" cy="50" r="3"/>
      <circle cx="50" cy="83" r="3"/><circle cx="83" cy="83" r="3"/><circle cx="137" cy="83" r="3"/><circle cx="170" cy="83" r="3"/>
      <circle cx="50" cy="137" r="3"/><circle cx="83" cy="137" r="3"/><circle cx="137" cy="137" r="3"/><circle cx="170" cy="137" r="3"/>
      <circle cx="50" cy="170" r="3"/><circle cx="83" cy="170" r="3"/><circle cx="137" cy="170" r="3"/><circle cx="170" cy="170" r="3"/>
    </g>

    <!-- Inner points: tight scatter -->
    <g fill="#c0392b" opacity="0.7">
      <circle cx="83" cy="83" r="1"/><circle cx="84" cy="82" r="1"/><circle cx="82" cy="84" r="1"/>
      <circle cx="137" cy="83" r="1"/><circle cx="138" cy="82" r="1"/><circle cx="136" cy="84" r="1"/>
      <circle cx="83" cy="137" r="1"/><circle cx="84" cy="138" r="1"/><circle cx="82" cy="136" r="1"/>
      <circle cx="137" cy="137" r="1"/><circle cx="138" cy="138" r="1"/><circle cx="136" cy="136" r="1"/>
    </g>
    <!-- Outer points: wide scatter (compression) -->
    <g fill="#c0392b" opacity="0.7">
      <circle cx="48" cy="48" r="1.5"/><circle cx="55" cy="45" r="1.5"/><circle cx="44" cy="55" r="1.5"/><circle cx="58" cy="58" r="1.5"/><circle cx="42" cy="42" r="1.5"/>
      <circle cx="172" cy="52" r="1.5"/><circle cx="175" cy="45" r="1.5"/><circle cx="166" cy="55" r="1.5"/><circle cx="178" cy="58" r="1.5"/><circle cx="168" cy="42" r="1.5"/>
      <circle cx="48" cy="172" r="1.5"/><circle cx="55" cy="175" r="1.5"/><circle cx="44" cy="165" r="1.5"/><circle cx="58" cy="162" r="1.5"/><circle cx="42" cy="178" r="1.5"/>
      <circle cx="172" cy="168" r="1.5"/><circle cx="175" cy="175" r="1.5"/><circle cx="166" cy="165" r="1.5"/><circle cx="178" cy="162" r="1.5"/><circle cx="168" cy="178" r="1.5"/>
    </g>
  </g>

  <!-- BOTTOM: legend / explanation -->
  <g transform="translate(60,380)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#003D6B">Reading the constellation:</text>

    <text x="0" y="28" font-size="12" font-weight="600" fill="#1b5e20">Clean: tight clusters, low EVM, transmitter and receiver are healthy.</text>

    <text x="0" y="55" font-size="12" font-weight="600" fill="#0078B6">Thermal noise: symmetric circular scatter at every point. SNR-limited.</text>
    <text x="14" y="72" font-size="11" fill="#2C3E50">→ reduce noise figure or increase signal power</text>

    <text x="0" y="100" font-size="12" font-weight="600" fill="#003D6B">Phase noise: arc-shaped scatter, larger for outer points (radius dependent).</text>
    <text x="14" y="117" font-size="11" fill="#2C3E50">→ improve LO stability or apply phase tracking</text>

    <text x="0" y="145" font-size="12" font-weight="600" fill="#c0392b">PA compression: outer constellation points scatter much more than inner ones.</text>
    <text x="14" y="162" font-size="11" fill="#2C3E50">→ back off input drive or improve PA linearity</text>
  </g>
</svg>
