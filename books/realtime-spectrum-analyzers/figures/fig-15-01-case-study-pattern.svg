<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="ar15" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2C3E50"/>
    </marker>
  </defs>

  <text x="550" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">Figure 15-1: The Five-Step Pattern Across All Eight Case Studies</text>
  <text x="550" y="48" text-anchor="middle" font-size="12" fill="#486581">Different problems, different sectors, same workflow. This is what RTSA-based diagnosis looks like.</text>

  <!-- Five workflow boxes connected horizontally -->
  <g>
    <!-- Step 1: Situation -->
    <rect x="60" y="100" width="180" height="120" fill="#ECEFF1" stroke="#003D6B" stroke-width="2" rx="8"/>
    <rect x="60" y="100" width="180" height="35" fill="#003D6B" rx="8"/>
    <text x="150" y="123" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">1. SITUATION</text>
    <text x="70" y="155" font-size="10" fill="#2C3E50">Risk identified:</text>
    <text x="70" y="170" font-size="10" fill="#2C3E50">- dropped calls</text>
    <text x="70" y="185" font-size="10" fill="#2C3E50">- spoofed GPS</text>
    <text x="70" y="200" font-size="10" fill="#2C3E50">- patient safety</text>
    <text x="70" y="215" font-size="10" fill="#2C3E50">- threat detection</text>

    <line x1="240" y1="160" x2="280" y2="160" stroke="#2C3E50" stroke-width="2" marker-end="url(#ar15)"/>

    <!-- Step 2: Investigation -->
    <rect x="285" y="100" width="180" height="120" fill="#ECEFF1" stroke="#0078B6" stroke-width="2" rx="8"/>
    <rect x="285" y="100" width="180" height="35" fill="#0078B6" rx="8"/>
    <text x="375" y="123" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">2. INVESTIGATION</text>
    <text x="295" y="155" font-size="10" fill="#2C3E50">RTSA deployed:</text>
    <text x="295" y="170" font-size="10" fill="#2C3E50">- 24/7 monitoring</text>
    <text x="295" y="185" font-size="10" fill="#2C3E50">- FMT armed</text>
    <text x="295" y="200" font-size="10" fill="#2C3E50">- IsoLOG DF</text>
    <text x="295" y="215" font-size="10" fill="#2C3E50">- I/Q recording</text>

    <line x1="465" y1="160" x2="505" y2="160" stroke="#2C3E50" stroke-width="2" marker-end="url(#ar15)"/>

    <!-- Step 3: Finding -->
    <rect x="510" y="100" width="180" height="120" fill="#ECEFF1" stroke="#1b5e20" stroke-width="2" rx="8"/>
    <rect x="510" y="100" width="180" height="35" fill="#1b5e20" rx="8"/>
    <text x="600" y="123" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">3. FINDING</text>
    <text x="520" y="155" font-size="10" fill="#2C3E50">Root cause:</text>
    <text x="520" y="170" font-size="10" fill="#2C3E50">- non-compliant</text>
    <text x="520" y="185" font-size="10" fill="#2C3E50">  device located</text>
    <text x="520" y="200" font-size="10" fill="#2C3E50">- bearing</text>
    <text x="520" y="215" font-size="10" fill="#2C3E50">  triangulated</text>

    <line x1="690" y1="160" x2="730" y2="160" stroke="#2C3E50" stroke-width="2" marker-end="url(#ar15)"/>

    <!-- Step 4: Resolution -->
    <rect x="735" y="100" width="180" height="120" fill="#ECEFF1" stroke="#2C3E50" stroke-width="2" rx="8"/>
    <rect x="735" y="100" width="180" height="35" fill="#2C3E50" rx="8"/>
    <text x="825" y="123" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">4. RESOLUTION</text>
    <text x="745" y="155" font-size="10" fill="#2C3E50">Action taken:</text>
    <text x="745" y="170" font-size="10" fill="#2C3E50">- compliance contact</text>
    <text x="745" y="185" font-size="10" fill="#2C3E50">- equipment replaced</text>
    <text x="745" y="200" font-size="10" fill="#2C3E50">- protocol updated</text>
    <text x="745" y="215" font-size="10" fill="#2C3E50">- alarm permanent</text>
  </g>

  <!-- Step 5 below center -->
  <line x1="825" y1="220" x2="825" y2="270" stroke="#2C3E50" stroke-width="2"/>
  <line x1="825" y1="270" x2="490" y2="270" stroke="#2C3E50" stroke-width="2"/>
  <line x1="490" y1="270" x2="490" y2="290" stroke="#2C3E50" stroke-width="2" marker-end="url(#ar15)"/>

  <rect x="380" y="290" width="340" height="100" fill="#ECEFF1" stroke="#c0392b" stroke-width="2" rx="8"/>
  <rect x="380" y="290" width="340" height="35" fill="#c0392b" rx="8"/>
  <text x="550" y="313" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">5. LESSONS LEARNED</text>
  <text x="395" y="345" font-size="11" fill="#2C3E50">- Continuous monitoring beats sporadic surveys</text>
  <text x="395" y="362" font-size="11" fill="#2C3E50">- Direction finding turns RF data into positions</text>
  <text x="395" y="380" font-size="11" fill="#2C3E50">- Investigation cost &lt;&lt; cost of unresolved problem</text>

  <!-- Eight case studies listed below -->
  <g transform="translate(60,420)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#003D6B">Eight cases follow this pattern:</text>

    <text x="0" y="22" font-size="11" fill="#2C3E50"><tspan font-weight="700">1.</tspan> Mystery cellular drop (rural carrier)</text>
    <text x="270" y="22" font-size="11" fill="#2C3E50"><tspan font-weight="700">2.</tspan> GPS spoofing (international airport)</text>
    <text x="540" y="22" font-size="11" fill="#2C3E50"><tspan font-weight="700">3.</tspan> Stadium Wi-Fi collapse (70K fans)</text>
    <text x="810" y="22" font-size="11" fill="#2C3E50"><tspan font-weight="700">4.</tspan> Hospital telemetry (LED driver)</text>

    <text x="0" y="42" font-size="11" fill="#2C3E50"><tspan font-weight="700">5.</tspan> Prison contraband drone</text>
    <text x="270" y="42" font-size="11" fill="#2C3E50"><tspan font-weight="700">6.</tspan> Broadcast pirate (TDOA hunt)</text>
    <text x="540" y="42" font-size="11" fill="#2C3E50"><tspan font-weight="700">7.</tspan> 5G MIMO beam verification</text>
    <text x="810" y="42" font-size="11" fill="#2C3E50"><tspan font-weight="700">8.</tspan> EW range DRFM analysis</text>

    <text x="0" y="70" font-size="11" font-style="italic" fill="#486581">Sectors: cellular, aviation, sports/entertainment, healthcare, corrections, broadcast, telecom, defense.</text>
  </g>
</svg>
