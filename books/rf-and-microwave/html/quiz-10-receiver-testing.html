      {
        q: "Why does this chapter recommend testing a receiver backward, from the output toward the antenna?",
        options: [
          "Because the antenna is the most likely fault and should be checked last",
          "Because once the output stage is confirmed good, it serves as a live monitor for every upstream stage, so the known-good portion grows with each step and faults become immediately observable",
          "Because the input stage is too fragile to probe first",
          "Because test equipment only connects to the output"
        ],
        answer: 1,
        explain: "A confirmed-good output stage becomes a monitor for upstream stages, growing the known-good section and speeding fault finding."
      },
      {
        q: "In a superheterodyne receiver, what is the role of the local oscillator, and what symptom appears when it drifts?",
        options: [
          "It amplifies the IF; drift causes overload",
          "It supplies the reference the mixer uses to convert RF down to the fixed IF, setting tuning accuracy; when it drifts the receiver tunes to the wrong frequency or loses the channel, visible as drift on a max-hold trace",
          "It filters out noise; drift adds noise",
          "It powers the antenna; drift cuts the signal entirely"
        ],
        answer: 1,
        explain: "The LO sets tuning by feeding the mixer; drift mistunes the receiver, observable on a max-hold trace."
      },
      {
        q: "Which expression gives a receiver's noise floor, and why does narrowing the channel bandwidth improve sensitivity?",
        options: [
          "Noise floor = -174 - 10 log10(BW) - NF; wider bandwidth lowers the floor",
          "Noise floor (dBm) = -174 + 10 log10(BW in Hz) + NF (dB); a narrower bandwidth admits less thermal noise, lowering the floor so a signal clears it by a larger margin",
          "Noise floor = -174 x BW x NF; bandwidth has no effect",
          "Noise floor = NF only; bandwidth is irrelevant"
        ],
        answer: 1,
        explain: "Noise floor = -174 + 10 log10(BW) + NF. Narrower bandwidth admits less noise, lowering the floor and improving sensitivity."
      },
      {
        q: "What is adjacent-channel selectivity, and which receiver block primarily sets it?",
        options: [
          "How fast the receiver tunes; set by the local oscillator",
          "How much stronger an adjacent-channel signal can be (in dB) before it degrades the wanted channel by a defined amount; set largely by the IF filter and its shape factor",
          "The receiver's total gain; set by the LNA",
          "The audio output level; set by the detector"
        ],
        answer: 1,
        explain: "Adjacent-channel selectivity is the dB margin before an adjacent signal degrades the wanted channel, set mainly by the IF filter's shape factor."
      },
      {
        q: "Third-order intermodulation products rise how many dB per 1 dB rise in the input tones, and why are they hard to filter?",
        options: [
          "About 1 dB; they fall far from the tones and filter out easily",
          "About 3 dB; they fall at 2f1 - f2 and 2f2 - f1, very close to the original tones and often inside the wanted channel, where no filter can separate them",
          "About 2 dB; they appear only at DC",
          "About 6 dB; they appear at the harmonics, easily filtered"
        ],
        answer: 1,
        explain: "Third-order products rise ~3 dB per 1 dB of input and land at 2f1-f2 and 2f2-f1, near the tones and inside the channel, so filtering cannot remove them."
      }
    ]
  };
