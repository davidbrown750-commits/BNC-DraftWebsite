        options: [
          "Power on the vertical axis against frequency on the horizontal axis",

          "Phase on the vertical axis against amplitude on the horizontal axis",

        answer: 1,

        q: "A waveform repeats every 20 ms. What is its frequency?",
        options: [
          "20 Hz",
          "200 Hz",
          "50 Hz",
          "500 Hz"
        ],
        answer: 2,
        explain: "f = 1/T = 1/(20 ms) = 50 Hz."
      },
      {
        q: "How does the superposition principle let a square wave be built from sine waves?",
        options: [
          "By adding a fundamental and its odd harmonics (3rd, 5th, 7th, ...) in the correct proportions, since added sine waves sum to a new shape",
          "By multiplying two sine waves of the same frequency together",
          "By adding only even harmonics of the fundamental",
          "By subtracting a single higher-frequency sine from the fundamental"
        ],
        answer: 0,
        explain: "Superposition sums sine waves; a square wave is the fundamental plus its odd harmonics in the right proportions."
      },
      {
        q: "A signal measures -10 dBm. How many milliwatts is that, and how does dBm differ from dB?",
        options: [
          "1 mW; dBm and dB mean the same thing",
          "10 mW; dBm is a ratio and dB is absolute",
          "0.1 mW; dBm is an absolute power referenced to 1 mW, while dB is a dimensionless ratio between two quantities",
          "-10 mW; both are absolute power levels"
        ],
        answer: 2,
        explain: "0 dBm = 1 mW, so -10 dBm = 0.1 mW. dBm is absolute (relative to 1 mW); dB is a ratio."
      },
      {
        q: "Why did the RF industry standardize on 50 ohms?",
        options: [
          "It is the impedance of free space, so it needs no matching",
          "It is a compromise between the impedance for lowest loss (about 77 ohms) and the impedance for highest power handling (about 30 ohms) in coaxial cable",
          "It was the only value early connectors could be machined to",
          "It exactly matches the impedance of every antenna ever built"
        ],
        answer: 1,
        explain: "Fifty ohms splits the difference between coax's lowest-loss (~77 ohm) and highest-power (~30 ohm) impedances."
      }
    ]
  };
