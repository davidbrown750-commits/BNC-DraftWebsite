<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Swept analyzer leaves gaps in time at each frequency while a real-time analyzer covers the full span continuously, so it catches a brief burst the swept instrument misses">
  <defs>
    <style>
      .axis{stroke:#2C3E50;stroke-width:1.4;}
      .tick{fill:#2C3E50;font-size:10px;}
      .ttl{fill:#003D6B;font-size:13px;font-weight:700;}
      .note{fill:#2C3E50;font-size:11px;}
    </style>
  </defs>

  <text x="20" y="28" fill="#003D6B" font-size="15" font-weight="700">Coverage Over Time: Swept Sweep vs Real-Time Capture</text>

  <!-- LEFT panel: swept -->
  <text x="40" y="62" class="ttl">Swept analyzer</text>
  <line class="axis" x1="55" y1="80" x2="55" y2="250"/>
  <line class="axis" x1="55" y1="250" x2="370" y2="250"/>
  <text x="25" y="170" class="tick" transform="rotate(-90 25 170)">Frequency</text>
  <text x="210" y="270" class="tick" text-anchor="middle">Time</text>
  <!-- diagonal sweep line: LO climbs through the span -->
  <line x1="60" y1="245" x2="365" y2="90" stroke="#0078B6" stroke-width="2.6"/>
  <!-- a brief burst that lands off the sweep line -->
  <rect x="150" y="120" width="10" height="34" fill="#C77E00"/>
  <text x="165" y="118" class="note">burst occurs here...</text>
  <text x="165" y="174" class="note" fill="#C77E00">...but the sweep is elsewhere</text>
  <text x="60" y="100" class="note" fill="#0078B6">analyzer dwells at one</text>
  <text x="60" y="114" class="note" fill="#0078B6">frequency at a time</text>
  <text x="200" y="232" class="note" fill="#C77E00">MISSED</text>

  <!-- RIGHT panel: real-time -->
  <text x="450" y="62" class="ttl">Real-time analyzer</text>
  <line class="axis" x1="465" y1="80" x2="465" y2="250"/>
  <line class="axis" x1="465" y1="250" x2="780" y2="250"/>
  <text x="600" y="270" class="tick" text-anchor="middle">Time</text>
  <!-- full-span continuous coverage shown as a shaded block -->
  <rect x="470" y="85" width="305" height="160" fill="#0078B6" fill-opacity="0.16"/>
  <text x="622" y="170" class="note" text-anchor="middle" fill="#003D6B">entire span analyzed</text>
  <text x="622" y="186" class="note" text-anchor="middle" fill="#003D6B">continuously, gap-free</text>
  <!-- same burst, now caught -->
  <rect x="560" y="120" width="10" height="34" fill="#C77E00"/>
  <text x="575" y="118" class="note">same burst</text>
  <text x="575" y="174" class="note" fill="#C77E00">CAUGHT at full amplitude</text>

  <line x1="20" y1="284" x2="800" y2="284" stroke="#b6c2cc" stroke-width="1"/>
  <text x="20" y="312" fill="#003D6B" font-size="13" font-weight="700">Probability of Intercept (POI)</text>
  <text x="20" y="334" class="note">POI is the shortest signal duration the analyzer is guaranteed to display at full amplitude, even if it occurs once.</text>
  <text x="20" y="352" class="note">Modern real-time analyzers specify 100% POI in the low microseconds to a few hundred nanoseconds.</text>
  <!-- POI bar comparison -->
  <text x="20" y="384" class="note">Swept dwell at each step</text>
  <rect x="230" y="374" width="60" height="13" fill="#0078B6"/>
  <text x="20" y="406" class="note">Real-time min. duration</text>
  <rect x="230" y="396" width="500" height="13" fill="#C77E00"/>
  <text x="296" y="385" class="note">long gaps between visits = events fall through</text>
  <text x="725" y="407" class="note" text-anchor="end" fill="#ffffff" font-weight="700">~hundreds of ns to a few us, 100% POI</text>
</svg>
