<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="5G NR and 6G spectrum map showing FR1, FR2, FR3 and sub-THz ranges">
  <defs>
    <linearGradient id="fr1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#003D6B"/>
      <stop offset="1" stop-color="#0078B6"/>
    </linearGradient>
    <linearGradient id="fr3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4B2A6B"/>
      <stop offset="1" stop-color="#6e4a92"/>
    </linearGradient>
    <linearGradient id="fr2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0078B6"/>
      <stop offset="1" stop-color="#00b4ff"/>
    </linearGradient>
    <linearGradient id="thz" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C77E00"/>
      <stop offset="1" stop-color="#e9a73a"/>
    </linearGradient>
    <style>
      .ttl{fill:#003D6B;font-size:17px;font-weight:700;}
      .band{fill:#ffffff;font-size:14px;font-weight:700;}
      .sub{fill:#ffffff;font-size:11px;}
      .ax{fill:#2C3E50;font-size:11px;}
      .tag{fill:#4B2A6B;font-size:12px;font-weight:700;letter-spacing:.5px;}
      .note{fill:#C77E00;font-size:11px;font-weight:700;}
    </style>
  </defs>

  <text x="430" y="30" text-anchor="middle" class="ttl">The Wireless Spectrum: From 5G FR1 to 6G Sub-THz</text>

  <!-- axis baseline -->
  <line x1="40" y1="320" x2="820" y2="320" stroke="#b6c2cc" stroke-width="1.5"/>

  <!-- FR1 -->
  <rect x="40" y="120" width="200" height="80" rx="4" fill="url(#fr1)"/>
  <text x="140" y="150" text-anchor="middle" class="band">FR1 (sub-6 GHz)</text>
  <text x="140" y="170" text-anchor="middle" class="sub">410 MHz - 7.125 GHz</text>
  <text x="140" y="188" text-anchor="middle" class="sub">n77 / n78 mid-band 3.3-3.8 GHz</text>
  <text x="140" y="232" text-anchor="middle" class="tag">5G coverage layer</text>

  <!-- FR3 / upper mid-band -->
  <rect x="252" y="135" width="150" height="65" rx="4" fill="url(#fr3)"/>
  <text x="327" y="162" text-anchor="middle" class="band">FR3 / upper mid</text>
  <text x="327" y="182" text-anchor="middle" class="sub">7 - 24 GHz</text>
  <text x="327" y="232" text-anchor="middle" class="tag">6G focus band</text>

  <!-- FR2 mmWave -->
  <rect x="414" y="120" width="200" height="80" rx="4" fill="url(#fr2)"/>
  <text x="514" y="150" text-anchor="middle" class="band" fill="#003D6B">FR2 (mmWave)</text>
  <text x="514" y="170" text-anchor="middle" class="sub" fill="#003D6B">24.25 - 71 GHz</text>
  <text x="514" y="188" text-anchor="middle" class="sub" fill="#003D6B">n258 (26) / n260 (39) / n261 (28)</text>
  <text x="514" y="232" text-anchor="middle" class="tag">5G capacity layer</text>

  <!-- sub-THz -->
  <rect x="626" y="135" width="194" height="65" rx="4" fill="url(#thz)"/>
  <text x="723" y="162" text-anchor="middle" class="band">sub-THz</text>
  <text x="723" y="182" text-anchor="middle" class="sub">~ 100 - 300 GHz</text>
  <text x="723" y="232" text-anchor="middle" class="tag">6G research</text>

  <!-- frequency ticks -->
  <g>
    <line x1="40" y1="315" x2="40" y2="325" stroke="#2C3E50"/>
    <text x="40" y="345" text-anchor="middle" class="ax">410 MHz</text>
    <line x1="240" y1="315" x2="240" y2="325" stroke="#2C3E50"/>
    <text x="240" y="345" text-anchor="middle" class="ax">7 GHz</text>
    <line x1="414" y1="315" x2="414" y2="325" stroke="#2C3E50"/>
    <text x="414" y="345" text-anchor="middle" class="ax">24 GHz</text>
    <line x1="614" y1="315" x2="614" y2="325" stroke="#2C3E50"/>
    <text x="614" y="345" text-anchor="middle" class="ax">71 GHz</text>
    <line x1="820" y1="315" x2="820" y2="325" stroke="#2C3E50"/>
    <text x="820" y="345" text-anchor="middle" class="ax">~300 GHz</text>
  </g>

  <text x="430" y="385" text-anchor="middle" class="ax" font-style="italic">Lower frequency = wider reach, less bandwidth.   Higher frequency = more bandwidth, shorter range.</text>
  <text x="430" y="408" text-anchor="middle" class="note">Band names and edges per 3GPP TS 38.101 series; FR3/sub-THz are 6G study targets. Verify before publication.</text>
</svg>
