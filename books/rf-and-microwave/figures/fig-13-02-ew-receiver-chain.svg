<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Electronic warfare receiver chain processing a dense threat environment into detected, identified emitters, with the three EW mission areas">
  <defs>
    <linearGradient id="env" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4B2A6B"/>
      <stop offset="1" stop-color="#003D6B"/>
    </linearGradient>
    <style>
      .blk{fill:#ffffff;stroke:#0078B6;stroke-width:1.6;}
      .lbl{fill:#003D6B;font-size:12px;font-weight:700;}
      .sub{fill:#2C3E50;font-size:10px;}
      .sig{stroke:#003D6B;stroke-width:2.2;fill:none;}
      .stage{fill:#0078B6;font-size:9px;font-weight:700;letter-spacing:.5px;}
      .ea{fill:#C77E00;}
    </style>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#003D6B"/>
    </marker>
  </defs>

  <text x="20" y="28" fill="#003D6B" font-size="15" font-weight="700">EW Receiver Chain in a Dense Threat Environment</text>

  <!-- Threat environment -->
  <rect x="20" y="60" width="150" height="200" rx="6" fill="url(#env)"/>
  <text x="95" y="82" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">Threat</text>
  <text x="95" y="98" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">environment</text>
  <!-- emitter ticks -->
  <line x1="40" y1="120" x2="40" y2="160" stroke="#00b4ff" stroke-width="2"/>
  <line x1="60" y1="130" x2="60" y2="160" stroke="#7fdbff" stroke-width="2"/>
  <line x1="80" y1="112" x2="80" y2="160" stroke="#00b4ff" stroke-width="2"/>
  <line x1="100" y1="138" x2="100" y2="160" stroke="#7fdbff" stroke-width="2"/>
  <line x1="120" y1="122" x2="120" y2="160" stroke="#00b4ff" stroke-width="2"/>
  <line x1="140" y1="144" x2="140" y2="160" stroke="#7fdbff" stroke-width="2"/>
  <text x="95" y="182" text-anchor="middle" fill="#cfe6f5" font-size="9">radars, datalinks,</text>
  <text x="95" y="196" text-anchor="middle" fill="#cfe6f5" font-size="9">comms, jammers</text>
  <text x="95" y="222" text-anchor="middle" fill="#cfe6f5" font-size="9">overlapping in</text>
  <text x="95" y="236" text-anchor="middle" fill="#cfe6f5" font-size="9">time and frequency</text>

  <!-- Wideband front end -->
  <line class="sig" x1="170" y1="160" x2="200" y2="160" marker-end="url(#ab)"/>
  <rect class="blk" x="200" y="136" width="98" height="48" rx="4"/>
  <text x="249" y="156" text-anchor="middle" class="lbl">Wideband</text>
  <text x="249" y="172" text-anchor="middle" class="sub">front end + ADC</text>

  <!-- Digital channelizer -->
  <line class="sig" x1="298" y1="160" x2="328" y2="160" marker-end="url(#ab)"/>
  <rect class="blk" x="328" y="136" width="104" height="48" rx="4"/>
  <text x="380" y="156" text-anchor="middle" class="lbl">Channelizer</text>
  <text x="380" y="172" text-anchor="middle" class="sub">FFT / DSP</text>

  <!-- Pulse descriptor -->
  <line class="sig" x1="432" y1="160" x2="462" y2="160" marker-end="url(#ab)"/>
  <rect class="blk" x="462" y="136" width="112" height="48" rx="4"/>
  <text x="518" y="153" text-anchor="middle" class="lbl">PDW extract</text>
  <text x="518" y="169" text-anchor="middle" class="sub">freq, PW, PRI,</text>
  <text x="518" y="180" text-anchor="middle" class="sub">amplitude, AoA</text>

  <!-- Identification -->
  <line class="sig" x1="574" y1="160" x2="604" y2="160" marker-end="url(#ab)"/>
  <rect class="blk" x="604" y="136" width="120" height="48" rx="4" fill="#003D6B" stroke="#003D6B"/>
  <text x="664" y="153" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Sort + identify</text>
  <text x="664" y="169" text-anchor="middle" fill="#7fdbff" font-size="10">emitter library</text>
  <text x="664" y="180" text-anchor="middle" fill="#7fdbff" font-size="10">match</text>

  <!-- Output to mission areas -->
  <line class="sig" x1="724" y1="160" x2="754" y2="160" marker-end="url(#ab)"/>
  <text x="760" y="150" class="sub">tracks +</text>
  <text x="760" y="164" class="sub">threat list</text>

  <!-- Three EW mission areas -->
  <rect x="20" y="300" width="280" height="76" rx="6" fill="#f2f7fb" stroke="#0078B6" stroke-width="1.4"/>
  <text x="34" y="322" class="lbl">Electronic Support (ES)</text>
  <text x="34" y="342" class="sub">Detect, intercept, locate, and</text>
  <text x="34" y="356" class="sub">identify emitters. Feeds the chain above.</text>

  <rect x="330" y="300" width="280" height="76" rx="6" fill="#fff4e6" stroke="#C77E00" stroke-width="1.4"/>
  <text x="344" y="322" class="lbl">Electronic Attack (EA)</text>
  <text x="344" y="342" class="sub">Jam, deceive, or spoof to deny the</text>
  <text x="344" y="356" class="sub">adversary's use of the spectrum.</text>

  <rect x="640" y="300" width="280" height="76" rx="6" fill="#f2f7fb" stroke="#4B2A6B" stroke-width="1.4"/>
  <text x="654" y="322" class="lbl">Electronic Protection (EP)</text>
  <text x="654" y="342" class="sub">Keep friendly systems working while</text>
  <text x="654" y="356" class="sub">under attack: agility, nulling, LPI.</text>

  <line class="sig" x1="160" y1="260" x2="160" y2="300" marker-end="url(#ab)" stroke-dasharray="4 3"/>
</svg>
