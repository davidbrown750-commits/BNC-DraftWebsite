<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="A map of career paths in radio frequency engineering, branching from a shared core of skills">
  <defs>
    <linearGradient id="core14a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#003D6B"/>
      <stop offset="0.6" stop-color="#0078B6"/>
      <stop offset="1" stop-color="#00b4ff"/>
    </linearGradient>
    <style>
      .card{fill:#ffffff;stroke:#b6c2cc;stroke-width:1.5;}
      .ttl{fill:#003D6B;font-size:15px;font-weight:700;letter-spacing:.2px;}
      .sub{fill:#2C3E50;font-size:11.5px;}
      .branch{stroke:#b6c2cc;stroke-width:2;fill:none;}
      .coreLabel{fill:#ffffff;font-weight:700;}
    </style>
  </defs>

  <!-- shared core -->
  <rect x="280" y="30" width="240" height="74" rx="6" fill="url(#core14a)"/>
  <text x="400" y="60" text-anchor="middle" class="coreLabel" font-size="16">SHARED CORE</text>
  <text x="400" y="82" text-anchor="middle" fill="#cdedff" font-size="11.5">EM theory, measurement, S-parameters, noise</text>

  <!-- branch lines from core to five paths -->
  <path class="branch" d="M340 104 C300 150, 130 150, 90 200"/>
  <path class="branch" d="M370 104 C350 150, 250 150, 245 200"/>
  <path class="branch" d="M400 104 C400 150, 400 150, 400 200"/>
  <path class="branch" d="M430 104 C450 150, 550 150, 555 200"/>
  <path class="branch" d="M460 104 C500 150, 670 150, 710 200"/>

  <!-- path 1: Design -->
  <rect class="card" x="16" y="200" width="150" height="120" rx="4"/>
  <rect x="16" y="200" width="6" height="120" fill="#0078B6"/>
  <text x="34" y="226" class="ttl">RF/MW Design</text>
  <text x="34" y="248" class="sub">Amplifiers, mixers,</text>
  <text x="34" y="264" class="sub">filters, front ends</text>
  <text x="34" y="288" class="sub">Tools: ADS, HFSS,</text>
  <text x="34" y="304" class="sub">VNA, EM solvers</text>

  <!-- path 2: Test & Measurement -->
  <rect class="card" x="178" y="200" width="150" height="120" rx="4"/>
  <rect x="178" y="200" width="6" height="120" fill="#00b4ff"/>
  <text x="196" y="226" class="ttl">Test &amp; Meas.</text>
  <text x="196" y="248" class="sub">Characterization,</text>
  <text x="196" y="264" class="sub">automation, calibration</text>
  <text x="196" y="288" class="sub">Tools: SA, VNA, NF,</text>
  <text x="196" y="304" class="sub">scripting, SCPI</text>

  <!-- path 3: Systems / Comms -->
  <rect class="card" x="325" y="200" width="150" height="120" rx="4"/>
  <rect x="325" y="200" width="6" height="120" fill="#003D6B"/>
  <text x="343" y="226" class="ttl">Systems &amp; Comms</text>
  <text x="343" y="248" class="sub">Link budgets, modems,</text>
  <text x="343" y="264" class="sub">5G/6G, SDR</text>
  <text x="343" y="288" class="sub">Tools: DSP, MATLAB,</text>
  <text x="343" y="304" class="sub">simulation</text>

  <!-- path 4: EMC / Compliance -->
  <rect class="card" x="472" y="200" width="150" height="120" rx="4"/>
  <rect x="472" y="200" width="6" height="120" fill="#C77E00"/>
  <text x="490" y="226" class="ttl">EMC &amp; Compliance</text>
  <text x="490" y="248" class="sub">Emissions, immunity,</text>
  <text x="490" y="264" class="sub">certification</text>
  <text x="490" y="288" class="sub">Tools: chambers,</text>
  <text x="490" y="304" class="sub">LISN, EMI receivers</text>

  <!-- path 5: Defense / Radar / EW -->
  <rect class="card" x="634" y="200" width="150" height="120" rx="4"/>
  <rect x="634" y="200" width="6" height="120" fill="#4B2A6B"/>
  <text x="652" y="226" class="ttl">Defense / EW</text>
  <text x="652" y="248" class="sub">Radar, SIGINT,</text>
  <text x="652" y="264" class="sub">electronic warfare</text>
  <text x="652" y="288" class="sub">Tools: wideband gen,</text>
  <text x="652" y="304" class="sub">real-time analysis</text>

  <!-- entry routes band -->
  <rect x="16" y="360" width="768" height="110" rx="6" fill="#f3f7fa" stroke="#b6c2cc" stroke-width="1.5"/>
  <text x="400" y="386" text-anchor="middle" class="ttl" font-size="14">Routes in</text>
  <text x="160" y="416" text-anchor="middle" class="sub" font-size="12">EE degree</text>
  <text x="160" y="436" text-anchor="middle" class="sub">(BSEE / MSEE)</text>
  <text x="335" y="416" text-anchor="middle" class="sub" font-size="12">Technician /</text>
  <text x="335" y="436" text-anchor="middle" class="sub">military training</text>
  <text x="510" y="416" text-anchor="middle" class="sub" font-size="12">Ham radio /</text>
  <text x="510" y="436" text-anchor="middle" class="sub">self-taught + SDR</text>
  <text x="660" y="416" text-anchor="middle" class="sub" font-size="12">Physics /</text>
  <text x="660" y="436" text-anchor="middle" class="sub">adjacent fields</text>
</svg>
