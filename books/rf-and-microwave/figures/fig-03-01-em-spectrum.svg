<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="The electromagnetic spectrum with RF bands and IEEE radar band designations">
  <defs>
    <linearGradient id="emband" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#003D6B"/>
      <stop offset="0.5" stop-color="#0078B6"/>
      <stop offset="1" stop-color="#00b4ff"/>
    </linearGradient>
    <style>
      .ttl{fill:#003D6B;font-size:18px;font-weight:700;letter-spacing:.3px;}
      .lbl{fill:#ffffff;font-size:12px;font-weight:700;}
      .sub{fill:#2C3E50;font-size:11px;}
      .axis{fill:#2C3E50;font-size:11px;}
      .rfttl{fill:#003D6B;font-size:13px;font-weight:700;}
      .cell{stroke:#ffffff;stroke-width:1;}
      .note{fill:#2C3E50;font-size:11px;}
    </style>
  </defs>

  <text x="40" y="34" class="ttl">The Electromagnetic Spectrum</text>
  <text x="40" y="54" class="sub">Increasing frequency &#8594; / Increasing wavelength &#8592;</text>

  <!-- full EM spectrum band -->
  <rect x="40" y="70" width="720" height="48" fill="url(#emband)"/>
  <g class="cell">
    <line x1="160" y1="70" x2="160" y2="118"/>
    <line x1="280" y1="70" x2="280" y2="118"/>
    <line x1="400" y1="70" x2="400" y2="118"/>
    <line x1="520" y1="70" x2="520" y2="118"/>
    <line x1="640" y1="70" x2="640" y2="118"/>
  </g>
  <text x="100" y="99" text-anchor="middle" class="lbl">Radio</text>
  <text x="220" y="99" text-anchor="middle" class="lbl">Micro</text>
  <text x="340" y="99" text-anchor="middle" class="lbl">IR</text>
  <text x="460" y="99" text-anchor="middle" class="lbl">Visible</text>
  <text x="580" y="99" text-anchor="middle" class="lbl">UV / X-ray</text>
  <text x="700" y="99" text-anchor="middle" class="lbl">Gamma</text>
  <text x="40" y="134" class="axis">3 kHz</text>
  <text x="760" y="134" text-anchor="end" class="axis">10^20 Hz+</text>

  <!-- RF section header -->
  <text x="40" y="176" class="rfttl">The RF band: 3 kHz to 300 GHz (ITU bands, by letter designation)</text>

  <!-- RF band table -->
  <g>
    <!-- columns: name | abbrev | frequency | example -->
    <rect x="40" y="190" width="720" height="22" fill="#003D6B"/>
    <text x="52" y="206" class="lbl">ITU Band</text>
    <text x="240" y="206" class="lbl">Frequency</text>
    <text x="430" y="206" class="lbl">Wavelength</text>
    <text x="600" y="206" class="lbl">Typical Use</text>

    <!-- rows -->
    <g class="note">
      <rect x="40" y="212" width="720" height="20" fill="#eef3f7"/>
      <text x="52" y="226">LF (Low)</text><text x="240" y="226">30-300 kHz</text><text x="430" y="226">10-1 km</text><text x="600" y="226">Navigation, time signals</text>

      <rect x="40" y="232" width="720" height="20" fill="#ffffff"/>
      <text x="52" y="246">MF (Medium)</text><text x="240" y="246">0.3-3 MHz</text><text x="430" y="246">1 km-100 m</text><text x="600" y="246">AM broadcast</text>

      <rect x="40" y="252" width="720" height="20" fill="#eef3f7"/>
      <text x="52" y="266">HF (High)</text><text x="240" y="266">3-30 MHz</text><text x="430" y="266">100-10 m</text><text x="600" y="266">Shortwave, amateur</text>

      <rect x="40" y="272" width="720" height="20" fill="#ffffff"/>
      <text x="52" y="286">VHF (Very High)</text><text x="240" y="286">30-300 MHz</text><text x="430" y="286">10-1 m</text><text x="600" y="286">FM, TV, aviation</text>

      <rect x="40" y="292" width="720" height="20" fill="#eef3f7"/>
      <text x="52" y="306">UHF (Ultra High)</text><text x="240" y="306">0.3-3 GHz</text><text x="430" y="306">1 m-10 cm</text><text x="600" y="306">Cellular, Wi-Fi, GPS</text>

      <rect x="40" y="312" width="720" height="20" fill="#ffffff"/>
      <text x="52" y="326">SHF (Super High)</text><text x="240" y="326">3-30 GHz</text><text x="430" y="326">10-1 cm</text><text x="600" y="326">Satellite, radar, 5G mmWave</text>

      <rect x="40" y="332" width="720" height="20" fill="#eef3f7"/>
      <text x="52" y="346">EHF (Extremely High)</text><text x="240" y="346">30-300 GHz</text><text x="430" y="346">10-1 mm</text><text x="600" y="346">Imaging, automotive radar</text>
    </g>
  </g>

  <!-- IEEE radar bands strip -->
  <text x="40" y="386" class="rfttl">IEEE radar band letters (1-110 GHz)</text>
  <g font-size="11">
    <g class="cell">
      <rect x="40"  y="398" width="78" height="40" fill="#4B2A6B"/>
      <rect x="118" y="398" width="78" height="40" fill="#0078B6"/>
      <rect x="196" y="398" width="78" height="40" fill="#003D6B"/>
      <rect x="274" y="398" width="78" height="40" fill="#0078B6"/>
      <rect x="352" y="398" width="78" height="40" fill="#003D6B"/>
      <rect x="430" y="398" width="78" height="40" fill="#0078B6"/>
      <rect x="508" y="398" width="78" height="40" fill="#003D6B"/>
      <rect x="586" y="398" width="88" height="40" fill="#C77E00"/>
      <rect x="674" y="398" width="86" height="40" fill="#4B2A6B"/>
    </g>
    <g fill="#ffffff" font-weight="700" text-anchor="middle">
      <text x="79"  y="416">L</text>
      <text x="157" y="416">S</text>
      <text x="235" y="416">C</text>
      <text x="313" y="416">X</text>
      <text x="391" y="416">Ku</text>
      <text x="469" y="416">K</text>
      <text x="547" y="416">Ka</text>
      <text x="630" y="416">V</text>
      <text x="717" y="416">W</text>
    </g>
    <g fill="#dfeaf2" font-size="9" text-anchor="middle">
      <text x="79"  y="430">1-2</text>
      <text x="157" y="430">2-4</text>
      <text x="235" y="430">4-8</text>
      <text x="313" y="430">8-12</text>
      <text x="391" y="430">12-18</text>
      <text x="469" y="430">18-27</text>
      <text x="547" y="430">27-40</text>
      <text x="630" y="430">40-75</text>
      <text x="717" y="430">75-110</text>
    </g>
  </g>
  <text x="40" y="454" class="axis">Frequency in GHz</text>

  <!-- regulatory note -->
  <rect x="40" y="470" width="720" height="36" fill="#ffffff" stroke="#b6c2cc" stroke-width="1.5" rx="4"/>
  <rect x="40" y="470" width="6" height="36" fill="#C77E00"/>
  <text x="58" y="487" class="note" font-weight="700" fill="#003D6B">Regulation:</text>
  <text x="130" y="487" class="note">The ITU coordinates spectrum globally; national regulators (FCC in the US) allocate and license bands.</text>
  <text x="130" y="501" class="note">Allocations vary by ITU Region 1 (EMEA), Region 2 (Americas), and Region 3 (Asia-Pacific).</text>
</svg>
