<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#ECEFF1"/>
  <!-- Axes -->
  <line x1="60" y1="340" x2="560" y2="340" stroke="#003D6B" stroke-width="2"/>
  <line x1="60" y1="20"  x2="60"  y2="340" stroke="#003D6B" stroke-width="2"/>
  <!-- Y-axis label: Insertion Loss (dB) -->
  <text transform="translate(18,200) rotate(-90)" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#003D6B" text-anchor="middle">Insertion Loss (dB)</text>
  <!-- X-axis label: Frequency -->
  <text x="310" y="385" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#003D6B" text-anchor="middle">Frequency</text>
  <!-- Y-axis ticks and labels -->
  <line x1="55" y1="60"  x2="60" y2="60"  stroke="#003D6B" stroke-width="1.5"/>
  <text x="50" y="64"  font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#003D6B" text-anchor="end">40</text>
  <line x1="55" y1="130" x2="60" y2="130" stroke="#003D6B" stroke-width="1.5"/>
  <text x="50" y="134" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#003D6B" text-anchor="end">30</text>
  <line x1="55" y1="200" x2="60" y2="200" stroke="#003D6B" stroke-width="1.5"/>
  <text x="50" y="204" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#003D6B" text-anchor="end">20</text>
  <line x1="55" y1="270" x2="60" y2="270" stroke="#003D6B" stroke-width="1.5"/>
  <text x="50" y="274" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#003D6B" text-anchor="end">10</text>
  <line x1="55" y1="340" x2="60" y2="340" stroke="#003D6B" stroke-width="1.5"/>
  <text x="50" y="344" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#003D6B" text-anchor="end">0</text>
  <!-- X-axis ticks -->
  <line x1="110" y1="340" x2="110" y2="345" stroke="#003D6B" stroke-width="1.5"/>
  <text x="110" y="358" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#003D6B" text-anchor="middle">f1</text>
  <line x1="210" y1="340" x2="210" y2="345" stroke="#003D6B" stroke-width="1.5"/>
  <text x="210" y="358" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#003D6B" text-anchor="middle">f2</text>
  <line x1="390" y1="340" x2="390" y2="345" stroke="#003D6B" stroke-width="1.5"/>
  <text x="390" y="358" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#003D6B" text-anchor="middle">f3</text>
  <line x1="490" y1="340" x2="490" y2="345" stroke="#003D6B" stroke-width="1.5"/>
  <text x="490" y="358" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#003D6B" text-anchor="middle">f4</text>
  <!-- Shaded passband region -->
  <rect x="210" y="327" width="180" height="13" fill="#0078B6" opacity="0.12"/>
  <!-- Filter response curve (polyline): high loss at low freq, drop to passband, rise again -->
  <!-- Points: start high loss at left, transition at f2, low loss passband (f2–f3), transition at f3, high loss right -->
  <polyline points="
    60,68
    80,70
    100,80
    110,95
    130,120
    155,165
    175,230
    190,295
    205,328
    210,333
    220,335
    250,337
    300,338
    350,337
    380,335
    390,333
    395,328
    410,295
    425,230
    445,165
    465,120
    480,95
    490,80
    510,70
    530,68
    560,66
  " fill="none" stroke="#0078B6" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Band edge dashed lines -->
  <line x1="210" y1="30" x2="210" y2="340" stroke="#003D6B" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="390" y1="30" x2="390" y2="340" stroke="#003D6B" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <!-- Passband label -->
  <text x="300" y="308" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#003D6B" text-anchor="middle" font-weight="600">Passband</text>
  <!-- Stopband labels -->
  <text x="135" y="150" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#003D6B" text-anchor="middle">Stopband</text>
  <text x="465" y="150" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#003D6B" text-anchor="middle">Stopband</text>
  <!-- 3 dB reference line -->
  <line x1="60" y1="319" x2="560" y2="319" stroke="#003D6B" stroke-width="1" stroke-dasharray="3,5" opacity="0.4"/>
  <text x="565" y="322" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#003D6B">3 dB</text>
  <!-- Title -->
  <text x="310" y="15" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#003D6B" text-anchor="middle" font-weight="700">Bandpass Filter Response</text>
</svg>
