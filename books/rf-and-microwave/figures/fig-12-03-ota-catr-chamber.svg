<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Compact antenna test range OTA chamber for FR2 mmWave device testing">
  <defs>
    <linearGradient id="instr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#003D6B"/>
      <stop offset="1" stop-color="#0078B6"/>
    </linearGradient>
    <style>
      .ttl{fill:#003D6B;font-size:17px;font-weight:700;}
      .wall{fill:#eef3f7;stroke:#b6c2cc;stroke-width:2;}
      .blk{fill:#ffffff;stroke:#b6c2cc;stroke-width:1.5;}
      .lbl{fill:#2C3E50;font-size:12px;}
      .ttls{fill:#003D6B;font-size:13px;font-weight:700;}
      .tag{fill:#4B2A6B;font-size:11px;font-weight:700;}
      .note{fill:#C77E00;font-size:11px;font-weight:700;}
      .ray{stroke:#00b4ff;stroke-width:2;fill:none;}
      .sph{stroke:#4B2A6B;stroke-width:1.5;fill:none;stroke-dasharray:4 3;}
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#00b4ff"/>
    </marker>
  </defs>

  <text x="430" y="30" text-anchor="middle" class="ttl">FR2 Over-the-Air Test: Compact Antenna Test Range (CATR)</text>

  <!-- chamber outline -->
  <rect x="40" y="55" width="600" height="320" rx="6" class="wall"/>
  <!-- absorber teeth top -->
  <g fill="#cdd9e2">
    <path d="M40 55 l20 22 l20 -22 z"/><path d="M80 55 l20 22 l20 -22 z"/><path d="M120 55 l20 22 l20 -22 z"/>
    <path d="M160 55 l20 22 l20 -22 z"/><path d="M200 55 l20 22 l20 -22 z"/><path d="M240 55 l20 22 l20 -22 z"/>
    <path d="M280 55 l20 22 l20 -22 z"/><path d="M320 55 l20 22 l20 -22 z"/><path d="M360 55 l20 22 l20 -22 z"/>
    <path d="M400 55 l20 22 l20 -22 z"/><path d="M440 55 l20 22 l20 -22 z"/><path d="M480 55 l20 22 l20 -22 z"/>
    <path d="M520 55 l20 22 l20 -22 z"/><path d="M560 55 l20 22 l20 -22 z"/><path d="M600 55 l20 22 l20 -22 z"/>
  </g>
  <text x="120" y="100" class="tag">Anechoic chamber (absorber-lined)</text>

  <!-- parabolic reflector -->
  <path d="M520 110 Q470 215 520 320" fill="none" stroke="#003D6B" stroke-width="6"/>
  <text x="540" y="215" class="ttls" transform="rotate(90 540 215)" text-anchor="middle">Parabolic reflector</text>

  <!-- feed antenna -->
  <rect class="blk" x="430" y="300" width="60" height="34" rx="4"/>
  <text x="460" y="322" text-anchor="middle" class="lbl" font-size="11">feed</text>

  <!-- spherical wave from feed to reflector -->
  <path class="sph" d="M490 317 Q505 280 514 250"/>
  <path class="sph" d="M490 317 Q500 300 514 300"/>

  <!-- collimated planar wave to DUT -->
  <line class="ray" x1="510" y1="150" x2="180" y2="150" marker-end="url(#ah)"/>
  <line class="ray" x1="510" y1="180" x2="180" y2="180" marker-end="url(#ah)"/>
  <line class="ray" x1="510" y1="210" x2="180" y2="210" marker-end="url(#ah)"/>
  <text x="330" y="135" text-anchor="middle" class="tag">planar (far-field) wavefront</text>

  <!-- DUT on positioner -->
  <rect class="blk" x="110" y="160" width="64" height="90" rx="4" fill="#fff"/>
  <rect x="110" y="160" width="6" height="90" fill="#00b4ff"/>
  <text x="142" y="200" text-anchor="middle" class="ttls" font-size="12">DUT</text>
  <text x="142" y="218" text-anchor="middle" class="lbl" font-size="11">5G FR2</text>
  <text x="142" y="234" text-anchor="middle" class="lbl" font-size="11">handset</text>
  <circle cx="142" cy="270" r="16" fill="#b6c2cc"/>
  <text x="142" y="300" text-anchor="middle" class="lbl" font-size="10">2-axis positioner</text>

  <!-- instrumentation outside chamber -->
  <rect class="blk" x="680" y="120" width="150" height="80" rx="4" fill="url(#instr)" stroke="#003D6B"/>
  <text x="755" y="150" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Signal source /</text>
  <text x="755" y="168" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">analyzer</text>
  <text x="755" y="188" text-anchor="middle" fill="#7fdbff" font-size="11">mmWave front end</text>

  <rect class="blk" x="680" y="230" width="150" height="70" rx="4"/>
  <text x="755" y="258" text-anchor="middle" class="ttls" font-size="12">Channel emulator</text>
  <text x="755" y="278" text-anchor="middle" class="lbl" font-size="11">+ control PC</text>

  <line x1="640" y1="160" x2="678" y2="160" stroke="#0078B6" stroke-width="2.5" marker-end="url(#ah)"/>

  <text x="430" y="408" text-anchor="middle" class="note">CATR collimates a spherical wave into a planar far-field at short range; FR2 UE is tested OTA per 3GPP TS 38.101-2 / TR 38.810. Verify before publication.</text>
</svg>
