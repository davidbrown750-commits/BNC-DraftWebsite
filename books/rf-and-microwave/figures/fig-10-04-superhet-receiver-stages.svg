<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Superheterodyne receiver block diagram showing the stages under test">
  <defs>
    <linearGradient id="rxcore" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#003D6B"/>
      <stop offset="1" stop-color="#0078B6"/>
    </linearGradient>
    <style>
      .stage{fill:#ffffff;stroke:#b6c2cc;stroke-width:1.5;}
      .accent{fill:#0078B6;}
      .accent2{fill:#00b4ff;}
      .lo{fill:#4B2A6B;}
      .amber{fill:#C77E00;}
      .ttl{fill:#003D6B;font-size:14px;font-weight:700;}
      .sub{fill:#2C3E50;font-size:11px;}
      .sig{stroke:#003D6B;stroke-width:2.5;fill:none;}
      .white{fill:#ffffff;font-weight:700;font-size:14px;}
      .lbl{fill:#003D6B;font-size:11px;font-weight:700;letter-spacing:.5px;}
    </style>
    <marker id="rxah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#003D6B"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="ttl" font-size="17">Superheterodyne Receiver - Signal Path and Stages Under Test</text>

  <!-- Antenna -->
  <path d="M58 120 L58 165 M40 90 L58 120 L76 90" class="sig"/>
  <text x="58" y="200" text-anchor="middle" class="lbl">ANTENNA</text>
  <text x="58" y="216" text-anchor="middle" class="sub">+ cable / adapters</text>

  <!-- RF selection stage -->
  <rect class="stage" x="110" y="120" width="120" height="80" rx="4"/>
  <rect x="110" y="120" width="6" height="80" class="accent"/>
  <text x="170" y="150" text-anchor="middle" class="ttl">RF Selection</text>
  <text x="170" y="170" text-anchor="middle" class="sub">tunable bandpass</text>
  <text x="170" y="186" text-anchor="middle" class="sub">+ LNA</text>

  <!-- Mixer -->
  <circle cx="320" cy="160" r="38" fill="url(#rxcore)"/>
  <line x1="298" y1="138" x2="342" y2="182" stroke="#ffffff" stroke-width="2.5"/>
  <line x1="342" y1="138" x2="298" y2="182" stroke="#ffffff" stroke-width="2.5"/>
  <text x="320" y="222" text-anchor="middle" class="lbl">MIXER</text>
  <text x="320" y="238" text-anchor="middle" class="sub">freq conversion</text>

  <!-- Local oscillator -->
  <rect class="stage" x="262" y="300" width="116" height="66" rx="4"/>
  <rect x="262" y="300" width="6" height="66" class="lo"/>
  <text x="320" y="328" text-anchor="middle" class="ttl">Local Osc.</text>
  <text x="320" y="348" text-anchor="middle" class="sub">stable reference</text>

  <!-- IF stage -->
  <rect class="stage" x="430" y="120" width="130" height="80" rx="4"/>
  <rect x="430" y="120" width="6" height="80" class="accent2"/>
  <text x="495" y="146" text-anchor="middle" class="ttl">IF / Selection</text>
  <text x="495" y="166" text-anchor="middle" class="sub">fixed filter +</text>
  <text x="495" y="182" text-anchor="middle" class="sub">IF amplifier</text>

  <!-- Demodulator -->
  <rect class="stage" x="600" y="120" width="120" height="80" rx="4"/>
  <rect x="600" y="120" width="6" height="80" class="accent"/>
  <text x="660" y="150" text-anchor="middle" class="ttl">Demodulator</text>
  <text x="660" y="170" text-anchor="middle" class="sub">recovers base</text>
  <text x="660" y="186" text-anchor="middle" class="sub">information</text>

  <!-- Audio amp + speaker -->
  <rect class="stage" x="760" y="120" width="110" height="80" rx="4"/>
  <rect x="760" y="120" width="6" height="80" class="amber"/>
  <text x="815" y="150" text-anchor="middle" class="ttl">Audio Amp</text>
  <text x="815" y="170" text-anchor="middle" class="sub">+ speaker /</text>
  <text x="815" y="186" text-anchor="middle" class="sub">data output</text>

  <!-- Signal path arrows -->
  <line class="sig" x1="58" y1="165" x2="104" y2="165" marker-end="url(#rxah)"/>
  <line class="sig" x1="230" y1="160" x2="276" y2="160" marker-end="url(#rxah)"/>
  <line class="sig" x1="358" y1="160" x2="424" y2="160" marker-end="url(#rxah)"/>
  <line class="sig" x1="560" y1="160" x2="594" y2="160" marker-end="url(#rxah)"/>
  <line class="sig" x1="720" y1="160" x2="754" y2="160" marker-end="url(#rxah)"/>
  <!-- LO into mixer -->
  <line class="sig" x1="320" y1="300" x2="320" y2="202" marker-end="url(#rxah)" stroke="#4B2A6B"/>

  <!-- Test-direction banner -->
  <rect x="110" y="384" width="760" height="26" rx="4" fill="#003D6B"/>
  <text x="490" y="402" text-anchor="middle" class="white" font-size="12">Recommended test order: work backward from the speaker (right) toward the antenna (left)</text>
  <path d="M780 397 L120 397" stroke="#00b4ff" stroke-width="2" marker-end="url(#rxah)" opacity="0"/>
</svg>
