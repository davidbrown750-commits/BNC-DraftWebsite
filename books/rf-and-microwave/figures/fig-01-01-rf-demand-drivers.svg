<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Four forces driving demand on the RF spectrum">
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#003D6B"/>
      <stop offset="0.6" stop-color="#0078B6"/>
      <stop offset="1" stop-color="#00b4ff"/>
    </linearGradient>
    <style>
      .card{fill:#ffffff;stroke:#b6c2cc;stroke-width:1.5;}
      .ttl{fill:#003D6B;font-size:18px;font-weight:700;letter-spacing:.3px;}
      .sub{fill:#2C3E50;font-size:13px;}
      .arrow{stroke:#0078B6;stroke-width:2.5;fill:none;}
      .coreLabel{fill:#ffffff;font-weight:700;}
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0078B6"/>
    </marker>
  </defs>

  <!-- central spectrum core -->
  <circle cx="400" cy="235" r="84" fill="url(#core)"/>
  <text x="400" y="226" text-anchor="middle" class="coreLabel" font-size="20">THE RF</text>
  <text x="400" y="250" text-anchor="middle" class="coreLabel" font-size="20">SPECTRUM</text>
  <text x="400" y="272" text-anchor="middle" fill="#7fdbff" font-size="12" letter-spacing="1.5">FINITE &amp; CONTESTED</text>

  <!-- connector arrows -->
  <line class="arrow" x1="250" y1="120" x2="338" y2="190" marker-end="url(#ah)"/>
  <line class="arrow" x1="550" y1="120" x2="462" y2="190" marker-end="url(#ah)"/>
  <line class="arrow" x1="250" y1="350" x2="338" y2="280" marker-end="url(#ah)"/>
  <line class="arrow" x1="550" y1="350" x2="462" y2="280" marker-end="url(#ah)"/>

  <!-- top-left: Commercial wireless -->
  <rect class="card" x="36" y="40" width="230" height="86" rx="4"/>
  <rect x="36" y="40" width="6" height="86" fill="#0078B6"/>
  <text x="58" y="72" class="ttl">Commercial Wireless</text>
  <text x="58" y="96" class="sub">5G, mmWave, and the road to 6G</text>
  <text x="58" y="114" class="sub">More bands, more front ends</text>

  <!-- top-right: IoT -->
  <rect class="card" x="534" y="40" width="230" height="86" rx="4"/>
  <rect x="534" y="40" width="6" height="86" fill="#00b4ff"/>
  <text x="556" y="72" class="ttl">Internet of Things</text>
  <text x="556" y="96" class="sub">30B+ connected radios</text>
  <text x="556" y="114" class="sub">Built to a price, everywhere</text>

  <!-- bottom-left: Satellite -->
  <rect class="card" x="36" y="344" width="230" height="86" rx="4"/>
  <rect x="36" y="344" width="6" height="86" fill="#4B2A6B"/>
  <text x="58" y="376" class="ttl">Satellite &amp; NTN</text>
  <text x="58" y="400" class="sub">LEO constellations</text>
  <text x="58" y="418" class="sub">Direct-to-device links</text>

  <!-- bottom-right: Defense -->
  <rect class="card" x="534" y="344" width="230" height="86" rx="4"/>
  <rect x="534" y="344" width="6" height="86" fill="#C77E00"/>
  <text x="556" y="376" class="ttl">Defense &amp; Aerospace</text>
  <text x="556" y="400" class="sub">Radar, EW, and SIGINT</text>
  <text x="556" y="418" class="sub">Wideband, fast, agile</text>
</svg>
