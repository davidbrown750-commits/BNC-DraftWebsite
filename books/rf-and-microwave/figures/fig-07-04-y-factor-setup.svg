<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Y-factor noise-figure measurement setup">
  <defs>
    <linearGradient id="src" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#003D6B"/>
      <stop offset="1" stop-color="#0078B6"/>
    </linearGradient>
    <style>
      .blk{fill:#ffffff;stroke:#b6c2cc;stroke-width:1.5;}
      .ttl{fill:#003D6B;font-size:15px;font-weight:700;}
      .sub{fill:#2C3E50;font-size:12px;}
      .lbl{fill:#4B2A6B;font-size:11px;font-weight:700;letter-spacing:.5px;}
      .sig{stroke:#0078B6;stroke-width:2.5;fill:none;}
      .white{fill:#ffffff;font-weight:700;}
      .note{fill:#C77E00;font-size:11px;font-weight:700;}
    </style>
    <marker id="ahd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0078B6"/>
    </marker>
  </defs>

  <text x="410" y="28" text-anchor="middle" class="ttl" font-size="17">Y-Factor Noise-Figure Measurement</text>

  <!-- Noise source -->
  <rect class="blk" x="30" y="120" width="150" height="90" rx="4" fill="url(#src)" stroke="#003D6B"/>
  <text x="105" y="152" text-anchor="middle" class="white" font-size="14">Calibrated</text>
  <text x="105" y="172" text-anchor="middle" class="white" font-size="14">Noise Source</text>
  <text x="105" y="194" text-anchor="middle" fill="#7fdbff" font-size="11">known ENR</text>
  <text x="105" y="240" text-anchor="middle" class="lbl">HOT (T_h) / COLD (T_c)</text>
  <text x="105" y="258" text-anchor="middle" class="sub">28 V on / off</text>

  <!-- DUT -->
  <rect class="blk" x="300" y="120" width="150" height="90" rx="4"/>
  <rect x="300" y="120" width="6" height="90" fill="#0078B6"/>
  <text x="375" y="158" text-anchor="middle" class="ttl">DUT</text>
  <text x="375" y="180" text-anchor="middle" class="sub">amplifier / LNA</text>
  <text x="375" y="198" text-anchor="middle" class="sub">gain G, factor F</text>

  <!-- Receiver / analyzer -->
  <rect class="blk" x="600" y="110" width="190" height="110" rx="4"/>
  <rect x="600" y="110" width="6" height="110" fill="#4B2A6B"/>
  <text x="695" y="146" text-anchor="middle" class="ttl">Measurement</text>
  <text x="695" y="166" text-anchor="middle" class="ttl">Receiver</text>
  <text x="695" y="188" text-anchor="middle" class="sub">NF analyzer / SA</text>
  <text x="695" y="206" text-anchor="middle" class="sub">reads N_hot, N_cold</text>

  <!-- signal path -->
  <line class="sig" x1="180" y1="165" x2="298" y2="165" marker-end="url(#ahd)"/>
  <line class="sig" x1="450" y1="165" x2="598" y2="165" marker-end="url(#ahd)"/>

  <!-- ENR control / bias line -->
  <line x1="105" y1="120" x2="105" y2="90" stroke="#C77E00" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="105" y1="90" x2="695" y2="90" stroke="#C77E00" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="695" y1="90" x2="695" y2="108" stroke="#C77E00" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ahd)"/>
  <text x="400" y="82" text-anchor="middle" class="note">noise-source drive / ENR table</text>

  <!-- Y-factor result -->
  <rect x="560" y="262" width="250" height="74" rx="4" fill="#f2f6f9" stroke="#b6c2cc" stroke-width="1.5"/>
  <text x="685" y="286" text-anchor="middle" class="ttl" font-size="14">Y = N_hot / N_cold</text>
  <text x="685" y="308" text-anchor="middle" class="sub">F = ENR / (Y - 1)</text>
  <text x="685" y="326" text-anchor="middle" class="sub">(cold near T_0)</text>
</svg>
