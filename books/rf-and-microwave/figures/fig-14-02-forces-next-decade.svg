<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Four forces shaping the next decade of RF: software-defined everything, AI in measurement, spectrum pressure, and the workforce gap">
  <defs>
    <linearGradient id="core14b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#003D6B"/>
      <stop offset="0.6" stop-color="#0078B6"/>
      <stop offset="1" stop-color="#00b4ff"/>
    </linearGradient>
    <style>
      .card{fill:#ffffff;stroke:#b6c2cc;stroke-width:1.5;}
      .ttl{fill:#003D6B;font-size:17px;font-weight:700;letter-spacing:.3px;}
      .sub{fill:#2C3E50;font-size:13px;}
      .arrow{stroke:#0078B6;stroke-width:2.5;fill:none;}
      .coreLabel{fill:#ffffff;font-weight:700;}
    </style>
    <marker id="ah14" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0078B6"/>
    </marker>
  </defs>

  <circle cx="400" cy="235" r="86" fill="url(#core14b)"/>
  <text x="400" y="222" text-anchor="middle" class="coreLabel" font-size="19">THE NEXT</text>
  <text x="400" y="246" text-anchor="middle" class="coreLabel" font-size="19">DECADE OF RF</text>
  <text x="400" y="270" text-anchor="middle" fill="#7fdbff" font-size="12" letter-spacing="1.5">FASTER &amp; SOFTER</text>

  <line class="arrow" x1="250" y1="118" x2="338" y2="188" marker-end="url(#ah14)"/>
  <line class="arrow" x1="550" y1="118" x2="462" y2="188" marker-end="url(#ah14)"/>
  <line class="arrow" x1="250" y1="352" x2="338" y2="282" marker-end="url(#ah14)"/>
  <line class="arrow" x1="550" y1="352" x2="462" y2="282" marker-end="url(#ah14)"/>

  <!-- top-left: Software-defined everything -->
  <rect class="card" x="30" y="38" width="236" height="86" rx="4"/>
  <rect x="30" y="38" width="6" height="86" fill="#0078B6"/>
  <text x="52" y="70" class="ttl">Software-Defined</text>
  <text x="52" y="94" class="sub">Function moves into code</text>
  <text x="52" y="112" class="sub">Update, don't re-buy</text>

  <!-- top-right: AI in measurement -->
  <rect class="card" x="534" y="38" width="236" height="86" rx="4"/>
  <rect x="534" y="38" width="6" height="86" fill="#00b4ff"/>
  <text x="556" y="70" class="ttl">AI in Measurement</text>
  <text x="556" y="94" class="sub">Signal classification</text>
  <text x="556" y="112" class="sub">Adaptive, faster sweeps</text>

  <!-- bottom-left: Spectrum pressure -->
  <rect class="card" x="30" y="346" width="236" height="86" rx="4"/>
  <rect x="30" y="346" width="6" height="86" fill="#4B2A6B"/>
  <text x="52" y="378" class="ttl">Spectrum Pressure</text>
  <text x="52" y="402" class="sub">More users, less margin</text>
  <text x="52" y="420" class="sub">Higher bands, mmWave+</text>

  <!-- bottom-right: Workforce gap -->
  <rect class="card" x="534" y="346" width="236" height="86" rx="4"/>
  <rect x="534" y="346" width="6" height="86" fill="#C77E00"/>
  <text x="556" y="378" class="ttl">Workforce Gap</text>
  <text x="556" y="402" class="sub">Retirements outpace hires</text>
  <text x="556" y="420" class="sub">Scarce, valuable skills</text>
</svg>
