<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="An FFT analyzer slices the sampled time stream into overlapping windowed frames and transforms each into a spectrum; overlap and window shape set the gap-free coverage and amplitude accuracy">
  <defs>
    <style>
      .axis{stroke:#2C3E50;stroke-width:1.4;}
      .tick{fill:#2C3E50;font-size:10px;}
      .ttl{fill:#003D6B;font-size:13px;font-weight:700;}
      .note{fill:#2C3E50;font-size:11px;}
    </style>
  </defs>

  <text x="20" y="28" fill="#003D6B" font-size="15" font-weight="700">FFT Processing: Overlapping Windowed Frames to Spectra</text>

  <!-- sampled time stream -->
  <text x="20" y="58" class="ttl">1. Sampled time stream from the ADC</text>
  <line class="axis" x1="40" y1="120" x2="790" y2="120"/>
  <path d="M40 120 Q70 80 100 120 T160 120 T220 120 T280 120 T340 120 T400 120 T460 120 T520 120 T580 120 T640 120 T700 120 T760 120"
        stroke="#2C3E50" stroke-width="1.4" fill="none"/>

  <!-- overlapping frames -->
  <text x="20" y="162" class="ttl">2. Sliced into overlapping frames (each frame = one FFT)</text>
  <rect x="40" y="172" width="200" height="30" fill="#0078B6" fill-opacity="0.22" stroke="#0078B6" stroke-width="1.4"/>
  <text x="140" y="192" class="note" text-anchor="middle" fill="#003D6B">frame 1</text>
  <rect x="140" y="208" width="200" height="30" fill="#4B2A6B" fill-opacity="0.20" stroke="#4B2A6B" stroke-width="1.4"/>
  <text x="240" y="228" class="note" text-anchor="middle" fill="#4B2A6B">frame 2</text>
  <rect x="240" y="244" width="200" height="30" fill="#0078B6" fill-opacity="0.22" stroke="#0078B6" stroke-width="1.4"/>
  <text x="340" y="264" class="note" text-anchor="middle" fill="#003D6B">frame 3</text>
  <!-- overlap brace -->
  <line x1="140" y1="172" x2="140" y2="274" stroke="#C77E00" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="240" y1="172" x2="240" y2="274" stroke="#C77E00" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="470" y="212" class="note">50% overlap (typical with a Hann window) so no</text>
  <text x="470" y="228" class="note">sample sits only at a frame edge. Overlap is what</text>
  <text x="470" y="244" class="note">makes real-time coverage gap-free.</text>

  <!-- window function -->
  <text x="20" y="306" class="ttl">3. Each frame is windowed, then transformed</text>
  <path d="M50 360 Q110 300 170 360" stroke="#C77E00" stroke-width="2.4" fill="none"/>
  <text x="110" y="380" class="note" text-anchor="middle">window taper</text>
  <text x="200" y="338" class="note">Window choice is a tradeoff:</text>
  <text x="200" y="356" class="note" fill="#0078B6">Hann: good frequency resolution, low leakage (default).</text>
  <text x="200" y="374" class="note" fill="#C77E00">Flat-top: best amplitude accuracy, wider main lobe.</text>

  <!-- resulting spectrum -->
  <line class="axis" x1="560" y1="300" x2="560" y2="385"/>
  <line class="axis" x1="560" y1="385" x2="790" y2="385"/>
  <path d="M560 383 L630 381 Q650 312 670 381 L720 381 Q735 340 750 381 L790 383"
        stroke="#003D6B" stroke-width="2.2" fill="none"/>
  <text x="675" y="402" class="note" text-anchor="middle">spectrum (one per frame)</text>

  <line x1="20" y1="412" x2="800" y2="412" stroke="#b6c2cc" stroke-width="1"/>
  <text x="20" y="428" class="note">Longer frames (larger FFT) give finer frequency resolution but take more time, trading away real-time bandwidth.</text>
</svg>
