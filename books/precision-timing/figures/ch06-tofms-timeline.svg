<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="t d">
  <title id="t">Time-of-flight mass spectrometry timing</title>
  <desc id="d">A timeline with an ionization laser pulse, a delayed-extraction wait interval, and a fast high-voltage extraction edge, above a drift-tube schematic showing a light and a heavy ion packet separating as they travel to a detector.</desc>
  <rect x="0" y="0" width="720" height="440" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="439" fill="none" stroke="#b6c2cc" rx="6"/>
  <text x="24" y="34" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">TOF-MS: Delayed Extraction and Mass Separation</text>

  <!-- timeline -->
  <line x1="70" y1="150" x2="680" y2="150" stroke="#b6c2cc" stroke-width="1.2"/>
  <polygon points="680,150 670,146 670,154" fill="#b6c2cc"/>
  <text x="640" y="172" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50">time</text>

  <!-- ionization pulse -->
  <polyline points="110,150 110,72 120,72 120,150" fill="none" stroke="#003D6B" stroke-width="2.5"/>
  <text x="78" y="64" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B">ionization</text>

  <!-- delayed extraction wait interval -->
  <line x1="120" y1="120" x2="360" y2="120" stroke="#C77E00" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="120" y1="112" x2="120" y2="128" stroke="#C77E00" stroke-width="1.5"/>
  <line x1="360" y1="112" x2="360" y2="128" stroke="#C77E00" stroke-width="1.5"/>
  <text x="170" y="110" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C77E00">delayed extraction</text>

  <!-- HV extraction edge -->
  <polyline points="360,150 360,140 366,75 372,75" fill="none" stroke="#0078B6" stroke-width="2.5"/>
  <text x="380" y="80" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#0078B6">HV extraction edge</text>

  <!-- drift tube -->
  <rect x="120" y="240" width="470" height="80" fill="#eaf4fb" stroke="#003D6B" stroke-width="2"/>
  <text x="140" y="232" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B">drift tube</text>

  <!-- ion packets separating: light ahead, heavy behind -->
  <g>
    <ellipse cx="470" cy="280" rx="16" ry="14" fill="#0078B6" opacity="0.85"/>
    <text x="445" y="345" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#0078B6">light mass</text>
    <polyline points="490,280 520,280" stroke="#2C3E50" stroke-width="1.5"/>
    <polygon points="520,280 512,276 512,284" fill="#2C3E50"/>
  </g>
  <g>
    <ellipse cx="280" cy="280" rx="20" ry="16" fill="#003D6B" opacity="0.85"/>
    <text x="250" y="345" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B">heavy mass</text>
    <polyline points="304,280 330,280" stroke="#2C3E50" stroke-width="1.5"/>
    <polygon points="330,280 322,276 322,284" fill="#2C3E50"/>
  </g>

  <!-- detector -->
  <rect x="600" y="240" width="60" height="80" fill="#eaf4fb" stroke="#003D6B" stroke-width="2"/>
  <line x1="600" y1="240" x2="600" y2="320" stroke="#003D6B" stroke-width="3"/>
  <text x="606" y="285" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#003D6B" transform="rotate(0 0 0)">detector</text>
  <line x1="590" y1="280" x2="600" y2="280" stroke="#0078B6" stroke-width="2.5"/>
  <polygon points="600,280 592,276 592,284" fill="#0078B6"/>
</svg>
