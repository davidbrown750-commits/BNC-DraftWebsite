<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="t d">
  <title id="t">Q-switch timing</title>
  <desc id="d">A timeline showing the lamp trigger at t=0, a rising and decaying stored-inversion curve, a Q-switch-open marker at the inversion peak, a short tall output pulse just after it, and a build-up interval callout labeled jitters by tens of nanoseconds.</desc>
  <rect x="0" y="0" width="720" height="420" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="419" fill="none" stroke="#b6c2cc" rx="6"/>
  <text x="24" y="34" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Q-Switch Timing and Build-Up Jitter</text>

  <!-- axis -->
  <line x1="70" y1="330" x2="680" y2="330" stroke="#b6c2cc" stroke-width="1.2"/>
  <polygon points="680,330 670,326 670,334" fill="#b6c2cc"/>
  <text x="600" y="352" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50">time (microseconds)</text>
  <line x1="70" y1="80" x2="70" y2="330" stroke="#b6c2cc" stroke-width="1.2"/>

  <!-- lamp trigger at t=0 -->
  <line x1="110" y1="100" x2="110" y2="330" stroke="#003D6B" stroke-width="2.5"/>
  <polygon points="110,100 105,112 115,112" fill="#003D6B"/>
  <text x="78" y="94" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B">lamp trigger</text>
  <text x="100" y="346" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50">t = 0</text>

  <!-- stored inversion curve: rises, peaks ~x=430, decays -->
  <path d="M110,330 C200,330 240,150 430,150 C520,150 560,250 640,300" fill="none" stroke="#0078B6" stroke-width="2.5"/>
  <text x="220" y="200" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0078B6">stored inversion</text>

  <!-- Q-switch open at inversion peak -->
  <line x1="430" y1="120" x2="430" y2="330" stroke="#C77E00" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="388" y="114" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C77E00">Q-switch open</text>
  <circle cx="430" cy="150" r="4" fill="#C77E00"/>

  <!-- output pulse just after -->
  <polyline points="448,330 452,110 456,330" fill="none" stroke="#003D6B" stroke-width="2.5"/>
  <text x="462" y="118" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#003D6B">output pulse</text>

  <!-- build-up bracket between Q-switch open and output -->
  <path d="M430,360 L430,372 L452,372 L452,360" fill="none" stroke="#C77E00" stroke-width="1.5"/>
  <text x="340" y="392" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C77E00">build-up: jitters by tens of ns</text>
</svg>
