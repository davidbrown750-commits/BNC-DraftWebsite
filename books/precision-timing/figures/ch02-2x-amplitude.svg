<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="Helvetica, Arial, sans-serif">
  <title>Amplitude into 50 ohm versus high impedance</title>
  <desc>The same programmed pulse delivers its specified amplitude into a matched 50 ohm load and roughly double that amplitude into a high-impedance input. A small voltage-divider schematic shows the back-matched 50 ohm source splitting voltage in half when matched and dropping almost nothing into a high-Z input.</desc>

  <rect x="0" y="0" width="720" height="440" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="439" fill="none" stroke="#b6c2cc" rx="6"/>

  <text x="60" y="36" fill="#003D6B" font-size="16" font-weight="700">The 2&#215; Amplitude Trap</text>

  <!-- axes -->
  <line x1="80" y1="70" x2="80" y2="330" stroke="#b6c2cc" stroke-width="1.5"/>
  <line x1="80" y1="330" x2="430" y2="330" stroke="#b6c2cc" stroke-width="1.5"/>
  <text x="34" y="200" fill="#2C3E50" font-size="13" transform="rotate(-90 34 200)" text-anchor="middle">Voltage</text>
  <text x="255" y="352" fill="#2C3E50" font-size="13" text-anchor="middle">Time &#8594;</text>

  <!-- amplitude reference dashed lines -->
  <line x1="80" y1="240" x2="430" y2="240" stroke="#C77E00" stroke-width="1.3" stroke-dasharray="6 4"/>
  <line x1="80" y1="105" x2="430" y2="105" stroke="#C77E00" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="84" y="236" fill="#2C3E50" font-size="11">V</text>
  <text x="84" y="101" fill="#2C3E50" font-size="11">2V</text>

  <!-- baseline -->
  <!-- matched 50 ohm pulse (lower, amplitude V): top at y=240 -->
  <path d="M 80 330 L 130 330 L 130 240 L 210 240 L 210 330 L 250 330"
        fill="none" stroke="#003D6B" stroke-width="2.5"/>
  <text x="170" y="316" fill="#003D6B" font-size="12" font-weight="700" text-anchor="middle">V (spec)</text>

  <!-- high-Z pulse (higher, ~2V): top at y=105 -->
  <path d="M 250 330 L 290 330 L 290 105 L 370 105 L 370 330 L 410 330"
        fill="none" stroke="#0655a3" stroke-width="2.5"/>
  <text x="330" y="98" fill="#0655a3" font-size="12" font-weight="700" text-anchor="middle">&#8776; 2V</text>

  <!-- labels under each -->
  <text x="170" y="382" fill="#2C3E50" font-size="12" text-anchor="middle">into 50 &#937; (matched)</text>
  <text x="330" y="382" fill="#2C3E50" font-size="12" text-anchor="middle">into high-Z (&#8776; 2&#215; V)</text>

  <!-- ============ voltage divider schematic (right) ============ -->
  <g stroke="#777f87" stroke-width="1.4" fill="none" font-family="Helvetica, Arial, sans-serif">
    <!-- MATCHED case -->
    <text x="470" y="80" fill="#003D6B" font-size="13" font-weight="700">Matched 50 &#937;</text>
    <!-- source emf -->
    <circle cx="490" cy="120" r="12"/>
    <text x="490" y="124" fill="#2C3E50" font-size="11" text-anchor="middle" stroke="none">2V</text>
    <line x1="490" y1="108" x2="490" y2="100"/>
    <line x1="490" y1="100" x2="560" y2="100"/>
    <!-- source resistor (50 ohm) -->
    <rect x="545" y="100" width="30" height="14" transform="translate(0 -7)"/>
    <text x="560" y="92" fill="#777f87" font-size="10" text-anchor="middle" stroke="none">50&#937; src</text>
    <line x1="575" y1="100" x2="630" y2="100"/>
    <!-- load resistor -->
    <line x1="630" y1="100" x2="630" y2="125"/>
    <rect x="623" y="125" width="14" height="30"/>
    <text x="660" y="143" fill="#777f87" font-size="10" stroke="none">50&#937; load</text>
    <line x1="630" y1="155" x2="630" y2="175"/>
    <!-- ground return -->
    <line x1="490" y1="132" x2="490" y2="175"/>
    <line x1="490" y1="175" x2="630" y2="175"/>
  </g>
  <text x="490" y="200" fill="#2C3E50" font-size="11" stroke="none">load gets V (half of source)</text>

  <g stroke="#777f87" stroke-width="1.4" fill="none">
    <!-- HIGH-Z case -->
    <text x="470" y="245" fill="#0655a3" font-size="13" font-weight="700">High-Z input</text>
    <circle cx="490" cy="285" r="12"/>
    <text x="490" y="289" fill="#2C3E50" font-size="11" text-anchor="middle" stroke="none">2V</text>
    <line x1="490" y1="273" x2="490" y2="265"/>
    <line x1="490" y1="265" x2="560" y2="265"/>
    <rect x="545" y="265" width="30" height="14" transform="translate(0 -7)"/>
    <text x="560" y="257" fill="#777f87" font-size="10" text-anchor="middle" stroke="none">50&#937; src</text>
    <line x1="575" y1="265" x2="630" y2="265"/>
    <line x1="630" y1="265" x2="630" y2="290"/>
    <!-- high-Z load (1M) -->
    <rect x="623" y="290" width="14" height="34"/>
    <text x="660" y="310" fill="#777f87" font-size="10" stroke="none">1 M&#937;</text>
    <line x1="630" y1="324" x2="630" y2="344"/>
    <line x1="490" y1="297" x2="490" y2="344"/>
    <line x1="490" y1="344" x2="630" y2="344"/>
  </g>
  <text x="490" y="368" fill="#2C3E50" font-size="11" stroke="none">load gets &#8776; 2V (~no drop)</text>

  <!-- callout box -->
  <rect x="460" y="386" width="245" height="40" fill="#eaf4fb" stroke="#0078B6" stroke-width="1" rx="4"/>
  <text x="472" y="403" fill="#003D6B" font-size="11">back-matched 50 &#937; output reads</text>
  <text x="472" y="418" fill="#003D6B" font-size="11">~2&#215; into an unterminated input</text>
</svg>
