<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="t d">
  <title id="t">Camera gating timeline</title>
  <desc id="d">A timeline showing an event pulse, a labeled delay interval, then a rectangular camera gate window that opens as the signal of interest arrives and closes after it, with wanted signal inside the gate and unwanted light outside shaded gray.</desc>
  <rect x="0" y="0" width="720" height="420" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="419" fill="none" stroke="#b6c2cc" rx="6"/>
  <text x="24" y="34" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Gated Detection: Delay and Gate Width</text>

  <!-- unwanted-light shaded regions outside the gate -->
  <rect x="70" y="120" width="380" height="180" fill="#e6edf3"/>
  <rect x="560" y="120" width="120" height="180" fill="#e6edf3"/>
  <text x="120" y="115" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50">unwanted light (rejected)</text>
  <text x="572" y="115" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50">rejected</text>

  <!-- baseline -->
  <line x1="70" y1="300" x2="680" y2="300" stroke="#b6c2cc" stroke-width="1.2"/>
  <polygon points="680,300 670,296 670,304" fill="#b6c2cc"/>
  <text x="620" y="322" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50">time</text>

  <!-- event pulse -->
  <polyline points="110,300 110,150 122,150 122,300" fill="none" stroke="#003D6B" stroke-width="2.5"/>
  <text x="88" y="142" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#003D6B">event</text>

  <!-- delay interval -->
  <line x1="122" y1="270" x2="450" y2="270" stroke="#C77E00" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="122" y1="262" x2="122" y2="278" stroke="#C77E00" stroke-width="1.5"/>
  <line x1="450" y1="262" x2="450" y2="278" stroke="#C77E00" stroke-width="1.5"/>
  <text x="260" y="262" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#C77E00">delay</text>

  <!-- camera gate window -->
  <rect x="450" y="130" width="110" height="170" fill="#eaf4fb"/>
  <polyline points="450,300 450,130 560,130 560,300" fill="none" stroke="#003D6B" stroke-width="2.5"/>
  <text x="463" y="124" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#003D6B">camera gate</text>
  <!-- gate width bracket -->
  <line x1="450" y1="318" x2="560" y2="318" stroke="#C77E00" stroke-width="1.5"/>
  <line x1="450" y1="312" x2="450" y2="324" stroke="#C77E00" stroke-width="1.5"/>
  <line x1="560" y1="312" x2="560" y2="324" stroke="#C77E00" stroke-width="1.5"/>
  <text x="470" y="338" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C77E00">gate width</text>

  <!-- signal inside gate -->
  <path d="M470,300 C490,300 495,170 505,170 C515,170 520,300 540,300" fill="none" stroke="#0078B6" stroke-width="2.5"/>
  <text x="478" y="162" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#0078B6">signal</text>
</svg>
