<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="t d">
  <title id="t">Pump-probe delay scan</title>
  <desc id="d">A fixed pump pulse at the left, several probe-pulse positions stepping rightward across a delay axis, and below a stack of resulting frames assembling into a time-resolved trace curve.</desc>
  <rect x="0" y="0" width="720" height="440" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="439" fill="none" stroke="#b6c2cc" rx="6"/>
  <text x="24" y="34" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Pump-Probe Delay Scan</text>

  <!-- delay axis -->
  <line x1="80" y1="170" x2="680" y2="170" stroke="#b6c2cc" stroke-width="1.2"/>
  <polygon points="680,170 670,166 670,174" fill="#b6c2cc"/>
  <text x="585" y="192" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50">delay axis</text>

  <!-- pump pulse fixed at left -->
  <polyline points="110,170 110,70 122,70 122,170" fill="none" stroke="#003D6B" stroke-width="2.5"/>
  <text x="92" y="62" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#003D6B">pump</text>

  <!-- stepping probe pulses -->
  <g stroke="#0078B6" stroke-width="2.5" fill="none">
    <polyline points="220,170 220,95 228,95 228,170"/>
    <polyline points="320,170 320,95 328,95 328,170"/>
    <polyline points="420,170 420,95 428,95 428,170"/>
    <polyline points="520,170 520,95 528,95 528,170"/>
    <polyline points="620,170 620,95 628,95 628,170"/>
  </g>
  <!-- step arrows -->
  <g stroke="#C77E00" stroke-width="1.4" stroke-dasharray="4 3">
    <line x1="228" y1="135" x2="318" y2="135"/>
    <line x1="328" y1="135" x2="418" y2="135"/>
    <line x1="428" y1="135" x2="518" y2="135"/>
    <line x1="528" y1="135" x2="618" y2="135"/>
  </g>
  <text x="300" y="86" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0078B6">probe (stepping)</text>

  <!-- frames stack -->
  <text x="80" y="232" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#2C3E50">frames at each delay step</text>
  <g fill="#eaf4fb" stroke="#003D6B" stroke-width="1.5">
    <rect x="206" y="245" width="36" height="36"/>
    <rect x="306" y="245" width="36" height="36"/>
    <rect x="406" y="245" width="36" height="36"/>
    <rect x="506" y="245" width="36" height="36"/>
    <rect x="606" y="245" width="36" height="36"/>
  </g>
  <!-- arrows from frames down to trace -->
  <g stroke="#2C3E50" stroke-width="1.2">
    <line x1="224" y1="281" x2="224" y2="320"/>
    <line x1="324" y1="281" x2="324" y2="320"/>
    <line x1="424" y1="281" x2="424" y2="320"/>
    <line x1="524" y1="281" x2="524" y2="320"/>
    <line x1="624" y1="281" x2="624" y2="320"/>
  </g>

  <!-- time-resolved trace -->
  <line x1="80" y1="410" x2="680" y2="410" stroke="#b6c2cc" stroke-width="1.2"/>
  <path d="M150,410 C200,410 210,340 224,338 C300,330 320,395 424,400 C520,405 560,360 660,352" fill="none" stroke="#003D6B" stroke-width="2.5"/>
  <text x="90" y="350" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#003D6B">time-resolved trace</text>
</svg>
