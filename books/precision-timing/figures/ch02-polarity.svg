<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Helvetica, Arial, sans-serif">
  <title>Positive, negative, and bipolar pulse polarity</title>
  <desc>Three stacked traces sharing a common time axis. A positive pulse rests at a low baseline and steps up. A negative pulse rests at a higher level and steps down. A bipolar pulse swings from a negative level up through its baseline to a positive level. Each baseline is a thin dashed line.</desc>

  <rect x="0" y="0" width="720" height="420" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="419" fill="none" stroke="#b6c2cc" rx="6"/>

  <text x="60" y="36" fill="#003D6B" font-size="16" font-weight="700">Polarity: Positive, Negative, Bipolar</text>

  <text x="28" y="220" fill="#2C3E50" font-size="13" transform="rotate(-90 28 220)" text-anchor="middle">Voltage</text>
  <text x="375" y="408" fill="#2C3E50" font-size="13" text-anchor="middle">Time &#8594;</text>

  <!-- =============== POSITIVE (top) =============== -->
  <!-- baseline y=120 (low), top y=70 -->
  <line x1="130" y1="120" x2="660" y2="120" stroke="#113163" stroke-width="1.1" stroke-dasharray="5 4"/>
  <path d="M 130 120 L 250 120 L 250 70 L 380 70 L 380 120 L 660 120"
        fill="none" stroke="#0655a3" stroke-width="2.5"/>
  <text x="120" y="124" fill="#2C3E50" font-size="11" text-anchor="end">baseline</text>
  <text x="660" y="64" fill="#2C3E50" font-size="13" font-weight="700" text-anchor="end">positive</text>

  <!-- =============== NEGATIVE (middle) =============== -->
  <!-- baseline y=210 (high), bottom y=260 -->
  <line x1="130" y1="210" x2="660" y2="210" stroke="#113163" stroke-width="1.1" stroke-dasharray="5 4"/>
  <path d="M 130 210 L 250 210 L 250 260 L 380 260 L 380 210 L 660 210"
        fill="none" stroke="#0655a3" stroke-width="2.5"/>
  <text x="120" y="214" fill="#2C3E50" font-size="11" text-anchor="end">baseline</text>
  <text x="660" y="204" fill="#2C3E50" font-size="13" font-weight="700" text-anchor="end">negative</text>

  <!-- =============== BIPOLAR (bottom) =============== -->
  <!-- baseline y=345 ; positive top y=305 ; negative low y=385 -->
  <line x1="130" y1="345" x2="660" y2="345" stroke="#113163" stroke-width="1.1" stroke-dasharray="5 4"/>
  <!-- swing: rests at baseline, goes negative, then up through baseline to positive, back -->
  <path d="M 130 345 L 230 345 L 230 385 L 320 385 L 320 305 L 410 305 L 410 345 L 660 345"
        fill="none" stroke="#0655a3" stroke-width="2.5"/>
  <text x="120" y="349" fill="#2C3E50" font-size="11" text-anchor="end">baseline</text>
  <text x="660" y="340" fill="#2C3E50" font-size="13" font-weight="700" text-anchor="end">bipolar / biphasic</text>
</svg>
