<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="t d">
  <title id="t">Multi-channel trigger, delay, and gate</title>
  <desc id="d">A single reference trigger fanning out to four independent output channels, each with its own delay and width, feeding four labeled loads: lamp, switch, camera, and digitizer.</desc>
  <rect x="0" y="0" width="720" height="460" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="459" fill="none" stroke="#b6c2cc" rx="6"/>
  <text x="24" y="34" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">One Reference, Four Independently Timed Channels</text>

  <!-- reference t=0 line -->
  <line x1="150" y1="60" x2="150" y2="420" stroke="#003D6B" stroke-width="2.5"/>
  <text x="92" y="54" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#003D6B">reference trigger</text>
  <text x="132" y="438" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50">t = 0</text>
  <!-- reference pulse marker -->
  <polyline points="142,420 142,72 150,72 150,420" fill="none" stroke="#003D6B" stroke-width="2.5"/>

  <!-- fan-out node -->
  <circle cx="150" cy="240" r="5" fill="#003D6B"/>

  <!-- channel rows: each baseline, delay dashed, pulse, load box -->
  <!-- generic structure -->
  <g font-family="Helvetica, Arial, sans-serif">
    <!-- Channel 1 lamp -->
    <line x1="150" y1="100" x2="600" y2="100" stroke="#b6c2cc" stroke-width="1"/>
    <line x1="150" y1="100" x2="240" y2="100" stroke="#C77E00" stroke-width="1.5" stroke-dasharray="5 4"/>
    <polyline points="240,100 240,76 270,76 270,100" fill="#eaf4fb" stroke="#0078B6" stroke-width="2.5"/>
    <text x="158" y="92" font-size="11" fill="#2C3E50">channel 1</text>
    <text x="195" y="116" font-size="10" fill="#C77E00">delay</text>
    <text x="244" y="70" font-size="10" fill="#0078B6">width</text>

    <!-- Channel 2 switch -->
    <line x1="150" y1="190" x2="600" y2="190" stroke="#b6c2cc" stroke-width="1"/>
    <line x1="150" y1="190" x2="300" y2="190" stroke="#C77E00" stroke-width="1.5" stroke-dasharray="5 4"/>
    <polyline points="300,190 300,170 318,170 318,190" fill="#eaf4fb" stroke="#0078B6" stroke-width="2.5"/>
    <text x="158" y="182" font-size="11" fill="#2C3E50">channel 2</text>
    <text x="220" y="206" font-size="10" fill="#C77E00">delay</text>
    <text x="304" y="164" font-size="10" fill="#0078B6">width</text>

    <!-- Channel 3 camera -->
    <line x1="150" y1="280" x2="600" y2="280" stroke="#b6c2cc" stroke-width="1"/>
    <line x1="150" y1="280" x2="360" y2="280" stroke="#C77E00" stroke-width="1.5" stroke-dasharray="5 4"/>
    <polyline points="360,280 360,256 408,256 408,280" fill="#eaf4fb" stroke="#0078B6" stroke-width="2.5"/>
    <text x="158" y="272" font-size="11" fill="#2C3E50">channel 3</text>
    <text x="250" y="296" font-size="10" fill="#C77E00">delay</text>
    <text x="368" y="250" font-size="10" fill="#0078B6">width</text>

    <!-- Channel 4 digitizer -->
    <line x1="150" y1="370" x2="600" y2="370" stroke="#b6c2cc" stroke-width="1"/>
    <line x1="150" y1="370" x2="420" y2="370" stroke="#C77E00" stroke-width="1.5" stroke-dasharray="5 4"/>
    <polyline points="420,370 420,346 438,346 438,370" fill="#eaf4fb" stroke="#0078B6" stroke-width="2.5"/>
    <text x="158" y="362" font-size="11" fill="#2C3E50">channel 4</text>
    <text x="280" y="386" font-size="10" fill="#C77E00">delay</text>
    <text x="424" y="340" font-size="10" fill="#0078B6">width</text>
  </g>

  <!-- load boxes -->
  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="610" y="82" width="92" height="36" fill="#eaf4fb" stroke="#003D6B" stroke-width="2"/>
    <text x="640" y="105" font-size="13" font-weight="700" fill="#003D6B">lamp</text>
    <line x1="600" y1="100" x2="610" y2="100" stroke="#2C3E50" stroke-width="1.5"/>

    <rect x="610" y="172" width="92" height="36" fill="#eaf4fb" stroke="#003D6B" stroke-width="2"/>
    <text x="636" y="195" font-size="13" font-weight="700" fill="#003D6B">switch</text>
    <line x1="600" y1="190" x2="610" y2="190" stroke="#2C3E50" stroke-width="1.5"/>

    <rect x="610" y="262" width="92" height="36" fill="#eaf4fb" stroke="#003D6B" stroke-width="2"/>
    <text x="632" y="285" font-size="13" font-weight="700" fill="#003D6B">camera</text>
    <line x1="600" y1="280" x2="610" y2="280" stroke="#2C3E50" stroke-width="1.5"/>

    <rect x="610" y="352" width="92" height="36" fill="#eaf4fb" stroke="#003D6B" stroke-width="2"/>
    <text x="628" y="375" font-size="12" font-weight="700" fill="#003D6B">digitizer</text>
    <line x1="600" y1="370" x2="610" y2="370" stroke="#2C3E50" stroke-width="1.5"/>
  </g>
</svg>
