<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-labelledby="t d">
  <title id="t">Avoiding overlap checklist</title>
  <desc id="d">A checklist card titled Avoiding overlap with five rows: budget the period first, re-check chains after edits, choose inhibit mode deliberately, use holdoff for minimum spacing, and trust the warnings. Each row has a checked box.</desc>
  <rect x="0" y="0" width="720" height="380" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="379" fill="none" stroke="#b6c2cc" rx="6"/>

  <!-- card -->
  <rect x="120" y="40" width="480" height="300" fill="#fafdff" stroke="#b6c2cc" rx="4"/>

  <!-- navy heading bar -->
  <path d="M120 44 a4 4 0 0 1 4 -4 L596 40 a4 4 0 0 1 4 4 L600 84 L120 84 Z" fill="#113163"/>
  <text x="144" y="70" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Avoiding overlap</text>

  <!-- rows: y baseline at 124, 172, 220, 268, 316 -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#2C3E50">
    <!-- row 1 -->
    <rect x="144" y="111" width="20" height="20" fill="none" stroke="#0655a3" stroke-width="2" rx="3"/>
    <path d="M148 121 L153 126 L161 114" fill="none" stroke="#0655a3" stroke-width="2.5"/>
    <text x="180" y="126">Budget the period first</text>
    <!-- row 2 -->
    <rect x="144" y="159" width="20" height="20" fill="none" stroke="#0655a3" stroke-width="2" rx="3"/>
    <path d="M148 169 L153 174 L161 162" fill="none" stroke="#0655a3" stroke-width="2.5"/>
    <text x="180" y="174">Re-check chains after edits</text>
    <!-- row 3 -->
    <rect x="144" y="207" width="20" height="20" fill="none" stroke="#0655a3" stroke-width="2" rx="3"/>
    <path d="M148 217 L153 222 L161 210" fill="none" stroke="#0655a3" stroke-width="2.5"/>
    <text x="180" y="222">Choose inhibit mode deliberately</text>
    <!-- row 4 -->
    <rect x="144" y="255" width="20" height="20" fill="none" stroke="#0655a3" stroke-width="2" rx="3"/>
    <path d="M148 265 L153 270 L161 258" fill="none" stroke="#0655a3" stroke-width="2.5"/>
    <text x="180" y="270">Use holdoff for minimum spacing</text>
    <!-- row 5 -->
    <rect x="144" y="303" width="20" height="20" fill="none" stroke="#0655a3" stroke-width="2" rx="3"/>
    <path d="M148 313 L153 318 L161 306" fill="none" stroke="#0655a3" stroke-width="2.5"/>
    <text x="180" y="318">Trust the warnings</text>
  </g>
</svg>
