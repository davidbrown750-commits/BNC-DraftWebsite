<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="t d">
  <title id="t">Networked time distribution versus single-cable timing</title>
  <desc id="d">On the left, a grandmaster clock distributes time over PTP and White Rabbit fiber links to a tree of distributed nodes with sub-nanosecond sync. On the right, faded, the older model of one generator with a star of coax cables to a few boxes labeled single-cable timing.</desc>
  <rect x="0" y="0" width="720" height="440" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="439" fill="none" stroke="#b6c2cc" rx="6"/>
  <text x="24" y="34" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Networked Time Distribution</text>

  <!-- ===== LEFT: modern network ===== -->
  <text x="40" y="66" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#003D6B">PTP / White Rabbit</text>

  <!-- grandmaster -->
  <rect x="40" y="180" width="110" height="56" fill="#eaf4fb" stroke="#003D6B" stroke-width="2.5" rx="3"/>
  <text x="56" y="206" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#003D6B">grandmaster</text>
  <text x="76" y="223" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B">clock</text>

  <!-- active fiber links (cyan highlight) -->
  <g stroke="#00b4ff" stroke-width="2.5" fill="none">
    <line x1="150" y1="208" x2="240" y2="120"/>
    <line x1="150" y1="208" x2="240" y2="208"/>
    <line x1="150" y1="208" x2="240" y2="296"/>
  </g>
  <!-- second tier links -->
  <g stroke="#0078B6" stroke-width="2" fill="none">
    <line x1="320" y1="120" x2="400" y2="90"/>
    <line x1="320" y1="120" x2="400" y2="150"/>
    <line x1="320" y1="296" x2="400" y2="266"/>
    <line x1="320" y1="296" x2="400" y2="326"/>
  </g>

  <!-- tier-1 nodes -->
  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="240" y="100" width="80" height="40" fill="#eaf4fb" stroke="#003D6B" stroke-width="2" rx="3"/>
    <text x="262" y="124" font-size="12" fill="#003D6B">node</text>
    <rect x="240" y="188" width="80" height="40" fill="#eaf4fb" stroke="#003D6B" stroke-width="2" rx="3"/>
    <text x="262" y="212" font-size="12" fill="#003D6B">node</text>
    <rect x="240" y="276" width="80" height="40" fill="#eaf4fb" stroke="#003D6B" stroke-width="2" rx="3"/>
    <text x="262" y="300" font-size="12" fill="#003D6B">node</text>
  </g>
  <!-- tier-2 leaf nodes -->
  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="400" y="72" width="66" height="34" fill="#eaf4fb" stroke="#003D6B" stroke-width="1.5" rx="3"/>
    <text x="418" y="93" font-size="11" fill="#003D6B">node</text>
    <rect x="400" y="132" width="66" height="34" fill="#eaf4fb" stroke="#003D6B" stroke-width="1.5" rx="3"/>
    <text x="418" y="153" font-size="11" fill="#003D6B">node</text>
    <rect x="400" y="248" width="66" height="34" fill="#eaf4fb" stroke="#003D6B" stroke-width="1.5" rx="3"/>
    <text x="418" y="269" font-size="11" fill="#003D6B">node</text>
    <rect x="400" y="308" width="66" height="34" fill="#eaf4fb" stroke="#003D6B" stroke-width="1.5" rx="3"/>
    <text x="418" y="329" font-size="11" fill="#003D6B">node</text>
  </g>

  <text x="120" y="380" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#C77E00">sub-ns sync across the tree</text>

  <!-- divider -->
  <line x1="500" y1="60" x2="500" y2="400" stroke="#b6c2cc" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ===== RIGHT: old model, faded ===== -->
  <g opacity="0.5">
    <text x="540" y="66" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#2C3E50">single-cable timing</text>
    <!-- generator -->
    <rect x="560" y="180" width="76" height="48" fill="#e6edf3" stroke="#2C3E50" stroke-width="2" rx="3"/>
    <text x="570" y="208" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50">generator</text>
    <!-- coax star to boxes -->
    <g stroke="#2C3E50" stroke-width="1.8" fill="none">
      <line x1="636" y1="204" x2="690" y2="120"/>
      <line x1="636" y1="204" x2="690" y2="204"/>
      <line x1="636" y1="204" x2="690" y2="288"/>
    </g>
    <g font-family="Helvetica, Arial, sans-serif">
      <rect x="678" y="104" width="30" height="30" fill="#e6edf3" stroke="#2C3E50" stroke-width="1.5"/>
      <rect x="678" y="188" width="30" height="30" fill="#e6edf3" stroke="#2C3E50" stroke-width="1.5"/>
      <rect x="678" y="272" width="30" height="30" fill="#e6edf3" stroke="#2C3E50" stroke-width="1.5"/>
    </g>
    <text x="560" y="345" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50">a few coax runs</text>
  </g>
</svg>
