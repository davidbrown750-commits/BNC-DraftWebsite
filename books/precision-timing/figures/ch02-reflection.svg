<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="Helvetica, Arial, sans-serif">
  <title>Reflection on a mismatched transmission line</title>
  <desc>A fast incident edge launched from the source, the reflected echo arriving after the round-trip delay, and the summed waveform at an unmatched load showing stair-step distortion. A small schematic shows source, coax, and mismatched load with the reflection coefficient.</desc>

  <rect x="0" y="0" width="720" height="440" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="439" fill="none" stroke="#b6c2cc" rx="6"/>

  <text x="60" y="34" fill="#003D6B" font-size="16" font-weight="700">Reflection on a Mismatched Line</text>

  <!-- ============ inline schematic (top right) ============ -->
  <g font-size="11" fill="#2C3E50">
    <!-- source box -->
    <rect x="430" y="52" width="46" height="26" fill="none" stroke="#777f87" stroke-width="1.4"/>
    <text x="453" y="69" text-anchor="middle">src</text>
    <!-- coax line -->
    <line x1="476" y1="65" x2="600" y2="65" stroke="#777f87" stroke-width="1.4"/>
    <text x="538" y="58" text-anchor="middle" fill="#777f87">coax (Z&#8320;=50&#937;)</text>
    <!-- mismatched / open load -->
    <line x1="600" y1="55" x2="600" y2="75" stroke="#777f87" stroke-width="1.4"/>
    <text x="604" y="69" fill="#777f87">load (mismatch)</text>
    <!-- gamma note -->
    <text x="430" y="98" fill="#2C3E50">&#915; = (Z_load &#8722; Z&#8320;) / (Z_load + Z&#8320;)</text>
  </g>

  <!-- shared time axis label -->
  <text x="375" y="430" fill="#2C3E50" font-size="13" text-anchor="middle">Time &#8594;</text>

  <!-- round-trip delay marker positions: edge launch x=150, echo arrival x=330 -->
  <g stroke="#b6c2cc" stroke-width="1" stroke-dasharray="3 3">
    <line x1="150" y1="120" x2="150" y2="380"/>
    <line x1="330" y1="120" x2="330" y2="380"/>
  </g>

  <!-- ===== Trace 1: incident edge ===== -->
  <text x="60" y="135" fill="#003D6B" font-size="13" font-weight="700">Incident edge</text>
  <line x1="60" y1="185" x2="660" y2="185" stroke="#b6c2cc" stroke-width="1.2"/>
  <path d="M 60 185 L 150 185 L 165 145 L 660 145"
        fill="none" stroke="#0655a3" stroke-width="2.5"/>

  <!-- ===== Trace 2: reflected echo ===== -->
  <text x="60" y="225" fill="#003D6B" font-size="13" font-weight="700">Reflected echo</text>
  <line x1="60" y1="275" x2="660" y2="275" stroke="#b6c2cc" stroke-width="1.2"/>
  <path d="M 60 275 L 330 275 L 345 245 L 660 245"
        fill="none" stroke="#0078B6" stroke-width="2.5"/>

  <!-- round-trip delay bracket between the two edges (on echo trace) -->
  <g stroke="#C77E00" stroke-width="2" fill="none">
    <line x1="150" y1="258" x2="330" y2="258"/>
    <line x1="150" y1="253" x2="150" y2="263"/>
    <line x1="330" y1="253" x2="330" y2="263"/>
    <path d="M 158 254 L 150 258 L 158 262"/>
    <path d="M 322 254 L 330 258 L 322 262"/>
  </g>
  <text x="240" y="252" fill="#C77E00" font-size="13" font-weight="700" text-anchor="middle">round-trip delay</text>

  <!-- ===== Trace 3: summed waveform at load ===== -->
  <text x="60" y="315" fill="#003D6B" font-size="13" font-weight="700">Summed waveform at load</text>
  <line x1="60" y1="380" x2="660" y2="380" stroke="#b6c2cc" stroke-width="1.2"/>
  <!-- original edge rises to first level at x=165, then stair-steps up at echo arrival x=345 -->
  <path d="M 60 380 L 150 380 L 165 340 L 345 340 L 360 312 L 660 312"
        fill="none" stroke="#003D6B" stroke-width="2.5"/>
  <!-- reflection callout on the step -->
  <circle cx="360" cy="312" r="3" fill="#C77E00"/>
  <line x1="360" y1="312" x2="430" y2="330" stroke="#2C3E50" stroke-width="1"/>
  <text x="434" y="334" fill="#2C3E50" font-size="12" font-weight="700">reflection (stair-step)</text>
</svg>
