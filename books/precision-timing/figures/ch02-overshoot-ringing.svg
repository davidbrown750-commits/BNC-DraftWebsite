<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Helvetica, Arial, sans-serif">
  <title>Overshoot, undershoot, ringing, and settling at a pulse corner</title>
  <desc>A zoom on the top-left corner of a pulse. A fast edge overshoots above the final level, dips below it, rings with decaying oscillation, and settles into a shaded error band around the final level. Settling time is bracketed.</desc>

  <rect x="0" y="0" width="720" height="420" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="419" fill="none" stroke="#b6c2cc" rx="6"/>

  <text x="60" y="40" fill="#003D6B" font-size="16" font-weight="700">Edge Aberrations &amp; Settling</text>

  <!-- geometry: baseline y=350, final top level y=200, overshoot peak y=120, undershoot dip y=235 -->
  <!-- axes -->
  <line x1="80" y1="70" x2="80" y2="350" stroke="#b6c2cc" stroke-width="1.5"/>
  <line x1="80" y1="350" x2="680" y2="350" stroke="#b6c2cc" stroke-width="1.5"/>
  <text x="34" y="210" fill="#2C3E50" font-size="13" transform="rotate(-90 34 210)" text-anchor="middle">Voltage</text>
  <text x="380" y="408" fill="#2C3E50" font-size="13" text-anchor="middle">Time &#8594;</text>

  <!-- settling band (light blue fill) around final level y=200, +/- ~14px -->
  <rect x="200" y="186" width="480" height="28" fill="#e6edf3"/>
  <text x="674" y="180" fill="#2C3E50" font-size="11" text-anchor="end">settling band, e.g. &#177;2%</text>

  <!-- final level dashed line -->
  <line x1="80" y1="200" x2="680" y2="200" stroke="#C77E00" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="84" y="194" fill="#2C3E50" font-size="11">final level (100%)</text>

  <!-- waveform: small preshoot bump, fast edge, overshoot, undershoot, decaying ring into band -->
  <path d="M 80 350
           L 150 350
           L 165 345
           L 175 352
           L 185 350
           L 200 120
           C 215 120 220 235 240 235
           C 258 235 262 168 282 168
           C 300 168 304 222 322 222
           C 340 222 344 190 362 190
           C 380 190 384 207 402 207
           C 420 207 424 197 442 197
           C 470 200 540 200 680 200"
        fill="none" stroke="#0655a3" stroke-width="2.5"/>

  <!-- preshoot label -->
  <line x1="170" y1="345" x2="150" y2="300" stroke="#2C3E50" stroke-width="1"/>
  <text x="146" y="296" fill="#2C3E50" font-size="12" text-anchor="end">preshoot</text>

  <!-- overshoot peak label -->
  <circle cx="200" cy="120" r="3" fill="#C77E00"/>
  <line x1="200" y1="120" x2="260" y2="100" stroke="#2C3E50" stroke-width="1"/>
  <text x="264" y="100" fill="#2C3E50" font-size="13" font-weight="700">overshoot</text>

  <!-- undershoot dip label -->
  <circle cx="240" cy="235" r="3" fill="#C77E00"/>
  <line x1="240" y1="235" x2="240" y2="290" stroke="#2C3E50" stroke-width="1"/>
  <text x="240" y="305" fill="#2C3E50" font-size="13" font-weight="700" text-anchor="middle">undershoot</text>

  <!-- ringing label -->
  <line x1="345" y1="178" x2="400" y2="135" stroke="#2C3E50" stroke-width="1"/>
  <text x="404" y="132" fill="#2C3E50" font-size="13" font-weight="700">ringing</text>

  <!-- settling time bracket: from edge start (x=200) to entry-and-stay in band (x=442) -->
  <g stroke="#C77E00" stroke-width="2" fill="none">
    <line x1="200" y1="330" x2="442" y2="330"/>
    <line x1="200" y1="325" x2="200" y2="335"/>
    <line x1="442" y1="325" x2="442" y2="335"/>
    <path d="M 208 326 L 200 330 L 208 334"/>
    <path d="M 434 326 L 442 330 L 434 334"/>
  </g>
  <text x="321" y="324" fill="#C77E00" font-size="13" font-weight="700" text-anchor="middle">settling time</text>
  <!-- guide line where it enters and stays -->
  <line x1="442" y1="197" x2="442" y2="335" stroke="#b6c2cc" stroke-width="1" stroke-dasharray="3 3"/>
</svg>
