<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-labelledby="t d">
  <title id="t">Same events, two repetition rates</title>
  <desc id="d">Two timelines with the same four channel events. At a low rate the events fit inside the long period with margin. At a high rate the same events overflow the shorter period, with the final event crossing the boundary in red.</desc>
  <rect x="0" y="0" width="720" height="400" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="399" fill="none" stroke="#b6c2cc" rx="6"/>

  <text x="36" y="40" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">The events don't shrink when the rate goes up</text>

  <!-- ===== Low rate ===== -->
  <text x="36" y="80" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#113163" font-weight="700">Low rate (long period)</text>
  <line x1="80" y1="92" x2="80" y2="178" stroke="#003D6B" stroke-width="3"/>
  <line x1="640" y1="92" x2="640" y2="178" stroke="#003D6B" stroke-width="3"/>
  <text x="80" y="194" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B" text-anchor="middle">T0</text>
  <text x="640" y="194" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B" text-anchor="middle">boundary</text>

  <!-- four events fitting -->
  <g fill="#0655a3">
    <rect x="100" y="100" width="80" height="16" rx="2"/>
    <rect x="200" y="122" width="100" height="16" rx="2"/>
    <rect x="320" y="144" width="90" height="16" rx="2"/>
    <rect x="430" y="122" width="110" height="16" rx="2"/>
  </g>
  <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">
    <text x="140" y="112">Ch1</text>
    <text x="250" y="134">Ch2</text>
    <text x="365" y="156">Ch3</text>
    <text x="485" y="134">Ch4</text>
  </g>
  <!-- margin -->
  <rect x="540" y="100" width="100" height="60" fill="#e6edf3"/>
  <text x="590" y="134" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50" text-anchor="middle">margin</text>

  <!-- ===== High rate ===== -->
  <text x="36" y="262" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#113163" font-weight="700">High rate (short period)</text>
  <line x1="80" y1="274" x2="80" y2="360" stroke="#003D6B" stroke-width="3"/>
  <line x1="430" y1="274" x2="430" y2="360" stroke="#003D6B" stroke-width="3"/>
  <text x="80" y="376" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B" text-anchor="middle">T0</text>
  <text x="430" y="376" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B" text-anchor="middle">boundary</text>

  <!-- same events, same widths; Ch4 crosses boundary -->
  <g fill="#0655a3">
    <rect x="100" y="282" width="80" height="16" rx="2"/>
    <rect x="200" y="304" width="100" height="16" rx="2"/>
    <rect x="320" y="326" width="90" height="16" rx="2"/>
  </g>
  <rect x="400" y="304" width="110" height="16" fill="#c0392b" rx="2"/>
  <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">
    <text x="140" y="294">Ch1</text>
    <text x="250" y="316">Ch2</text>
    <text x="365" y="338">Ch3</text>
    <text x="455" y="316">Ch4</text>
  </g>

  <!-- conflict leader + label -->
  <path d="M430 338 q0 6 6 6 L510 344 q6 0 6 6" fill="none" stroke="#C77E00" stroke-width="2"/>
  <text x="520" y="334" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c0392b" font-weight="700">same events no longer fit</text>
</svg>
