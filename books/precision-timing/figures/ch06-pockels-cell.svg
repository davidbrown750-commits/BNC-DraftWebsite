<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="t d">
  <title id="t">Pockels cell optical switch</title>
  <desc id="d">A Pockels cell crystal between crossed polarizers, driven by a high-voltage driver triggered by one delay-generator channel, with an inset timing trace showing reference, delay, and the switched optical window.</desc>
  <rect x="0" y="0" width="720" height="420" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="419" fill="none" stroke="#b6c2cc" rx="6"/>
  <text x="24" y="34" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Pockels Cell Electro-Optic Switch</text>

  <!-- optical axis baseline -->
  <line x1="40" y1="150" x2="680" y2="150" stroke="#b6c2cc" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- incoming beam -->
  <line x1="40" y1="150" x2="150" y2="150" stroke="#0078B6" stroke-width="2.5"/>
  <polygon points="150,150 140,146 140,154" fill="#0078B6"/>
  <text x="48" y="138" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50">input beam</text>

  <!-- polarizer 1 -->
  <rect x="160" y="118" width="14" height="64" fill="#eaf4fb" stroke="#003D6B" stroke-width="2"/>
  <line x1="167" y1="122" x2="167" y2="178" stroke="#003D6B" stroke-width="1.2"/>
  <text x="138" y="200" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B">polarizer</text>

  <!-- beam through to crystal -->
  <line x1="174" y1="150" x2="300" y2="150" stroke="#0078B6" stroke-width="2.5"/>

  <!-- Pockels crystal -->
  <rect x="300" y="120" width="120" height="60" fill="#eaf4fb" stroke="#003D6B" stroke-width="2.5"/>
  <line x1="300" y1="116" x2="420" y2="116" stroke="#003D6B" stroke-width="3"/>
  <line x1="300" y1="184" x2="420" y2="184" stroke="#003D6B" stroke-width="3"/>
  <text x="307" y="155" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#003D6B">Pockels cell</text>
  <text x="318" y="171" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50">EO crystal</text>
  <text x="300" y="108" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50">electrodes</text>

  <!-- beam crystal to polarizer 2 -->
  <line x1="420" y1="150" x2="540" y2="150" stroke="#0078B6" stroke-width="2.5"/>

  <!-- crossed polarizer 2 -->
  <rect x="540" y="118" width="14" height="64" fill="#eaf4fb" stroke="#003D6B" stroke-width="2"/>
  <line x1="540" y1="150" x2="554" y2="150" stroke="#003D6B" stroke-width="1.2"/>
  <text x="500" y="200" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B">crossed polarizer</text>

  <!-- output beam -->
  <line x1="554" y1="150" x2="680" y2="150" stroke="#0078B6" stroke-width="2.5"/>
  <polygon points="680,150 670,146 670,154" fill="#0078B6"/>
  <text x="600" y="138" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50">output beam</text>

  <!-- HV driver -->
  <rect x="300" y="220" width="120" height="46" fill="#eaf4fb" stroke="#003D6B" stroke-width="2"/>
  <text x="334" y="241" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#003D6B">HV driver</text>
  <text x="333" y="257" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50">fast edges</text>
  <line x1="360" y1="220" x2="360" y2="184" stroke="#2C3E50" stroke-width="2"/>
  <polygon points="360,184 356,194 364,194" fill="#2C3E50"/>

  <!-- delay channel -->
  <rect x="120" y="220" width="120" height="46" fill="#eaf4fb" stroke="#003D6B" stroke-width="2"/>
  <text x="138" y="241" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#003D6B">delay channel</text>
  <text x="142" y="257" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50">trigger out</text>
  <line x1="240" y1="243" x2="300" y2="243" stroke="#2C3E50" stroke-width="2"/>
  <polygon points="300,243 290,239 290,247" fill="#2C3E50"/>

  <!-- inset timing trace -->
  <rect x="430" y="300" width="262" height="100" fill="#ffffff" stroke="#b6c2cc" rx="4"/>
  <text x="440" y="318" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#003D6B">Timing trace</text>
  <line x1="445" y1="388" x2="680" y2="388" stroke="#b6c2cc" stroke-width="1"/>
  <!-- reference pulse -->
  <polyline points="455,388 455,335 465,335 465,388" fill="none" stroke="#003D6B" stroke-width="2.5"/>
  <text x="448" y="332" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2C3E50">reference</text>
  <!-- delay interval -->
  <line x1="465" y1="370" x2="560" y2="370" stroke="#C77E00" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="490" y="383" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#C77E00">delay</text>
  <!-- switched window -->
  <rect x="560" y="338" width="70" height="50" fill="#eaf4fb"/>
  <polyline points="560,388 560,338 630,338 630,388" fill="none" stroke="#0078B6" stroke-width="2.5"/>
  <text x="556" y="332" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#0078B6">switched window</text>
</svg>
