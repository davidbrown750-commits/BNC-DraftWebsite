<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc" font-family="Helvetica, Arial, sans-serif">
  <title id="title">Several channels off one clock</title>
  <desc id="desc">A single trigger defines T0 at the left origin. Four channel lanes labeled Channel 1 through Channel 4 share one time axis, each placing a single pulse at its own programmed delay and width. Dashed guides drop from T0, and a one-period bracket spans the full width.</desc>

  <rect x="0" y="0" width="720" height="420" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="419" fill="none" stroke="#b6c2cc" rx="6"/>

  <text x="36" y="34" fill="#003D6B" font-size="16" font-weight="700">Four Channels Off One Clock</text>

  <!-- geometry: axis from x=120 to x=660. T0 at 120. period end at 660. -->

  <!-- Clock tick row -->
  <text x="36" y="64" fill="#2C3E50" font-size="12" font-weight="700">Clock</text>
  <line x1="120" y1="62" x2="660" y2="62" stroke="#b6c2cc" stroke-width="1"/>
  <g stroke="#b6c2cc" stroke-width="1">
    <line x1="120" y1="56" x2="120" y2="68"/>
    <line x1="165" y1="58" x2="165" y2="66"/>
    <line x1="210" y1="58" x2="210" y2="66"/>
    <line x1="255" y1="58" x2="255" y2="66"/>
    <line x1="300" y1="58" x2="300" y2="66"/>
    <line x1="345" y1="58" x2="345" y2="66"/>
    <line x1="390" y1="58" x2="390" y2="66"/>
    <line x1="435" y1="58" x2="435" y2="66"/>
    <line x1="480" y1="58" x2="480" y2="66"/>
    <line x1="525" y1="58" x2="525" y2="66"/>
    <line x1="570" y1="58" x2="570" y2="66"/>
    <line x1="615" y1="58" x2="615" y2="66"/>
    <line x1="660" y1="56" x2="660" y2="68"/>
  </g>

  <!-- T0 marker and full-height dashed guide -->
  <line x1="120" y1="50" x2="120" y2="360" stroke="#C77E00" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="100" y="44" fill="#C77E00" font-size="13" font-weight="700">Trigger / T0</text>

  <!-- Channel lanes baselines -->
  <!-- CH1 baseline 120, CH2 185, CH3 250, CH4 315 -->
  <g stroke="#b6c2cc" stroke-width="1">
    <line x1="120" y1="120" x2="660" y2="120"/>
    <line x1="120" y1="185" x2="660" y2="185"/>
    <line x1="120" y1="250" x2="660" y2="250"/>
    <line x1="120" y1="315" x2="660" y2="315"/>
  </g>

  <!-- Channel labels -->
  <text x="36" y="116" fill="#003D6B" font-size="13" font-weight="700">Channel 1</text>
  <text x="36" y="181" fill="#003D6B" font-size="13" font-weight="700">Channel 2</text>
  <text x="36" y="246" fill="#003D6B" font-size="13" font-weight="700">Channel 3</text>
  <text x="36" y="311" fill="#003D6B" font-size="13" font-weight="700">Channel 4</text>

  <!-- Pulses. Each lane pulse height 36. Distinct navy/sky shades. -->
  <!-- CH1: short pulse close to T0. delay 165, width 30 -> 165..195 -->
  <path d="M165,120 L165,84 L195,84 L195,120" fill="none" stroke="#003D6B" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- CH2: wider pulse further out. delay 255, width 90 -> 255..345 -->
  <path d="M255,185 L255,149 L345,149 L345,185" fill="none" stroke="#0a5fa0" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- CH3: narrow pulse near mid-period. delay 390, width 24 -> 390..414 -->
  <path d="M390,250 L390,214 L414,214 L414,250" fill="none" stroke="#0078B6" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- CH4: pulse late in period. delay 540, width 60 -> 540..600 -->
  <path d="M540,315 L540,279 L600,279 L600,315" fill="none" stroke="#3a9bd1" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Dashed leading-edge guides dropping through lanes -->
  <g stroke="#003D6B" stroke-width="1" stroke-dasharray="2 4" opacity="0.6">
    <line x1="165" y1="84" x2="165" y2="360"/>
    <line x1="255" y1="149" x2="255" y2="360"/>
    <line x1="390" y1="214" x2="390" y2="360"/>
    <line x1="540" y1="279" x2="540" y2="360"/>
  </g>

  <!-- time axis label -->
  <line x1="120" y1="360" x2="660" y2="360" stroke="#b6c2cc" stroke-width="1"/>
  <path d="M660,360 l-9,-5 l0,10 z" fill="#b6c2cc"/>
  <text x="560" y="380" fill="#2C3E50" font-size="12">time after T0</text>

  <!-- one period bracket at bottom -->
  <line x1="120" y1="398" x2="660" y2="398" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="120" y1="392" x2="120" y2="404" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="660" y1="392" x2="660" y2="404" stroke="#2C3E50" stroke-width="1.5"/>
  <rect x="356" y="388" width="68" height="18" fill="#ffffff"/>
  <text x="390" y="402" fill="#2C3E50" font-size="12" text-anchor="middle">one period</text>
</svg>
