<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="t d">
  <title id="t">Period budget, healthy versus overrun</title>
  <desc id="d">Two period bars. The top bar fits four channel events end to end with dead-time margin remaining at the right. The bottom bar shows the fourth channel overrunning past the end of the period, flagged in red as an overlap.</desc>
  <rect x="0" y="0" width="720" height="420" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="419" fill="none" stroke="#b6c2cc" rx="6"/>

  <text x="36" y="40" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Everything must fit inside one period</text>

  <!-- ===== Healthy bar ===== -->
  <text x="36" y="78" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#113163" font-weight="700">Healthy budget</text>
  <!-- period boundaries -->
  <line x1="80" y1="88" x2="80" y2="190" stroke="#003D6B" stroke-width="2.5"/>
  <line x1="600" y1="88" x2="600" y2="190" stroke="#003D6B" stroke-width="2.5"/>
  <text x="80" y="206" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B" text-anchor="middle">T0</text>
  <text x="600" y="206" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B" text-anchor="middle">End of period</text>

  <!-- channel segments: thin delay line + solid block -->
  <!-- Ch1 -->
  <line x1="80" y1="100" x2="110" y2="100" stroke="#b6c2cc" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="110" y="92" width="90" height="16" fill="#0655a3" rx="2"/>
  <text x="155" y="104" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Ch1</text>
  <!-- Ch2 -->
  <line x1="80" y1="122" x2="170" y2="122" stroke="#b6c2cc" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="170" y="114" width="110" height="16" fill="#0655a3" rx="2"/>
  <text x="225" y="126" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Ch2</text>
  <!-- Ch3 -->
  <line x1="80" y1="144" x2="290" y2="144" stroke="#b6c2cc" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="290" y="136" width="100" height="16" fill="#0655a3" rx="2"/>
  <text x="340" y="148" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Ch3</text>
  <!-- Ch4 -->
  <line x1="80" y1="166" x2="400" y2="166" stroke="#b6c2cc" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="400" y="158" width="120" height="16" fill="#0655a3" rx="2"/>
  <text x="460" y="170" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Ch4</text>

  <!-- dead time / margin -->
  <rect x="520" y="92" width="80" height="82" fill="#e6edf3"/>
  <text x="560" y="138" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50" text-anchor="middle">dead time</text>
  <text x="560" y="152" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#2C3E50" text-anchor="middle">/ margin</text>

  <!-- ===== Overrun bar ===== -->
  <text x="36" y="276" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#113163" font-weight="700">Overrun</text>
  <line x1="80" y1="286" x2="80" y2="388" stroke="#003D6B" stroke-width="2.5"/>
  <line x1="600" y1="286" x2="600" y2="388" stroke="#003D6B" stroke-width="2.5"/>
  <text x="80" y="404" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B" text-anchor="middle">T0</text>
  <text x="600" y="404" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#003D6B" text-anchor="middle">End of period</text>

  <!-- Ch1 -->
  <line x1="80" y1="298" x2="110" y2="298" stroke="#b6c2cc" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="110" y="290" width="90" height="16" fill="#0655a3" rx="2"/>
  <text x="155" y="302" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Ch1</text>
  <!-- Ch2 -->
  <line x1="80" y1="320" x2="170" y2="320" stroke="#b6c2cc" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="170" y="312" width="110" height="16" fill="#0655a3" rx="2"/>
  <text x="225" y="324" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Ch2</text>
  <!-- Ch3 -->
  <line x1="80" y1="342" x2="290" y2="342" stroke="#b6c2cc" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="290" y="334" width="100" height="16" fill="#0655a3" rx="2"/>
  <text x="340" y="346" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Ch3</text>
  <!-- Ch4 overrun -->
  <line x1="80" y1="364" x2="470" y2="364" stroke="#b6c2cc" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="470" y="356" width="190" height="16" fill="#c0392b" rx="2"/>
  <text x="540" y="368" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Ch4</text>

  <!-- overrun bracket past boundary -->
  <path d="M600 380 q0 6 6 6 L654 386 q6 0 6 6" fill="none" stroke="#C77E00" stroke-width="2"/>
  <text x="660" y="370" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c0392b" text-anchor="end" font-weight="700">overrun &#8594; overlap</text>
</svg>
