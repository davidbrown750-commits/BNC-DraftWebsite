<h1>Chapter 5 Quiz</h1>

<div id="bnc-quiz"></div>

<script>
window.QUIZ_DATA = {
  bookKey: "tmi",
  chapterKey: "05",
  title: "Chapter 5 Quiz: Multi-Signal Timing: Rep Rates & Overlap",
  questions: [
    {
      q: "How are the pulse repetition frequency (PRF) and the period related?",
      options: [
        "They are equal for a periodic source",
        "The period is the reciprocal of the PRF",
        "The period is the PRF multiplied by the pulse width",
        "They are unrelated quantities"
      ],
      answer: 1,
      explain: "PRF is the number of pulses per second and the period is the time from one cycle to the next. They are reciprocals, so doubling the rate halves the period."
    },
    {
      q: "A 100 ns pulse repeating every 200 ns has what duty cycle?",
      options: [
        "One hundredth of one percent",
        "Ten percent",
        "Fifty percent",
        "One hundred percent"
      ],
      answer: 2,
      explain: "Duty cycle is the fraction of each period the output is high. A 100 ns pulse in a 200 ns period is high half the time, so the duty cycle is fifty percent."
    },
    {
      q: "Why does dead time deserve its own line in the period budget?",
      options: [
        "It increases the maximum output amplitude",
        "It is required to set the trigger threshold",
        "It protects the load and leaves timing margin so small edits do not push an edge across a boundary",
        "It has no effect on the program and can always be removed"
      ],
      answer: 2,
      explain: "Dead time gives the load time to recover and leaves margin against jitter and small parameter changes. A program with no dead time has no defense against the next edit."
    },
    {
      q: "What is an overlap condition?",
      options: [
        "Two instruments sharing one external clock",
        "A program that asks a channel or a shared resource to do two incompatible things at once",
        "A pulse measured at half of maximum amplitude",
        "A delay set longer than the pulse width"
      ],
      answer: 1,
      explain: "An overlap condition arises when a channel is told to fire again before its pulse ends, or when two events collide on a shared resource. The program cannot be honored as written."
    },
    {
      q: "When an instrument validates a timing program and refuses a conflicting setting before it runs, what is happening, and what is the best response?",
      options: [
        "The hardware has merged the pulses, so the operator should lower the amplitude",
        "The instrument has flagged or rejected the conflict at programming time, and the operator should find the conflict rather than work around the message",
        "A runt pulse has been produced, so the operator should rerun the program",
        "The pulse was swallowed, so the operator should raise the rate to recover it"
      ],
      answer: 1,
      explain: "A flag-or-reject instrument catches the conflict before it reaches the output. The warning is information: the right response is to find the overrun, not to bypass the message."
    }
  ]
};
</script>
