<h1>Chapter 3 Quiz</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<script>
window.QUIZ_DATA = {
  bookKey: "tmi",
  chapterKey: "03",
  title: "Chapter 3 Quiz: Gating, Delaying & Clocking Signals",
  questions: [
    {
      q: "When an external trigger crosses a noisy threshold on a slow edge, what is the main consequence?",
      options: [
        "The output amplitude drops",
        "The crossing time wanders, which shows up later as trigger jitter",
        "The instrument switches to an internal trigger automatically",
        "The pulse width doubles"
      ],
      answer: 1,
      explain: "On a slow edge crossing a noisy threshold, the crossing instant wanders cycle to cycle, and that wander appears later as trigger jitter. The fastest, cleanest edge gives the lowest jitter."
    },
    {
      q: "What does trigger holdoff do after a trigger fires?",
      options: [
        "It blocks new triggers for a set time, preventing double-triggering and enforcing minimum spacing",
        "It increases the output amplitude for the next cycle",
        "It switches the slope from rising to falling",
        "It arms the instrument for the next setup signal"
      ],
      answer: 0,
      explain: "Holdoff blanks the trigger input for a set time after a trigger, so a bouncing source cannot double-trigger and a fast train cannot pack pulses too close together."
    },
    {
      q: "What is the difference between output inhibit and pulse inhibit when a gate disables a channel?",
      options: [
        "Output inhibit is slower than pulse inhibit",
        "Output inhibit cuts the output immediately and can truncate a pulse in progress, while pulse inhibit lets an in-progress pulse finish cleanly before stopping",
        "They are two names for the same behavior",
        "Pulse inhibit only works over a software bus"
      ],
      answer: 1,
      explain: "Output inhibit is a hard, immediate cutoff that can leave a runt pulse. Pulse inhibit blocks new triggers but allows any pulse already underway to complete cleanly."
    },
    {
      q: "If channel B is chained to channel A by a fixed offset, what happens when the operator slides A later in time?",
      options: [
        "B stays fixed and the A-to-B spacing changes",
        "B follows A, keeping the A-to-B spacing constant",
        "B fires before To",
        "Both channels are disabled until re-armed"
      ],
      answer: 1,
      explain: "Delay chaining references one channel to another, so moving A automatically carries B along and holds the spacing between them constant. This moves a whole feature without disturbing its internal structure."
    },
    {
      q: "Which time base is best suited for low close-in phase noise and good short-term stability?",
      options: [
        "A rubidium reference",
        "A GPS-disciplined oscillator",
        "An oven-controlled crystal oscillator (OCXO)",
        "A standard uncompensated crystal"
      ],
      answer: 2,
      explain: "An OCXO holds a crystal at constant temperature, giving low phase noise and good short-term stability. Rubidium and GPS excel at long-term stability and traceability, locked to a 10 MHz reference where needed."
    }
  ]
};
</script>
