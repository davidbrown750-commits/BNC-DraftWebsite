<h1>Chapter 8 Quiz</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<div id="bnc-quiz"></div>

<script>
window.QUIZ_DATA = {
  bookKey: "tmi",
  chapterKey: "08",
  title: "Chapter 8 Quiz: Industry Trends & the Future of Precision Timing",
  questions: [
    {
      q: "Which single specification does the chapter describe as the one that never stops moving, shrinking from nanoseconds toward femtoseconds?",
      options: [
        "Output amplitude",
        "Jitter",
        "Channel count",
        "Insertion delay"
      ],
      answer: 1,
      explain: "Jitter is the headline number that keeps falling. Each generation of experiment needs triggers and delays stable to a smaller fraction of the event being measured, pushing timing into the femtosecond regime."
    },
    {
      q: "What is the central challenge in putting optical clocks to work, according to the chapter?",
      options: [
        "Building a clock accurate enough to be useful",
        "Getting the optical-grade stability out of the clock and into the electrical and RF systems that consume it",
        "Finding an atomic transition in the optical band",
        "Reducing the power draw below that of microwave references"
      ],
      answer: 1,
      explain: "The clock itself is not the hard part. Optical-to-RF distribution exists to fan a stable optical reference over fiber and convert it to electrical triggers at each endpoint."
    },
    {
      q: "How does White Rabbit relate to IEEE-1588 PTP?",
      options: [
        "It is an unrelated wireless protocol that replaces PTP",
        "It is a CERN-developed extension built on top of PTP that pushes synchronization into the picoseconds",
        "It is the original name for PTP before standardization",
        "It distributes time only over coaxial cable, not Ethernet"
      ],
      answer: 1,
      explain: "White Rabbit builds on PTP, adding synchronous Ethernet and precise phase measurement to reach reported link performance in the tens of picoseconds."
    },
    {
      q: "In a GNSS-disciplined timing system, what does holdover refer to?",
      options: [
        "The delay before the receiver first locks to satellites",
        "The period a disciplined oscillator stays within spec after losing its reference, such as during a GNSS outage",
        "The time to switch between GPS and another constellation",
        "The interval between successive timing pulses"
      ],
      answer: 1,
      explain: "Holdover is the window during which the system must keep time on its own. The quality of the local oscillator, such as an OCXO, decides how long it stays within spec when the satellite signal is lost, jammed, or spoofed."
    },
    {
      q: "What does a chip-scale atomic clock (CSAC) provide that supports portable and embedded timing?",
      options: [
        "Higher output voltage than a rack instrument",
        "Atomic stability and good holdover in a compact package small enough for portable and embedded use",
        "Direct optical-to-RF conversion without fiber",
        "Network synchronization without any local oscillator"
      ],
      answer: 1,
      explain: "CSACs put rubidium or cesium references into small packages, bringing atomic stability and good holdover to portable references, distributed sensors, and even distributed quantum experiments."
    }
  ]
};
</script>
