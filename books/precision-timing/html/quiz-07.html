<h1>Chapter 7 Quiz</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<div id="bnc-quiz"></div>

<script>
window.QUIZ_DATA = {
  bookKey: "tmi",
  chapterKey: "07",
  title: "Chapter 7 Quiz: Communications, Storage & Safety",
  questions: [
    {
      q: "Why is saving and recalling a setup more than a convenience?",
      options: [
        "It increases the instrument's maximum output voltage",
        "It is the foundation of a repeatable experiment, restoring the same timing run after run",
        "It is the only way to power the instrument on",
        "It speeds up the rise time of each pulse"
      ],
      answer: 1,
      explain: "A stored configuration recalls a delay, width, and channel arrangement exactly, so the same timing arrives at the same outputs every run and removes the human variation between runs."
    },
    {
      q: "What does SCPI stand for, and what is its purpose?",
      options: [
        "Serial Cable Protocol Interface, a wiring standard for connectors",
        "Standard Commands for Programmable Instruments, a command language structured to work across different interfaces",
        "System Control Panel Indicator, a front-panel status light",
        "Synchronized Clock Phase Input, a timing reference port"
      ],
      answer: 1,
      explain: "SCPI is the Standard Commands for Programmable Instruments. The command set is structured so the same syntax works across interfaces such as RS-232, USB, Ethernet, and GPIB."
    },
    {
      q: "Which of the following is a common remote communication interface on a pulse generator's back panel?",
      options: [
        "HDMI",
        "GPIB",
        "VGA",
        "PS/2"
      ],
      answer: 1,
      explain: "Common interfaces listed for remote control are RS-232, USB, Ethernet, and GPIB."
    },
    {
      q: "Why does remote control matter for automated test sequences?",
      options: [
        "It eliminates the need for any trigger source",
        "Under script control, sequences that are tedious or impossible to repeat by hand become routine and exactly repeatable",
        "It removes the need to save configurations",
        "It converts electrical outputs into optical outputs"
      ],
      answer: 1,
      explain: "Sweeps and burst sequences are hard to drive and repeat by hand. Under script control a sequence can step delay, log results, change channel modes, and run again tomorrow with identical timing."
    },
    {
      q: "What do the safety markings on a pulse generator indicate?",
      options: [
        "The instrument's serial number and firmware version",
        "Conformance to industry-required safety and regulatory standards",
        "The maximum repetition rate of the outputs",
        "The recommended cable length for fastest rise time"
      ],
      answer: 1,
      explain: "All modern electronics conform to industry-required safety markings. Always confirm the markings that apply to a specific instrument against its current datasheet and certifications."
    }
  ]
};
