<h1>Chapter 4 Quiz</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<div id="bnc-quiz"></div>

<script>
window.QUIZ_DATA = {
  bookKey: "tmi",
  chapterKey: "04",
  title: "Chapter 4 Quiz: Operating a Multi-Channel Timing System",
  questions: [
    {
      q: "In which output mode does a channel produce one pulse on the first trigger only, after which it is inhibited?",
      options: [
        "Normal",
        "Single shot",
        "Burst",
        "Duty cycle"
      ],
      answer: 1,
      explain: "Single shot produces one output pulse on the first trigger only, then inhibits the channel. Normal produces one pulse per trigger, while burst produces a preset number of pulses per trigger."
    },
    {
      q: "What does the multiplex feature do?",
      options: [
        "Locks the instrument to an external 10 MHz reference",
        "Combines the outputs of several channels onto one output connector",
        "Counts the total number of output pulses produced",
        "Skips a set number of pulses before a channel begins output"
      ],
      answer: 1,
      explain: "Multiplex combines several channels onto one physical output connector as a composite sequence. Because more than one channel maps to a single output, it is a classic source of overlap conflicts."
    },
    {
      q: "How does a system mode relate to the individual channel modes?",
      options: [
        "Channel modes always take precedence over the system mode",
        "The system mode sets overall timing that takes precedence over individual channel modes",
        "System and channel modes can never be active at the same time",
        "The system mode only affects the first channel"
      ],
      answer: 1,
      explain: "A system mode sits above the channels. A system burst, for example, limits the triggers that ever reach the channel layer, so every channel responds to the new envelope at once."
    },
    {
      q: "In the pulse inhibit method of channel gating, what happens to a pulse that is already underway when the gate inhibits the channel?",
      options: [
        "It is cut off immediately",
        "It is allowed to finish cleanly",
        "It is stretched to fill the gate window",
        "It is rerouted to another channel"
      ],
      answer: 1,
      explain: "Pulse inhibit prevents the channel from being triggered by its own trigger source pulse, but any pulse already underway is allowed to finish cleanly. The gate is set Active High or Active Low."
    },
    {
      q: "What does a shot counter track?",
      options: [
        "The number of channels currently enabled",
        "The external reference frequency in MHz",
        "The total number of output pulses, or shots, the instrument has produced",
        "The delay from the trigger to the first pulse"
      ],
      answer: 2,
      explain: "A shot counter tracks how many output pulses the instrument has produced. It enforces a known total when a test calls for one and confirms a sequence ran to completion, giving one trusted number across many channels and modes."
    }
  ]
};
</script>
