<h1>Chapter 1 Quiz</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<div id="bnc-quiz"></div>

<script>
window.QUIZ_DATA = {
  bookKey: "tmi",
  chapterKey: "01",
  title: "Chapter 1 Quiz: General Properties of a Timing Signal",
  questions: [
    {
      q: "What is the difference between resolution and accuracy?",
      options: [
        "They are two names for the same specification",
        "Resolution is the finest settable step; accuracy is how close the hardware comes to delivering that value",
        "Resolution is how close the hardware comes; accuracy is the smallest step",
        "Resolution applies to delay and accuracy applies to width only"
      ],
      answer: 1,
      explain: "Resolution is the size of the smallest step you can request. Accuracy is a separate spec describing how close the hardware comes to that value. The two are independent."
    },
    {
      q: "From which point is the programmed delay usually measured, and what is that reference called?",
      options: [
        "From the falling edge of the output, called the period",
        "From the leading edge of the trigger pulse, called To",
        "From the half-amplitude point of the output, called the width",
        "From the 10 percent point of the rising edge, called the threshold"
      ],
      answer: 1,
      explain: "Delay is measured from the leading edge of the trigger pulse, the reference point called To, to the leading edge of the timed pulse. To is the anchor for every channel's timing."
    },
    {
      q: "Rise time is typically measured as the time for a signal to move between which two points on the leading edge?",
      options: [
        "0 percent and 100 percent of maximum amplitude",
        "10 percent and 90 percent of maximum amplitude",
        "The trigger and the falling edge",
        "Half amplitude and full amplitude"
      ],
      answer: 1,
      explain: "Rise time is the 10 percent to 90 percent transition on the leading edge. A 20 percent to 80 percent measurement is sometimes used instead."
    },
    {
      q: "What is insertion delay?",
      options: [
        "The adjustable delay the user programs between trigger and output",
        "The time to remote-program the instrument over GPIB",
        "A fixed delay from the Trigger In signal to the first timing period, built into the design",
        "The ringing at the top of a pulse before it settles"
      ],
      answer: 2,
      explain: "Insertion delay is a fixed, design-determined delay from Trigger In to the first timing period. It is inherent to the hardware, so treat it as a known offset. Good designs minimize it."
    },
    {
      q: "What does the pulse repetition rate (PRF) describe, and how does it relate to the period?",
      options: [
        "The output voltage; the period is its reciprocal",
        "How often the cycle repeats in pulses per second; the period is its reciprocal",
        "The width of each pulse; the period is the same value",
        "The slope of the trigger; the period is unrelated"
      ],
      answer: 1,
      explain: "The repetition rate is how often the timing cycle repeats, expressed as pulses per second. The period is its reciprocal, and you can set whichever is natural for the task."
    }
  ]
};
</script>
