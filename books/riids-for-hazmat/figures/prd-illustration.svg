<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420" font-family="Helvetica, Arial, sans-serif">
  <!-- Stylized PRD pager illustration, BNC palette only, vendor-neutral -->
  <defs>
    <linearGradient id="pdrBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4753"/>
      <stop offset="100%" stop-color="#1c2832"/>
    </linearGradient>
    <linearGradient id="pdrScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003D6B"/>
      <stop offset="100%" stop-color="#001f38"/>
    </linearGradient>
    <filter id="pdrShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#001f38" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="600" height="420" fill="#ffffff"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-weight="700" font-size="14" fill="#003D6B" letter-spacing="1.5">PERSONAL RADIATION DETECTOR (PRD)</text>
  <text x="300" y="48" text-anchor="middle" font-style="italic" font-size="10" fill="#2C3E50" font-family="Georgia, serif">Wearable, alarm-only. The first rung of the detection ladder.</text>

  <!-- Body -->
  <g transform="translate(190,82)" filter="url(#pdrShadow)">
    <!-- chassis -->
    <rect x="0" y="0" width="220" height="280" rx="22" fill="url(#pdrBody)" stroke="#0078B6" stroke-width="0.6"/>
    <!-- top speaker grille -->
    <rect x="40" y="18" width="140" height="6" rx="3" fill="#1c2832"/>
    <rect x="40" y="28" width="140" height="3" rx="1.5" fill="#2c3540"/>
    <!-- screen panel -->
    <rect x="22" y="50" width="176" height="100" rx="6" fill="url(#pdrScreen)" stroke="#0078B6" stroke-width="1"/>
    <!-- screen content: dose rate readout -->
    <text x="110" y="78" text-anchor="middle" font-size="10" fill="#7fdbff" font-family="Helvetica, Arial, sans-serif" letter-spacing="3">DOSE RATE</text>
    <text x="110" y="116" text-anchor="middle" font-weight="900" font-size="34" fill="#ffffff" font-family="Helvetica, Arial, sans-serif">0.12</text>
    <text x="110" y="138" text-anchor="middle" font-size="11" fill="#7fdbff" font-family="Helvetica, Arial, sans-serif">µSv/hr</text>
    <!-- LED indicator (target green = "all clear") -->
    <circle cx="36" cy="64" r="3.5" fill="#00ff88"/>
    <!-- battery indicator -->
    <rect x="170" y="60" width="14" height="6" rx="1" fill="none" stroke="#7fdbff" stroke-width="0.8"/>
    <rect x="172" y="61.5" width="9" height="3" fill="#00ff88"/>
    <!-- buttons -->
    <circle cx="60" cy="190" r="14" fill="#2c3540" stroke="#0078B6" stroke-width="0.8"/>
    <circle cx="110" cy="190" r="14" fill="#2c3540" stroke="#0078B6" stroke-width="0.8"/>
    <circle cx="160" cy="190" r="14" fill="#2c3540" stroke="#0078B6" stroke-width="0.8"/>
    <text x="60" y="195" text-anchor="middle" font-weight="700" font-size="9" fill="#7fdbff">MENU</text>
    <text x="110" y="195" text-anchor="middle" font-weight="700" font-size="9" fill="#7fdbff">OK</text>
    <text x="160" y="195" text-anchor="middle" font-weight="700" font-size="9" fill="#7fdbff">BACK</text>
    <!-- belt clip indicator -->
    <rect x="80" y="232" width="60" height="20" rx="3" fill="none" stroke="#7fdbff" stroke-width="0.8"/>
    <text x="110" y="246" text-anchor="middle" font-size="8" fill="#7fdbff" letter-spacing="2">BELT CLIP</text>
  </g>

  <!-- Right-side callouts -->
  <g font-family="Helvetica, Arial, sans-serif">
    <!-- alarm callout -->
    <line x1="408" y1="152" x2="450" y2="142" stroke="#0078B6" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="408" cy="152" r="3" fill="#0078B6"/>
    <text x="455" y="135" font-weight="700" font-size="11" fill="#003D6B">DOSE RATE</text>
    <text x="455" y="150" font-size="10" fill="#2C3E50" font-family="Georgia, serif">Live, in µSv/hr</text>

    <!-- LED callout -->
    <line x1="226" y1="146" x2="160" y2="80" stroke="#0078B6" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="226" cy="146" r="3" fill="#0078B6"/>
    <text x="40" y="84" font-weight="700" font-size="11" fill="#003D6B">STATUS LED</text>
    <text x="40" y="98" font-size="10" fill="#2C3E50" font-family="Georgia, serif">Green = clear</text>
    <text x="40" y="111" font-size="10" fill="#2C3E50" font-family="Georgia, serif">Red = alarm</text>

    <!-- button callout -->
    <line x1="300" y1="272" x2="335" y2="305" stroke="#0078B6" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="300" cy="272" r="3" fill="#0078B6"/>
    <text x="345" y="305" font-weight="700" font-size="11" fill="#003D6B">3-BUTTON UI</text>
    <text x="345" y="320" font-size="10" fill="#2C3E50" font-family="Georgia, serif">Glove-friendly,</text>
    <text x="345" y="333" font-size="10" fill="#2C3E50" font-family="Georgia, serif">audible + haptic alarms</text>
  </g>

  <!-- Footer note -->
  <rect x="40" y="378" width="520" height="34" fill="#ECEFF1" rx="3"/>
  <rect x="40" y="378" width="6" height="34" fill="#0078B6"/>
  <text x="56" y="394" font-weight="700" font-size="10" fill="#003D6B" letter-spacing="1.2">REMEMBER</text>
  <text x="56" y="406" font-size="10" fill="#2C3E50" font-family="Georgia, serif">A PRD detects. It does not identify. When it alarms, escalate to a SAM family RIID.</text>
</svg>
