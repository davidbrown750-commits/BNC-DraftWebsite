<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" height="460" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="rung-1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#003D6B"/><stop offset="100%" stop-color="#001f38"/>
    </linearGradient>
    <linearGradient id="rung-2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0078B6"/><stop offset="100%" stop-color="#003D6B"/>
    </linearGradient>
    <linearGradient id="rung-3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2C3E50"/><stop offset="100%" stop-color="#1c2832"/>
    </linearGradient>
    <linearGradient id="rung-4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7fdbff"/><stop offset="100%" stop-color="#0078B6"/>
    </linearGradient>
    <linearGradient id="rung-5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ECEFF1"/><stop offset="100%" stop-color="#cfd6dc"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#001f38" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="900" height="460" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-weight="700" font-size="18" fill="#003D6B">The Detection Ladder</text>
  <text x="450" y="52" text-anchor="middle" font-style="italic" font-size="11" fill="#2C3E50" font-family="Georgia, serif">Each rung passes the call up.</text>

  <!-- ESCALATE arrow on left -->
  <g transform="translate(60,80)">
    <line x1="0" y1="245" x2="0" y2="0" stroke="#0078B6" stroke-width="2.4" stroke-linecap="round"/>
    <polyline points="-7,8 0,0 7,8" fill="none" stroke="#0078B6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="130" text-anchor="middle" font-size="9" fill="#0078B6" letter-spacing="3" font-weight="700" transform="rotate(-90 0 130)">ESCALATE</text>
  </g>

  <!-- Rung 1: REACHBACK + LAB (top, narrowest) -->
  <g filter="url(#shadow)">
    <polygon points="280,76 540,76 520,114 300,114" fill="url(#rung-1)"/>
  </g>
  <text x="410" y="100" text-anchor="middle" font-weight="700" font-size="13" fill="#ffffff" letter-spacing="1.5">REACHBACK + LAB</text>
  <text x="560" y="96" font-size="10.5" fill="#2C3E50" font-family="Georgia, serif">Final word, ambiguous cases</text>
  <text x="560" y="110" font-size="9.5" fill="#5b6770" font-family="Georgia, serif">Health physicist, HPGe analysis</text>

  <!-- Rung 2: RD-120 / RD-150 -->
  <g filter="url(#shadow)">
    <polygon points="245,128 575,128 555,166 265,166" fill="url(#rung-2)"/>
  </g>
  <text x="410" y="152" text-anchor="middle" font-weight="700" font-size="12.5" fill="#ffffff" letter-spacing="0.6">RD-120 BACKPACK + RD-150 VEHICLE</text>
  <text x="595" y="148" font-size="10.5" fill="#2C3E50" font-family="Georgia, serif">Wide-area search and ID</text>
  <text x="595" y="162" font-size="9.5" fill="#5b6770" font-family="Georgia, serif">Sweeps, perimeters, plume mapping</text>

  <!-- Rung 3: SAM HANDHELD RIID -->
  <g filter="url(#shadow)">
    <polygon points="210,180 610,180 590,218 230,218" fill="url(#rung-3)"/>
  </g>
  <text x="410" y="204" text-anchor="middle" font-weight="700" font-size="13" fill="#ffffff" letter-spacing="1.5">SAM HANDHELD RIID</text>
  <text x="630" y="200" font-size="10.5" fill="#2C3E50" font-family="Georgia, serif">Identify on scene</text>
  <text x="630" y="214" font-size="9.5" fill="#5b6770" font-family="Georgia, serif">SAM 940+, 940/945, 950</text>

  <!-- Rung 4: SURVEY METERS -->
  <g filter="url(#shadow)">
    <polygon points="175,232 645,232 625,270 195,270" fill="url(#rung-4)"/>
  </g>
  <text x="410" y="256" text-anchor="middle" font-weight="700" font-size="13" fill="#003D6B" letter-spacing="1.5">SURVEY METERS</text>
  <text x="665" y="252" font-size="10.5" fill="#2C3E50" font-family="Georgia, serif">Quantify dose, manage cordon</text>
  <text x="665" y="266" font-size="9.5" fill="#5b6770" font-family="Georgia, serif">palmRAD 907 and equivalents</text>

  <!-- Rung 5: PRD (bottom, widest) -->
  <g filter="url(#shadow)">
    <polygon points="140,284 680,284 660,322 160,322" fill="url(#rung-5)" stroke="#b6c2cc" stroke-width="0.8"/>
  </g>
  <text x="410" y="308" text-anchor="middle" font-weight="700" font-size="12.5" fill="#003D6B" letter-spacing="1">PRD (PERSONAL RADIATION DETECTOR)</text>
  <text x="700" y="304" font-size="10.5" fill="#2C3E50" font-family="Georgia, serif">Alert: "something is here"</text>
  <text x="700" y="318" font-size="9.5" fill="#5b6770" font-family="Georgia, serif">Alarm-only, always present</text>

  <!-- Footer note -->
  <rect x="60" y="360" width="780" height="60" fill="#ECEFF1" rx="3"/>
  <rect x="60" y="360" width="6" height="60" fill="#0078B6"/>
  <text x="80" y="380" font-weight="700" font-size="11" fill="#003D6B" letter-spacing="1.2">GROUND RULE</text>
  <text x="80" y="398" font-size="11" fill="#2C3E50" font-family="Georgia, serif">A well-equipped HazMat or law-enforcement program runs all five rungs every day,</text>
  <text x="80" y="412" font-size="11" fill="#2C3E50" font-family="Georgia, serif">even if most calls never need to escalate above PRD or survey meter.</text>
</svg>

