<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="tbShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#001f38" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="720" height="320" fill="#ffffff"/>
  <text x="360" y="34" text-anchor="middle" font-weight="700" font-size="16" fill="#003D6B" letter-spacing="1.5">THE THREE-BEAT MNEMONIC</text>
  <text x="360" y="52" text-anchor="middle" font-style="italic" font-size="11" fill="#2C3E50" font-family="Georgia, serif">drill it until it is automatic</text>
  <g transform="translate(60,76)" filter="url(#tbShadow)">
    <circle cx="34" cy="34" r="30" fill="#003D6B"/>
    <text x="34" y="46" text-anchor="middle" font-weight="900" font-size="34" fill="#ffffff">A</text>
  </g>
  <text x="138" y="98" font-weight="700" font-size="15" fill="#003D6B">Alert</text>
  <text x="138" y="118" font-size="12" fill="#2C3E50" font-family="Georgia, serif">stop, step back, stage</text>
  <text x="138" y="134" font-size="10" fill="#5b6770" font-family="Georgia, serif">PRD or portal alarm starts the call</text>
  <g transform="translate(60,156)" filter="url(#tbShadow)">
    <circle cx="34" cy="34" r="30" fill="#0078B6"/>
    <text x="34" y="46" text-anchor="middle" font-weight="900" font-size="34" fill="#ffffff">I</text>
  </g>
  <text x="138" y="178" font-weight="700" font-size="15" fill="#003D6B">Identify</text>
  <text x="138" y="198" font-size="12" fill="#2C3E50" font-family="Georgia, serif">power, calibrate, background, approach, save</text>
  <text x="138" y="214" font-size="10" fill="#5b6770" font-family="Georgia, serif">SAM family handheld answers "what is it?"</text>
  <g transform="translate(60,236)" filter="url(#tbShadow)">
    <circle cx="34" cy="34" r="30" fill="#2C3E50"/>
    <text x="34" y="46" text-anchor="middle" font-weight="900" font-size="34" fill="#ffffff">S</text>
  </g>
  <text x="138" y="258" font-weight="700" font-size="15" fill="#003D6B">Send</text>
  <text x="138" y="278" font-size="12" fill="#2C3E50" font-family="Georgia, serif">reachback, command, records</text>
  <text x="138" y="294" font-size="10" fill="#5b6770" font-family="Georgia, serif">on the SAM 940+, one button</text>
  <g transform="translate(440,90)">
    <rect x="0" y="0" width="240" height="180" fill="#ECEFF1" rx="4"/>
    <rect x="0" y="0" width="6" height="180" fill="#7fdbff"/>
    <text x="22" y="28" font-weight="700" font-size="11" fill="#003D6B" letter-spacing="1.5">REMEMBER</text>
    <text x="22" y="56" font-size="11.5" fill="#2C3E50" font-family="Georgia, serif">Same beat on every scene.</text>
    <text x="22" y="86" font-size="11" fill="#2C3E50" font-family="Georgia, serif">Vehicle stop, public event,</text>
    <text x="22" y="102" font-size="11" fill="#2C3E50" font-family="Georgia, serif">cargo, post-detonation.</text>
    <text x="22" y="132" font-size="11" fill="#2C3E50" font-family="Georgia, serif">If you can recite the beat,</text>
    <text x="22" y="148" font-size="11" fill="#2C3E50" font-family="Georgia, serif">you can run the call.</text>
  </g>
</svg>
