<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" width="720" height="540" font-family="Helvetica, Arial, sans-serif">
  <!-- Quick-Start Card, Alert / Identify / Send three-beat ribbon -->
  <defs>
    <filter id="qsShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#001f38" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="540" fill="#ffffff"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="680" height="48" fill="#003D6B" rx="4"/>
  <text x="360" y="50" text-anchor="middle" font-weight="700" font-size="18" fill="#ffffff" letter-spacing="2">QUICK-START CARD</text>
  <text x="360" y="64" text-anchor="middle" font-style="italic" font-size="10" fill="#7fdbff" font-family="Georgia, serif">read this first</text>

  <!-- Three-beat flow ribbon -->
  <g transform="translate(20,90)">
    <!-- ALERT -->
    <g filter="url(#qsShadow)">
      <rect x="0" y="0" width="210" height="50" fill="#003D6B" rx="3"/>
    </g>
    <text x="105" y="32" text-anchor="middle" font-weight="900" font-size="22" fill="#ffffff" letter-spacing="3">ALERT</text>

    <!-- arrow -->
    <polygon points="220,15 245,25 220,35" fill="#0078B6"/>

    <!-- IDENTIFY -->
    <g filter="url(#qsShadow)">
      <rect x="255" y="0" width="210" height="50" fill="#0078B6" rx="3"/>
    </g>
    <text x="360" y="32" text-anchor="middle" font-weight="900" font-size="22" fill="#ffffff" letter-spacing="3">IDENTIFY</text>

    <!-- arrow -->
    <polygon points="475,15 500,25 475,35" fill="#0078B6"/>

    <!-- SEND -->
    <g filter="url(#qsShadow)">
      <rect x="510" y="0" width="170" height="50" fill="#003D6B" rx="3"/>
    </g>
    <text x="595" y="32" text-anchor="middle" font-weight="900" font-size="22" fill="#ffffff" letter-spacing="3">SEND</text>
  </g>

  <!-- Three columns of bullets -->
  <g transform="translate(20,164)" font-family="Georgia, serif">
    <!-- ALERT column -->
    <rect x="0" y="0" width="210" height="240" fill="#ECEFF1" rx="3"/>
    <rect x="0" y="0" width="210" height="6" fill="#003D6B" rx="3"/>
    <text x="14" y="32" font-weight="700" font-size="11" fill="#003D6B" font-family="Helvetica, Arial, sans-serif" letter-spacing="1.5">FIRST 60 SECONDS</text>
    <g font-size="11" fill="#2C3E50">
      <text x="14" y="62">• PRD or fixed monitor flags</text>
      <text x="22" y="76">elevated dose / count rate</text>
      <text x="14" y="98">• Note time, location, dose</text>
      <text x="22" y="112">rate, who alarmed</text>
      <text x="14" y="134">• Step BACK first, then call</text>
      <text x="22" y="148">for the next-rung instrument</text>
      <text x="14" y="170">• Stage upwind on a clear</text>
      <text x="22" y="184">approach line</text>
      <text x="14" y="206">• Begin the timeline log</text>
    </g>

    <!-- IDENTIFY column -->
    <rect x="255" y="0" width="210" height="240" fill="#ECEFF1" rx="3"/>
    <rect x="255" y="0" width="210" height="6" fill="#0078B6" rx="3"/>
    <text x="269" y="32" font-weight="700" font-size="11" fill="#003D6B" font-family="Helvetica, Arial, sans-serif" letter-spacing="1.5">RIID FIVE STEPS</text>
    <g font-size="11" fill="#2C3E50">
      <text x="269" y="62">1. Power on, self-test passes</text>
      <text x="269" y="84">2. Verify date/time, battery,</text>
      <text x="285" y="98">GPS lock</text>
      <text x="269" y="120">3. Acquire BACKGROUND in</text>
      <text x="285" y="134">a clean area, save it</text>
      <text x="269" y="156">4. Approach, place RIID, scan</text>
      <text x="285" y="170">until confidence is reached</text>
      <text x="269" y="192">5. SAVE spectrum with</text>
      <text x="285" y="206">photo and notes</text>
    </g>

    <!-- SEND column -->
    <rect x="510" y="0" width="170" height="240" fill="#ECEFF1" rx="3"/>
    <rect x="510" y="0" width="170" height="6" fill="#003D6B" rx="3"/>
    <text x="524" y="32" font-weight="700" font-size="11" fill="#003D6B" font-family="Helvetica, Arial, sans-serif" letter-spacing="1.5">SEND PACKET</text>
    <g font-size="11" fill="#2C3E50">
      <text x="524" y="62">• Spectrum + photo +</text>
      <text x="532" y="76">GPS + notes to reachback</text>
      <text x="524" y="98">• Plain-language summary</text>
      <text x="532" y="112">to incident command</text>
      <text x="524" y="134">• Wait for confirmation</text>
      <text x="532" y="148">before changing posture</text>
      <text x="524" y="170">• Log: who, what, when,</text>
      <text x="532" y="184">where, dose</text>
      <text x="524" y="206">• On SAM 940+, this is</text>
      <text x="532" y="220">one button</text>
    </g>
  </g>

  <!-- Ground Rules banner -->
  <g transform="translate(20,424)">
    <rect x="0" y="0" width="680" height="100" fill="#003D6B" rx="3"/>
    <rect x="0" y="0" width="680" height="22" fill="#0078B6" rx="3"/>
    <text x="14" y="16" font-weight="700" font-size="11" fill="#ffffff" letter-spacing="2">GROUND RULES</text>
    <g font-size="11" fill="#ffffff" font-family="Georgia, serif">
      <text x="14" y="44">• Time, Distance, Shielding. Always.</text>
      <text x="14" y="62">• Do not break cordon to "double-check."</text>
      <text x="14" y="80">• Trust the ID confidence indicator. Re-acquire if low.</text>
      <text x="360" y="44">• If unsure, reachback. Always.</text>
      <text x="360" y="62">• A wrong public statement is harder to unwind than a true positive.</text>
      <text x="360" y="80">• The PRD asks the question. Higher rungs answer it.</text>
    </g>
  </g>
</svg>
