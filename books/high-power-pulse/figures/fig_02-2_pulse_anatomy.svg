<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 16px; font-weight: 700; fill: #003D6B; }
    .lbl { font-size: 10px; fill: #2C3E50; }
    .lbl-w { font-size: 11px; font-weight: 700; fill: #003D6B; }
    .note { font-size: 9px; fill: #2C3E50; opacity: 0.8; font-style: italic; }
    .axis { stroke: #2C3E50; stroke-width: 1.2; fill: none; }
    .grid { stroke: #d4d8db; stroke-width: 0.5; fill: none; }
    .pulse { stroke: #00b4ff; stroke-width: 2.5; fill: none; }
    .pulse-fill { fill: #0078B6; opacity: 0.12; }
    .marker { stroke: #003D6B; stroke-width: 1; stroke-dasharray: 3 3; }
    .arrow { stroke: #003D6B; stroke-width: 1.2; fill: none; marker-end: url(#a); }
    .ann { font-size: 10px; fill: #003D6B; font-weight: 600; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#003D6B"/>
    </marker>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">Anatomy of a pulse: the six fundamental specs</text>

  <!-- Coordinates: x ranges 80 to 820, y baseline 320, peak 100 -->
  <!-- Grid -->
  <g class="grid">
    <line x1="80" y1="100" x2="820" y2="100" />
    <line x1="80" y1="155" x2="820" y2="155" />
    <line x1="80" y1="210" x2="820" y2="210" />
    <line x1="80" y1="265" x2="820" y2="265" />
    <line x1="80" y1="320" x2="820" y2="320" />
  </g>

  <!-- Y axis labels -->
  <text x="72" y="104" text-anchor="end" class="lbl">100%</text>
  <text x="72" y="115" text-anchor="end" class="lbl">90%</text>
  <text x="72" y="214" text-anchor="end" class="lbl">50%</text>
  <text x="72" y="313" text-anchor="end" class="lbl">10%</text>
  <text x="72" y="324" text-anchor="end" class="lbl">0%</text>

  <!-- Axes -->
  <line x1="80" y1="320" x2="820" y2="320" class="axis" />
  <line x1="80" y1="320" x2="80" y2="80" class="axis" />

  <!-- Pulse path: rises from 320 to 100 in 240..300, slight overshoot, settles, holds with droop, falls 580..640, slight undershoot -->
  <path class="pulse-fill" d="M 80 320
    L 240 320
    L 268 105
    L 280 95
    L 295 110
    L 340 108
    L 360 110
    L 400 113
    L 450 116
    L 500 119
    L 540 122
    L 575 125
    L 595 145
    L 615 220
    L 635 305
    L 655 322
    L 670 318
    L 685 320
    L 820 320
    L 820 320
    L 80 320 Z"/>
  <path class="pulse" d="M 80 320
    L 240 320
    L 268 105
    L 280 95
    L 295 110
    L 340 108
    L 360 110
    L 400 113
    L 450 116
    L 500 119
    L 540 122
    L 575 125
    L 595 145
    L 615 220
    L 635 305
    L 655 322
    L 670 318
    L 685 320
    L 820 320"/>

  <!-- Rise time markers -->
  <line x1="245" y1="312" x2="245" y2="350" class="marker" />
  <line x1="290" y1="115" x2="290" y2="350" class="marker" />
  <line x1="245" y1="345" x2="290" y2="345" class="arrow" />
  <line x1="290" y1="345" x2="245" y2="345" class="arrow" />
  <text x="267" y="362" text-anchor="middle" class="ann">t_rise (10%-90%)</text>

  <!-- Fall time markers -->
  <line x1="608" y1="115" x2="608" y2="350" class="marker" />
  <line x1="650" y1="312" x2="650" y2="350" class="marker" />
  <line x1="608" y1="345" x2="650" y2="345" class="arrow" />
  <line x1="650" y1="345" x2="608" y2="345" class="arrow" />
  <text x="629" y="362" text-anchor="middle" class="ann">t_fall (90%-10%)</text>

  <!-- Pulse width (50%) -->
  <line x1="265" y1="210" x2="265" y2="385" class="marker" />
  <line x1="625" y1="210" x2="625" y2="385" class="marker" />
  <line x1="265" y1="380" x2="625" y2="380" class="arrow" />
  <line x1="625" y1="380" x2="265" y2="380" class="arrow" />
  <text x="445" y="398" text-anchor="middle" class="ann">pulse width (FWHM, 50%-50%)</text>

  <!-- Amplitude bracket -->
  <line x1="60" y1="100" x2="60" y2="320" class="arrow" />
  <line x1="60" y1="320" x2="60" y2="100" class="arrow" />
  <text x="36" y="218" text-anchor="middle" class="ann" transform="rotate(-90,36,218)">amplitude</text>

  <!-- Overshoot annotation -->
  <line x1="280" y1="95" x2="350" y2="60" class="arrow" />
  <text x="396" y="56" class="ann">overshoot</text>
  <text x="396" y="68" class="note">excess above target right after rise</text>

  <!-- Droop annotation -->
  <line x1="540" y1="122" x2="500" y2="80" class="arrow" />
  <text x="430" y="76" class="ann" text-anchor="end">droop</text>
  <text x="430" y="88" class="note" text-anchor="end">flat-top sag from energy-store discharge</text>

  <!-- Ringing annotation pointing to small wave on flat top -->
  <line x1="350" y1="108" x2="280" y2="180" class="arrow" />
  <text x="206" y="186" class="ann">ringing</text>
  <text x="206" y="198" class="note">stray-L resonance, fixable by termination</text>

  <!-- Period -->
  <text x="445" y="20" text-anchor="middle" class="note">Period T = 1 / PRF, from one rising edge to the next.</text>
</svg>
