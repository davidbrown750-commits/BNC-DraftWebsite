<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 400" width="620" height="400">
  <rect width="620" height="400" fill="#ECEFF1"/>

  <!-- Title -->
  <text x="310" y="28" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#003D6B" text-anchor="middle">Marx Generator — Charge in Parallel, Fire in Series</text>

  <!-- ===== Charge bus lines (top and bottom) ===== -->
  <!-- Top charge rail (+HV) -->
  <line x1="40" y1="70" x2="560" y2="70" stroke="#0078B6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="10" y="74" font-family="Arial,sans-serif" font-size="10" fill="#0078B6" font-weight="bold">+HV</text>

  <!-- Bottom charge rail (GND) -->
  <line x1="40" y1="330" x2="560" y2="330" stroke="#003D6B" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="10" y="334" font-family="Arial,sans-serif" font-size="10" fill="#003D6B" font-weight="bold">GND</text>

  <!-- ===== Stage 1 ===== -->
  <!-- Charging resistor top -->
  <line x1="110" y1="70" x2="110" y2="115" stroke="#003D6B" stroke-width="1.5"/>
  <rect x="102" y="115" width="16" height="36" rx="2" fill="none" stroke="#003D6B" stroke-width="1.5"/>
  <text x="131" y="136" font-family="Arial,sans-serif" font-size="9" fill="#555">R</text>
  <line x1="110" y1="151" x2="110" y2="175" stroke="#003D6B" stroke-width="1.5"/>

  <!-- Capacitor C1 -->
  <line x1="110" y1="175" x2="110" y2="190" stroke="#003D6B" stroke-width="1.5"/>
  <line x1="90" y1="190" x2="130" y2="190" stroke="#003D6B" stroke-width="2.5"/>
  <line x1="90" y1="198" x2="130" y2="198" stroke="#003D6B" stroke-width="2.5"/>
  <line x1="110" y1="198" x2="110" y2="213" stroke="#003D6B" stroke-width="1.5"/>
  <text x="135" y="198" font-family="Arial,sans-serif" font-size="10" fill="#003D6B" font-weight="bold">C₁</text>

  <!-- Charging resistor bottom -->
  <line x1="110" y1="213" x2="110" y2="249" stroke="#003D6B" stroke-width="1.5"/>
  <rect x="102" y="249" width="16" height="36" rx="2" fill="none" stroke="#003D6B" stroke-width="1.5"/>
  <line x1="110" y1="285" x2="110" y2="330" stroke="#003D6B" stroke-width="1.5"/>

  <!-- Spark gap S1 (between stage 1 bottom and stage 2 top conductor) -->
  <line x1="110" y1="213" x2="160" y2="213" stroke="#003D6B" stroke-width="1.5"/>
  <circle cx="175" cy="213" r="5" fill="none" stroke="#0078B6" stroke-width="2"/>
  <circle cx="195" cy="213" r="5" fill="none" stroke="#0078B6" stroke-width="2"/>
  <text x="168" y="235" font-family="Arial,sans-serif" font-size="9" fill="#0078B6">S₁</text>

  <!-- ===== Stage 2 ===== -->
  <!-- Top node of stage 2 connected from S1 right -->
  <line x1="200" y1="213" x2="270" y2="213" stroke="#003D6B" stroke-width="1.5"/>
  <line x1="270" y1="213" x2="270" y2="175" stroke="#003D6B" stroke-width="1.5"/>

  <!-- Charging resistor top of stage 2 from +HV rail -->
  <line x1="270" y1="70" x2="270" y2="115" stroke="#003D6B" stroke-width="1.5"/>
  <rect x="262" y="115" width="16" height="36" rx="2" fill="none" stroke="#003D6B" stroke-width="1.5"/>
  <text x="291" y="136" font-family="Arial,sans-serif" font-size="9" fill="#555">R</text>
  <line x1="270" y1="151" x2="270" y2="175" stroke="#003D6B" stroke-width="1.5"/>

  <!-- Capacitor C2 -->
  <line x1="270" y1="175" x2="270" y2="190" stroke="#003D6B" stroke-width="1.5"/>
  <line x1="250" y1="190" x2="290" y2="190" stroke="#003D6B" stroke-width="2.5"/>
  <line x1="250" y1="198" x2="290" y2="198" stroke="#003D6B" stroke-width="2.5"/>
  <line x1="270" y1="198" x2="270" y2="213" stroke="#003D6B" stroke-width="1.5"/>
  <text x="295" y="198" font-family="Arial,sans-serif" font-size="10" fill="#003D6B" font-weight="bold">C₂</text>

  <!-- Charging resistor bottom of stage 2 -->
  <line x1="270" y1="213" x2="270" y2="249" stroke="#003D6B" stroke-width="1.5"/>
  <rect x="262" y="249" width="16" height="36" rx="2" fill="none" stroke="#003D6B" stroke-width="1.5"/>
  <line x1="270" y1="285" x2="270" y2="330" stroke="#003D6B" stroke-width="1.5"/>

  <!-- Spark gap S2 -->
  <line x1="270" y1="198" x2="320" y2="198" stroke="#003D6B" stroke-width="1.5"/>
  <circle cx="335" cy="198" r="5" fill="none" stroke="#0078B6" stroke-width="2"/>
  <circle cx="355" cy="198" r="5" fill="none" stroke="#0078B6" stroke-width="2"/>
  <text x="328" y="220" font-family="Arial,sans-serif" font-size="9" fill="#0078B6">S₂</text>

  <!-- ===== Stage 3 ===== -->
  <line x1="360" y1="198" x2="430" y2="198" stroke="#003D6B" stroke-width="1.5"/>
  <line x1="430" y1="198" x2="430" y2="175" stroke="#003D6B" stroke-width="1.5"/>

  <!-- Charging resistor top -->
  <line x1="430" y1="70" x2="430" y2="115" stroke="#003D6B" stroke-width="1.5"/>
  <rect x="422" y="115" width="16" height="36" rx="2" fill="none" stroke="#003D6B" stroke-width="1.5"/>
  <text x="451" y="136" font-family="Arial,sans-serif" font-size="9" fill="#555">R</text>
  <line x1="430" y1="151" x2="430" y2="175" stroke="#003D6B" stroke-width="1.5"/>

  <!-- Capacitor C3 -->
  <line x1="430" y1="175" x2="430" y2="190" stroke="#003D6B" stroke-width="1.5"/>
  <line x1="410" y1="190" x2="450" y2="190" stroke="#003D6B" stroke-width="2.5"/>
  <line x1="410" y1="198" x2="450" y2="198" stroke="#003D6B" stroke-width="2.5"/>
  <line x1="430" y1="198" x2="430" y2="213" stroke="#003D6B" stroke-width="1.5"/>
  <text x="455" y="198" font-family="Arial,sans-serif" font-size="10" fill="#003D6B" font-weight="bold">C₃</text>

  <!-- Charging resistor bottom -->
  <line x1="430" y1="213" x2="430" y2="249" stroke="#003D6B" stroke-width="1.5"/>
  <rect x="422" y="249" width="16" height="36" rx="2" fill="none" stroke="#003D6B" stroke-width="1.5"/>
  <line x1="430" y1="285" x2="430" y2="330" stroke="#003D6B" stroke-width="1.5"/>

  <!-- Output node from stage 3 top -->
  <line x1="430" y1="175" x2="530" y2="175" stroke="#003D6B" stroke-width="1.5"/>
  <line x1="530" y1="175" x2="530" y2="200" stroke="#003D6B" stroke-width="1.5"/>

  <!-- Output load symbol -->
  <rect x="510" y="200" width="40" height="55" rx="3" fill="#ECEFF1" stroke="#003D6B" stroke-width="1.5"/>
  <text x="530" y="232" font-family="Arial,sans-serif" font-size="9" fill="#003D6B" text-anchor="middle" font-weight="bold">LOAD</text>
  <line x1="530" y1="255" x2="530" y2="330" stroke="#003D6B" stroke-width="1.5"/>

  <!-- Output voltage label -->
  <text x="575" y="218" font-family="Arial,sans-serif" font-size="10" fill="#0078B6" font-weight="bold">V_out</text>
  <text x="575" y="232" font-family="Arial,sans-serif" font-size="10" fill="#0078B6">= n·V</text>

  <!-- ===== Annotations ===== -->
  <!-- Charge phase arrow -->
  <text x="55" y="50" font-family="Arial,sans-serif" font-size="10" fill="#0078B6" font-style="italic">Charge: capacitors in parallel at V</text>
  <!-- Fire phase arrow -->
  <text x="55" y="360" font-family="Arial,sans-serif" font-size="10" fill="#003D6B" font-style="italic">Fire: spark gaps close, capacitors stack in series → n×V</text>

  <!-- Legend -->
  <rect x="40" y="370" width="540" height="22" rx="3" fill="#fff" stroke="#d4d8db" stroke-width="1"/>
  <text x="55" y="385" font-family="Arial,sans-serif" font-size="9" fill="#555">R = charging resistor (isolates stages during charge)   C = storage capacitor   S = spark-gap switch   n = number of stages</text>
</svg>
