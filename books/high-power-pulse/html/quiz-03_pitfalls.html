<h1>Chapter 3 Quiz: Common Pitfalls</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<div id="bnc-quiz"></div>

<script>
window.QUIZ_DATA = {
  bookKey: "hppg",
  chapterKey: "03",
  title: "Chapter 3 Quiz",
  questions: [
    {
      q: "A pulser drives an open-circuit cable. What happens to the voltage at the open end during the pulse?",
      options: [
        "The voltage stays the same as the source.",
        "The voltage drops to zero.",
        "The voltage doubles due to reflection.",
        "The voltage oscillates randomly."
      ],
      answer: 2,
      explain: "An open end reflects the wave in phase, so the incident and reflected waves add and the open-end voltage doubles."
    },
    {
      q: "Miller turn-on is caused by:",
      options: [
        "Bias on the source resistor.",
        "dV/dt at the drain coupling current through Cgd into the gate.",
        "Thermal runaway in the channel.",
        "Common-mode current on the trigger cable."
      ],
      answer: 1,
      explain: "A fast drain dV/dt pushes current through the gate-drain capacitance, lifting the gate and falsely turning the device on."
    },
    {
      q: "A 10 ns ring period on a scope trace from a pulser-cable system most likely indicates:",
      options: [
        "EMI pickup from a nearby AC line.",
        "Round-trip resonance on a 1 m cable with mismatched impedance.",
        "Switch ringing from gate-loop inductance.",
        "Power supply ripple."
      ],
      answer: 1,
      explain: "A 1 m cable has roughly a 5 ns one-way delay, so a 10 ns ring period matches its mismatched round-trip resonance."
    },
    {
      q: "A user replaces the supplied RG-62 cable on a PVX-4150 with a 50 Ω BNC cable that fits the connector. The result is most likely:",
      options: [
        "No effect because the impedance difference is small.",
        "Overshoot and ringing on the pulse waveform.",
        "The pulser stops working entirely.",
        "Reduced power dissipation in the pulser."
      ],
      answer: 1,
      explain: "Swapping the matched cable for a different impedance creates a mismatch, producing reflections seen as overshoot and ringing."
    },
    {
      q: "Which of the following is NOT a safe way to make a measurement on a floating load?",
      options: [
        "Use a differential probe with adequate voltage rating.",
        "Use a fiber-coupled isolation amplifier.",
        "Lift the oscilloscope's safety ground.",
        "Use a current-viewing resistor with a galvanically isolated digitizer."
      ],
      answer: 2,
      explain: "Lifting the scope safety ground defeats a protective earth and is a shock hazard, never an acceptable floating-measurement method."
    },
    {
      q: "Partial discharge typically leaves what visible evidence?",
      options: [
        "A clean burn mark across all conductors.",
        "Carbonized tracking patterns along the dielectric surface.",
        "Melted solder joints.",
        "Discolored heatsinks."
      ],
      answer: 1,
      explain: "Repeated partial discharge erodes the insulation, leaving carbonized tracking paths along the dielectric surface."
    },
    {
      q: "The single most common cause of pulser returns from the field is:",
      options: [
        "Switch failure in the output stage.",
        "Software firmware bugs.",
        "Cable and connector problems, including wrong cable substitution and disconnect-under-load events.",
        "Power supply failure."
      ],
      answer: 2,
      explain: "Most field returns trace to cabling, not the pulser, including wrong-impedance substitutions and disconnect-under-load damage."
    }
  ]
};
</script>
