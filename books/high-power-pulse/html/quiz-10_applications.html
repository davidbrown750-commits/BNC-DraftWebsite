    {
      q: "Time-of-flight mass spectrometry uses high-voltage pulses primarily to:",
      options: [
        "Heat the sample to ionization temperature.",
        "Accelerate ions to a known kinetic energy so flight time correlates with mass-to-charge ratio.",
        "Cool the detector to reduce noise.",
        "Generate the laser used to ionize the sample."
      ],
      answer: 1,
      explain: "A pulse gives every ion the same kinetic energy, so lighter ions arrive sooner and flight time maps to mass-to-charge ratio."
    },
    {
      q: "Irreversible electroporation (IRE) for tumor ablation kills cells via:",
      options: [
        "Heating the tissue.",
        "Permanent electric-field-induced membrane damage and apoptosis, without thermal mechanisms.",
        "Direct mechanical disruption.",
        "Chemical reaction with the electrode material."
      ],
      answer: 1,
      explain: "IRE uses strong field pulses to permanently disrupt cell membranes and trigger apoptosis without relying on heat."
    },
    {
      q: "Pulsed-electric-field food processing kills microorganisms by:",
      options: [
        "Heating the food to pasteurization temperature.",
        "Disrupting microbial cell membranes through electroporation, without significant thermal effect.",
        "Ionizing the water in the food.",
        "Generating ultraviolet light at the electrodes."
      ],
      answer: 1,
      explain: "PEF processing electroporates microbial membranes, inactivating organisms while keeping the food essentially cold."
    },
    {
      q: "The Sandia Z Machine delivers approximately:",
      options: [
        "25 mA in 100 ns.",
        "25 A in 100 ns.",
        "25 kA in 100 ns.",

      answer: 3,
      explain: "The Z Machine delivers on the order of 25 MA in about 100 ns, among the largest pulsed currents ever produced."
    },
    {
      q: "FMCW LiDAR differs from time-of-flight LiDAR in that:",

        "FMCW uses a continuous-wave laser with frequency modulation; ToF uses short pulses.",

        "FMCW does not use lasers.",
        "ToF requires more complex pulser electronics than FMCW."

      answer: 0,
      explain: "FMCW sweeps the frequency of a continuous-wave laser, while time-of-flight LiDAR times the return of short laser pulses."

        "Generate non-thermal plasma jets for wound treatment, antimicrobial action, and skin therapy.",

        "Perform non-invasive imaging."
