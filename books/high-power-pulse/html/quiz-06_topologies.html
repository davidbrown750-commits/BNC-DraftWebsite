window.QUIZ_DATA = {

  chapterKey: "06",
  title: "Chapter 6 Quiz",
  questions: [
    {
      q: "The half-bridge topology achieves symmetric rise and fall times because:",
      options: [
        "Both switches turn on at the same instant.",
        "The load is tied to the midpoint between two switches that actively source and sink current.",
        "The output capacitor balances the rise and fall.",
        "The supply voltage is symmetric around ground."
      ],
      answer: 1,
      explain: "With the load at the midpoint, one switch actively drives the rising edge and the other the falling edge, so both are symmetric."
    },
    {
      q: "A solid-state Marx generator's output voltage equals:",
      options: [
        "The charge voltage of one stage.",
        "The charge voltage divided by the number of stages.",
        "N times the charge voltage, where N is the number of stages.",
        "The charge voltage doubled."
      ],
      answer: 2,
      explain: "A Marx charges its stages in parallel and discharges them in series, so the output is N times the per-stage charge voltage."
    },
    {
      q: "A PFN's pulse shape is determined by:",
      options: [
        "The trigger waveform applied to the switch.",
        "The L and C values of the network sections, fixed at design time.",
        "The supply voltage of the charger.",
        "A microcontroller running a control algorithm."
      ],
      answer: 1,
      explain: "A PFN's pulse width and shape are set by the inductor and capacitor values chosen when the network is designed."
    },
    {
      q: "The PCX-7500 maintains constant output current to better than 1% droop over multi-millisecond pulses by using:",
      options: [
        "A single very large storage capacitor.",
        "Multiple parallel inductive-storage current loops with PID control.",
        "A single MOSFET with gate-drive feedback.",
        "A spark-gap switch with millisecond hold-off."
      ],
      answer: 1,
      explain: "The PCX-7500 uses parallel inductive-storage current loops under PID control to hold flat current across long pulses."
    },
    {
      q: "Magnetic pulse compression chains are used to:",
      options: [
        "Generate the initial pulse from a DC supply.",
        "Sharpen the rise time of a slow pulse from a primary switch using saturable inductors.",
        "Step up the pulse voltage with magnetic transformers.",
        "Filter noise from the output pulse."
      ],
      answer: 1,
      explain: "Saturable inductors store then suddenly release energy, compressing a slow primary pulse into a faster, sharper edge."
    },
    {
      q: "A Blumlein line delivers a pulse with amplitude equal to:",
      options: [
        "Half the charge voltage.",
        "The charge voltage.",
        "Twice the charge voltage.",
        "Four times the charge voltage."
      ],
      answer: 1,
      explain: "A Blumlein delivers a pulse at the full charge voltage into a matched load, its key advantage over a single charged line."
    },
    {
      q: "Resonant charging provides what advantage over resistive charging?",

        "Lower component cost.",
        "Simpler triggering."
      ],
      answer: 0,
      explain: "Resonant charging swings the storage element to about twice the supply voltage with little loss, charging fast and efficiently."
