<h1>Chapter 5 Quiz: Switches</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<div id="bnc-quiz"></div>

<script>
window.QUIZ_DATA = {
  bookKey: "hppg",
  chapterKey: "05",
  title: "Chapter 5 Quiz",
  questions: [
    {
      q: "The single biggest advantage of SiC MOSFETs over silicon MOSFETs at the same voltage rating is:",
      options: [
        "Lower cost.",
        "Higher breakdown field, leading to thinner drift regions, lower capacitances, and faster switching at the same voltage.",
        "Negative temperature coefficient of on-resistance.",
        "Compatibility with standard silicon gate drivers."
      ],
      answer: 1,
      explain: "SiC's higher breakdown field lets the drift region be thinner, which cuts capacitance and on-resistance and speeds switching."
    },
    {
      q: "Which switch technology is the right answer for a sub-nanosecond rise-time pulser at 200 V?",
      options: ["Silicon power MOSFET.", "IGBT.", "GaN HEMT.", "Spark gap."],
      answer: 2,
      explain: "GaN HEMTs have the low capacitance and fast switching needed for sub-nanosecond edges in the low-hundreds-of-volts class."
    },
    {
      q: "Drift-step-recovery diodes produce a fast voltage rise by:",
      options: [
        "Closing in response to a gate signal, like a transistor.",
        "Recovering from forward bias to reverse bias quickly, with the voltage step set by the rate of charge removal.",
        "Generating a discharge in a gas gap.",
        "Saturating a magnetic core."
      ],
      answer: 1,
      explain: "A DSRD snaps from conducting to blocking as stored charge is swept out, and the abrupt interruption forms a fast voltage step."
    },
    {
      q: "In a series stack of MOSFETs, dynamic balancing during transitions is most commonly achieved by:",
      options: [
        "Connecting all gates to a single voltage rail.",
        "Transformer-coupled gate drive with all secondaries on a common core, plus parallel snubber capacitors across each device.",
        "Removing one device from the stack to lower the voltage.",
        "Using only IGBTs because they are inherently balanced."
      ],
      answer: 1,
      explain: "A common-core transformer drives every gate together, and snubber capacitors across each device equalize the switching transitions."
    },
    {
      q: "Photoconductive semiconductor switches close in response to:",
      options: [
        "A voltage signal applied to a gate terminal.",
        "A magnetic field applied to the device.",
        "A laser pulse incident on the semiconductor bulk.",
        "Forward current exceeding a threshold."
      ],
      answer: 2,
      explain: "A PCSS becomes conductive when an incident laser pulse generates carriers in the semiconductor bulk."
    },
    {
      q: "The \"tail current\" effect that limits IGBT switching speed is caused by:",
      options: [
        "Common-mode currents on the gate.",
        "Stored minority charge in the bipolar drift region taking time to recombine after the gate is turned off.",
        "Parasitic inductance in the package.",
        "Insufficient gate drive voltage."
      ],
      answer: 1,
      explain: "An IGBT is part bipolar, so minority charge in the drift region must recombine after turn-off, producing the slow current tail."
    },
    {
      q: "Spark gaps remain in service in modern pulsed-power systems primarily because:",
      options: [
        "They are cheaper than semiconductors.",
        "They handle voltages above what any semiconductor can hold off.",
        "They have lower jitter than thyratrons.",
        "They are more energy-efficient."
      ],
      answer: 1,
      explain: "Spark gaps survive in the highest-voltage systems because they hold off voltages well beyond any single semiconductor device."
    }
  ]
};
