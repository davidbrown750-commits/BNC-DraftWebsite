<h1>Chapter 8 Quiz: Grounding and EMC</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<div id="bnc-quiz"></div>

<script>
window.QUIZ_DATA = {
  bookKey: "hppg",
  chapterKey: "08",
  title: "Chapter 8 Quiz",
  questions: [
    {
      q: "The \"single-point ground\" approach works well at:",
      options: [
        "All frequencies, in all bench geometries.",
        "Low frequencies and small bench geometries, where wire impedance back to the ground point is small.",
        "Only above 100 MHz.",
        "Only with copper plane construction."
      ],
      answer: 1,
      explain: "Single-point ground works while the wire impedance to the star point stays small, which holds at low frequency on a small bench."
    },
    {
      q: "A common-mode choke on a monitor cable suppresses:",
      options: [
        "Differential-mode signal currents.",
        "Common-mode noise currents flowing in the same direction on the conductor and shield.",
        "DC offsets on the signal.",
        "Low-frequency drift."
      ],
      answer: 1,
      explain: "A common-mode choke presents high impedance to currents flowing the same way on both conductors, leaving the signal untouched."
    },
    {
      q: "Fiber-optic trigger distribution provides what advantage over electrical trigger distribution?",
      options: [
        "Lower latency.",
        "Galvanic isolation between trigger source and pulser, eliminating common-mode pickup.",
        "Cheaper cable cost.",
        "Lower jitter under all conditions."
      ],
      answer: 1,
      explain: "Fiber carries no current, so it galvanically isolates the trigger source from the pulser and breaks the common-mode path."
    },
    {
      q: "The most important external protection for a scope front-end measuring near a high-power pulser is:",
      options: [
        "A high-input-impedance buffer.",
        "A series resistor and a gas-discharge tube at the scope input.",
        "A bandpass filter.",
        "A fiber-optic isolator on the trigger."
      ],
      answer: 1,
      explain: "A series resistor limits surge current and a gas-discharge tube clamps overvoltage, protecting the sensitive scope front-end."
    },
    {
      q: "Two cables grounded at both ends are most likely to:",
      options: [
        "Reduce signal pickup.",
        "Form a ground loop that picks up environmental noise.",
        "Improve impedance matching.",
        "Add useful damping."
      ],
      answer: 1,
      explain: "Grounding a cable at both ends closes a loop that couples environmental fields, the classic ground-loop noise source."
    },
    {
      q: "A copper-plane ground reference is preferred over single-point ground when:",
      options: [
        "Signal frequencies are below 1 kHz.",
        "Rise times are below 10 ns and the bench is large enough that single-point ground impedances become significant.",
        "The bench is portable.",
        "Cost is the primary concern."
      ],
      answer: 1,
      explain: "Fast edges and a large bench make wire ground impedances matter, so a low-impedance copper plane outperforms a star ground."
    },
    {
      q: "The \"plane-and-bond\" grounding approach achieves low impedance at high frequencies because:",
      options: [
        "The plane has zero resistance.",
        "The plane has so much surface area that current spreads out and impedance everywhere is small.",
        "The plane only conducts at the surface.",
        "The plane is electrically isolated from earth."
      ],
      answer: 1,
      explain: "A broad plane lets return current spread out, so the inductance and impedance between any two points stay low at high frequency."
    }
  ]
};
</script>
