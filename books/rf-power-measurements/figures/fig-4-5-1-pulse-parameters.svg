<text x="14" y="22" fill="#ffffff" font-size="14" font-weight="700">Figure 4.5.1 — Pulse waveform parameters: rise, overshoot, droop, fall</text>
<line x1="80" y1="300" x2="660" y2="300" stroke="#2C3E50" stroke-width="1.5"/><line x1="80" y1="60" x2="80" y2="300" stroke="#2C3E50" stroke-width="1.5"/><text x="370" y="340" font-size="12" fill="#2C3E50" text-anchor="middle">Time</text><text x="40" y="180" font-size="12" fill="#2C3E50" transform="rotate(-90, 40, 180)" text-anchor="middle">Power</text><polyline points="80,300 180,300 200,90 215,70 235,100 250,95 450,130 470,290 660,300" fill="none" stroke="#00b4ff" stroke-width="2.6"/><polygon points="80,300 180,300 200,90 215,70 235,100 250,95 450,130 470,290 660,300 660,300 80,300" fill="#00b4ff" opacity="0.12"/><line x1="200" y1="60" x2="200" y2="320" stroke="#00ff88" stroke-dasharray="3,3" stroke-width="1.5"/><line x1="250" y1="60" x2="250" y2="320" stroke="#00ff88" stroke-dasharray="3,3" stroke-width="1.5"/><text x="225" y="55" font-size="10" fill="#00ff88" text-anchor="middle" font-weight="700">Rise time</text><line x1="215" y1="70" x2="350" y2="40" stroke="#003D6B" stroke-width="1"/><text x="350" y="38" font-size="10" fill="#003D6B">Overshoot</text><line x1="350" y1="115" x2="450" y2="155" stroke="#003D6B" stroke-width="0" stroke-dasharray="2,2"/><text x="350" y="200" font-size="10" fill="#003D6B" font-weight="700">Droop</text><line x1="380" y1="190" x2="380" y2="135" stroke="#003D6B" stroke-width="1" marker-end="url(#arrow)"/><line x1="450" y1="60" x2="450" y2="320" stroke="#00ff88" stroke-dasharray="3,3" stroke-width="1.5"/><line x1="470" y1="60" x2="470" y2="320" stroke="#00ff88" stroke-dasharray="3,3" stroke-width="1.5"/><text x="495" y="55" font-size="10" fill="#00ff88">Fall time</text><line x1="225" y1="320" x2="455" y2="320" stroke="#003D6B" stroke-width="2"/><text x="340" y="335" font-size="11" fill="#003D6B" text-anchor="middle" font-weight="700">Pulse width (50% points)</text></svg>
