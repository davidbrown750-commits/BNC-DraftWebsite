<text x="14" y="22" fill="#ffffff" font-size="14" font-weight="700">Figure 7.3.1 — EMC coupling paths between source and victim</text>
<rect x="60" y="140" width="120" height="80" fill="#0078B6" stroke="#003D6B" stroke-width="2" rx="6"/><text x="120" y="180" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="700">SOURCE</text><text x="120" y="200" font-size="10" fill="#ffffff" text-anchor="middle">(emitter)</text><rect x="540" y="140" width="120" height="80" fill="#003D6B" stroke="#003D6B" stroke-width="2" rx="6"/><text x="600" y="180" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="700">VICTIM</text><text x="600" y="200" font-size="10" fill="#ffffff" text-anchor="middle">(EUT)</text><path d="M 180 160 Q 360 80 540 160" fill="none" stroke="#00b4ff" stroke-width="2.5" stroke-dasharray="6,3"/><text x="360" y="75" font-size="11" fill="#00b4ff" text-anchor="middle" font-weight="700">Radiative</text><text x="360" y="90" font-size="9" fill="#2C3E50" text-anchor="middle">EM wave through space</text><path d="M 180 180 Q 360 130 540 180" fill="none" stroke="#003D6B" stroke-width="2"/><text x="360" y="125" font-size="11" fill="#003D6B" text-anchor="middle" font-weight="700">Inductive</text><text x="360" y="140" font-size="9" fill="#2C3E50" text-anchor="middle">Magnetic field linkage</text><path d="M 180 200 Q 360 230 540 200" fill="none" stroke="#7fdbff" stroke-width="2"/><text x="360" y="245" font-size="11" fill="#003D6B" text-anchor="middle" font-weight="700">Capacitive</text><text x="360" y="258" font-size="9" fill="#2C3E50" text-anchor="middle">Electric field linkage</text><path d="M 180 220 Q 360 290 540 220" fill="none" stroke="#00ff88" stroke-width="2"/><text x="360" y="305" font-size="11" fill="#003D6B" text-anchor="middle" font-weight="700">Conductive</text><text x="360" y="318" font-size="9" fill="#2C3E50" text-anchor="middle">Direct wired path</text></svg>
