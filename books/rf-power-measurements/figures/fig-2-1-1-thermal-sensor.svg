<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<rect width="720" height="320" fill="#ECEFF1"/>
<rect x="0" y="0" width="720" height="32" fill="#003D6B"/>
<text x="14" y="22" fill="#ffffff" font-size="14" font-weight="700">Figure 2.1.1 — Thermal RF power sensor (DC substitution)</text>
<text x="20" y="170" font-size="12" fill="#2C3E50">RF in</text><line x1="60" y1="160" x2="140" y2="160" stroke="#2C3E50" stroke-width="2"/><rect x="140" y="140" width="80" height="40" fill="#0078B6" stroke="#003D6B" stroke-width="2"/><text x="180" y="165" font-size="11" fill="#ffffff" text-anchor="middle">50 Ω</text><text x="180" y="135" font-size="10" fill="#003D6B" text-anchor="middle">Precision termination</text><path d="M 230 160 Q 260 130, 290 160" fill="none" stroke="#00b4ff" stroke-width="2.5" stroke-dasharray="4,3"/><text x="260" y="115" font-size="10" fill="#00b4ff" text-anchor="middle">heat</text><rect x="290" y="140" width="80" height="40" fill="#003D6B" stroke="#003D6B" stroke-width="2"/><text x="330" y="165" font-size="11" fill="#ffffff" text-anchor="middle">Thermistor</text><text x="330" y="135" font-size="10" fill="#003D6B" text-anchor="middle">Temperature transducer</text><line x1="370" y1="160" x2="450" y2="160" stroke="#2C3E50" stroke-width="2"/><rect x="450" y="135" width="100" height="50" fill="#ECEFF1" stroke="#003D6B" stroke-width="2"/><text x="500" y="160" font-size="11" fill="#003D6B" text-anchor="middle">Wheatstone</text><text x="500" y="173" font-size="11" fill="#003D6B" text-anchor="middle">bridge</text><line x1="550" y1="160" x2="630" y2="160" stroke="#2C3E50" stroke-width="2"/><rect x="630" y="135" width="70" height="50" fill="#00ff88" stroke="#003D6B" stroke-width="2"/><text x="665" y="155" font-size="11" fill="#003D6B" text-anchor="middle" font-weight="700">Reading</text><text x="665" y="172" font-size="11" fill="#003D6B" text-anchor="middle">(dBm)</text><text x="360" y="260" font-size="11" fill="#2C3E50" text-anchor="middle" font-style="italic">RF heats the termination. The bridge reduces DC bias to maintain temperature.</text><text x="360" y="278" font-size="11" fill="#2C3E50" text-anchor="middle" font-style="italic">DC reduction equals RF input power. True-RMS, modulation-agnostic.</text></svg>
