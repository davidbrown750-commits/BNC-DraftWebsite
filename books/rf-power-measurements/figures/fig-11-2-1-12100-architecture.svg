<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<rect width="720" height="380" fill="#ECEFF1"/>
<rect x="0" y="0" width="720" height="32" fill="#003D6B"/>
<text x="14" y="22" fill="#ffffff" font-size="14" font-weight="700">Figure 11.2.1 — Model 12100 series architecture</text>
<text x="20" y="200" font-size="12" fill="#2C3E50">RF in</text><line x1="60" y1="190" x2="120" y2="190" stroke="#2C3E50" stroke-width="2"/><rect x="120" y="170" width="80" height="40" fill="#0078B6" stroke="#003D6B" stroke-width="2"/><text x="160" y="195" font-size="11" fill="#ffffff" text-anchor="middle">50 Ω</text><line x1="200" y1="190" x2="240" y2="190" stroke="#2C3E50" stroke-width="2"/><line x1="240" y1="190" x2="240" y2="130" stroke="#2C3E50" stroke-width="2"/><line x1="240" y1="190" x2="240" y2="250" stroke="#2C3E50" stroke-width="2"/><rect x="260" y="115" width="100" height="35" fill="#003D6B" stroke="#003D6B"/><text x="310" y="138" font-size="11" fill="#ffffff" text-anchor="middle">High-power path</text><rect x="260" y="235" width="100" height="35" fill="#003D6B" stroke="#003D6B"/><text x="310" y="258" font-size="11" fill="#ffffff" text-anchor="middle">Low-power path</text><line x1="240" y1="130" x2="260" y2="130" stroke="#2C3E50" stroke-width="2"/><line x1="240" y1="250" x2="260" y2="250" stroke="#2C3E50" stroke-width="2"/><rect x="260" y="170" width="100" height="40" fill="#00b4ff" stroke="#003D6B" opacity="0.4"/><text x="310" y="186" font-size="10" fill="#003D6B" text-anchor="middle" font-weight="700">Thermal</text><text x="310" y="200" font-size="10" fill="#003D6B" text-anchor="middle">compensation</text><line x1="360" y1="132" x2="420" y2="160" stroke="#2C3E50" stroke-width="2"/><line x1="360" y1="252" x2="420" y2="220" stroke="#2C3E50" stroke-width="2"/><line x1="360" y1="190" x2="420" y2="190" stroke="#2C3E50" stroke-width="2"/><rect x="420" y="155" width="80" height="70" fill="#003D6B" stroke="#003D6B"/><text x="460" y="180" font-size="11" fill="#ffffff" text-anchor="middle">ADC +</text><text x="460" y="195" font-size="11" fill="#ffffff" text-anchor="middle">DSP</text><text x="460" y="212" font-size="11" fill="#ffffff" text-anchor="middle">stitching</text><line x1="500" y1="190" x2="540" y2="190" stroke="#2C3E50" stroke-width="2"/><rect x="540" y="160" width="100" height="60" fill="#00ff88" stroke="#003D6B"/><text x="590" y="180" font-size="11" fill="#003D6B" text-anchor="middle" font-weight="700">USB 2.0</text><text x="590" y="195" font-size="9" fill="#003D6B" text-anchor="middle">+ SPI / I²C / LAN</text><text x="590" y="210" font-size="9" fill="#003D6B" text-anchor="middle">(optional)</text><text x="360" y="320" font-size="11" fill="#2C3E50" text-anchor="middle" font-style="italic">Two parallel diode paths cover different power ranges. Internal thermal compensation</text><text x="360" y="335" font-size="11" fill="#2C3E50" text-anchor="middle" font-style="italic">eliminates the need for zeroing or pre-use calibration.</text></svg>
