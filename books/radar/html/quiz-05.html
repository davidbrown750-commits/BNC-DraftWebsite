<h1>Radar Loss Quiz</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<div id="bnc-quiz"></div>

<script>
window.QUIZ_DATA = {
  bookKey: "radar",
  chapterKey: "05",
  title: "Radar Loss Quiz",
  questions: [
    {
      q: "Total losses in a radar system are considered excessive above roughly what level?",
      options: [
        "5 decibels",
        "13 decibels",
        "21 decibels",
        "40 decibels"
      ],
      answer: 2,
      explain: "Losses above about 21 dB are declared excessive; a well-designed radar is closer to 13 dB."
    },
    {
      q: "Atmospheric losses are insignificant at frequencies below about:",
      options: [
        "300 MHz",
        "1 GHz",
        "3 GHz",
        "10 GHz"
      ],
      answer: 2,
      explain: "Below about 3 GHz, especially in clear weather, atmospheric absorption losses are insignificant."
    },
    {
      q: "What is the main cause of fluctuation loss?",
      options: [
        "Waveguide attenuation",
        "Variation (fluttering) in the radar cross section of the target",
        "Beam stepping in a phased array",
        "Receiver noise figure"
      ],
      answer: 1,
      explain: "Fluctuation loss comes from the changing radar cross section; frequency diversity helps overcome it."
    },
    {
      q: "To double the maximum range of a radar by transmit power alone, the power must be increased by a factor of:",
      options: [
        "2",
        "4",
        "8",
        "16"
      ],
      answer: 3,
      explain: "Because range goes as the fourth root of power, doubling range needs a 16-fold power increase."
    },
    {
      q: "Typical values of the minimum discernible signal (MDS) for radar receivers lie in the range of:",
      options: [
        "-40 to -50 dBm",
        "-70 to -80 dBm",
        "-104 to -110 dBm",
        "-150 to -160 dBm"
      ],
      answer: 2,
      explain: "Typical radar MDS echo values lie between about -104 dBm and -110 dBm."
    }
  ]
};
