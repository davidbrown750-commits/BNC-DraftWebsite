<h1>Chapter 10 Quiz</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<script>
window.QUIZ_DATA = {
  bookKey: "radar",
  chapterKey: "10",
  title: "Chapter 10 Quiz",
  questions: [
    {
      q: "In a keyed-oscillator transmitter (POT), which device produces the RF pulse?",
      options: [
        "A klystron power amplifier",
        "A self-oscillating tube, usually a magnetron, keyed by the modulator",
        "A solid-state phased array module",
        "A surface acoustic wave filter"
      ],
      answer: 1,
      explain: "A POT uses a single self-oscillating tube, usually a magnetron, keyed on and off by the modulator."
    },
    {
      q: "What does coherence describe in a pulse radar system?",
      options: [
        "The brightness of the display",
        "The constant phase relationship between transmitted and received pulses",
        "The antenna rotation rate",
        "The number of cavities in the tube"
      ],
      answer: 1,
      explain: "Coherence is a constant, predictable phase relationship between the transmitted and received pulses."
    },
    {
      q: "In the classic thyratron modulator, what role does the pulse-forming network (PFN) play?",
      options: [
        "It cools the transmitter tube",
        "It stores energy, charged to twice the supply voltage, then discharges to form the pulse",
        "It demodulates the echo signal",
        "It steers the antenna beam"
      ],
      answer: 1,
      explain: "The PFN stores energy at twice the supply voltage and discharges through the thyratron to form the high-voltage pulse."
    },
    {
      q: "What is the main benefit of pulse compression?",
      options: [
        "It combines the high energy of a long pulse with the resolution of a short pulse",
        "It removes the need for an antenna",
        "It eliminates all receiver noise",
        "It lets the radar transmit and receive on the same antenna element"
      ],
      answer: 0,
      explain: "Pulse compression gives a long pulse's energy and range while resolving targets like a short pulse."
    },
    {
      q: "A computer study concluded that the longest usable Barker code, and therefore the maximum phase-code compression ratio, is what?",
      options: ["7:1", "13:1", "50:1", "121:1"],
      answer: 1,
      explain: "Only the 13-element Barker code gives the maximum signal-to-sidelobe ratio, a 13:1 compression ratio."
    }
  ]
};
