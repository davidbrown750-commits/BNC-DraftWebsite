<h1>Chapter 12 Quiz</h1>
<p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>

<script>
window.QUIZ_DATA = {
  bookKey: "radar",
  chapterKey: "12",
  title: "Chapter 12 Quiz",
  questions: [
    {
      q: "Why is the magnetron classed as a diode?",
      options: [
        "It has two anodes",
        "It has no grid",
        "It rectifies the output signal",
        "It uses two cathodes"
      ],
      answer: 1,
      explain: "The magnetron has no grid, only an anode and cathode, so it is classed as a diode."
    },
    {
      q: "What rotating pattern of electrons sustains the RF oscillations in a magnetron?",
      options: [
        "A space-charge wheel",
        "A standing wave column",
        "A drift tube stack",
        "A repeller cloud"
      ],
      answer: 0,
      explain: "Velocity modulation forms a space-charge wheel whose spokes deliver energy to the AC field."
    },
    {
      q: "Why are the pulses generated by a plain magnetron not coherent?",
      options: [
        "The anode voltage is too low",
        "Each transient oscillation starts with a random phase",
        "The cavities are all different sizes",
        "The cathode is too hot"
      ],
      answer: 1,
      explain: "The transient oscillation begins with an unpredictable, random phase on every pulse, so the pulses are not coherent."
    },
    {
      q: "How does the crossed-field amplifier (CFA) differ from the magnetron in cavity count?",
      options: [
        "It has an even number of cavities",
        "It has an odd number of resonant cavities coupled together",
        "It has exactly two cavities",
        "It has no cavities"
      ],
      answer: 1,
      explain: "The CFA uses an odd number of coupled cavities, which interrupts the space-charge wheel and allows amplification."
    },
    {
      q: "What advantage does the extended interaction klystron (EIK) combine?",
      options: [
        "The low cost of a diode and the size of a transistor",
        "The ruggedness and high power of a klystron with the larger bandwidth of a TWT",
        "The tunability of a BWO with zero power draw",
        "The coherence of a CW source with the simplicity of a magnetron"
      ],
      answer: 1,
      explain: "The EIK merges the klystron's ruggedness and high power with the wider bandwidth of a coupled-cavity TWT."
    }
  ]
};
