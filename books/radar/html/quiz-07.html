      options: [
        "It receives and evaluates echoes reflected from the target",

        "It measures the target's temperature"

      q: "What must a target carry for a secondary radar to work as intended?",

      answer: 1,
      explain: "Secondary radar relies on a transponder that receives the interrogation and emits a coded reply."
    },
    {
      q: "What is the defining behavior of a continuous wave (CW) radar?",
      options: [
        "It transmits short high-power pulses with silent listening gaps",
        "It transmits a high-frequency signal continuously and receives at the same time",
        "It transmits only when a target is detected",
        "It transmits once per antenna revolution"
      ],
      answer: 1,
      explain: "CW radar transmits continuously and receives continuously, which is why it must isolate transmit from receive."
    },
    {
      q: "An unmodulated CW radar measuring speed relies on which effect?",
      options: ["The photoelectric effect", "The Doppler effect", "The Hall effect", "The skin effect"],
      answer: 1,
      explain: "Unmodulated CW radar measures radial velocity through the Doppler shift; it cannot measure range."
    },
    {
      q: "What distinguishes a monostatic radar from a bistatic radar?",
      options: [
        "Monostatic radar uses higher power",
        "In a monostatic radar the transmitter and receiver are collocated, often sharing one antenna",
        "Monostatic radar can only detect aircraft",
        "Monostatic radar never uses pulses"
      ],
      answer: 1,
      explain: "Monostatic radar collocate transmitter and receiver; bistatic radar separate them by a large distance."
    }
