window.QUIZ_DATA = {
  bookKey: "radar",
  chapterKey: "09",
  title: "Chapter 9 Quiz",
  questions: [
    {
      q: "How does antenna gain differ from directivity?",
      options: [
        "Gain ignores the antenna pattern entirely",
        "Gain also takes the efficiency of the antenna into account",
        "Gain applies only to receiving antennas",
        "Gain is always measured against a parabolic reference"
      ],
      answer: 1,
      explain: "Directivity describes direction only; gain also accounts for the antenna's efficiency."
    },
    {
      q: "Why does circular polarization help suppress rain returns?",
      options: [
        "Rain does not reflect microwaves",
        "A spherical raindrop reflects the wave in the opposite sense, which the antenna rejects",
        "Rain shifts the carrier frequency",
        "Circular polarization doubles the transmit power"
      ],
      answer: 1,
      explain: "The opposite-sense reflection from spherical drops is rejected, while non-spherical aircraft keep components in the original sense."
    },
    {
      q: "What beam shape does an ideal circular parabolic reflector produce?",
      options: [
        "A fan beam",
        "An omnidirectional pattern",
        "A pencil beam",
        "A cosecant squared beam"
      ],
      answer: 2,
      explain: "A circular parabolic reflector ideally produces a pencil beam; an elliptical reflector gives a fan beam."
    },
    {
      q: "What is the main purpose of a cosecant squared antenna pattern in air-surveillance radar?",
      options: [
        "To maximize range at the horizon only",
        "To keep received power roughly independent of range for a constant-height target",
        "To eliminate the need for a transmitter",
        "To steer the beam electronically"
      ],
      answer: 1,
      explain: "It gives more uniform signal strength as a constant-height target moves within the beam."
    },
    {
      q: "Why is the monopulse antenna named monopulse?",
      options: [
        "It transmits only one pulse per scan to save power",
        "A single pulse is sufficient to make a bearing measurement",
        "It uses a single antenna element",
        "It can only detect one target at a time"
      ],
      answer: 1,
      explain: "Comparing sum and difference channels lets a single pulse yield an accurate bearing."
    }
  ]
};
