    {
      q: "What is velocity modulation?",
      options: [
        "Variation in the velocity of an electron beam caused by alternately speeding up and slowing down the electrons",
        "A change in antenna rotation speed",
        "The Doppler shift of the echo signal",
        "The switching rate of the modulator"
      ],
      answer: 0,
      explain: "Velocity modulation is the alternate speeding up and slowing down of electrons in the beam, which forms bunches."
    },
    {
      q: "In a two-cavity klystron, what are the two resonant cavities called?",
      options: [
        "Anode and cathode",
        "Buncher and catcher",
        "Helix and collector",
        "Repeller and reflector"
      ],
      answer: 1,
      explain: "The first cavity is the buncher and the second is the catcher; the gap between is the drift space."
    },
    {
      q: "What makes the backward-wave oscillator (carcinotron) attractive?",
      options: [
        "It needs no power supply",
        "It offers electronic tunability over a wide frequency range",
        "It is fully coherent",
        "It operates without a vacuum"
      ],
      answer: 1,
      explain: "The BWO can be electronically tuned over a wide range by changing the electron velocity via the anode voltage."
    },
    {
      q: "How does a reflex (repeller) klystron sustain oscillations?",
      options: [
        "By using a second separate amplifier cavity",
        "By reversing the beam with a negatively charged repeller so it passes the cavity twice",
        "By using a permanent magnet as the output",
        "By cooling the collector below freezing"
      ],
      answer: 1,
      explain: "A negatively charged repeller turns the velocity-modulated beam back through the cavity to maintain oscillation."
    },
    {
      q: "Which characteristic makes the traveling wave tube (TWT) ideal as a radar receiver pre-amplifier?",
      options: [
        "Its narrow bandwidth",
        "Its wide bandwidth and low noise figure",
        "Its fixed single frequency",
        "Its very high operating pressure"
      ],
      answer: 1,
      explain: "The TWT's wide bandwidth and low noise figure make it well suited as a low-noise RF pre-amplifier."
    }
  ]
