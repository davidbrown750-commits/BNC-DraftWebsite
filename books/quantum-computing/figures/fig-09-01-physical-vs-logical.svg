<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Physical qubits combined into one logical qubit using a surface-code grid">
  <rect x="0" y="0" width="820" height="460" fill="#ffffff"/>
  <text x="410" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">From Physical Qubits to One Logical Qubit</text>
  <text x="410" y="56" text-anchor="middle" font-size="12.5" fill="#2C3E50">A surface code spreads one protected qubit across many noisy ones</text>

  <!-- LEFT: single noisy physical qubit -->
  <text x="150" y="96" text-anchor="middle" font-size="13.5" font-weight="700" fill="#4B2A6B">PHYSICAL QUBIT</text>
  <circle cx="150" cy="190" r="52" fill="#0078B6" opacity="0.18" stroke="#0078B6" stroke-width="2"/>
  <circle cx="150" cy="190" r="14" fill="#0078B6"/>
  <!-- noise jitter marks -->
  <path d="M150 110 l8 14 l-16 0 z" fill="#C77E00"/>
  <path d="M230 200 l-14 -8 l0 16 z" fill="#C77E00"/>
  <path d="M150 270 l-8 -14 l16 0 z" fill="#C77E00"/>
  <path d="M70 180 l14 8 l0 -16 z" fill="#C77E00"/>
  <text x="150" y="300" text-anchor="middle" font-size="11.5" fill="#2C3E50">One ion, atom, or circuit</text>
  <text x="150" y="318" text-anchor="middle" font-size="11.5" fill="#C77E00" font-weight="700">Fragile - errors creep in</text>

  <!-- ARROW -->
  <line x1="240" y1="200" x2="330" y2="200" stroke="#003D6B" stroke-width="3"/>
  <path d="M330 200 l-16 -8 l0 16 z" fill="#003D6B"/>
  <text x="285" y="186" text-anchor="middle" font-size="11" fill="#003D6B" font-weight="700">encode</text>

  <!-- RIGHT: surface-code grid -->
  <text x="580" y="96" text-anchor="middle" font-size="13.5" font-weight="700" fill="#4B2A6B">LOGICAL QUBIT (surface code)</text>
  <!-- grid of data + measure qubits, distance-style lattice -->
  <g>
    <!-- data qubits: solid sky blue circles; measure qubits: hollow cyan -->
    <!-- rows -->
    <g fill="#0078B6">
      <circle cx="430" cy="150" r="9"/><circle cx="480" cy="150" r="9"/><circle cx="530" cy="150" r="9"/><circle cx="580" cy="150" r="9"/><circle cx="630" cy="150" r="9"/>
      <circle cx="430" cy="250" r="9"/><circle cx="480" cy="250" r="9"/><circle cx="530" cy="250" r="9"/><circle cx="580" cy="250" r="9"/><circle cx="630" cy="250" r="9"/>
      <circle cx="430" cy="200" r="9"/><circle cx="480" cy="200" r="9"/><circle cx="530" cy="200" r="9"/><circle cx="580" cy="200" r="9"/><circle cx="630" cy="200" r="9"/>
    </g>
    <!-- measure / syndrome qubits -->
    <g fill="#ffffff" stroke="#00b4ff" stroke-width="2.5">
      <circle cx="455" cy="175" r="7"/><circle cx="505" cy="175" r="7"/><circle cx="555" cy="175" r="7"/><circle cx="605" cy="175" r="7"/>
      <circle cx="455" cy="225" r="7"/><circle cx="505" cy="225" r="7"/><circle cx="555" cy="225" r="7"/><circle cx="605" cy="225" r="7"/>
    </g>
    <!-- coupling lines -->
    <g stroke="#b6c2cc" stroke-width="1.2">
      <line x1="430" y1="150" x2="630" y2="150"/><line x1="430" y1="200" x2="630" y2="200"/><line x1="430" y1="250" x2="630" y2="250"/>
      <line x1="430" y1="150" x2="430" y2="250"/><line x1="480" y1="150" x2="480" y2="250"/><line x1="530" y1="150" x2="530" y2="250"/><line x1="580" y1="150" x2="580" y2="250"/><line x1="630" y1="150" x2="630" y2="250"/>
    </g>
  </g>
  <!-- legend -->
  <circle cx="450" cy="300" r="8" fill="#0078B6"/>
  <text x="466" y="304" font-size="11" fill="#2C3E50">Data qubits (hold the state)</text>
  <circle cx="450" cy="324" r="6.5" fill="#ffffff" stroke="#00b4ff" stroke-width="2.5"/>
  <text x="466" y="328" font-size="11" fill="#2C3E50">Measure qubits (flag errors, never read the data)</text>
  <text x="580" y="356" text-anchor="middle" font-size="11.5" fill="#003D6B" font-weight="700">Add more physical qubits and the logical error rate falls</text>

  <!-- bottom band -->
  <rect x="40" y="392" width="740" height="44" rx="4" fill="#ECEFF1"/>
  <text x="410" y="412" text-anchor="middle" font-size="11.5" fill="#2C3E50">Today's best results: a few dozen logical qubits from roughly 100 physical qubits.</text>
  <text x="410" y="428" text-anchor="middle" font-size="11.5" fill="#2C3E50">Future fault-tolerant machines may need hundreds or thousands of physical qubits per logical qubit.</text>
</svg>
