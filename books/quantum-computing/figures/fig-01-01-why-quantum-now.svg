<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Why quantum computing, why now: a 2021 to 2026 milestone timeline</title>
  <desc id="desc">A horizontal timeline showing key quantum computing milestones from 2021 through 2026, with three forces driving momentum noted above the line.</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#003D6B"/>
      <stop offset="0.5" stop-color="#0078B6"/>
      <stop offset="1" stop-color="#00b4ff"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="960" height="460" fill="#ffffff"/>

  <!-- Heading -->
  <text x="40" y="46" font-size="22" font-weight="bold" fill="#003D6B">From physics demonstration to engineered system</text>
  <text x="40" y="70" font-size="14" fill="#2C3E50">Key quantum computing milestones, 2021 to 2026</text>

  <!-- Three driving forces -->
  <g font-size="12.5" fill="#ffffff" font-weight="bold" text-anchor="middle">
    <rect x="40" y="96" width="270" height="34" rx="4" fill="#003D6B"/>
    <text x="175" y="118">Error correction crossing threshold</text>
    <rect x="345" y="96" width="270" height="34" rx="4" fill="#4B2A6B"/>
    <text x="480" y="118">National programs and capital</text>
    <rect x="650" y="96" width="270" height="34" rx="4" fill="#C77E00"/>
    <text x="785" y="118">Credible vendor roadmaps</text>
  </g>
  <text x="480" y="152" font-size="12" fill="#2C3E50" text-anchor="middle" font-style="italic">Three forces converging since 2021</text>

  <!-- Timeline axis -->
  <line x1="60" y1="300" x2="900" y2="300" stroke="url(#line)" stroke-width="6" stroke-linecap="round"/>

  <!-- Year ticks and milestone markers -->
  <g text-anchor="middle">
    <!-- 2021 -->
    <circle cx="100" cy="300" r="9" fill="#003D6B"/>
    <text x="100" y="338" font-size="14" font-weight="bold" fill="#003D6B">2021</text>
    <text x="100" y="266" font-size="11" fill="#2C3E50">First error-</text>
    <text x="100" y="280" font-size="11" fill="#2C3E50">corrected qubit</text>

    <!-- 2022 -->
    <circle cx="260" cy="300" r="9" fill="#0078B6"/>
    <text x="260" y="338" font-size="14" font-weight="bold" fill="#003D6B">2022</text>
    <text x="260" y="266" font-size="11" fill="#2C3E50">Qubit counts</text>
    <text x="260" y="280" font-size="11" fill="#2C3E50">scale past 400</text>

    <!-- 2023 -->
    <circle cx="420" cy="300" r="9" fill="#0078B6"/>
    <text x="420" y="338" font-size="14" font-weight="bold" fill="#003D6B">2023</text>
    <text x="420" y="266" font-size="11" fill="#2C3E50">Neutral-atom</text>
    <text x="420" y="280" font-size="11" fill="#2C3E50">arrays top 1,000</text>

    <!-- 2024 -->
    <circle cx="580" cy="300" r="11" fill="#00b4ff" stroke="#003D6B" stroke-width="2"/>
    <text x="580" y="338" font-size="14" font-weight="bold" fill="#003D6B">2024</text>
    <text x="580" y="260" font-size="11" font-weight="bold" fill="#003D6B">Below-threshold</text>
    <text x="580" y="274" font-size="11" fill="#2C3E50">error correction</text>
    <text x="580" y="288" font-size="11" fill="#2C3E50">(Willow)</text>

    <!-- 2025 -->
    <circle cx="740" cy="300" r="9" fill="#00b4ff"/>
    <text x="740" y="338" font-size="14" font-weight="bold" fill="#003D6B">2025</text>
    <text x="740" y="266" font-size="11" fill="#2C3E50">Fault-tolerant</text>
    <text x="740" y="280" font-size="11" fill="#2C3E50">roadmaps set</text>

    <!-- 2026 -->
    <circle cx="900" cy="300" r="9" fill="#C77E00"/>
    <text x="900" y="338" font-size="14" font-weight="bold" fill="#003D6B">2026</text>
    <text x="900" y="266" font-size="11" fill="#2C3E50">Toward logical-</text>
    <text x="900" y="280" font-size="11" fill="#2C3E50">qubit systems</text>
  </g>

  <!-- The control layer band -->
  <rect x="60" y="376" width="840" height="52" rx="4" fill="#ECEFF1" stroke="#b6c2cc" stroke-width="1"/>
  <text x="80" y="400" font-size="12.5" font-weight="bold" fill="#003D6B">Underneath every milestone: the control and characterization layer</text>
  <text x="80" y="418" font-size="11.5" fill="#2C3E50">Stable clocks, clean RF and microwave sources, shaped pulses, synchronized triggers. Precise timing and signal generation.</text>
</svg>
