<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Chart comparing classical, Grover quadratic, and Shor exponential scaling">
  <rect x="0" y="0" width="820" height="480" fill="#ffffff"/>
  <text x="410" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#003D6B">Two Kinds of Quantum Speedup</text>
  <text x="410" y="56" text-anchor="middle" font-size="12.5" fill="#2C3E50">How effort grows as the problem gets bigger (lower is faster)</text>

  <!-- axes -->
  <line x1="90" y1="380" x2="730" y2="380" stroke="#2C3E50" stroke-width="2"/>
  <line x1="90" y1="380" x2="90" y2="90" stroke="#2C3E50" stroke-width="2"/>
  <text x="410" y="416" text-anchor="middle" font-size="12" fill="#2C3E50">Problem size  &#8594;</text>
  <text x="40" y="235" text-anchor="middle" font-size="12" fill="#2C3E50" transform="rotate(-90 40 235)">Work required  &#8594;</text>

  <!-- classical exponential / linear-heavy curve (steep, red-ish amber) -->
  <path d="M90 380 C 230 360, 300 250, 360 130 C 390 75, 410 70, 420 68" fill="none" stroke="#C77E00" stroke-width="3.5"/>
  <text x="430" y="78" font-size="12.5" font-weight="700" fill="#C77E00">Classical factoring</text>
  <text x="430" y="95" font-size="11" fill="#2C3E50">grows almost exponentially</text>

  <!-- Grover quadratic curve (sky blue) -->
  <path d="M90 380 C 250 320, 450 250, 730 200" fill="none" stroke="#0078B6" stroke-width="3.5"/>
  <text x="560" y="190" font-size="12.5" font-weight="700" fill="#0078B6">Grover search</text>
  <text x="560" y="207" font-size="11" fill="#2C3E50">quadratic speedup, &#8730;N</text>

  <!-- Shor polynomial curve (bright cyan, nearly flat) -->
  <path d="M90 380 C 300 360, 500 345, 730 335" fill="none" stroke="#00b4ff" stroke-width="3.5"/>
  <text x="540" y="328" font-size="12.5" font-weight="700" fill="#00b4ff">Shor factoring (quantum)</text>
  <text x="540" y="345" font-size="11" fill="#2C3E50">polynomial, stays manageable</text>

  <!-- plum marker line -->
  <line x1="420" y1="90" x2="420" y2="380" stroke="#4B2A6B" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- bottom takeaways band -->
  <rect x="60" y="436" width="700" height="34" rx="4" fill="#ECEFF1"/>
  <text x="410" y="458" text-anchor="middle" font-size="11.5" fill="#2C3E50">Shor turns an impossible job into a feasible one. Grover halves the exponent. Speedups apply only to the right problems.</text>
</svg>
