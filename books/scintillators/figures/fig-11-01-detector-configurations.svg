<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <rect width="900" height="480" fill="#ECEFF1"/>

  <text x="450" y="32" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Detector configuration cross-sections: classical B-style versus modern S-style</text>

  <!-- Left: B-style PMT-coupled -->
  <g transform="translate(40, 70)">
    <text x="200" y="0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#003D6B">B-style: PMT-coupled</text>
    <text x="200" y="18" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-style="italic" fill="#2C3E50">e.g. B-76S-76-3-NaI:Tl/M</text>

    <!-- Outer housing -->
    <rect x="20" y="40" width="360" height="180" fill="none" stroke="#2C3E50" stroke-width="2"/>
    <!-- Inner aluminum can section -->
    <rect x="22" y="42" width="356" height="176" fill="#ECEFF1" opacity="0.5"/>

    <!-- Crystal area -->
    <rect x="40" y="60" width="120" height="140" fill="#0078B6" opacity="0.85"/>
    <!-- reflector -->
    <rect x="36" y="56" width="128" height="148" fill="none" stroke="#7fdbff" stroke-width="2" stroke-dasharray="3,2"/>
    <!-- crystal label -->
    <text x="100" y="135" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff">NaI(Tl)</text>
    <text x="100" y="148" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#ffffff">crystal</text>

    <!-- entrance window (left) -->
    <rect x="22" y="60" width="14" height="140" fill="#7fdbff" opacity="0.7"/>

    <!-- optical coupling -->
    <rect x="160" y="80" width="10" height="100" fill="#00ff88" opacity="0.7"/>

    <!-- PMT body -->
    <polygon points="170,75 230,90 230,170 170,185" fill="#003D6B"/>
    <!-- focusing electrode -->
    <line x1="180" y1="100" x2="225" y2="115" stroke="#7fdbff" stroke-width="1.4"/>
    <line x1="180" y1="160" x2="225" y2="145" stroke="#7fdbff" stroke-width="1.4"/>

    <!-- dynode chain in PMT extension -->
    <rect x="230" y="90" width="80" height="80" fill="#001f38"/>
    <g stroke="#7fdbff" stroke-width="0.8" fill="none">
      <line x1="240" y1="105" x2="248" y2="115"/>
      <line x1="248" y1="115" x2="256" y2="105"/>
      <line x1="256" y1="105" x2="264" y2="115"/>
      <line x1="264" y1="115" x2="272" y2="105"/>
      <line x1="272" y1="105" x2="280" y2="115"/>
      <line x1="240" y1="155" x2="248" y2="145"/>
      <line x1="248" y1="145" x2="256" y2="155"/>
      <line x1="256" y1="155" x2="264" y2="145"/>
      <line x1="264" y1="145" x2="272" y2="155"/>
      <line x1="272" y1="155" x2="280" y2="145"/>
    </g>

    <!-- voltage divider PCB -->
    <rect x="310" y="80" width="60" height="100" fill="#2C3E50" stroke="#7fdbff" stroke-width="1"/>
    <g fill="#7fdbff">
      <circle cx="320" cy="100" r="2"/>
      <circle cx="335" cy="100" r="2"/>
      <circle cx="350" cy="100" r="2"/>
      <circle cx="320" cy="120" r="2"/>
      <circle cx="335" cy="120" r="2"/>
      <circle cx="350" cy="120" r="2"/>
      <circle cx="320" cy="140" r="2"/>
      <circle cx="335" cy="140" r="2"/>
      <circle cx="350" cy="140" r="2"/>
      <circle cx="320" cy="160" r="2"/>
      <circle cx="335" cy="160" r="2"/>
      <circle cx="350" cy="160" r="2"/>
    </g>

    <!-- Output cable -->
    <rect x="370" y="125" width="20" height="10" fill="#003D6B"/>

    <!-- Mu-metal shield -->
    <path d="M 165,40 L 380,40 L 380,220 L 165,220" fill="none" stroke="#003D6B" stroke-width="2" stroke-dasharray="6,3"/>

    <!-- Callout labels -->
    <g font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#003D6B">
      <line x1="29" y1="130" x2="0" y2="130" stroke="#003D6B" stroke-width="0.8"/>
      <text x="-5" y="133" text-anchor="end" font-weight="600">window</text>

      <line x1="36" y1="56" x2="36" y2="40" stroke="#003D6B" stroke-width="0.8"/>
      <text x="36" y="34" text-anchor="middle" font-weight="600">reflector</text>

      <line x1="165" y1="200" x2="165" y2="240" stroke="#003D6B" stroke-width="0.8"/>
      <text x="165" y="252" text-anchor="middle" font-weight="600">optical coupling</text>

      <line x1="200" y1="195" x2="200" y2="260" stroke="#003D6B" stroke-width="0.8"/>
      <text x="200" y="272" text-anchor="middle" font-weight="600">PMT</text>

      <line x1="340" y1="180" x2="340" y2="240" stroke="#003D6B" stroke-width="0.8"/>
      <text x="340" y="252" text-anchor="middle" font-weight="600">divider</text>

      <line x1="320" y1="40" x2="320" y2="20" stroke="#003D6B" stroke-width="0.8"/>
      <text x="320" y="14" text-anchor="middle" font-weight="600">µ-metal shield</text>
    </g>

    <!-- size scale -->
    <line x1="22" y1="295" x2="378" y2="295" stroke="#2C3E50" stroke-width="0.8"/>
    <line x1="22" y1="290" x2="22" y2="300" stroke="#2C3E50" stroke-width="0.8"/>
    <line x1="378" y1="290" x2="378" y2="300" stroke="#2C3E50" stroke-width="0.8"/>
    <text x="200" y="312" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50" font-style="italic">overall length ≈ 250 mm for a 76 mm diameter crystal</text>
  </g>

  <!-- Right: S-style SiPM-coupled -->
  <g transform="translate(490, 70)">
    <text x="180" y="0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#003D6B">S-style: SiPM-coupled</text>
    <text x="180" y="18" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-style="italic" fill="#2C3E50">e.g. S-25S-25-12mm-HD-RGB-CsI:Tl/A/D</text>

    <!-- Outer housing -->
    <rect x="20" y="40" width="320" height="180" fill="none" stroke="#2C3E50" stroke-width="2"/>
    <rect x="22" y="42" width="316" height="176" fill="#ECEFF1" opacity="0.5"/>

    <!-- Crystal -->
    <rect x="40" y="80" width="100" height="100" fill="#00ff88" opacity="0.7"/>
    <rect x="36" y="76" width="108" height="108" fill="none" stroke="#7fdbff" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="90" y="125" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#003D6B">CsI(Tl)</text>
    <text x="90" y="138" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#003D6B">crystal</text>

    <!-- entrance window (left) -->
    <rect x="22" y="80" width="14" height="100" fill="#7fdbff" opacity="0.7"/>

    <!-- optical coupling -->
    <rect x="140" y="85" width="6" height="90" fill="#00ff88" opacity="0.5"/>

    <!-- SiPM array -->
    <rect x="146" y="85" width="22" height="90" fill="#003D6B"/>
    <!-- 4 dies -->
    <g fill="#0078B6" stroke="#7fdbff" stroke-width="0.4">
      <rect x="148" y="87" width="9" height="20"/>
      <rect x="158" y="87" width="9" height="20"/>
      <rect x="148" y="109" width="9" height="20"/>
      <rect x="158" y="109" width="9" height="20"/>
      <rect x="148" y="131" width="9" height="20"/>
      <rect x="158" y="131" width="9" height="20"/>
      <rect x="148" y="153" width="9" height="20"/>
      <rect x="158" y="153" width="9" height="20"/>
    </g>

    <!-- ASIC + DPP PCB -->
    <rect x="170" y="60" width="160" height="140" fill="#2C3E50" stroke="#7fdbff" stroke-width="1"/>
    <text x="250" y="80" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#7fdbff">front-end ASIC</text>
    <rect x="178" y="86" width="60" height="20" fill="#003D6B" stroke="#7fdbff" stroke-width="0.5"/>
    <text x="208" y="100" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#ffffff">TIA</text>

    <text x="250" y="125" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#7fdbff">DPP / FPGA</text>
    <rect x="245" y="130" width="80" height="35" fill="#003D6B" stroke="#7fdbff" stroke-width="0.5"/>
    <g fill="#0078B6">
      <rect x="248" y="133" width="8" height="6"/>
      <rect x="258" y="133" width="8" height="6"/>
      <rect x="268" y="133" width="8" height="6"/>
      <rect x="278" y="133" width="8" height="6"/>
      <rect x="288" y="133" width="8" height="6"/>
      <rect x="248" y="145" width="74" height="16"/>
    </g>

    <text x="250" y="180" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#7fdbff">USB / BLE / Ethernet</text>
    <rect x="200" y="186" width="100" height="10" fill="#003D6B" stroke="#7fdbff" stroke-width="0.5"/>

    <!-- Output -->
    <rect x="330" y="120" width="14" height="20" fill="#003D6B"/>

    <!-- Callouts -->
    <g font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#003D6B">
      <line x1="29" y1="130" x2="5" y2="130" stroke="#003D6B" stroke-width="0.8"/>
      <text x="0" y="133" text-anchor="end" font-weight="600">window</text>

      <line x1="157" y1="180" x2="157" y2="245" stroke="#003D6B" stroke-width="0.8"/>
      <text x="157" y="257" text-anchor="middle" font-weight="600">SiPM array</text>

      <line x1="250" y1="200" x2="250" y2="245" stroke="#003D6B" stroke-width="0.8"/>
      <text x="250" y="257" text-anchor="middle" font-weight="600">ASIC + DPP</text>
    </g>

    <line x1="22" y1="295" x2="338" y2="295" stroke="#2C3E50" stroke-width="0.8"/>
    <line x1="22" y1="290" x2="22" y2="300" stroke="#2C3E50" stroke-width="0.8"/>
    <line x1="338" y1="290" x2="338" y2="300" stroke="#2C3E50" stroke-width="0.8"/>
    <text x="180" y="312" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50" font-style="italic">overall length ≈ 80 mm for a 25 mm crystal, full DPP integrated</text>
  </g>

  <!-- Comparison table at bottom -->
  <g transform="translate(60, 370)">
    <rect x="0" y="0" width="780" height="80" fill="#ffffff" stroke="#003D6B" stroke-width="1.4" rx="3"/>
    <text x="80" y="20" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">Trade-off</text>
    <text x="280" y="20" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">B-style (PMT)</text>
    <text x="540" y="20" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">S-style (SiPM)</text>
    <line x1="10" y1="26" x2="770" y2="26" stroke="#003D6B" stroke-width="1"/>

    <text x="80" y="42" font-family="Helvetica, Arial, sans-serif" font-size="9.5" fill="#2C3E50">Bias voltage</text>
    <text x="280" y="42" font-family="Helvetica, Arial, sans-serif" font-size="9.5" fill="#2C3E50">700–1500 V (HV)</text>
    <text x="540" y="42" font-family="Helvetica, Arial, sans-serif" font-size="9.5" fill="#2C3E50">25–50 V (LV)</text>

    <text x="80" y="56" font-family="Helvetica, Arial, sans-serif" font-size="9.5" fill="#2C3E50">Magnetic field tolerance</text>
    <text x="280" y="56" font-family="Helvetica, Arial, sans-serif" font-size="9.5" fill="#2C3E50">poor, needs µ-metal</text>
    <text x="540" y="56" font-family="Helvetica, Arial, sans-serif" font-size="9.5" fill="#2C3E50">excellent</text>

    <text x="80" y="70" font-family="Helvetica, Arial, sans-serif" font-size="9.5" fill="#2C3E50">Best for</text>
    <text x="280" y="70" font-family="Helvetica, Arial, sans-serif" font-size="9.5" fill="#2C3E50">large area, low background</text>
    <text x="540" y="70" font-family="Helvetica, Arial, sans-serif" font-size="9.5" fill="#2C3E50">handheld, compact, networked</text>
  </g>
</svg>
