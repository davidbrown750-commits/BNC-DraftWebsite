<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <rect width="900" height="600" fill="#ECEFF1"/>

  <text x="450" y="32" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Detectors for the Nuclear Renaissance: a configuration map</text>

  <!-- Central node: Scionix detector portfolio -->
  <g>
    <circle cx="450" cy="310" r="80" fill="#003D6B" stroke="#0078B6" stroke-width="3"/>
    <text x="450" y="298" text-anchor="middle" font-family="Helvetica, Arial Black, sans-serif" font-size="14" font-weight="900" fill="#ffffff">Scintillation</text>
    <text x="450" y="316" text-anchor="middle" font-family="Helvetica, Arial Black, sans-serif" font-size="14" font-weight="900" fill="#ffffff">detectors</text>
    <text x="450" y="334" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7fdbff">(Scionix portfolio)</text>
  </g>

  <!-- 8 application nodes around the center -->

  <!-- Top: SMR -->
  <g>
    <line x1="450" y1="230" x2="450" y2="155" stroke="#0078B6" stroke-width="1.6"/>
    <rect x="370" y="80" width="160" height="75" fill="#ffffff" stroke="#003D6B" stroke-width="1.6" rx="6"/>
    <text x="450" y="100" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">SMR &amp; microreactor</text>
    <text x="450" y="116" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">NaI(Tl), CsI(Tl), CLLBC</text>
    <text x="450" y="130" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">PMT or SiPM, network-attached</text>
    <text x="450" y="145" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#0078B6" font-style="italic">§ 14.2, 14.3</text>
  </g>

  <!-- Top-right: AI datacenter SMR -->
  <g>
    <line x1="510" y1="260" x2="610" y2="200" stroke="#0078B6" stroke-width="1.6"/>
    <rect x="610" y="155" width="180" height="75" fill="#ffffff" stroke="#003D6B" stroke-width="1.6" rx="6"/>
    <text x="700" y="175" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">AI datacenter co-located</text>
    <text x="700" y="191" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">portal monitors, NaI(Tl) +</text>
    <text x="700" y="205" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">plastic; lifecycle support</text>
    <text x="700" y="220" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#0078B6" font-style="italic">§ 14.7</text>
  </g>

  <!-- Right: Advanced reactors -->
  <g>
    <line x1="530" y1="310" x2="630" y2="310" stroke="#0078B6" stroke-width="1.6"/>
    <rect x="630" y="270" width="180" height="80" fill="#ffffff" stroke="#003D6B" stroke-width="1.6" rx="6"/>
    <text x="720" y="290" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">HTGR / MSR / SFR / LFR</text>
    <text x="720" y="306" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">CLLBC, CLYC for off-gas</text>
    <text x="720" y="320" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">ZnS:Ag for Po-210 alpha</text>
    <text x="720" y="334" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">high-temp Ce-doped</text>
    <text x="720" y="346" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#0078B6" font-style="italic">§ 14.4</text>
  </g>

  <!-- Bottom-right: Fusion -->
  <g>
    <line x1="510" y1="360" x2="610" y2="420" stroke="#0078B6" stroke-width="1.6"/>
    <rect x="610" y="395" width="180" height="80" fill="#ffffff" stroke="#003D6B" stroke-width="1.6" rx="6"/>
    <text x="700" y="415" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">Fusion diagnostics</text>
    <text x="700" y="431" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">stilbene, BC-501A for D-T</text>
    <text x="700" y="445" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">LaBr₃:Ce, CeBr₃ collimated</text>
    <text x="700" y="459" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">tritium accountancy</text>
    <text x="700" y="471" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#0078B6" font-style="italic">§ 14.5</text>
  </g>

  <!-- Bottom: Decommissioning -->
  <g>
    <line x1="450" y1="390" x2="450" y2="465" stroke="#0078B6" stroke-width="1.6"/>
    <rect x="370" y="465" width="160" height="80" fill="#ffffff" stroke="#003D6B" stroke-width="1.6" rx="6"/>
    <text x="450" y="485" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">Decommissioning</text>
    <text x="450" y="501" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">large-area plastic floor</text>
    <text x="450" y="515" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">NaI/CsI drum scan, HPGe</text>
    <text x="450" y="529" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">free-release survey</text>
    <text x="450" y="541" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#0078B6" font-style="italic">§ 14.8</text>
  </g>

  <!-- Bottom-left: Space nuclear -->
  <g>
    <line x1="390" y1="360" x2="290" y2="420" stroke="#0078B6" stroke-width="1.6"/>
    <rect x="110" y="395" width="180" height="80" fill="#ffffff" stroke="#003D6B" stroke-width="1.6" rx="6"/>
    <text x="200" y="415" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">Space nuclear power</text>
    <text x="200" y="431" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">CsI(Tl) + SiPM compact</text>
    <text x="200" y="445" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">vacuum-rated, low power</text>
    <text x="200" y="459" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">RTG monitoring, KRUSTY</text>
    <text x="200" y="471" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#0078B6" font-style="italic">§ 14.6</text>
  </g>

  <!-- Left: Defense / military -->
  <g>
    <line x1="370" y1="310" x2="270" y2="310" stroke="#0078B6" stroke-width="1.6"/>
    <rect x="90" y="270" width="180" height="80" fill="#ffffff" stroke="#003D6B" stroke-width="1.6" rx="6"/>
    <text x="180" y="290" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">Defense / military</text>
    <text x="180" y="306" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">CLLBC handheld, PSD</text>
    <text x="180" y="320" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">backpack search, MIL-STD</text>
    <text x="180" y="334" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">microreactor monitoring</text>
    <text x="180" y="346" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#0078B6" font-style="italic">§ 14.3, B.6</text>
  </g>

  <!-- Top-left: HALEU verification -->
  <g>
    <line x1="390" y1="260" x2="290" y2="200" stroke="#0078B6" stroke-width="1.6"/>
    <rect x="110" y="155" width="180" height="75" fill="#ffffff" stroke="#003D6B" stroke-width="1.6" rx="6"/>
    <text x="200" y="175" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">HALEU verification</text>
    <text x="200" y="191" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">LaBr₃:Ce, CeBr₃, SrI₂(Eu)</text>
    <text x="200" y="205" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">U-235 line at 185.7 keV</text>
    <text x="200" y="220" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#0078B6" font-style="italic">§ 14.3</text>
  </g>

  <!-- Footer band: drivers -->
  <g transform="translate(60, 565)">
    <rect x="0" y="0" width="780" height="25" fill="#003D6B" rx="3"/>
    <text x="20" y="17" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#7fdbff">Drivers:</text>
    <text x="80" y="17" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#ffffff">decarbonization · AI energy demand · SMR regulatory milestones · fusion ignition · space nuclear flight hardware · Generation II decommissioning</text>
  </g>
</svg>
