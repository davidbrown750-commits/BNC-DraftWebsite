<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <defs>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="460" fill="#ECEFF1"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Cs-137 pulse height spectrum, 76x76 mm NaI(Tl)</text>

  <!-- Plot area -->
  <rect x="80" y="60" width="660" height="320" fill="#ffffff" stroke="#2C3E50" stroke-width="1.4"/>

  <!-- Y axis label -->
  <text x="30" y="220" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#003D6B" font-weight="600" transform="rotate(-90, 30, 220)">Counts (log scale)</text>
  <!-- X axis label -->
  <text x="410" y="408" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#003D6B" font-weight="600">Energy (keV)</text>

  <!-- X axis ticks and labels: 0, 100, 200, ... 800 keV -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">
    <line x1="80" y1="380" x2="80" y2="385" stroke="#2C3E50"/>
    <text x="80" y="397" text-anchor="middle">0</text>
    <line x1="160" y1="380" x2="160" y2="385" stroke="#2C3E50"/>
    <text x="160" y="397" text-anchor="middle">100</text>
    <line x1="240" y1="380" x2="240" y2="385" stroke="#2C3E50"/>
    <text x="240" y="397" text-anchor="middle">200</text>
    <line x1="320" y1="380" x2="320" y2="385" stroke="#2C3E50"/>
    <text x="320" y="397" text-anchor="middle">300</text>
    <line x1="400" y1="380" x2="400" y2="385" stroke="#2C3E50"/>
    <text x="400" y="397" text-anchor="middle">400</text>
    <line x1="480" y1="380" x2="480" y2="385" stroke="#2C3E50"/>
    <text x="480" y="397" text-anchor="middle">500</text>
    <line x1="560" y1="380" x2="560" y2="385" stroke="#2C3E50"/>
    <text x="560" y="397" text-anchor="middle">600</text>
    <line x1="640" y1="380" x2="640" y2="385" stroke="#2C3E50"/>
    <text x="640" y="397" text-anchor="middle">700</text>
    <line x1="720" y1="380" x2="720" y2="385" stroke="#2C3E50"/>
    <text x="720" y="397" text-anchor="middle">800</text>
  </g>

  <!-- Y axis ticks (log scale) -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">
    <line x1="75" y1="370" x2="80" y2="370" stroke="#2C3E50"/>
    <text x="70" y="373" text-anchor="end">10</text>
    <line x1="75" y1="296" x2="80" y2="296" stroke="#2C3E50"/>
    <text x="70" y="299" text-anchor="end">10²</text>
    <line x1="75" y1="222" x2="80" y2="222" stroke="#2C3E50"/>
    <text x="70" y="225" text-anchor="end">10³</text>
    <line x1="75" y1="148" x2="80" y2="148" stroke="#2C3E50"/>
    <text x="70" y="151" text-anchor="end">10⁴</text>
    <line x1="75" y1="74" x2="80" y2="74" stroke="#2C3E50"/>
    <text x="70" y="77" text-anchor="end">10⁵</text>
  </g>

  <!-- Spectrum (synthetic but realistic Cs-137 + Ba X-rays) -->
  <!-- Region 0-30: low background rising -->
  <!-- 32 keV Ba X-ray peak (sharp narrow peak) -->
  <!-- Continuum from Compton edge down -->
  <!-- 184 keV backscatter peak (broad small) -->
  <!-- 478 keV Compton edge (sharp drop) -->
  <!-- 662 keV photopeak (large gaussian) -->

  <g filter="url(#glow2)">
    <path d="M 80,355 L 100,330 L 110,300 L 115,260 L 118,220 L 120,180 L 122,160 L 124,200 L 128,260 L 132,300 L 138,310
             L 150,300 L 160,290 L 170,280 L 180,270 L 200,260 L 220,255 L 240,250 L 260,245 L 280,240
             L 300,235 L 320,232 L 340,230 L 360,228 L 380,228 L 400,230 L 420,232 L 440,233
             L 450,235 L 458,240 L 462,250 L 466,265 L 468,290 L 470,320 L 472,355 L 478,365
             L 490,360 L 500,355 L 510,350 L 520,345 L 530,340 L 540,335 L 545,328 L 548,310
             L 552,260 L 555,200 L 558,140 L 560,90 L 562,75 L 565,65 L 568,80 L 572,140
             L 576,200 L 580,260 L 584,310 L 590,340 L 600,355 L 610,360 L 620,362 L 640,365 L 700,368 L 740,370"
          fill="none" stroke="#00b4ff" stroke-width="2.4"/>
  </g>

  <!-- Photopeak label -->
  <g>
    <line x1="565" y1="65" x2="610" y2="100" stroke="#003D6B" stroke-width="1"/>
    <rect x="610" y="83" width="120" height="34" fill="#003D6B" rx="3"/>
    <text x="670" y="100" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Photopeak</text>
    <text x="670" y="112" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#7fdbff">662 keV</text>
    <circle cx="565" cy="65" r="3" fill="#00ff88"/>
  </g>

  <!-- Compton edge label -->
  <g>
    <line x1="478" y1="365" x2="380" y2="320" stroke="#003D6B" stroke-width="1"/>
    <rect x="270" y="305" width="115" height="32" fill="#0078B6" rx="3"/>
    <text x="328" y="320" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Compton edge</text>
    <text x="328" y="332" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#7fdbff">478 keV</text>
    <circle cx="478" cy="365" r="3" fill="#00ff88"/>
  </g>

  <!-- Backscatter peak label -->
  <g>
    <line x1="240" y1="250" x2="240" y2="180" stroke="#003D6B" stroke-width="1"/>
    <rect x="180" y="155" width="125" height="32" fill="#2C3E50" rx="3"/>
    <text x="242" y="170" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Backscatter peak</text>
    <text x="242" y="182" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#7fdbff">~184 keV</text>
    <circle cx="240" cy="250" r="2.5" fill="#00ff88"/>
  </g>

  <!-- Ba X-ray peak label -->
  <g>
    <line x1="120" y1="180" x2="170" y2="120" stroke="#003D6B" stroke-width="1"/>
    <rect x="155" y="100" width="120" height="32" fill="#003D6B" rx="3"/>
    <text x="215" y="115" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Ba K X-rays</text>
    <text x="215" y="127" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#7fdbff">~32 keV</text>
    <circle cx="120" cy="180" r="2.5" fill="#00ff88"/>
  </g>

  <!-- Caption -->
  <text x="400" y="430" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2C3E50" font-style="italic">Figure 2.1 - Pulse height spectrum of Cs-137 in a 76 mm by 76 mm NaI(Tl) detector. The four labeled features appear in every gamma spectrum and are the working vocabulary of pulse height spectroscopy.</text>
</svg>
