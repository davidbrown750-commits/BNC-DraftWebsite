<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <marker id="arrow" viewBox="0 0 12 10" refX="11" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 12 5 L 0 10 Z" fill="#003D6B"/>
    </marker>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="320" fill="#ECEFF1"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">The scintillation detector chain, end to end</text>

  <!-- Source -->
  <g transform="translate(40, 90)">
    <circle cx="40" cy="50" r="16" fill="#00ff88" filter="url(#g)"/>
    <circle cx="40" cy="50" r="9" fill="#003D6B"/>
    <text x="40" y="120" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#003D6B">Source</text>
    <text x="40" y="138" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">gamma, alpha, beta, neutron</text>
    <!-- emission rays -->
    <g stroke="#00b4ff" stroke-width="1.6" fill="none" opacity="0.9">
      <line x1="56" y1="50" x2="105" y2="35"/>
      <line x1="56" y1="50" x2="105" y2="50"/>
      <line x1="56" y1="50" x2="105" y2="65"/>
    </g>
  </g>

  <!-- Scintillator -->
  <g transform="translate(160, 70)">
    <rect x="0" y="20" width="100" height="80" fill="#0078B6" stroke="#003D6B" stroke-width="2" opacity="0.85"/>
    <!-- crystal facet hint -->
    <line x1="0" y1="20" x2="20" y2="5" stroke="#003D6B" stroke-width="1.4"/>
    <line x1="100" y1="20" x2="120" y2="5" stroke="#003D6B" stroke-width="1.4"/>
    <line x1="20" y1="5" x2="120" y2="5" stroke="#003D6B" stroke-width="1.4"/>
    <line x1="120" y1="5" x2="120" y2="85" stroke="#003D6B" stroke-width="1.4"/>
    <line x1="120" y1="85" x2="100" y2="100" stroke="#003D6B" stroke-width="1.4"/>
    <!-- scintillation flash -->
    <g stroke="#7fdbff" stroke-width="1.4" fill="none" opacity="0.95">
      <line x1="50" y1="60" x2="70" y2="55"/>
      <line x1="50" y1="60" x2="68" y2="65"/>
      <line x1="50" y1="60" x2="62" y2="48"/>
      <line x1="50" y1="60" x2="62" y2="72"/>
    </g>
    <text x="60" y="135" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#003D6B">Scintillator</text>
    <text x="60" y="153" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">photons / MeV</text>
  </g>

  <!-- Coupling -->
  <g transform="translate(310, 90)">
    <rect x="0" y="20" width="40" height="60" fill="#7fdbff" stroke="#0078B6" stroke-width="1.6" opacity="0.7"/>
    <text x="20" y="120" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#003D6B">Coupling</text>
    <text x="20" y="138" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">grease / cement</text>
  </g>

  <!-- Photodetector -->
  <g transform="translate(390, 80)">
    <!-- PMT-like silhouette -->
    <rect x="0" y="20" width="20" height="80" fill="#003D6B"/>
    <polygon points="20,20 80,30 80,90 20,100" fill="#0078B6" stroke="#003D6B" stroke-width="1.6"/>
    <rect x="80" y="30" width="50" height="60" fill="#ECEFF1" stroke="#003D6B" stroke-width="1.6"/>
    <!-- dynodes -->
    <g stroke="#003D6B" stroke-width="0.8" fill="none">
      <line x1="92" y1="40" x2="100" y2="48"/>
      <line x1="100" y1="48" x2="108" y2="40"/>
      <line x1="108" y1="40" x2="116" y2="48"/>
      <line x1="92" y1="80" x2="100" y2="72"/>
      <line x1="100" y1="72" x2="108" y2="80"/>
      <line x1="108" y1="80" x2="116" y2="72"/>
    </g>
    <text x="65" y="135" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#003D6B">Photodetector</text>
    <text x="65" y="153" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">PMT or SiPM</text>
  </g>

  <!-- Electronics -->
  <g transform="translate(560, 90)">
    <rect x="0" y="20" width="100" height="60" fill="#ECEFF1" stroke="#2C3E50" stroke-width="1.6"/>
    <text x="50" y="45" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#2C3E50">preamp</text>
    <line x1="0" y1="50" x2="100" y2="50" stroke="#2C3E50" stroke-width="0.8" stroke-dasharray="2,2"/>
    <text x="50" y="68" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#2C3E50">DPP / MCA</text>
    <text x="50" y="120" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#003D6B">Electronics</text>
    <text x="50" y="138" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">analog or digital</text>
  </g>

  <!-- Readout -->
  <g transform="translate(720, 90)">
    <rect x="0" y="20" width="120" height="60" fill="#003D6B" stroke="#0078B6" stroke-width="1.6"/>
    <!-- spectrum on screen -->
    <polyline points="10,68 25,65 35,55 38,30 42,55 50,62 70,60 85,58 95,52 105,58 115,68"
              fill="none" stroke="#00b4ff" stroke-width="1.6" filter="url(#g)"/>
    <!-- peak marker -->
    <circle cx="38" cy="30" r="2.5" fill="#00ff88"/>
    <text x="60" y="120" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#003D6B">Readout</text>
    <text x="60" y="138" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">spectrum, alarm, network</text>
  </g>

  <!-- Connecting arrows between stages -->
  <g stroke="#003D6B" stroke-width="2.0" fill="none" marker-end="url(#arrow)">
    <line x1="115" y1="140" x2="155" y2="140"/>
    <line x1="285" y1="140" x2="305" y2="140"/>
    <line x1="355" y1="140" x2="385" y2="140"/>
    <line x1="525" y1="140" x2="555" y2="140"/>
    <line x1="665" y1="140" x2="715" y2="140"/>
  </g>

  <!-- Stage labels under arrows -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#2C3E50" text-anchor="middle" font-style="italic">
    <text x="135" y="170">radiation</text>
    <text x="295" y="170">light</text>
    <text x="370" y="170">light</text>
    <text x="540" y="170">charge pulse</text>
    <text x="690" y="170">data</text>
  </g>

  <!-- Stage numbers -->
  <g font-family="Helvetica, Arial Black, sans-serif" font-size="11" font-weight="900" fill="#0078B6" text-anchor="middle">
    <text x="80" y="80">1</text>
    <text x="220" y="60">2</text>
    <text x="330" y="80">3</text>
    <text x="455" y="70">4</text>
    <text x="610" y="80">5</text>
    <text x="780" y="80">6</text>
  </g>

  <!-- Caption -->
  <text x="450" y="285" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2C3E50" font-style="italic">Figure 1.1 - The six stages of a scintillation detector chain. Each stage is the subject of one or more chapters in this book.</text>
</svg>
