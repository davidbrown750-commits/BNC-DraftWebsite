<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
  <defs>
    <filter id="g3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="580" fill="#ECEFF1"/>

  <text x="400" y="32" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Scintillator landscape: light yield versus energy resolution at 662 keV</text>

  <!-- Plot area -->
  <rect x="80" y="60" width="660" height="380" fill="#ffffff" stroke="#2C3E50" stroke-width="1.4"/>

  <!-- Y axis: light yield 0 to 200 (% of NaI), 380 px -->
  <!-- y = 440 - val * 1.9 -->
  <text x="30" y="250" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#003D6B" font-weight="600" transform="rotate(-90, 30, 250)">Relative light yield (% of NaI(Tl))</text>

  <text x="410" y="468" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#003D6B" font-weight="600">Energy resolution at 662 keV (% FWHM, lower is better)</text>

  <!-- X axis: 0 to 12% FWHM, 660 px -->
  <!-- x = 80 + val * 55 -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">
    <line x1="80" y1="440" x2="80" y2="445" stroke="#2C3E50"/><text x="80" y="457" text-anchor="middle">0</text>
    <line x1="135" y1="440" x2="135" y2="445" stroke="#2C3E50"/><text x="135" y="457" text-anchor="middle">1</text>
    <line x1="190" y1="440" x2="190" y2="445" stroke="#2C3E50"/><text x="190" y="457" text-anchor="middle">2</text>
    <line x1="245" y1="440" x2="245" y2="445" stroke="#2C3E50"/><text x="245" y="457" text-anchor="middle">3</text>
    <line x1="300" y1="440" x2="300" y2="445" stroke="#2C3E50"/><text x="300" y="457" text-anchor="middle">4</text>
    <line x1="355" y1="440" x2="355" y2="445" stroke="#2C3E50"/><text x="355" y="457" text-anchor="middle">5</text>
    <line x1="410" y1="440" x2="410" y2="445" stroke="#2C3E50"/><text x="410" y="457" text-anchor="middle">6</text>
    <line x1="465" y1="440" x2="465" y2="445" stroke="#2C3E50"/><text x="465" y="457" text-anchor="middle">7</text>
    <line x1="520" y1="440" x2="520" y2="445" stroke="#2C3E50"/><text x="520" y="457" text-anchor="middle">8</text>
    <line x1="575" y1="440" x2="575" y2="445" stroke="#2C3E50"/><text x="575" y="457" text-anchor="middle">9</text>
    <line x1="630" y1="440" x2="630" y2="445" stroke="#2C3E50"/><text x="630" y="457" text-anchor="middle">10</text>
    <line x1="685" y1="440" x2="685" y2="445" stroke="#2C3E50"/><text x="685" y="457" text-anchor="middle">11</text>
    <line x1="740" y1="440" x2="740" y2="445" stroke="#2C3E50"/><text x="740" y="457" text-anchor="middle">12</text>
  </g>

  <!-- Y ticks -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">
    <line x1="75" y1="440" x2="80" y2="440" stroke="#2C3E50"/><text x="70" y="443" text-anchor="end">0</text>
    <line x1="75" y1="345" x2="80" y2="345" stroke="#2C3E50"/><text x="70" y="348" text-anchor="end">50</text>
    <line x1="75" y1="250" x2="80" y2="250" stroke="#2C3E50"/><text x="70" y="253" text-anchor="end">100</text>
    <line x1="75" y1="155" x2="80" y2="155" stroke="#2C3E50"/><text x="70" y="158" text-anchor="end">150</text>
    <line x1="75" y1="60" x2="80" y2="60" stroke="#2C3E50"/><text x="70" y="63" text-anchor="end">200</text>
  </g>

  <!-- Gridlines -->
  <g stroke="#d4d8db" stroke-width="0.6" stroke-dasharray="2,3">
    <line x1="80" y1="155" x2="740" y2="155"/>
    <line x1="80" y1="250" x2="740" y2="250"/>
    <line x1="80" y1="345" x2="740" y2="345"/>
    <line x1="190" y1="60" x2="190" y2="440"/>
    <line x1="300" y1="60" x2="300" y2="440"/>
    <line x1="410" y1="60" x2="410" y2="440"/>
    <line x1="520" y1="60" x2="520" y2="440"/>
    <line x1="630" y1="60" x2="630" y2="440"/>
  </g>

  <!-- Quadrant labels -->
  <text x="180" y="105" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-style="italic" fill="#0078B6" opacity="0.6">high yield + high resolution</text>
  <text x="180" y="120" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" font-style="italic" fill="#0078B6" opacity="0.6">(the goal)</text>

  <text x="630" y="400" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-style="italic" fill="#2C3E50" opacity="0.5">low yield + low resolution</text>
  <text x="630" y="415" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" font-style="italic" fill="#2C3E50" opacity="0.5">(specialty / low cost)</text>

  <!-- Material data points -->
  <!-- (energy_resolution_FWHM%, light_yield % of NaI) -->
  <!-- NaI(Tl): 7%, 100 -->
  <!-- LaBr3:Ce: 2.7%, 170 -->
  <!-- CeBr3: 3.5%, 130 -->
  <!-- LBC: 3.0%, 140 -->
  <!-- SrI2(Eu): 2.6%, 130 -->
  <!-- Cs2HfCl6: 2.0%, 150 -->
  <!-- CsI(Tl) PMT: 7%, 45 -->
  <!-- CsI(Tl) SiPM: 6.5%, 165 -->
  <!-- CsI(Na): 7%, 85 -->
  <!-- LYSO:Ce: 9%, 75 -->
  <!-- BGO: 11%, 17 -->
  <!-- GAGG:Ce: 5.5%, 145 -->
  <!-- GAGG:Ce,Mg: 6%, 125 -->
  <!-- CLLBC: 4.5%, 65 -->
  <!-- BaF2: 11%, 16 -->

  <!-- Data points -->
  <g>
    <!-- NaI(Tl) -->
    <circle cx="465" cy="250" r="9" fill="#003D6B" filter="url(#g3)"/>
    <text x="465" y="237" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#003D6B">NaI(Tl)</text>

    <!-- LaBr3:Ce -->
    <circle cx="229" cy="117" r="9" fill="#0078B6" filter="url(#g3)"/>
    <text x="229" y="104" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#0078B6">LaBr₃:Ce</text>

    <!-- CeBr3 -->
    <circle cx="273" cy="203" r="8" fill="#00ff88" filter="url(#g3)"/>
    <text x="290" y="207" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#00b4ff">CeBr₃</text>

    <!-- LBC -->
    <circle cx="245" cy="184" r="7" fill="#00d4ff"/>
    <text x="232" y="180" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#00d4ff">LBC</text>

    <!-- SrI2:Eu -->
    <circle cx="223" cy="203" r="8" fill="#0078B6" stroke="#003D6B" stroke-width="1"/>
    <text x="200" y="199" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#0078B6">SrI₂(Eu)</text>

    <!-- Cs2HfCl6 (the headline new material) -->
    <circle cx="190" cy="155" r="11" fill="#00ff88" stroke="#003D6B" stroke-width="2" filter="url(#g3)"/>
    <text x="190" y="138" text-anchor="middle" font-family="Helvetica, Arial Black, sans-serif" font-size="11" font-weight="900" fill="#003D6B">Cs₂HfCl₆</text>
    <text x="190" y="180" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" font-style="italic" fill="#003D6B">(SCINT 2024)</text>

    <!-- CsI(Tl) PMT -->
    <circle cx="465" cy="354" r="8" fill="#7fdbff" stroke="#0078B6" stroke-width="1"/>
    <text x="480" y="358" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#0078B6">CsI(Tl) on PMT</text>

    <!-- CsI(Tl) SiPM -->
    <circle cx="438" cy="127" r="9" fill="#00ff88" filter="url(#g3)"/>
    <text x="395" y="105" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#00b4ff">CsI(Tl) on SiPM</text>
    <line x1="438" y1="127" x2="395" y2="110" stroke="#00b4ff" stroke-width="0.8"/>

    <!-- CsI(Na) -->
    <circle cx="465" cy="278" r="8" fill="#003D6B"/>
    <text x="465" y="295" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#003D6B">CsI(Na)</text>

    <!-- LYSO:Ce -->
    <circle cx="575" cy="298" r="8" fill="#2C3E50"/>
    <text x="595" y="302" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#2C3E50">LYSO:Ce</text>

    <!-- BGO -->
    <circle cx="685" cy="408" r="8" fill="#2C3E50"/>
    <text x="685" y="425" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#2C3E50">BGO</text>

    <!-- GAGG:Ce -->
    <circle cx="383" cy="165" r="9" fill="#0078B6"/>
    <text x="383" y="152" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#0078B6">GAGG:Ce</text>

    <!-- GAGG:Ce,Mg -->
    <circle cx="410" cy="203" r="7" fill="#0078B6" opacity="0.7"/>
    <text x="425" y="195" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#0078B6">GAGG:Ce,Mg</text>

    <!-- CLLBC -->
    <circle cx="328" cy="316" r="9" fill="#00d4ff" stroke="#003D6B" stroke-width="1"/>
    <text x="328" y="305" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#003D6B">CLLBC</text>
    <text x="328" y="333" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" font-style="italic" fill="#003D6B">(γ + n)</text>

    <!-- BaF2 -->
    <circle cx="685" cy="410" r="0" fill="none"/>
    <circle cx="685" cy="412" r="6" fill="#7fdbff" stroke="#2C3E50" stroke-width="0.8"/>
    <text x="700" y="416" font-family="Helvetica, Arial, sans-serif" font-size="8" font-weight="700" fill="#2C3E50">BaF₂</text>
  </g>

  <!-- Legend at bottom -->
  <g transform="translate(80, 480)">
    <rect x="0" y="0" width="660" height="80" fill="#ffffff" stroke="#003D6B" stroke-width="1.4" rx="3"/>
    <text x="20" y="20" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">Reading the chart</text>

    <text x="20" y="40" font-family="Helvetica, Arial, sans-serif" font-size="9.5" fill="#2C3E50">Top-left = better. High light yield improves photon statistics. Low FWHM means better separation of nearby gamma lines.</text>
    <text x="20" y="55" font-family="Helvetica, Arial, sans-serif" font-size="9.5" fill="#2C3E50">CsI(Tl) on PMT vs SiPM: same crystal, two photodetectors, dramatically different measured pulse height. The matching matters.</text>
    <text x="20" y="70" font-family="Helvetica, Arial, sans-serif" font-size="9.5" fill="#2C3E50">Cs₂HfCl₆ (highlighted): newest catalog entry, sub-1% FWHM in best research samples reported at SCINT 2024.</text>
  </g>

  <!-- Caption -->
  <text x="400" y="568" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2C3E50" font-style="italic">Figure 3.1 - The scintillator landscape. Each point represents a major catalog material at standard size and standard photodetector pairing.</text>
</svg>
