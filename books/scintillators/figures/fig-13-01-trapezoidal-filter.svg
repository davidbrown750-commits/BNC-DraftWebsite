<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <rect width="800" height="540" fill="#ECEFF1"/>

  <text x="400" y="32" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Trapezoidal filter for digital pulse-height estimation</text>

  <!-- Three stacked plots -->

  <!-- Plot 1: preamplifier output -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="680" height="120" fill="#ffffff" stroke="#2C3E50" stroke-width="1.2"/>
    <text x="-10" y="65" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">preamp out</text>
    <text x="-10" y="78" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">(V)</text>

    <!-- Baseline -->
    <line x1="0" y1="100" x2="680" y2="100" stroke="#2C3E50" stroke-width="0.6" stroke-dasharray="2,3"/>

    <!-- Pulse: fast rise, exponential decay -->
    <path d="M 0,100 L 100,100 L 105,98 L 110,80 L 115,55 L 120,30 L 125,28 L 130,30 L 140,38 L 155,50 L 175,62 L 200,72 L 230,80 L 270,86 L 320,91 L 380,95 L 450,98 L 520,99 L 600,100 L 680,100"
          fill="none" stroke="#00b4ff" stroke-width="2.4"/>

    <!-- Annotation: pulse height -->
    <line x1="125" y1="28" x2="125" y2="100" stroke="#00ff88" stroke-width="0.8" stroke-dasharray="2,2"/>
    <text x="135" y="55" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#00ff88" font-weight="700">pulse charge ∝ energy</text>

    <text x="660" y="115" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50" font-style="italic">slow exponential decay (τ ≈ µs–ms)</text>
  </g>

  <!-- Plot 2: trapezoidal filter output -->
  <g transform="translate(60, 220)">
    <rect x="0" y="0" width="680" height="120" fill="#ffffff" stroke="#2C3E50" stroke-width="1.2"/>
    <text x="-10" y="65" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">filter out</text>
    <text x="-10" y="78" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">(arb)</text>

    <!-- Baseline -->
    <line x1="0" y1="100" x2="680" y2="100" stroke="#2C3E50" stroke-width="0.6" stroke-dasharray="2,3"/>

    <!-- Trapezoid: rises from t1 to t2, flat from t2 to t3, falls from t3 to t4 -->
    <!-- t1=130, t2=210, t3=270, t4=350 -->
    <path d="M 0,100 L 130,100 L 210,30 L 270,30 L 350,100 L 680,100"
          fill="none" stroke="#003D6B" stroke-width="2.4"/>
    <!-- shading under trapezoid -->
    <path d="M 130,100 L 210,30 L 270,30 L 350,100 Z" fill="#0078B6" opacity="0.18"/>

    <!-- flat-top height label -->
    <line x1="240" y1="30" x2="240" y2="100" stroke="#00ff88" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="245" y="55" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#00ff88">flat-top height = pulse height</text>

    <!-- Time interval annotations -->
    <g stroke="#2C3E50" stroke-width="0.7">
      <line x1="130" y1="108" x2="130" y2="115"/>
      <line x1="210" y1="108" x2="210" y2="115"/>
      <line x1="270" y1="108" x2="270" y2="115"/>
      <line x1="350" y1="108" x2="350" y2="115"/>
      <line x1="130" y1="115" x2="210" y2="115"/>
      <line x1="210" y1="115" x2="270" y2="115"/>
      <line x1="270" y1="115" x2="350" y2="115"/>
    </g>
    <text x="170" y="125" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50" font-style="italic">t_int</text>
    <text x="240" y="125" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50" font-style="italic">t_gap</text>
    <text x="310" y="125" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50" font-style="italic">t_int</text>
  </g>

  <!-- Plot 3: pulse height histogram (the output of the chain) -->
  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="680" height="120" fill="#ffffff" stroke="#2C3E50" stroke-width="1.2"/>
    <text x="-10" y="65" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">spectrum</text>
    <text x="-10" y="78" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50">(counts)</text>

    <!-- Histogram bars -->
    <g fill="#0078B6">
      <rect x="20" y="98" width="6" height="2"/>
      <rect x="30" y="95" width="6" height="5"/>
      <rect x="40" y="90" width="6" height="10"/>
      <rect x="50" y="85" width="6" height="15"/>
      <rect x="60" y="80" width="6" height="20"/>
      <rect x="70" y="78" width="6" height="22"/>
      <rect x="80" y="76" width="6" height="24"/>
      <rect x="90" y="75" width="6" height="25"/>
      <rect x="100" y="74" width="6" height="26"/>
      <rect x="110" y="76" width="6" height="24"/>
      <rect x="120" y="78" width="6" height="22"/>
      <rect x="130" y="80" width="6" height="20"/>
      <rect x="140" y="82" width="6" height="18"/>
      <rect x="150" y="84" width="6" height="16"/>
      <rect x="160" y="85" width="6" height="15"/>
      <rect x="180" y="80" width="6" height="20"/>
      <rect x="200" y="60" width="6" height="40"/>
      <rect x="220" y="38" width="6" height="62"/>
      <rect x="225" y="20" width="6" height="80"/>
      <rect x="230" y="22" width="6" height="78"/>
      <rect x="235" y="40" width="6" height="60"/>
      <rect x="245" y="65" width="6" height="35"/>
      <rect x="260" y="90" width="6" height="10"/>
      <rect x="280" y="95" width="6" height="5"/>
      <rect x="320" y="93" width="6" height="7"/>
      <rect x="360" y="92" width="6" height="8"/>
      <rect x="400" y="92" width="6" height="8"/>
      <rect x="450" y="93" width="6" height="7"/>
      <rect x="500" y="94" width="6" height="6"/>
      <rect x="550" y="96" width="6" height="4"/>
    </g>

    <!-- Photopeak label -->
    <line x1="227" y1="20" x2="270" y2="50" stroke="#003D6B" stroke-width="0.8"/>
    <rect x="270" y="35" width="100" height="28" fill="#003D6B" rx="3"/>
    <text x="320" y="51" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff">photopeak</text>
    <circle cx="227" cy="20" r="3" fill="#00ff88"/>

    <line x1="0" y1="100" x2="680" y2="100" stroke="#2C3E50" stroke-width="1"/>
    <text x="660" y="115" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50" font-style="italic">pulse height (channel) →</text>
  </g>

  <!-- Caption -->
  <text x="400" y="525" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2C3E50" font-style="italic">Figure 13.1 - Top: preamplifier output for a single scintillation event. Middle: trapezoidal filter response with flat-top height proportional to pulse charge. Bottom: histogrammed pulse heights form the gamma spectrum.</text>
</svg>
