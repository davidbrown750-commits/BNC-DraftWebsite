<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" height="460">
  <rect width="900" height="460" fill="#ECEFF1"/>

  <text x="450" y="32" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Silicon photomultiplier architecture: array, die, and microcell</text>

  <!-- Left: Array of dies (4 x 4) -->
  <g transform="translate(60, 70)">
    <text x="100" y="-8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">SiPM array (4×4 dies)</text>
    <rect x="0" y="0" width="200" height="200" fill="#2C3E50" stroke="#003D6B" stroke-width="1.6"/>
    <!-- 16 dies with small gaps -->
    <g fill="#003D6B" stroke="#7fdbff" stroke-width="0.5">
      <rect x="6" y="6" width="44" height="44"/>
      <rect x="55" y="6" width="44" height="44"/>
      <rect x="104" y="6" width="44" height="44"/>
      <rect x="153" y="6" width="44" height="44"/>
      <rect x="6" y="55" width="44" height="44"/>
      <rect x="55" y="55" width="44" height="44"/>
      <rect x="104" y="55" width="44" height="44"/>
      <rect x="153" y="55" width="44" height="44"/>
      <rect x="6" y="104" width="44" height="44"/>
      <rect x="55" y="104" width="44" height="44"/>
      <rect x="104" y="104" width="44" height="44"/>
      <rect x="153" y="104" width="44" height="44"/>
      <rect x="6" y="153" width="44" height="44"/>
      <rect x="55" y="153" width="44" height="44"/>
      <rect x="104" y="153" width="44" height="44"/>
      <rect x="153" y="153" width="44" height="44"/>
    </g>
    <!-- highlight one die -->
    <rect x="55" y="55" width="44" height="44" fill="none" stroke="#00ff88" stroke-width="2"/>
    <text x="100" y="222" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50" font-style="italic">~1" × 1" total area</text>
  </g>

  <!-- Middle: Single die zoom showing microcells -->
  <g transform="translate(330, 70)">
    <text x="100" y="-8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">Single die (~6 mm × 6 mm)</text>
    <rect x="0" y="0" width="200" height="200" fill="#003D6B" stroke="#0078B6" stroke-width="1.6"/>
    <!-- microcell grid (10 x 10 visible) -->
    <g fill="#0078B6" stroke="#7fdbff" stroke-width="0.4">
      <!-- generate 10x10 grid programmatically via repetition -->
      <rect x="6" y="6" width="17" height="17"/><rect x="25" y="6" width="17" height="17"/><rect x="44" y="6" width="17" height="17"/>
      <rect x="63" y="6" width="17" height="17"/><rect x="82" y="6" width="17" height="17"/><rect x="101" y="6" width="17" height="17"/>
      <rect x="120" y="6" width="17" height="17"/><rect x="139" y="6" width="17" height="17"/><rect x="158" y="6" width="17" height="17"/><rect x="177" y="6" width="17" height="17"/>
      <rect x="6" y="25" width="17" height="17"/><rect x="25" y="25" width="17" height="17"/><rect x="44" y="25" width="17" height="17"/>
      <rect x="63" y="25" width="17" height="17"/><rect x="82" y="25" width="17" height="17"/><rect x="101" y="25" width="17" height="17"/>
      <rect x="120" y="25" width="17" height="17"/><rect x="139" y="25" width="17" height="17"/><rect x="158" y="25" width="17" height="17"/><rect x="177" y="25" width="17" height="17"/>
      <rect x="6" y="44" width="17" height="17"/><rect x="25" y="44" width="17" height="17"/><rect x="44" y="44" width="17" height="17"/>
      <rect x="63" y="44" width="17" height="17"/><rect x="82" y="44" width="17" height="17"/><rect x="101" y="44" width="17" height="17"/>
      <rect x="120" y="44" width="17" height="17"/><rect x="139" y="44" width="17" height="17"/><rect x="158" y="44" width="17" height="17"/><rect x="177" y="44" width="17" height="17"/>
      <rect x="6" y="63" width="17" height="17"/><rect x="25" y="63" width="17" height="17"/><rect x="44" y="63" width="17" height="17"/>
      <rect x="63" y="63" width="17" height="17"/><rect x="82" y="63" width="17" height="17"/><rect x="101" y="63" width="17" height="17"/>
      <rect x="120" y="63" width="17" height="17"/><rect x="139" y="63" width="17" height="17"/><rect x="158" y="63" width="17" height="17"/><rect x="177" y="63" width="17" height="17"/>
      <rect x="6" y="82" width="17" height="17"/><rect x="25" y="82" width="17" height="17"/><rect x="44" y="82" width="17" height="17"/>
      <rect x="63" y="82" width="17" height="17"/><rect x="82" y="82" width="17" height="17"/><rect x="101" y="82" width="17" height="17"/>
      <rect x="120" y="82" width="17" height="17"/><rect x="139" y="82" width="17" height="17"/><rect x="158" y="82" width="17" height="17"/><rect x="177" y="82" width="17" height="17"/>
      <rect x="6" y="101" width="17" height="17"/><rect x="25" y="101" width="17" height="17"/><rect x="44" y="101" width="17" height="17"/>
      <rect x="63" y="101" width="17" height="17"/><rect x="82" y="101" width="17" height="17"/><rect x="101" y="101" width="17" height="17"/>
      <rect x="120" y="101" width="17" height="17"/><rect x="139" y="101" width="17" height="17"/><rect x="158" y="101" width="17" height="17"/><rect x="177" y="101" width="17" height="17"/>
      <rect x="6" y="120" width="17" height="17"/><rect x="25" y="120" width="17" height="17"/><rect x="44" y="120" width="17" height="17"/>
      <rect x="63" y="120" width="17" height="17"/><rect x="82" y="120" width="17" height="17"/><rect x="101" y="120" width="17" height="17"/>
      <rect x="120" y="120" width="17" height="17"/><rect x="139" y="120" width="17" height="17"/><rect x="158" y="120" width="17" height="17"/><rect x="177" y="120" width="17" height="17"/>
      <rect x="6" y="139" width="17" height="17"/><rect x="25" y="139" width="17" height="17"/><rect x="44" y="139" width="17" height="17"/>
      <rect x="63" y="139" width="17" height="17"/><rect x="82" y="139" width="17" height="17"/><rect x="101" y="139" width="17" height="17"/>
      <rect x="120" y="139" width="17" height="17"/><rect x="139" y="139" width="17" height="17"/><rect x="158" y="139" width="17" height="17"/><rect x="177" y="139" width="17" height="17"/>
      <rect x="6" y="158" width="17" height="17"/><rect x="25" y="158" width="17" height="17"/><rect x="44" y="158" width="17" height="17"/>
      <rect x="63" y="158" width="17" height="17"/><rect x="82" y="158" width="17" height="17"/><rect x="101" y="158" width="17" height="17"/>
      <rect x="120" y="158" width="17" height="17"/><rect x="139" y="158" width="17" height="17"/><rect x="158" y="158" width="17" height="17"/><rect x="177" y="158" width="17" height="17"/>
      <rect x="6" y="177" width="17" height="17"/><rect x="25" y="177" width="17" height="17"/><rect x="44" y="177" width="17" height="17"/>
      <rect x="63" y="177" width="17" height="17"/><rect x="82" y="177" width="17" height="17"/><rect x="101" y="177" width="17" height="17"/>
      <rect x="120" y="177" width="17" height="17"/><rect x="139" y="177" width="17" height="17"/><rect x="158" y="177" width="17" height="17"/><rect x="177" y="177" width="17" height="17"/>
    </g>
    <!-- some "fired" microcells in green -->
    <g fill="#00ff88" stroke="#00b4ff" stroke-width="0.5">
      <rect x="44" y="63" width="17" height="17"/>
      <rect x="82" y="82" width="17" height="17"/>
      <rect x="120" y="120" width="17" height="17"/>
      <rect x="63" y="139" width="17" height="17"/>
    </g>
    <!-- highlight one cell for zoom -->
    <rect x="82" y="82" width="17" height="17" fill="none" stroke="#00ff88" stroke-width="2.5"/>
    <text x="100" y="222" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50" font-style="italic">thousands of microcells, several fired</text>
  </g>

  <!-- Right: Single microcell zoom -->
  <g transform="translate(605, 70)">
    <text x="120" y="-8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">Microcell (~25-50 µm pitch)</text>
    <rect x="0" y="0" width="240" height="200" fill="#001f38" stroke="#003D6B" stroke-width="1.6"/>
    <!-- p+ epitaxial structure -->
    <rect x="20" y="20" width="200" height="40" fill="#7fdbff" opacity="0.6"/>
    <text x="120" y="44" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#003D6B" font-weight="700">p+ (anti-reflection)</text>

    <rect x="20" y="60" width="200" height="50" fill="#0078B6"/>
    <text x="120" y="80" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#ffffff" font-weight="700">depletion / multiplication</text>
    <text x="120" y="95" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#7fdbff">avalanche region</text>

    <rect x="20" y="110" width="200" height="50" fill="#003D6B"/>
    <text x="120" y="135" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#ffffff" font-weight="700">n epitaxial / substrate</text>

    <!-- quenching resistor on side -->
    <rect x="222" y="60" width="14" height="100" fill="#00ff88" stroke="#003D6B" stroke-width="0.8"/>
    <text x="252" y="115" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#003D6B" font-weight="700">R_quench</text>

    <!-- Photon arrow in -->
    <g stroke="#00b4ff" stroke-width="2.0">
      <line x1="50" y1="-15" x2="60" y2="15"/>
    </g>
    <polygon points="60,15 56,8 64,8" fill="#00b4ff"/>
    <text x="40" y="-18" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#00b4ff" font-weight="700">photon</text>

    <!-- avalanche mark -->
    <g stroke="#00ff88" stroke-width="0.6" fill="#00ff88" opacity="0.85">
      <circle cx="120" cy="85" r="14" fill="#00ff88" opacity="0.4"/>
      <circle cx="120" cy="85" r="7" fill="#00ff88"/>
    </g>
    <line x1="120" y1="85" x2="120" y2="170" stroke="#00ff88" stroke-width="1.4" stroke-dasharray="3,2"/>

    <text x="120" y="222" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50" font-style="italic">Geiger-mode avalanche, gain ≈ 10⁵–10⁶</text>
  </g>

  <!-- Connection arrows between the three panels -->
  <g stroke="#003D6B" stroke-width="1.4" fill="none">
    <line x1="265" y1="170" x2="325" y2="170" stroke-dasharray="4,3"/>
    <polygon points="325,170 318,166 318,174" fill="#003D6B"/>
    <line x1="535" y1="170" x2="600" y2="170" stroke-dasharray="4,3"/>
    <polygon points="600,170 593,166 593,174" fill="#003D6B"/>
  </g>
  <text x="295" y="160" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50" font-style="italic">zoom</text>
  <text x="567" y="160" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#2C3E50" font-style="italic">zoom</text>

  <!-- Output equation -->
  <g transform="translate(80, 330)">
    <rect x="0" y="0" width="740" height="60" fill="#ffffff" stroke="#0078B6" stroke-width="1.4" rx="3"/>
    <text x="20" y="22" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#003D6B">Photodetection efficiency:</text>
    <text x="200" y="22" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#003D6B" font-style="italic">PDE = QE × FillFactor × P_Geiger</text>
    <text x="20" y="46" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2C3E50">Modern devices reach PDE = 50–65% at the matched scintillator emission wavelength.</text>
    <text x="500" y="46" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2C3E50" font-style="italic">SCINT 2024, Mazzillo et al.</text>
  </g>

  <!-- Caption -->
  <text x="450" y="425" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2C3E50" font-style="italic">Figure 9.2 - Silicon photomultiplier architecture from array (left) to die (middle) to microcell (right). Each microcell is a Geiger-mode avalanche</text>
  <text x="450" y="440" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2C3E50" font-style="italic">photodiode with a quenching resistor; the SiPM output is the parallel sum of all fired cells.</text>
</svg>
