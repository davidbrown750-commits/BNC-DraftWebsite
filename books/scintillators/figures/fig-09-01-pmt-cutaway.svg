<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <filter id="g91" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="420" fill="#ECEFF1"/>

  <text x="450" y="32" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#003D6B">Photomultiplier tube cutaway: 10-stage linear-focused architecture</text>

  <!-- Tube envelope -->
  <g>
    <rect x="80" y="120" width="720" height="160" fill="#001f38" stroke="#003D6B" stroke-width="1.6" rx="6"/>
    <!-- inner vacuum tint -->
    <rect x="86" y="126" width="708" height="148" fill="#003D6B" opacity="0.6" rx="4"/>
  </g>

  <!-- Window + photocathode at left -->
  <g>
    <rect x="80" y="120" width="20" height="160" fill="#7fdbff" opacity="0.7"/>
    <text x="90" y="115" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#003D6B">window</text>
    <line x1="100" y1="120" x2="100" y2="280" stroke="#0078B6" stroke-width="2.4"/>
    <text x="100" y="305" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#003D6B">photocathode</text>
  </g>

  <!-- Incoming photon -->
  <g stroke="#00b4ff" stroke-width="2.0" filter="url(#g91)">
    <line x1="30" y1="200" x2="78" y2="200"/>
  </g>
  <polygon points="78,200 70,196 70,204" fill="#00b4ff"/>
  <text x="20" y="194" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#00b4ff">photon</text>

  <!-- Focusing electrode -->
  <g stroke="#7fdbff" stroke-width="1.6" fill="none">
    <path d="M 110,150 Q 130,165 130,200 Q 130,235 110,250"/>
    <path d="M 110,148 Q 145,165 145,200 Q 145,235 110,252"/>
  </g>
  <text x="135" y="115" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#7fdbff">focusing</text>

  <!-- Dynode chain (10 stages) -->
  <g>
    <!-- alternating curved dynodes -->
    <g stroke="#7fdbff" stroke-width="1.8" fill="none">
      <path d="M 175,165 Q 195,180 195,200" />
      <path d="M 215,235 Q 235,220 235,200" />
      <path d="M 255,165 Q 275,180 275,200" />
      <path d="M 295,235 Q 315,220 315,200" />
      <path d="M 335,165 Q 355,180 355,200" />
      <path d="M 375,235 Q 395,220 395,200" />
      <path d="M 415,165 Q 435,180 435,200" />
      <path d="M 455,235 Q 475,220 475,200" />
      <path d="M 495,165 Q 515,180 515,200" />
      <path d="M 535,235 Q 555,220 555,200" />
    </g>
    <!-- electron trajectory (dashed) -->
    <g stroke="#00ff88" stroke-width="1.4" fill="none" stroke-dasharray="3,2">
      <path d="M 100,200 Q 145,200 175,180 Q 200,160 215,210 Q 230,260 255,180 Q 270,150 295,220 Q 310,260 335,180 Q 350,150 375,220 Q 390,255 415,180 Q 430,150 455,220 Q 470,255 495,180 Q 510,150 535,220 Q 555,250 580,205 L 685,205"/>
    </g>
    <!-- arrowhead at anode -->
    <polygon points="685,205 678,200 678,210" fill="#00ff88"/>
  </g>
  <text x="370" y="305" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#003D6B">dynode chain (×10 stages, gain ≈ 10⁵–10⁶)</text>

  <!-- Anode -->
  <g>
    <rect x="585" y="170" width="120" height="60" fill="#0078B6" opacity="0.85"/>
    <text x="645" y="205" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">anode</text>
  </g>

  <!-- Pin base -->
  <g>
    <rect x="710" y="120" width="90" height="160" fill="#2C3E50" stroke="#003D6B" stroke-width="1.6"/>
    <g stroke="#7fdbff" stroke-width="1" fill="#003D6B">
      <circle cx="730" cy="140" r="3"/>
      <circle cx="750" cy="140" r="3"/>
      <circle cx="770" cy="140" r="3"/>
      <circle cx="790" cy="140" r="3"/>
      <circle cx="730" cy="170" r="3"/>
      <circle cx="750" cy="170" r="3"/>
      <circle cx="770" cy="170" r="3"/>
      <circle cx="790" cy="170" r="3"/>
      <circle cx="730" cy="200" r="3"/>
      <circle cx="750" cy="200" r="3"/>
      <circle cx="770" cy="200" r="3"/>
      <circle cx="790" cy="200" r="3"/>
      <circle cx="730" cy="230" r="3"/>
      <circle cx="750" cy="230" r="3"/>
      <circle cx="770" cy="230" r="3"/>
      <circle cx="790" cy="230" r="3"/>
      <circle cx="750" cy="260" r="3"/>
      <circle cx="770" cy="260" r="3"/>
    </g>
    <text x="755" y="305" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#003D6B">pin base + voltage divider</text>
  </g>

  <!-- Output signal arrow -->
  <g stroke="#00ff88" stroke-width="2" fill="none" filter="url(#g91)">
    <line x1="800" y1="200" x2="850" y2="200"/>
  </g>
  <polygon points="850,200 842,196 842,204" fill="#00ff88"/>
  <text x="855" y="195" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#00ff88">signal</text>

  <!-- Length scale -->
  <g stroke="#2C3E50" stroke-width="0.8" fill="none">
    <line x1="80" y1="345" x2="800" y2="345"/>
    <line x1="80" y1="340" x2="80" y2="350"/>
    <line x1="800" y1="340" x2="800" y2="350"/>
  </g>
  <text x="440" y="362" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2C3E50" font-style="italic">tube length ≈ 100–250 mm depending on diameter</text>

  <!-- Caption -->
  <text x="450" y="395" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2C3E50" font-style="italic">Figure 9.1 - Photomultiplier tube schematic. The photoelectron emitted at the photocathode is electrostatically focused onto the first dynode and</text>
  <text x="450" y="410" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2C3E50" font-style="italic">multiplied through a 10-stage cascade of secondary emission. The anode collects the resulting charge pulse.</text>
</svg>
