  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Quiz Progress: Scintillator Book</title>
  <link rel="stylesheet" href="_bnc-style.css" />
  <link rel="stylesheet" href="_quiz-style.css" />
  <style>
    .progress-page { max-width: 940px; margin: 32px auto 80px; padding: 0 28px; }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin: 22px 0 10px;
    }
    .stat {
      background: var(--bnc-white);
      padding: 18px 20px;
      border-left: 4px solid var(--bnc-deep-navy);
      box-shadow: 0 1px 0 rgba(0,0,0,0.05);
    }
    .stat .num {
      font-family: Helvetica, "Arial Black", sans-serif;
      font-size: 28pt;
      font-weight: 900;
      color: var(--bnc-deep-navy);
      line-height: 1;
      display: block;
    }
    .stat .label {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 9.5pt;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--bnc-charcoal);
      margin-top: 6px;
    }
    .stat.green   { border-left-color: var(--bnc-target-green); }
    .stat.green .num { color: #009b54; }
    .stat.amber   { border-left-color: var(--bnc-warm-amber); }
    .stat.amber .num { color: var(--bnc-warm-amber); }
    .stat.plum    { border-left-color: var(--bnc-deep-plum); }
    .stat.plum .num  { color: var(--bnc-deep-plum); }
    .stat.sky     { border-left-color: var(--bnc-sky-blue); }
    .stat.sky .num   { color: var(--bnc-sky-blue); }

    .empty-state {
      background: var(--bnc-white);
      padding: 40px 32px;
      border-left: 4px solid var(--bnc-deep-plum);
      text-align: center;
    }
    .empty-state h2 {
      color: var(--bnc-deep-navy);
      border-left: none;
      margin: 0 0 12px;
      padding: 0;
    }
    .empty-state p { color: var(--bnc-charcoal); margin: 6px 0; }

    .ch-card {
      background: var(--bnc-white);
      margin: 12px 0;
      padding: 0;
      border-left: 4px solid var(--bnc-charcoal);
      overflow: hidden;
      box-shadow: 0 1px 0 rgba(0,0,0,0.05);
    }
    .ch-head {
      padding: 16px 22px;
      background: linear-gradient(90deg, #f5f9fc 0%, var(--bnc-white) 60%);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .ch-head h3 {
      flex: 1;
      margin: 0;
      font-size: 13pt;
      color: var(--bnc-deep-navy);
    }
    .ch-pills { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .pill {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 9pt;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 10px;
      color: var(--bnc-white);
      text-transform: uppercase;
    }
    .pill.green  { background: var(--bnc-target-green); color: var(--bnc-deep-navy); }
    .pill.amber  { background: var(--bnc-warm-amber); }
    .pill.plum   { background: var(--bnc-deep-plum); }
    .pill.gray   { background: #aab7c0; }
    .ch-score {
      font-family: Helvetica, "Arial Black", sans-serif;
      font-weight: 900;
      font-size: 13pt;
      color: var(--bnc-deep-navy);
      min-width: 64px;
      text-align: right;
    }

    .actions-row {
      margin: 24px 0 12px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .actions-row button, .actions-row a.btn-link {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 10pt;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 10px 18px;
      border: 2px solid var(--bnc-deep-navy);
      color: var(--bnc-deep-navy);
      background: var(--bnc-white);
      cursor: pointer;
      border-radius: 3px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .actions-row button.primary,
    .actions-row a.btn-link.primary {
      background: var(--bnc-deep-navy);
      color: var(--bnc-white);
    }
    .actions-row button.danger {
      border-color: var(--bnc-deep-plum);
      color: var(--bnc-deep-plum);
    }
    .actions-row button.danger:hover {
      background: var(--bnc-deep-plum);
      color: var(--bnc-white);
    }
    .actions-row button:hover, .actions-row a.btn-link:hover {
      background: var(--bnc-warm-amber);
      border-color: var(--bnc-warm-amber);
      color: var(--bnc-white);
    }
    .recommend {
      background: #f5f0fa;
      border-left: 4px solid var(--bnc-deep-plum);
      padding: 16px 20px;
      margin: 20px 0;
    }
    .recommend h3 {
      margin: 0 0 8px;
      color: var(--bnc-deep-plum);
      font-size: 13pt;
    }
    .recommend ul { margin: 6px 0 0; padding-left: 20px; }
    .recommend li { margin: 4px 0; color: var(--bnc-charcoal); }

    @media print {
      .actions-row { display: none; }
      .ch-card { page-break-inside: avoid; }
      body { background: white; }
    }
  </style>

<body>

  <main class="progress-page">
    <header class="quiz-header" style="margin-bottom: 0;">
      <p class="crumb">Interactive Reference Guide · Progress</p>
      <h1>My Quiz Progress</h1>
      <p class="sub">Your scores across every chapter quiz, in one place. Saved to this browser only, so you can clear it any time.</p>
    </header>

    <section id="content"></section>

    <p class="footer-note" style="font-family: Helvetica, Arial, sans-serif; font-size: 9pt; color: var(--bnc-charcoal); text-align: center; margin-top: 30px; letter-spacing: 0.5px;">
      &copy; 2026 Berkeley Nucleonics Corporation. Progress is stored in your browser's localStorage on this device only.
    </p>
  </main>

  <script>
    /* Reads the multiple-choice engine progress key written by quiz-mc.js:
       localStorage["scintillator-quiz-progress"] = { "01": {score, total}, "02": {...}, ... } */
    const PROGRESS_KEY = "scintillator-quiz-progress";
    const CHAPTERS = {
      "01": { title: "1. Why Scintillation, Why Now",                          file: "01-why-now.html",              quiz: "quiz-01-why-now.html" },
      "02": { title: "2. Scintillation Physics: From Photon to Count",         file: "02-scintillation-physics.html", quiz: "quiz-02-scintillation-physics.html" },
      "03": { title: "3. Properties and Use of Scintillation Materials",       file: "03-materials.html",            quiz: "quiz-03-materials.html" },
      "04": { title: "4. Thermal Neutron Detection",                           file: "04-neutrons.html",             quiz: "quiz-04-neutrons.html" },
      "05": { title: "5. Radiation Damage",                                    file: "05-radiation-damage.html",     quiz: "quiz-05-radiation-damage.html" },
      "06": { title: "6. Emission Spectra and Photodetector Matching",         file: "06-emission-spectra.html",     quiz: "quiz-06-emission-spectra.html" },
      "07": { title: "7. Temperature Influence on Scintillation Response",     file: "07-temperature.html",          quiz: "quiz-07-temperature.html" },
      "08": { title: "8. Choosing the Scintillator for Your Application",      file: "08-selection.html",            quiz: "quiz-08-selection.html" },
      "09": { title: "9. Scintillation Light Detection Devices",               file: "09-photodetectors.html",       quiz: "quiz-09-photodetectors.html" },
      "10": { title: "10. Detector Nomenclature and Type Numbering",           file: "10-nomenclature.html",         quiz: "quiz-10-nomenclature.html" },
      "11": { title: "11. Detector Configurations",                            file: "11-configurations.html",       quiz: "quiz-11-configurations.html" },
      "12": { title: "12. Examples of Standard Detector Configurations",       file: "12-examples.html",             quiz: "quiz-12-examples.html" },
      "13": { title: "13. Detector Electronics",                               file: "13-electronics.html",          quiz: "quiz-13-electronics.html" },
      "14": { title: "14. Detectors for the Nuclear Renaissance",              file: "14-nuclear-renaissance.html",  quiz: "quiz-14-nuclear-renaissance.html" }
    };

    function loadProgress() {
      try { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || "{}") || {}; } catch (e) { return {}; }
    }
    function escapeHtml(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }
    function pct(score, total) { return total ? Math.round((score / total) * 100) : 0; }
    function band(p) { return p >= 70 ? "green" : p >= 40 ? "amber" : "plum"; }
    function bandLabel(p) { return p >= 70 ? "Solid" : p >= 40 ? "Review" : "Reread"; }

    function render() {
      const prog = loadProgress();
      const root = document.getElementById("content");

      const taken = [];
      let totalScore = 0, totalQuestions = 0, perfectCount = 0;
      Object.keys(CHAPTERS).forEach(key => {
        const entry = prog[key];
        if (!entry || typeof entry.total !== "number" || entry.total === 0) return;
        const score = Number(entry.score) || 0;
        taken.push({ key, score, total: entry.total });
        totalScore += score;
        totalQuestions += entry.total;
        if (score === entry.total) perfectCount++;
      });

      if (taken.length === 0) {
        root.innerHTML = `
          <div class="empty-state">
            <h2>No quiz scores yet.</h2>
            <p>Once you check your answers on any chapter quiz, your score will appear here.</p>
            <p style="margin-top:18px;"><a class="btn-link primary" style="display:inline-block; padding:10px 18px; background:var(--bnc-deep-navy); color:var(--bnc-white); text-decoration:none; border-radius:3px; font-family: Helvetica, Arial, sans-serif; font-weight:700; letter-spacing:1px; text-transform:uppercase; font-size:10pt;" href="quiz-01-why-now.html">Start with Chapter 1 &rarr;</a></p>
          </div>`;
        return;
      }

      const overallPct = pct(totalScore, totalQuestions);

      let html = `
        <div class="stat-grid">
          <div class="stat sky">  <span class="num">${taken.length}</span>   <div class="label">Quizzes taken</div></div>
          <div class="stat green"><span class="num">${totalScore}</span>     <div class="label">Correct answers</div></div>
          <div class="stat">      <span class="num">${totalQuestions}</span> <div class="label">Questions answered</div></div>
          <div class="stat amber"><span class="num">${overallPct}%</span>    <div class="label">Overall score</div></div>
          <div class="stat plum"> <span class="num">${perfectCount}</span>   <div class="label">Perfect scores</div></div>
        </div>
        <p style="font-size:10pt; color:var(--bnc-charcoal); margin:0 0 6px;">
          ${totalScore} of ${totalQuestions} correct across ${taken.length} quiz${taken.length === 1 ? "" : "zes"}.
        </p>
      `;

      const reread = taken.filter(t => pct(t.score, t.total) < 70).map(t => CHAPTERS[t.key]).filter(Boolean);
      if (reread.length) {
        html += `
          <div class="recommend">
            <h3>Suggested re-reads</h3>
            <p style="margin:0;">You scored below 70 percent in these chapters. Worth a second pass:</p>
            <ul>
              ${reread.map(m => `<li><a href="${m.file}">${escapeHtml(m.title)}</a> &mdash; <a href="${m.quiz}">retake the quiz</a></li>`).join("")}
            </ul>
          </div>`;
      }

      html += `
        <div class="actions-row">
          <button class="primary" onclick="window.print()">Print my progress</button>
          <button onclick="exportJson()">Export as JSON</button>
          <button class="danger" onclick="clearAll()">Clear all progress</button>
        </div>
      `;

      Object.keys(CHAPTERS).forEach(key => {
        const entry = prog[key];
        const meta = CHAPTERS[key];
        if (!entry || typeof entry.total !== "number" || entry.total === 0) return;
        const score = Number(entry.score) || 0;
        const p = pct(score, entry.total);
        html += `
          <article class="ch-card" style="border-left-color: var(--bnc-${band(p) === 'green' ? 'target-green' : band(p) === 'amber' ? 'warm-amber' : 'deep-plum'});">
            <div class="ch-head">
              <h3>${escapeHtml(meta.title)}</h3>
              <div class="ch-pills">
                <span class="pill ${band(p)}">${bandLabel(p)} · ${p}%</span>
                <a href="${meta.quiz}" style="font-size:9pt; letter-spacing:1px; text-transform:uppercase; color:var(--bnc-sky-blue); text-decoration:none; border-bottom:1px dotted var(--bnc-sky-blue);">retake &rarr;</a>
              </div>
              <span class="ch-score">${score} / ${entry.total}</span>
            </div>
          </article>
        `;
      });

      root.innerHTML = html;
    }

    function exportJson() {
      const data = loadProgress();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "scintillator-quiz-progress.json";
      a.click();
    }

    function clearAll() {
      if (!confirm("Clear all your saved quiz scores? This cannot be undone.")) return;
      localStorage.removeItem(PROGRESS_KEY);
      Object.keys(CHAPTERS).forEach(key => localStorage.removeItem("scintillator-quiz-" + key));
      render();
    }

    render();
  </script>
</body>
</html>
