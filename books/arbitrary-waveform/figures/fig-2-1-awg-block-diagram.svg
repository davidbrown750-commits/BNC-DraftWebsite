<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="380" fill="#ffffff"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#003D6B">AWG Signal Chain: Memory to Output Connector</text>

  <!-- Sequencer (top, feeds memory addressing) -->
  <rect x="40" y="62" width="150" height="50" rx="4" fill="#ECEFF1" stroke="#4B2A6B" stroke-width="2"/>
  <text x="115" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#4B2A6B">Sequencer</text>
  <text x="115" y="101" text-anchor="middle" font-size="11" fill="#2C3E50">address / loop control</text>

  <!-- Trigger input (top right) -->
  <rect x="630" y="62" width="150" height="50" rx="4" fill="#ECEFF1" stroke="#C77E00" stroke-width="2"/>
  <text x="705" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#C77E00">Trigger In</text>
  <text x="705" y="101" text-anchor="middle" font-size="11" fill="#2C3E50">start / gate / sync</text>

  <!-- Main chain row y=170 -->
  <!-- Waveform Memory -->
  <rect x="20" y="155" width="120" height="64" rx="4" fill="#003D6B"/>
  <text x="80" y="182" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#ffffff">Waveform</text>
  <text x="80" y="199" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#ffffff">Memory</text>

  <!-- Sample Clock -->
  <rect x="175" y="155" width="110" height="64" rx="4" fill="#0078B6"/>
  <text x="230" y="182" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#ffffff">Sample</text>
  <text x="230" y="199" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#ffffff">Clock</text>

  <!-- DAC -->
  <rect x="320" y="155" width="100" height="64" rx="4" fill="#003D6B"/>
  <text x="370" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">DAC</text>

  <!-- Reconstruction Filter -->
  <rect x="455" y="155" width="130" height="64" rx="4" fill="#0078B6"/>
  <text x="520" y="182" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#ffffff">Reconstruction</text>
  <text x="520" y="199" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#ffffff">Filter</text>

  <!-- Amp / Attenuator -->
  <rect x="620" y="155" width="120" height="64" rx="4" fill="#003D6B"/>
  <text x="680" y="182" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#ffffff">Amp /</text>
  <text x="680" y="199" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#ffffff">Attenuator</text>

  <!-- Output connector -->
  <circle cx="780" cy="187" r="14" fill="#ffffff" stroke="#2C3E50" stroke-width="3"/>
  <circle cx="780" cy="187" r="5" fill="#2C3E50"/>
  <text x="780" y="232" text-anchor="middle" font-size="11" fill="#2C3E50">Output</text>

  <!-- Arrows along main chain -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#2C3E50"/>
    </marker>
  </defs>
  <g stroke="#2C3E50" stroke-width="2.5" fill="none" marker-end="url(#ah)">
    <line x1="140" y1="187" x2="173" y2="187"/>
    <line x1="285" y1="187" x2="318" y2="187"/>
    <line x1="420" y1="187" x2="453" y2="187"/>
    <line x1="585" y1="187" x2="618" y2="187"/>
    <line x1="740" y1="187" x2="764" y2="187"/>
  </g>

  <!-- Sequencer feeds memory (down arrow) -->
  <g stroke="#4B2A6B" stroke-width="2" fill="none" marker-end="url(#ah)">
    <path d="M80,112 L80,153"/>
  </g>
  <!-- Sample clock drives DAC and memory readout: dashed control lines -->
  <g stroke="#0078B6" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#ah)">
    <path d="M230,219 L230,250 L370,250 L370,221"/>
  </g>
  <text x="300" y="266" text-anchor="middle" font-size="10.5" fill="#0078B6">clock drives DAC update rate</text>

  <!-- Trigger feeds sequencer -->
  <g stroke="#C77E00" stroke-width="2" fill="none" marker-end="url(#ah)">
    <path d="M705,112 L705,135 L115,135 L115,112"/>
  </g>
  <text x="410" y="130" text-anchor="middle" font-size="10.5" fill="#C77E00">trigger starts / gates playback</text>

  <!-- digital vs analog domain labels -->
  <line x1="445" y1="300" x2="445" y2="345" stroke="#b6c2cc" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="235" y="330" text-anchor="middle" font-size="12" font-style="italic" fill="#003D6B">digital domain (codes)</text>
  <text x="630" y="330" text-anchor="middle" font-size="12" font-style="italic" fill="#0078B6">analog domain (volts)</text>
</svg>
