<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="470" fill="#ffffff"/>
  <text x="410" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#003D6B">Output Termination: Why Hi-Z Doubles Your Amplitude</text>

  <!-- ============ TOP CASE: matched 50 ohm ============ -->
  <text x="40" y="64" font-size="13" font-weight="bold" fill="#0078B6">Case A: Matched 50 &#937; load (correct)</text>

  <!-- AWG block -->
  <rect x="40" y="80" width="120" height="80" rx="4" fill="#ECEFF1" stroke="#003D6B" stroke-width="1.5"/>
  <text x="100" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#003D6B">AWG</text>
  <text x="100" y="130" text-anchor="middle" font-size="11" fill="#2C3E50">source</text>
  <text x="100" y="146" text-anchor="middle" font-size="11" fill="#2C3E50">2 Vpp open</text>

  <!-- internal 50 ohm source resistor -->
  <rect x="180" y="108" width="44" height="24" fill="#fff" stroke="#C77E00" stroke-width="1.5"/>
  <text x="202" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#C77E00">50 &#937;</text>
  <text x="202" y="100" text-anchor="middle" font-size="11" fill="#C77E00">R(source)</text>

  <!-- line -->
  <line x1="160" y1="120" x2="180" y2="120" stroke="#2C3E50" stroke-width="2"/>
  <line x1="224" y1="120" x2="430" y2="120" stroke="#2C3E50" stroke-width="2"/>
  <text x="320" y="112" text-anchor="middle" font-size="10" fill="#0078B6">50 &#937; coax</text>

  <!-- load 50 ohm -->
  <rect x="430" y="96" width="48" height="48" fill="#fff" stroke="#0078B6" stroke-width="1.5"/>
  <text x="454" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#0078B6">50 &#937;</text>
  <text x="454" y="133" text-anchor="middle" font-size="11" fill="#0078B6">R(load)</text>
  <line x1="454" y1="144" x2="454" y2="160" stroke="#2C3E50" stroke-width="2"/>
  <line x1="444" y1="160" x2="464" y2="160" stroke="#2C3E50" stroke-width="2"/>
  <line x1="448" y1="166" x2="460" y2="166" stroke="#2C3E50" stroke-width="2"/>

  <!-- result waveform -->
  <rect x="540" y="84" width="240" height="76" fill="#ECEFF1" stroke="#d4d8db"/>
  <line x1="540" y1="122" x2="780" y2="122" stroke="#b0b8bd" stroke-width="1"/>
  <path d="M540,122 C570,96 600,96 630,122 C660,148 690,148 720,122 C740,105 760,105 780,118" fill="none" stroke="#0078B6" stroke-width="2.5"/>
  <text x="660" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#003D6B">1 Vpp at load</text>
  <text x="660" y="153" text-anchor="middle" font-size="10" fill="#2C3E50">half delivered across the divider, as expected</text>

  <!-- divider -->
  <line x1="40" y1="190" x2="780" y2="190" stroke="#e3e7ea" stroke-width="1"/>

  <!-- ============ BOTTOM CASE: Hi-Z pitfall ============ -->
  <text x="40" y="224" font-size="13" font-weight="bold" fill="#C77E00">Case B: High-impedance load (the 2x amplitude pitfall)</text>

  <rect x="40" y="240" width="120" height="80" rx="4" fill="#ECEFF1" stroke="#003D6B" stroke-width="1.5"/>
  <text x="100" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#003D6B">AWG</text>
  <text x="100" y="290" text-anchor="middle" font-size="11" fill="#2C3E50">source</text>
  <text x="100" y="306" text-anchor="middle" font-size="11" fill="#2C3E50">2 Vpp open</text>

  <rect x="180" y="268" width="44" height="24" fill="#fff" stroke="#C77E00" stroke-width="1.5"/>
  <text x="202" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#C77E00">50 &#937;</text>
  <text x="202" y="260" text-anchor="middle" font-size="11" fill="#C77E00">R(source)</text>

  <line x1="160" y1="280" x2="180" y2="280" stroke="#2C3E50" stroke-width="2"/>
  <line x1="224" y1="280" x2="430" y2="280" stroke="#2C3E50" stroke-width="2"/>
  <text x="320" y="272" text-anchor="middle" font-size="10" fill="#0078B6">50 &#937; coax</text>

  <!-- high-Z load (scope 1 Mohm) -->
  <rect x="430" y="256" width="64" height="48" fill="#fff" stroke="#C77E00" stroke-width="1.5"/>
  <text x="462" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#C77E00">1 M&#937;</text>
  <text x="462" y="293" text-anchor="middle" font-size="11" fill="#C77E00">scope Hi-Z</text>
  <line x1="462" y1="304" x2="462" y2="320" stroke="#2C3E50" stroke-width="2"/>
  <line x1="452" y1="320" x2="472" y2="320" stroke="#2C3E50" stroke-width="2"/>
  <line x1="456" y1="326" x2="468" y2="326" stroke="#2C3E50" stroke-width="2"/>

  <!-- result waveform doubled -->
  <rect x="540" y="232" width="240" height="92" fill="#ECEFF1" stroke="#d4d8db"/>
  <line x1="540" y1="278" x2="780" y2="278" stroke="#b0b8bd" stroke-width="1"/>
  <path d="M540,278 C570,238 600,238 630,278 C660,318 690,318 720,278 C740,252 760,252 780,272" fill="none" stroke="#C77E00" stroke-width="2.5"/>
  <text x="660" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#C77E00">2 Vpp at load</text>
  <text x="660" y="318" text-anchor="middle" font-size="10" fill="#2C3E50">no current drawn, full open-circuit swing appears</text>

  <text x="410" y="356" text-anchor="middle" font-size="12" fill="#2C3E50">The generator has not changed. Only the load did. With nothing to draw current,</text>
  <text x="410" y="374" text-anchor="middle" font-size="12" fill="#2C3E50">the 50 &#937; source divider disappears and the displayed amplitude doubles.</text>

  <!-- formula box -->
  <rect x="150" y="392" width="520" height="58" rx="4" fill="#003D6B"/>
  <text x="410" y="416" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">V(load) = V(open) &#215; R(load) / ( R(source) + R(load) )</text>
  <text x="410" y="438" text-anchor="middle" font-size="11" fill="#7fdbff">50 &#937; load: factor 1/2 &#8226;&#8226; Hi-Z load: factor &#8776; 1 (full swing)</text>
</svg>
