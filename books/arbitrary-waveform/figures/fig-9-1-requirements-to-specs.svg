<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="430" fill="#ffffff"/>
  <text x="24" y="34" font-size="18" font-weight="bold" fill="#003D6B">From Requirement to Derived Specification</text>
  <text x="24" y="56" font-size="13" fill="#2C3E50">Start with what the signal must do. Each requirement maps to the instrument spec it drives.</text>

  <!-- Column headers -->
  <rect x="24" y="74" width="300" height="28" fill="#003D6B"/>
  <text x="36" y="93" font-size="13" font-weight="bold" fill="#ffffff">WHAT YOU NEED (the signal)</text>
  <rect x="496" y="74" width="300" height="28" fill="#4B2A6B"/>
  <text x="508" y="93" font-size="13" font-weight="bold" fill="#ffffff">WHAT IT SETS (the spec)</text>

  <defs>
    <marker id="a9" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#0078B6"/>
    </marker>
  </defs>

  <!-- Row 1 -->
  <rect x="24" y="116" width="300" height="44" rx="4" fill="#ECEFF1" stroke="#0078B6" stroke-width="1.5"/>
  <text x="36" y="135" font-size="13" font-weight="bold" fill="#003D6B">Highest frequency in the signal</text>
  <text x="36" y="152" font-size="11" fill="#2C3E50">The fastest tone you must reproduce</text>
  <line x1="324" y1="138" x2="492" y2="138" stroke="#0078B6" stroke-width="2" marker-end="url(#a9)"/>
  <rect x="496" y="116" width="300" height="44" rx="4" fill="#ECEFF1" stroke="#4B2A6B" stroke-width="1.5"/>
  <text x="508" y="135" font-size="13" font-weight="bold" fill="#4B2A6B">Sample rate (Fs)</text>
  <text x="508" y="152" font-size="11" fill="#2C3E50">2.5x to 5x the highest frequency</text>

  <!-- Row 2 -->
  <rect x="24" y="168" width="300" height="44" rx="4" fill="#ECEFF1" stroke="#0078B6" stroke-width="1.5"/>
  <text x="36" y="187" font-size="13" font-weight="bold" fill="#003D6B">Edge speed / rise time</text>
  <text x="36" y="204" font-size="11" fill="#2C3E50">How sharp the transitions must be</text>
  <line x1="324" y1="190" x2="492" y2="190" stroke="#0078B6" stroke-width="2" marker-end="url(#a9)"/>
  <rect x="496" y="168" width="300" height="44" rx="4" fill="#ECEFF1" stroke="#4B2A6B" stroke-width="1.5"/>
  <text x="508" y="187" font-size="13" font-weight="bold" fill="#4B2A6B">Analog bandwidth</text>
  <text x="508" y="204" font-size="11" fill="#2C3E50">BW &#8776; 0.35 / rise time</text>

  <!-- Row 3 -->
  <rect x="24" y="220" width="300" height="44" rx="4" fill="#ECEFF1" stroke="#0078B6" stroke-width="1.5"/>
  <text x="36" y="239" font-size="13" font-weight="bold" fill="#003D6B">Dynamic range / spectral purity</text>
  <text x="36" y="256" font-size="11" fill="#2C3E50">Low-level detail beside large signals</text>
  <line x1="324" y1="242" x2="492" y2="242" stroke="#0078B6" stroke-width="2" marker-end="url(#a9)"/>
  <rect x="496" y="220" width="300" height="44" rx="4" fill="#ECEFF1" stroke="#4B2A6B" stroke-width="1.5"/>
  <text x="508" y="239" font-size="13" font-weight="bold" fill="#4B2A6B">DAC resolution (bits)</text>
  <text x="508" y="256" font-size="11" fill="#2C3E50">More bits, lower quantization floor</text>

  <!-- Row 4 -->
  <rect x="24" y="272" width="300" height="44" rx="4" fill="#ECEFF1" stroke="#0078B6" stroke-width="1.5"/>
  <text x="36" y="291" font-size="13" font-weight="bold" fill="#003D6B">Scenario duration</text>
  <text x="36" y="308" font-size="11" fill="#2C3E50">How long the playback must run</text>
  <line x1="324" y1="294" x2="492" y2="294" stroke="#0078B6" stroke-width="2" marker-end="url(#a9)"/>
  <rect x="496" y="272" width="300" height="44" rx="4" fill="#ECEFF1" stroke="#4B2A6B" stroke-width="1.5"/>
  <text x="508" y="291" font-size="13" font-weight="bold" fill="#4B2A6B">Memory depth + sequencing</text>
  <text x="508" y="308" font-size="11" fill="#2C3E50">Samples = duration x Fs (or loop it)</text>

  <!-- Row 5 -->
  <rect x="24" y="324" width="300" height="44" rx="4" fill="#ECEFF1" stroke="#0078B6" stroke-width="1.5"/>
  <text x="36" y="343" font-size="13" font-weight="bold" fill="#003D6B">Emitters / parallel signals</text>
  <text x="36" y="360" font-size="11" fill="#2C3E50">I and Q, antennas, multi-source</text>
  <line x1="324" y1="346" x2="492" y2="346" stroke="#0078B6" stroke-width="2" marker-end="url(#a9)"/>
  <rect x="496" y="324" width="300" height="44" rx="4" fill="#ECEFF1" stroke="#4B2A6B" stroke-width="1.5"/>
  <text x="508" y="343" font-size="13" font-weight="bold" fill="#4B2A6B">Synchronized channel count</text>
  <text x="508" y="360" font-size="11" fill="#2C3E50">Phase-locked channels per chassis</text>

  <text x="24" y="398" font-size="11.5" fill="#2C3E50">Work left to right. The signal is the spec sheet you have not written down yet. Derive numbers, then shop.</text>
</svg>
