<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="440" fill="#ffffff"/>
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#003D6B">IQ Vector Signal Generation: Two AWG Channels Into an IQ Modulator</text>

  <!-- ===== I channel ===== -->
  <rect x="40" y="70" width="120" height="48" rx="4" fill="#ECEFF1" stroke="#003D6B" stroke-width="1.4"/>
  <text x="100" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#003D6B">AWG Ch 1</text>
  <text x="100" y="107" text-anchor="middle" font-size="11" fill="#2C3E50">I baseband</text>

  <!-- ===== Q channel ===== -->
  <rect x="40" y="270" width="120" height="48" rx="4" fill="#ECEFF1" stroke="#003D6B" stroke-width="1.4"/>
  <text x="100" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#003D6B">AWG Ch 2</text>
  <text x="100" y="307" text-anchor="middle" font-size="11" fill="#2C3E50">Q baseband</text>

  <!-- sync tie between channels -->
  <line x1="100" y1="118" x2="100" y2="270" stroke="#4B2A6B" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="108" y="198" font-size="10" fill="#4B2A6B">sample-clock synchronized</text>

  <!-- lines to mixers -->
  <line x1="160" y1="94" x2="300" y2="94" stroke="#2C3E50" stroke-width="1.4"/>
  <polygon points="300,94 290,89 290,99" fill="#2C3E50"/>
  <line x1="160" y1="294" x2="300" y2="294" stroke="#2C3E50" stroke-width="1.4"/>
  <polygon points="300,294 290,289 290,299" fill="#2C3E50"/>

  <!-- ===== I mixer ===== -->
  <circle cx="330" cy="94" r="26" fill="#ffffff" stroke="#0078B6" stroke-width="1.6"/>
  <line x1="312" y1="76" x2="348" y2="112" stroke="#0078B6" stroke-width="1.4"/>
  <line x1="312" y1="112" x2="348" y2="76" stroke="#0078B6" stroke-width="1.4"/>
  <text x="330" y="58" text-anchor="middle" font-size="11" fill="#2C3E50">mixer</text>

  <!-- ===== Q mixer ===== -->
  <circle cx="330" cy="294" r="26" fill="#ffffff" stroke="#0078B6" stroke-width="1.6"/>
  <line x1="312" y1="276" x2="348" y2="312" stroke="#0078B6" stroke-width="1.4"/>
  <line x1="312" y1="312" x2="348" y2="276" stroke="#0078B6" stroke-width="1.4"/>

  <!-- ===== LO and 90 deg split ===== -->
  <rect x="280" y="180" width="100" height="44" rx="4" fill="#ECEFF1" stroke="#C77E00" stroke-width="1.4"/>
  <text x="330" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#C77E00">LO</text>
  <text x="330" y="216" text-anchor="middle" font-size="10" fill="#2C3E50">local oscillator</text>
  <!-- 90 deg phase split: LO to I (0 deg) up, LO to Q (90 deg) down -->
  <path d="M330,180 L330,120" fill="none" stroke="#C77E00" stroke-width="1.3"/>
  <polygon points="330,120 325,130 335,130" fill="#C77E00"/>
  <text x="338" y="150" font-size="10" fill="#C77E00">0 deg</text>
  <rect x="300" y="232" width="60" height="22" rx="3" fill="#ffffff" stroke="#C77E00" stroke-width="1.2"/>
  <text x="330" y="247" text-anchor="middle" font-size="10" fill="#C77E00">90 deg shift</text>
  <path d="M330,254 L330,268" fill="none" stroke="#C77E00" stroke-width="1.3"/>
  <polygon points="330,268 325,258 335,258" fill="#C77E00"/>

  <!-- ===== summer ===== -->
  <line x1="356" y1="94" x2="470" y2="94" stroke="#2C3E50" stroke-width="1.4"/>
  <line x1="356" y1="294" x2="470" y2="294" stroke="#2C3E50" stroke-width="1.4"/>
  <line x1="470" y1="94" x2="470" y2="170" stroke="#2C3E50" stroke-width="1.4"/>
  <line x1="470" y1="294" x2="470" y2="218" stroke="#2C3E50" stroke-width="1.4"/>
  <circle cx="490" cy="194" r="22" fill="#ffffff" stroke="#003D6B" stroke-width="1.6"/>
  <text x="490" y="200" text-anchor="middle" font-size="18" fill="#003D6B">+</text>
  <line x1="470" y1="170" x2="471" y2="172" stroke="#2C3E50" stroke-width="1.4"/>
  <line x1="470" y1="172" x2="490" y2="183" stroke="#2C3E50" stroke-width="1.4"/>
  <line x1="470" y1="216" x2="490" y2="205" stroke="#2C3E50" stroke-width="1.4"/>

  <!-- RF out -->
  <line x1="512" y1="194" x2="600" y2="194" stroke="#003D6B" stroke-width="2"/>
  <polygon points="600,194 590,189 590,199" fill="#003D6B"/>
  <text x="556" y="184" text-anchor="middle" font-size="12" font-weight="bold" fill="#003D6B">RF out</text>
  <text x="556" y="210" text-anchor="middle" font-size="10" fill="#2C3E50">modulated carrier</text>

  <!-- ===== constellation inset ===== -->
  <rect x="630" y="70" width="160" height="160" rx="4" fill="#ffffff" stroke="#2C3E50" stroke-width="1"/>
  <text x="710" y="62" text-anchor="middle" font-size="11" fill="#2C3E50">16-QAM constellation</text>
  <!-- axes -->
  <line x1="650" y1="150" x2="770" y2="150" stroke="#2C3E50" stroke-width="0.8"/>
  <line x1="710" y1="90" x2="710" y2="210" stroke="#2C3E50" stroke-width="0.8"/>
  <text x="766" y="146" font-size="11" fill="#2C3E50">I</text>
  <text x="714" y="98" font-size="11" fill="#2C3E50">Q</text>
  <!-- 16 symbol points -->
  <g fill="#0078B6">
    <circle cx="668" cy="108" r="3.5"/><circle cx="696" cy="108" r="3.5"/><circle cx="724" cy="108" r="3.5"/><circle cx="752" cy="108" r="3.5"/>
    <circle cx="668" cy="136" r="3.5"/><circle cx="696" cy="136" r="3.5"/><circle cx="724" cy="136" r="3.5"/><circle cx="752" cy="136" r="3.5"/>
    <circle cx="668" cy="164" r="3.5"/><circle cx="696" cy="164" r="3.5"/><circle cx="724" cy="164" r="3.5"/><circle cx="752" cy="164" r="3.5"/>
    <circle cx="668" cy="192" r="3.5"/><circle cx="696" cy="192" r="3.5"/><circle cx="724" cy="192" r="3.5"/><circle cx="752" cy="192" r="3.5"/>
  </g>
  <text x="710" y="250" text-anchor="middle" font-size="10" fill="#2C3E50">each point = one symbol (I, Q pair)</text>

  <!-- caption note -->
  <text x="60" y="360" font-size="11" fill="#2C3E50">The AWG generates the baseband I and Q waveforms. The external modulator upconverts them to the carrier.</text>
  <text x="60" y="378" font-size="11" fill="#2C3E50">Vector accuracy depends on matched gain, matched delay, and tight phase between the two channels.</text>
</svg>
