<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="470" fill="#ffffff"/>
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#003D6B">Which AWG Specs Each Application Stresses</text>
  <text x="410" y="46" text-anchor="middle" font-size="10" fill="#2C3E50">Filled = primary driver, half = secondary, open = not the limiting factor</text>

  <!-- column headers (specs) -->
  <text x="370" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#003D6B">Sample rate</text>
  <text x="450" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#003D6B">Bandwidth</text>
  <text x="530" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#003D6B">Channels</text>
  <text x="610" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#003D6B">Memory</text>
  <text x="690" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#003D6B">Low noise</text>

  <!-- header rule -->
  <line x1="40" y1="100" x2="730" y2="100" stroke="#003D6B" stroke-width="1.5"/>

  <!-- ROW: Radar / EW -->
  <text x="44" y="132" font-size="12" font-weight="bold" fill="#2C3E50">Radar &amp; EW</text>
  <circle cx="370" cy="128" r="9" fill="#0078B6"/>
  <circle cx="450" cy="128" r="9" fill="#0078B6"/>
  <path d="M530,119 A9 9 0 0 1 530,137 Z" fill="#0078B6"/><circle cx="530" cy="128" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <circle cx="610" cy="128" r="9" fill="#0078B6"/>
  <circle cx="690" cy="128" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <line x1="40" y1="148" x2="730" y2="148" stroke="#ECEFF1" stroke-width="1"/>

  <!-- ROW: Quantum / physics -->
  <text x="44" y="180" font-size="12" font-weight="bold" fill="#2C3E50">Quantum &amp; physics</text>
  <path d="M370,167 A9 9 0 0 1 370,185 Z" fill="#0078B6"/><circle cx="370" cy="176" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <circle cx="450" cy="176" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <circle cx="530" cy="176" r="9" fill="#0078B6"/>
  <path d="M610,167 A9 9 0 0 1 610,185 Z" fill="#0078B6"/><circle cx="610" cy="176" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <circle cx="690" cy="176" r="9" fill="#0078B6"/>
  <line x1="40" y1="196" x2="730" y2="196" stroke="#ECEFF1" stroke-width="1"/>

  <!-- ROW: Wireless / satcom -->
  <text x="44" y="228" font-size="12" font-weight="bold" fill="#2C3E50">Wireless &amp; satcom</text>
  <circle cx="370" cy="224" r="9" fill="#0078B6"/>
  <circle cx="450" cy="224" r="9" fill="#0078B6"/>
  <path d="M530,215 A9 9 0 0 1 530,233 Z" fill="#0078B6"/><circle cx="530" cy="224" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <circle cx="610" cy="224" r="9" fill="#0078B6"/>
  <path d="M690,215 A9 9 0 0 1 690,233 Z" fill="#0078B6"/><circle cx="690" cy="224" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <line x1="40" y1="244" x2="730" y2="244" stroke="#ECEFF1" stroke-width="1"/>

  <!-- ROW: Semiconductor / ATE -->
  <text x="44" y="276" font-size="12" font-weight="bold" fill="#2C3E50">Semiconductor &amp; ATE</text>
  <circle cx="370" cy="272" r="9" fill="#0078B6"/>
  <path d="M450,263 A9 9 0 0 1 450,281 Z" fill="#0078B6"/><circle cx="450" cy="272" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <circle cx="530" cy="272" r="9" fill="#0078B6"/>
  <path d="M610,263 A9 9 0 0 1 610,281 Z" fill="#0078B6"/><circle cx="610" cy="272" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <circle cx="690" cy="272" r="9" fill="#0078B6"/>
  <line x1="40" y1="292" x2="730" y2="292" stroke="#ECEFF1" stroke-width="1"/>

  <!-- ROW: Sensor sim / emerging -->
  <text x="44" y="324" font-size="12" font-weight="bold" fill="#2C3E50">Sensor sim &amp; emerging</text>
  <circle cx="370" cy="320" r="9" fill="#0078B6"/>
  <circle cx="450" cy="320" r="9" fill="#0078B6"/>
  <circle cx="530" cy="320" r="9" fill="#0078B6"/>
  <path d="M610,311 A9 9 0 0 1 610,329 Z" fill="#0078B6"/><circle cx="610" cy="320" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <path d="M690,311 A9 9 0 0 1 690,329 Z" fill="#0078B6"/><circle cx="690" cy="320" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <line x1="40" y1="340" x2="730" y2="340" stroke="#003D6B" stroke-width="1.5"/>

  <!-- legend -->
  <circle cx="120" cy="380" r="9" fill="#0078B6"/>
  <text x="136" y="384" font-size="11" fill="#2C3E50">primary driver</text>
  <path d="M280,371 A9 9 0 0 1 280,389 Z" fill="#0078B6"/><circle cx="280" cy="380" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <text x="296" y="384" font-size="11" fill="#2C3E50">secondary</text>
  <circle cx="430" cy="380" r="9" fill="none" stroke="#0078B6" stroke-width="1.4"/>
  <text x="446" y="384" font-size="11" fill="#2C3E50">not limiting</text>

  <text x="410" y="430" text-anchor="middle" font-size="11" fill="#4B2A6B">No single spec wins every job. Match the instrument to the column your application actually fills in.</text>
</svg>
