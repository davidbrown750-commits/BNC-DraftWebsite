<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="400" fill="#ffffff"/>
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#003D6B">Zero-Order-Hold sin(x)/x Amplitude Roll-Off</text>

  <!-- Plot frame -->
  <!-- x from 80 to 760 maps f = 0 .. Fs ; y from 60 (0 dB) to 340 -->
  <line x1="80" y1="60" x2="80" y2="340" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="80" y1="340" x2="760" y2="340" stroke="#2C3E50" stroke-width="1.5"/>
  <polygon points="760,340 750,335 750,345" fill="#2C3E50"/>
  <text x="755" y="362" text-anchor="end" font-size="12" fill="#2C3E50">output frequency</text>

  <!-- y axis: 0 dB at y=70, scale 30 px per dB roughly. 0 dB top -->
  <!-- Gridlines for dB: 0, -1, -2, -3, -3.9, -6 -->
  <g stroke="#ECEFF1" stroke-width="1">
    <line x1="80" y1="70" x2="760" y2="70"/>
    <line x1="80" y1="110" x2="760" y2="110"/>
    <line x1="80" y1="150" x2="760" y2="150"/>
    <line x1="80" y1="190" x2="760" y2="190"/>
    <line x1="80" y1="230" x2="760" y2="230"/>
    <line x1="80" y1="270" x2="760" y2="270"/>
    <line x1="80" y1="310" x2="760" y2="310"/>
  </g>
  <g font-size="11" fill="#2C3E50" text-anchor="end">
    <text x="74" y="74">0 dB</text>
    <text x="74" y="114">-1</text>
    <text x="74" y="154">-2</text>
    <text x="74" y="194">-3</text>
    <text x="74" y="234">-4</text>
    <text x="74" y="274">-5</text>
    <text x="74" y="314">-6</text>
  </g>
  <text x="34" y="200" text-anchor="middle" font-size="12" fill="#2C3E50" transform="rotate(-90 34 200)">relative amplitude</text>

  <!-- x ticks: 0, Fs/4, Fs/2 (Nyquist), 3Fs/4, Fs -->
  <g stroke="#2C3E50" stroke-width="1">
    <line x1="80" y1="340" x2="80" y2="346"/>
    <line x1="250" y1="340" x2="250" y2="346"/>
    <line x1="420" y1="340" x2="420" y2="346"/>
    <line x1="590" y1="340" x2="590" y2="346"/>
    <line x1="760" y1="340" x2="760" y2="346"/>
  </g>
  <g font-size="12" fill="#2C3E50" text-anchor="middle">
    <text x="80" y="362">0</text>
    <text x="250" y="362">Fs/4</text>
    <text x="420" y="362">Fs/2 (Nyquist)</text>
    <text x="590" y="362">3Fs/4</text>
    <text x="760" y="362">Fs</text>
  </g>

  <!-- sinc curve: amplitude(f) = |sinc(f/Fs)| in dB.
       Sample points (f/Fs, dB): 0:0, .125:-0.22, .25:-0.91, .375:-2.1, .5:-3.92, .625:-6.7, .75:-10.5, .875:-16.8, ~1:large
       y = 70 + 40*dBmag  (40 px per dB).
       x = 80 + 680*(f/Fs) -->
  <path d="M80,70
           L165,79
           L250,106
           L335,154
           L420,227
           L505,338
           " fill="none" stroke="#0078B6" stroke-width="3"/>
  <!-- continue curve toward null near Fs (drops off frame) -->
  <path d="M505,338 C540,380 560,395 575,395" fill="none" stroke="#0078B6" stroke-width="3" opacity="0.5" stroke-dasharray="4 3"/>

  <!-- Nyquist marker at Fs/2 -->
  <line x1="420" y1="60" x2="420" y2="340" stroke="#4B2A6B" stroke-width="1.2" stroke-dasharray="5 4"/>
  <circle cx="420" cy="227" r="5" fill="#C77E00"/>
  <rect x="436" y="206" width="150" height="40" rx="3" fill="#fff" stroke="#C77E00" stroke-width="1"/>
  <text x="446" y="222" font-size="12" font-weight="bold" fill="#C77E00">-3.9 dB at Nyquist</text>
  <text x="446" y="238" font-size="10" fill="#2C3E50">(Fs/2)</text>

  <!-- 0 dB reference dashed -->
  <line x1="80" y1="70" x2="760" y2="70" stroke="#003D6B" stroke-width="0.8" stroke-dasharray="2 3"/>

  <text x="150" y="58" font-size="11" fill="#0078B6">sin(x)/x, x = pi f / Fs</text>
</svg>
