<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#ECEFF1" rx="6"/>

  <!-- Title -->
  <text x="300" y="32" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#003D6B" text-anchor="middle">DAC Staircase Reconstruction</text>

  <!-- Axis area: x 60-560, y 55-345 -->
  <!-- Grid lines (horizontal) -->
  <line x1="60" y1="55"  x2="560" y2="55"  stroke="#c0cdd6" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="100" x2="560" y2="100" stroke="#c0cdd6" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="145" x2="560" y2="145" stroke="#c0cdd6" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="200" x2="560" y2="200" stroke="#c0cdd6" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="255" x2="560" y2="255" stroke="#c0cdd6" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="300" x2="560" y2="300" stroke="#c0cdd6" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="345" x2="560" y2="345" stroke="#c0cdd6" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Axes -->
  <line x1="60" y1="345" x2="560" y2="345" stroke="#003D6B" stroke-width="2"/>
  <line x1="60" y1="55"  x2="60"  y2="345" stroke="#003D6B" stroke-width="2"/>

  <!-- Y axis label -->
  <text x="18" y="202" font-family="Arial,sans-serif" font-size="12" fill="#003D6B" text-anchor="middle" transform="rotate(-90,18,202)">Amplitude (V)</text>

  <!-- X axis label -->
  <text x="310" y="378" font-family="Arial,sans-serif" font-size="12" fill="#003D6B" text-anchor="middle">Time</text>

  <!-- Y axis tick labels -->
  <text x="54" y="349" font-family="Arial,sans-serif" font-size="10" fill="#003D6B" text-anchor="end">0</text>
  <text x="54" y="304" font-family="Arial,sans-serif" font-size="10" fill="#003D6B" text-anchor="end">1</text>
  <text x="54" y="259" font-family="Arial,sans-serif" font-size="10" fill="#003D6B" text-anchor="end">2</text>
  <text x="54" y="204" font-family="Arial,sans-serif" font-size="10" fill="#003D6B" text-anchor="end">3</text>
  <text x="54" y="149" font-family="Arial,sans-serif" font-size="10" fill="#003D6B" text-anchor="end">4</text>
  <text x="54" y="104" font-family="Arial,sans-serif" font-size="10" fill="#003D6B" text-anchor="end">5</text>
  <text x="54" y="59"  font-family="Arial,sans-serif" font-size="10" fill="#003D6B" text-anchor="end">6</text>

  <!--
    Sine wave: y = 200 - 140*sin(2*pi*(x-60)/500)
    We use the range x_svg 60..560 mapping t=0..1 cycle
    Sample points at t = 0/16, 1/16, ... 16/16 of the period
    step width = 500/16 = 31.25 px each
    Staircase: hold value from sample to next sample

    Sample values (y_svg = 200 - 140*sin(2*pi*i/16)):
    i=0:  200 - 140*sin(0)      = 200
    i=1:  200 - 140*sin(pi/8)   = 200 - 140*0.3827 = 146
    i=2:  200 - 140*sin(pi/4)   = 200 - 140*0.7071 = 101
    i=3:  200 - 140*sin(3pi/8)  = 200 - 140*0.9239 = 71
    i=4:  200 - 140*sin(pi/2)   = 200 - 140 = 60
    i=5:  200 - 140*sin(5pi/8)  = 200 - 140*0.9239 = 71
    i=6:  200 - 140*sin(3pi/4)  = 200 - 140*0.7071 = 101
    i=7:  200 - 140*sin(7pi/8)  = 200 - 140*0.3827 = 146
    i=8:  200 - 140*sin(pi)     = 200
    i=9:  200 - 140*sin(9pi/8)  = 200 + 140*0.3827 = 254
    i=10: 200 - 140*sin(10pi/8) = 200 + 140*0.7071 = 299
    i=11: 200 - 140*sin(11pi/8) = 200 + 140*0.9239 = 329
    i=12: 200 - 140*sin(12pi/8) = 200 + 140 = 340
    i=13: 200 - 140*sin(13pi/8) = 200 + 140*0.9239 = 329
    i=14: 200 - 140*sin(14pi/8) = 200 + 140*0.7071 = 299
    i=15: 200 - 140*sin(15pi/8) = 200 + 140*0.3827 = 254
    i=16: 200

    x positions: 60 + i*31.25
    x0=60, x1=91.25, x2=122.5, x3=153.75, x4=185, x5=216.25, x6=247.5, x7=278.75
    x8=310, x9=341.25, x10=372.5, x11=403.75, x12=435, x13=466.25, x14=497.5, x15=528.75, x16=560
  -->

  <!-- DAC Staircase (sky blue fill under) -->
  <polyline points="
    60,200 91,200
    91,146 122,146
    122,101 154,101
    154,71  185,71
    185,60  216,60
    216,71  248,71
    248,101 279,101
    279,146 310,146
    310,200 341,200
    341,254 373,254
    373,299 404,299
    404,329 435,329
    435,340 466,340
    466,329 497,329
    497,299 529,299
    529,254 560,254
  " fill="none" stroke="#0078B6" stroke-width="2.5" stroke-linejoin="miter"/>

  <!-- Smooth sine wave overlay (navy) -->
  <path d="
    M 60,200
    C 70,173 80,147 91,121
    C 102,95 112,74 122,60
    C 133,47 143,44 154,44
    C 165,44 175,55 185,60
    C 196,65 206,80 216,101
    C 227,122 237,146 248,168
    C 259,190 269,202 279,200
    C 290,198 300,190 310,200
    C 321,210 331,232 341,254
    C 352,276 362,300 373,319
    C 384,338 394,347 404,340
    C 415,333 425,316 435,299
    C 446,282 456,266 466,254
    C 477,242 487,237 497,240
    C 508,243 518,252 529,265
    C 540,278 550,292 560,300
  " fill="none" stroke="#003D6B" stroke-width="2" stroke-dasharray="7,4" opacity="0.75"/>

  <!-- Sample dots on staircase -->
  <circle cx="60"  cy="200" r="4" fill="#0078B6"/>
  <circle cx="91"  cy="146" r="4" fill="#0078B6"/>
  <circle cx="122" cy="101" r="4" fill="#0078B6"/>
  <circle cx="154" cy="71"  r="4" fill="#0078B6"/>
  <circle cx="185" cy="60"  r="4" fill="#0078B6"/>
  <circle cx="216" cy="71"  r="4" fill="#0078B6"/>
  <circle cx="248" cy="101" r="4" fill="#0078B6"/>
  <circle cx="279" cy="146" r="4" fill="#0078B6"/>
  <circle cx="310" cy="200" r="4" fill="#0078B6"/>
  <circle cx="341" cy="254" r="4" fill="#0078B6"/>
  <circle cx="373" cy="299" r="4" fill="#0078B6"/>
  <circle cx="404" cy="329" r="4" fill="#0078B6"/>
  <circle cx="435" cy="340" r="4" fill="#0078B6"/>
  <circle cx="466" cy="329" r="4" fill="#0078B6"/>
  <circle cx="497" cy="299" r="4" fill="#0078B6"/>
  <circle cx="529" cy="254" r="4" fill="#0078B6"/>

  <!-- Legend -->
  <line x1="68" y1="318" x2="102" y2="318" stroke="#0078B6" stroke-width="2.5"/>
  <circle cx="85" cy="318" r="4" fill="#0078B6"/>
  <text x="108" y="322" font-family="Arial,sans-serif" font-size="11" fill="#003D6B">DAC staircase output</text>

  <line x1="68" y1="337" x2="102" y2="337" stroke="#003D6B" stroke-width="2" stroke-dasharray="7,4" opacity="0.75"/>
  <text x="108" y="341" font-family="Arial,sans-serif" font-size="11" fill="#003D6B">Ideal sine wave</text>
</svg>
