<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="440" fill="#ffffff"/>
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#003D6B">Trigger Timing: Input, Holdoff, Waveform Output, and Marker</text>

  <!-- shared time axis reference verticals -->
  <!-- trigger event 1 at x=150, holdoff window to x=300, trigger event 2 at x=330 (ignored), event 3 at x=560 -->

  <!-- ===== Row 1: Trigger input ===== -->
  <text x="20" y="78" font-size="12" font-weight="bold" fill="#003D6B">Trigger</text>
  <text x="20" y="93" font-size="12" font-weight="bold" fill="#003D6B">input</text>
  <line x1="120" y1="100" x2="780" y2="100" stroke="#ECEFF1" stroke-width="1"/>
  <!-- baseline low at y=100, pulses up to y=66 -->
  <path d="M120,100 L150,100 L150,66 L168,66 L168,100 L330,100 L330,66 L348,66 L348,100 L560,100 L560,66 L578,66 L578,100 L780,100"
        fill="none" stroke="#2C3E50" stroke-width="1.8"/>
  <!-- rising-edge slope markers -->
  <polygon points="150,66 145,78 155,78" fill="#0078B6"/>
  <text x="150" y="58" text-anchor="middle" font-size="11" fill="#0078B6">edge 1</text>
  <text x="339" y="58" text-anchor="middle" font-size="11" fill="#C77E00">edge 2</text>
  <text x="569" y="58" text-anchor="middle" font-size="11" fill="#0078B6">edge 3</text>
  <text x="690" y="92" font-size="11" fill="#2C3E50">rising slope, level set by threshold</text>

  <!-- ===== Holdoff window ===== -->
  <rect x="150" y="120" width="180" height="26" rx="3" fill="#ECEFF1" stroke="#C77E00" stroke-width="1.3"/>
  <text x="240" y="137" text-anchor="middle" font-size="11" fill="#C77E00">holdoff window (re-triggers ignored)</text>
  <line x1="150" y1="100" x2="150" y2="120" stroke="#C77E00" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="330" y1="100" x2="330" y2="120" stroke="#C77E00" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="339" y="116" text-anchor="middle" font-size="11" fill="#C77E00">ignored</text>

  <!-- ===== Row 2: Waveform output ===== -->
  <text x="20" y="222" font-size="12" font-weight="bold" fill="#003D6B">Waveform</text>
  <text x="20" y="237" font-size="12" font-weight="bold" fill="#003D6B">output</text>
  <line x1="120" y1="240" x2="780" y2="240" stroke="#ECEFF1" stroke-width="1"/>
  <!-- output burst after edge 1 (with latency), and after edge 3 -->
  <!-- burst 1: starts x=168 -->
  <path d="M120,240
           L168,240
           Q176,200 184,240 Q192,280 200,240 Q208,200 216,240 Q224,280 232,240 Q240,200 248,240 Q256,280 264,240 Q272,200 280,240 Q288,280 296,240
           L560,240
           Q586,200 594,240 Q602,280 610,240 Q618,200 626,240 Q634,280 642,240 Q650,200 658,240 Q666,280 674,240 Q682,200 690,240 Q698,280 706,240
           L780,240"
        fill="none" stroke="#0078B6" stroke-width="1.8"/>
  <!-- latency callout between edge 1 (x=150) and output start (x=168) -->
  <line x1="150" y1="186" x2="168" y2="186" stroke="#4B2A6B" stroke-width="1.2"/>
  <line x1="150" y1="182" x2="150" y2="190" stroke="#4B2A6B" stroke-width="1.2"/>
  <line x1="168" y1="182" x2="168" y2="190" stroke="#4B2A6B" stroke-width="1.2"/>
  <text x="208" y="183" font-size="11" fill="#4B2A6B">trigger latency (deterministic)</text>

  <!-- ===== Row 3: Marker / sync output ===== -->
  <text x="20" y="342" font-size="12" font-weight="bold" fill="#003D6B">Marker /</text>
  <text x="20" y="357" font-size="12" font-weight="bold" fill="#003D6B">sync out</text>
  <line x1="120" y1="360" x2="780" y2="360" stroke="#ECEFF1" stroke-width="1"/>
  <!-- marker pulses aligned to sample positions in the output burst -->
  <path d="M120,360 L168,360 L168,326 L186,326 L186,360 L560,360 L560,326 L578,326 L578,360 L780,360"
        fill="none" stroke="#C77E00" stroke-width="1.8"/>
  <line x1="168" y1="240" x2="168" y2="326" stroke="#C77E00" stroke-width="0.7" stroke-dasharray="3 3"/>
  <text x="300" y="320" font-size="11" fill="#C77E00">marker rises at a defined sample index, drives the scope or DUT</text>

  <!-- time axis -->
  <line x1="120" y1="400" x2="780" y2="400" stroke="#2C3E50" stroke-width="1.4"/>
  <polygon points="780,400 770,395 770,405" fill="#2C3E50"/>
  <text x="780" y="418" text-anchor="middle" font-size="11" fill="#2C3E50">time</text>
  <text x="120" y="418" text-anchor="start" font-size="11" fill="#2C3E50">armed and waiting</text>
</svg>
