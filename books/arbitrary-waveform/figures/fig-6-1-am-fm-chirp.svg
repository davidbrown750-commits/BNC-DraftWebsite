<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="520" fill="#ffffff"/>
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#003D6B">Three Common AWG Output Scenarios</text>

  <!-- ============ PANEL 1: AM envelope ============ -->
  <text x="60" y="62" font-size="13" font-weight="bold" fill="#003D6B">Amplitude Modulation</text>
  <text x="760" y="62" font-size="11" text-anchor="end" fill="#2C3E50">carrier with sinusoidal envelope</text>
  <!-- axis -->
  <line x1="60" y1="115" x2="780" y2="115" stroke="#2C3E50" stroke-width="1"/>
  <line x1="60" y1="75" x2="60" y2="155" stroke="#2C3E50" stroke-width="1"/>
  <!-- envelope (upper and lower) -->
  <path d="M60,95 Q150,70 240,95 Q330,120 420,95 Q510,70 600,95 Q690,120 780,95" fill="none" stroke="#C77E00" stroke-width="1.4" stroke-dasharray="5 4"/>
  <path d="M60,135 Q150,160 240,135 Q330,110 420,135 Q510,160 600,135 Q690,110 780,135" fill="none" stroke="#C77E00" stroke-width="1.4" stroke-dasharray="5 4"/>
  <!-- AM carrier filled between envelopes (approximate dense sine) -->
  <path d="M60,115 L66,98 L72,132 L78,99 L84,131 L90,100 L96,107 L102,123 L108,103 L114,127 L120,104 L126,109
           L132,121 L138,106 L144,124 L150,106 L156,110 L162,120 L168,107 L174,123 L180,107 L186,111 L192,119
           L198,108 L204,122 L210,108 L216,112 L222,118 L228,109 L234,121 L240,108 L246,112 L252,118 L258,109
           L264,122 L270,107 L276,123 L282,107 L288,111 L294,120 L300,106 L306,124 L312,106 L318,110 L324,121
           L330,105 L336,125 L342,104 L348,109 L354,123 L360,103 L366,127 L372,103 L378,109 L384,124 L390,102
           L396,128 L402,103 L408,108 L414,124 L420,102 L426,128 L432,103 L438,109 L444,123 L450,104 L456,127
           L462,104 L468,110 L474,121 L480,106 L486,124 L492,106 L498,111 L504,120 L510,107 L516,123 L522,108
           L528,112 L534,118 L540,109 L546,121 L552,108 L558,112 L564,118 L570,109 L576,121 L582,108 L588,111
           L594,119 L600,107 L606,123 L612,106 L618,110 L624,121 L630,105 L636,125 L642,104 L648,109 L654,123
           L660,103 L666,127 L672,103 L678,109 L684,124 L690,102 L696,128 L702,103 L708,108 L714,124 L720,102
           L726,128 L732,104 L738,109 L744,122 L750,106 L756,124 L762,107 L768,131 L774,99 L780,115"
        fill="none" stroke="#003D6B" stroke-width="1.1"/>
  <text x="64" y="170" font-size="10" fill="#2C3E50">depth set by modulation index m</text>

  <!-- ============ PANEL 2: FM / chirp sweep ============ -->
  <text x="60" y="222" font-size="13" font-weight="bold" fill="#003D6B">Frequency Sweep (LFM Chirp)</text>
  <text x="760" y="222" font-size="11" text-anchor="end" fill="#2C3E50">instantaneous frequency rises linearly</text>
  <line x1="60" y1="285" x2="780" y2="285" stroke="#2C3E50" stroke-width="1"/>
  <line x1="60" y1="245" x2="60" y2="325" stroke="#2C3E50" stroke-width="1"/>
  <!-- chirp: frequency increasing left to right -->
  <path d="M60,285 L72,260 L84,310 L98,258 L112,312 L128,256 L144,314 L162,255 L180,315 L200,256 L220,314
           L240,258 L260,313 L278,260 L296,310 L312,262 L328,308 L342,264 L356,306 L368,266 L380,304 L391,268
           L402,302 L412,270 L422,300 L431,272 L440,298 L448,274 L456,296 L464,276 L471,295 L478,277 L485,295
           L491,277 L497,294 L503,278 L509,293 L514,279 L519,292 L524,280 L529,291 L533,281 L537,291 L541,282
           L545,290 L549,282 L553,290 L557,283 L561,290 L564,284 L567,289 L570,285 L573,289 L576,285 L579,289
           L582,285 L585,289 L588,285 L591,289 L594,285 L597,289 L600,285 L603,289 L606,285 L609,289 L612,285
           L615,289 L618,286 L621,289 L624,285 L627,289 L630,286 L633,288 L636,286 L639,288 L642,286 L645,288
           L648,286 L651,288 L654,286 L657,288 L660,286 L780,285"
        fill="none" stroke="#0078B6" stroke-width="1.2"/>
  <text x="64" y="340" font-size="10" fill="#2C3E50">defined by start f, stop f, and duration T</text>
  <!-- arrow showing rising frequency -->
  <line x1="120" y1="248" x2="660" y2="248" stroke="#4B2A6B" stroke-width="1" stroke-dasharray="4 3"/>
  <polygon points="660,248 650,244 650,252" fill="#4B2A6B"/>
  <text x="200" y="244" font-size="10" fill="#4B2A6B">f0 -&gt; f1</text>

  <!-- ============ PANEL 3: Pulse ============ -->
  <text x="60" y="392" font-size="13" font-weight="bold" fill="#003D6B">Precision Pulse</text>
  <text x="760" y="392" font-size="11" text-anchor="end" fill="#2C3E50">width, edges, and PRF under direct control</text>
  <line x1="60" y1="470" x2="780" y2="470" stroke="#2C3E50" stroke-width="1"/>
  <line x1="60" y1="410" x2="60" y2="480" stroke="#2C3E50" stroke-width="1"/>
  <!-- two pulses -->
  <path d="M60,470 L150,470 L162,418 L300,418 L312,470 L500,470 L512,418 L650,418 L662,470 L780,470"
        fill="none" stroke="#003D6B" stroke-width="1.8"/>
  <!-- width marker -->
  <line x1="162" y1="402" x2="300" y2="402" stroke="#C77E00" stroke-width="1"/>
  <line x1="162" y1="398" x2="162" y2="418" stroke="#C77E00" stroke-width="1"/>
  <line x1="300" y1="398" x2="300" y2="418" stroke="#C77E00" stroke-width="1"/>
  <text x="231" y="397" text-anchor="middle" font-size="10" fill="#C77E00">pulse width</text>
  <!-- period marker -->
  <line x1="162" y1="488" x2="512" y2="488" stroke="#4B2A6B" stroke-width="1"/>
  <line x1="162" y1="484" x2="162" y2="492" stroke="#4B2A6B" stroke-width="1"/>
  <line x1="512" y1="484" x2="512" y2="492" stroke="#4B2A6B" stroke-width="1"/>
  <text x="337" y="502" text-anchor="middle" font-size="10" fill="#4B2A6B">period = 1 / PRF</text>
</svg>
