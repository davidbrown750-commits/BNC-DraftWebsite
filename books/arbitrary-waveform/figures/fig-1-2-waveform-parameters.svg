<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="380" fill="#ffffff"/>
  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#003D6B">Anatomy of a Periodic Waveform</text>

  <!-- Plot frame -->
  <!-- baseline / zero reference at y=200, DC offset line at y=170 -->
  <!-- axes -->
  <line x1="90" y1="60" x2="90" y2="340" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="90" y1="200" x2="770" y2="200" stroke="#2C3E50" stroke-width="1.5"/>
  <polygon points="770,200 760,195 760,205" fill="#2C3E50"/>
  <polygon points="90,60 85,70 95,70" fill="#2C3E50"/>
  <text x="778" y="204" font-size="12" fill="#2C3E50">time</text>
  <text x="74" y="64" text-anchor="end" font-size="12" fill="#2C3E50">V</text>

  <!-- 0 V tick -->
  <text x="82" y="204" text-anchor="end" font-size="11" fill="#2C3E50">0 V</text>

  <!-- DC offset reference (sine centered here) center y = 150 -->
  <line x1="90" y1="150" x2="770" y2="150" stroke="#C77E00" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="600" y="144" font-size="11.5" fill="#C77E00">DC offset (waveform center)</text>

  <!-- DC offset arrow between 0V (200) and center (150) -->
  <line x1="120" y1="200" x2="120" y2="150" stroke="#4B2A6B" stroke-width="1.3"/>
  <polygon points="120,150 116,160 124,160" fill="#4B2A6B"/>
  <polygon points="120,200 116,190 124,190" fill="#4B2A6B"/>
  <text x="128" y="180" font-size="11.5" fill="#4B2A6B">offset</text>

  <!-- Sine wave: center=150, amplitude=70, one period = 240px starting x=150 -->
  <!-- y(x) = 150 - 70*sin( 2pi*(x-150)/240 ) -->
  <path fill="none" stroke="#0078B6" stroke-width="2.5"
    d="M150,150
       C165,116 183,80 210,80
       C237,80 255,116 270,150
       C285,184 303,220 330,220
       C357,220 375,184 390,150
       C405,116 423,80 450,80
       C477,80 495,116 510,150
       C525,184 543,220 570,220
       C597,220 615,184 630,150"/>

  <!-- Peak amplitude marker: from center 150 to peak 80 at x=210 -->
  <line x1="210" y1="150" x2="210" y2="80" stroke="#003D6B" stroke-width="1.3"/>
  <polygon points="210,80 206,90 214,90" fill="#003D6B"/>
  <text x="218" y="118" font-size="12" fill="#003D6B" font-weight="bold">amplitude (peak)</text>

  <!-- Peak-to-peak marker on right at x=690 -->
  <line x1="690" y1="80" x2="690" y2="220" stroke="#2C3E50" stroke-width="1.2"/>
  <polygon points="690,80 686,90 694,90" fill="#2C3E50"/>
  <polygon points="690,220 686,210 694,210" fill="#2C3E50"/>
  <line x1="630" y1="80" x2="700" y2="80" stroke="#2C3E50" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="570" y1="220" x2="700" y2="220" stroke="#2C3E50" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="700" y="154" font-size="12" fill="#2C3E50">peak-to-peak (Vpp)</text>

  <!-- Period marker: one cycle from x=150 (rising zero-cross of center) to x=390 -->
  <line x1="150" y1="285" x2="390" y2="285" stroke="#00b4ff" stroke-width="1.5"/>
  <polygon points="150,285 160,281 160,289" fill="#00b4ff"/>
  <polygon points="390,285 380,281 380,289" fill="#00b4ff"/>
  <line x1="150" y1="150" x2="150" y2="295" stroke="#00b4ff" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="390" y1="150" x2="390" y2="295" stroke="#00b4ff" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="270" y="306" text-anchor="middle" font-size="12" fill="#0078B6" font-weight="bold">period T = 1 / frequency</text>

  <!-- Phase note -->
  <text x="150" y="338" font-size="11.5" fill="#4B2A6B">Phase sets the horizontal start point of the cycle (here 0 deg at center crossing).</text>
</svg>
