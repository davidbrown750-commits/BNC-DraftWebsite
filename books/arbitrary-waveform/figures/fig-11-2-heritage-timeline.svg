<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="320" fill="#ffffff"/>
  <text x="24" y="34" font-size="18" font-weight="bold" fill="#003D6B">From Pulse Heritage to a Modern AWG Family</text>
  <text x="24" y="56" font-size="13" fill="#2C3E50">One verified date anchors the line. The milestones between are a direction of travel, not a dated record.</text>

  <!-- baseline -->
  <line x1="60" y1="160" x2="760" y2="160" stroke="#0078B6" stroke-width="3"/>
  <defs>
    <marker id="t11" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 z" fill="#0078B6"/>
    </marker>
  </defs>
  <line x1="760" y1="160" x2="788" y2="160" stroke="#0078B6" stroke-width="3" marker-end="url(#t11)"/>

  <!-- Node 1: 1963 founding -->
  <circle cx="120" cy="160" r="9" fill="#003D6B"/>
  <rect x="60" y="92" width="160" height="52" rx="4" fill="#ECEFF1" stroke="#003D6B" stroke-width="1.5"/>
  <text x="140" y="113" font-size="15" font-weight="bold" fill="#003D6B" text-anchor="middle">1963</text>
  <text x="140" y="132" font-size="11" fill="#2C3E50" text-anchor="middle">Founded, San Rafael CA</text>
  <line x1="120" y1="144" x2="120" y2="151" stroke="#003D6B" stroke-width="1.5"/>

  <!-- Node 2: pulse generation -->
  <circle cx="320" cy="160" r="9" fill="#0078B6"/>
  <rect x="240" y="180" width="170" height="52" rx="4" fill="#ECEFF1" stroke="#0078B6" stroke-width="1.5"/>
  <text x="325" y="201" font-size="13" font-weight="bold" fill="#0078B6" text-anchor="middle">Fast-risetime pulse</text>
  <text x="325" y="219" font-size="11" fill="#2C3E50" text-anchor="middle">generators, nuclear research</text>
  <line x1="320" y1="169" x2="320" y2="178" stroke="#0078B6" stroke-width="1.5"/>

  <!-- Node 3: timing/waveform heritage -->
  <circle cx="520" cy="160" r="9" fill="#C77E00"/>
  <rect x="438" y="92" width="170" height="52" rx="4" fill="#ECEFF1" stroke="#C77E00" stroke-width="1.5"/>
  <text x="523" y="113" font-size="13" font-weight="bold" fill="#C77E00" text-anchor="middle">Precision timing</text>
  <text x="523" y="131" font-size="11" fill="#2C3E50" text-anchor="middle">and waveform expertise</text>
  <line x1="520" y1="144" x2="520" y2="151" stroke="#C77E00" stroke-width="1.5"/>

  <!-- Node 4: modern AWG family -->
  <circle cx="700" cy="160" r="9" fill="#4B2A6B"/>
  <rect x="618" y="180" width="172" height="52" rx="4" fill="#ECEFF1" stroke="#4B2A6B" stroke-width="1.5"/>
  <text x="704" y="201" font-size="13" font-weight="bold" fill="#4B2A6B" text-anchor="middle">Modern AWG family</text>
  <text x="704" y="219" font-size="11" fill="#2C3E50" text-anchor="middle">A2085 through 686</text>
  <line x1="700" y1="169" x2="700" y2="178" stroke="#4B2A6B" stroke-width="1.5"/>

  <text x="24" y="288" font-size="11.5" fill="#2C3E50">The same priorities run the length of the line: clean edges, accurate timing, and signals you can trust.</text>
</svg>
