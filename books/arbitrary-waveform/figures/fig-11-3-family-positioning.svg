<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="460" fill="#ffffff"/>
  <text x="24" y="34" font-size="18" font-weight="bold" fill="#003D6B">The AWG Family, Entry to Flagship</text>
  <text x="24" y="56" font-size="13" fill="#2C3E50">Models placed by sample rate and overall performance class. Verify current specs at berkeleynucleonics.com.</text>

  <!-- axes -->
  <line x1="90" y1="80" x2="90" y2="400" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="90" y1="400" x2="780" y2="400" stroke="#2C3E50" stroke-width="1.5"/>
  <defs>
    <marker id="ax11" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2C3E50"/>
    </marker>
  </defs>
  <line x1="90" y1="80" x2="90" y2="72" stroke="#2C3E50" stroke-width="1.5" marker-end="url(#ax11)"/>
  <line x1="780" y1="400" x2="788" y2="400" stroke="#2C3E50" stroke-width="1.5" marker-end="url(#ax11)"/>

  <!-- y axis label -->
  <text x="40" y="240" font-size="13" font-weight="bold" fill="#003D6B" text-anchor="middle" transform="rotate(-90 40 240)">Sample rate / speed</text>
  <text x="430" y="438" font-size="13" font-weight="bold" fill="#003D6B" text-anchor="middle">Performance class and price</text>

  <!-- gridline labels -->
  <text x="84" y="380" font-size="10" fill="#2C3E50" text-anchor="end">MSa/s</text>
  <text x="84" y="240" font-size="10" fill="#2C3E50" text-anchor="end">GS/s</text>
  <text x="84" y="120" font-size="10" fill="#2C3E50" text-anchor="end">tens of GS/s</text>

  <!-- entry / benchtop band -->
  <text x="180" y="420" font-size="10" fill="#78909C" text-anchor="middle">benchtop</text>
  <text x="430" y="420" font-size="10" fill="#78909C" text-anchor="middle">high-performance</text>
  <text x="680" y="420" font-size="10" fill="#78909C" text-anchor="middle">flagship</text>

  <!-- A2085 -->
  <circle cx="140" cy="372" r="8" fill="#0078B6"/>
  <text x="140" y="356" font-size="12" font-weight="bold" fill="#003D6B" text-anchor="middle">A2085</text>
  <text x="140" y="392" font-size="10" fill="#2C3E50" text-anchor="middle">80 MHz, 2-ch</text>

  <!-- A2255 -->
  <circle cx="215" cy="350" r="8" fill="#0078B6"/>
  <text x="215" y="334" font-size="12" font-weight="bold" fill="#003D6B" text-anchor="middle">A2255</text>
  <text x="215" y="370" font-size="10" fill="#2C3E50" text-anchor="middle">250 MHz</text>

  <!-- 645 -->
  <circle cx="300" cy="320" r="8" fill="#0078B6"/>
  <text x="300" y="304" font-size="12" font-weight="bold" fill="#003D6B" text-anchor="middle">645</text>
  <text x="300" y="340" font-size="10" fill="#2C3E50" text-anchor="middle">125 MSa/s, 14-bit</text>

  <!-- 670C / 675 -->
  <circle cx="430" cy="250" r="8" fill="#00b4ff"/>
  <text x="430" y="234" font-size="12" font-weight="bold" fill="#003D6B" text-anchor="middle">670C / 675</text>
  <text x="430" y="270" font-size="10" fill="#2C3E50" text-anchor="middle">high-performance</text>

  <!-- 685 / 685C -->
  <circle cx="560" cy="180" r="8" fill="#C77E00"/>
  <text x="560" y="164" font-size="12" font-weight="bold" fill="#003D6B" text-anchor="middle">685 / 685C</text>
  <text x="560" y="200" font-size="10" fill="#2C3E50" text-anchor="middle">16-bit, 6.16 GS/s</text>

  <!-- 686 -->
  <circle cx="700" cy="110" r="9" fill="#4B2A6B"/>
  <text x="700" y="94" font-size="13" font-weight="bold" fill="#4B2A6B" text-anchor="middle">686</text>
  <text x="700" y="132" font-size="10" fill="#2C3E50" text-anchor="middle">14-bit, 20 GS/s</text>

  <!-- trend curve -->
  <path d="M140 372 Q 350 360 430 250 T 700 110" fill="none" stroke="#0078B6" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.55"/>
</svg>
