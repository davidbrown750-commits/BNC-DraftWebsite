<script>window.QUIZ_DATA = { bookKey:"awg", chapterKey:"05", title:"Chapter 5 Quiz: Creating and Sequencing Waveforms", questions:[
  { q: "When you import a scope capture into an AWG and play it back, why does setting the sample rate correctly matter?",
    options: [
      "A data file has no inherent time axis, so the AWG plays the samples at its own clock; a mismatch shifts every frequency in the signal.",
      "Imported files always replay at exactly the capture rate regardless of the AWG clock.",
      "Sample rate only affects amplitude, not timing.",
      "The AWG automatically detects the capture rate from the file contents."
    ],
    answer: 0,
    explain: "Samples carry values, not time. The AWG clocks them out at its own rate, so you must resample to the AWG clock or match the AWG rate to the source." },
  { q: "What is the main advantage of sequencing segments over storing one giant waveform?",
    options: [
      "It increases the DAC's vertical resolution.",
      "A repeated segment is stored once and looped, so memory is reused and the scenario can react to triggers and events.",
      "It removes the need to set a sample rate.",
      "It guarantees seamless loop points automatically."
    ],
    answer: 1,
    explain: "Loop counts replay one stored copy many times, saving memory, and conditional advance lets the playout react rather than being frozen." },
  { q: "An instrument has a waveform granularity of 16 samples. Which buffer length is legal?",
    options: [
      "1000 samples",
      "1004 samples",
      "1008 samples",
      "1010 samples"
    ],
    answer: 2,
    explain: "Length must be a multiple of the granularity N. Of the choices, only 1008 is a multiple of 16." },
  { q: "Why does a looped waveform with a fractional number of cycles in the buffer produce spurs?",
    options: [
      "Fractional cycles raise the average power of the signal.",
      "The end phase does not match the start phase, so the wrap forces a step discontinuity that is wideband and repeats every loop.",
      "Fractional cycles cause the DAC to clip.",
      "The instrument refuses to loop and outputs DC instead."
    ],
    answer: 1,
    explain: "If the buffer ends mid-cycle, wrapping to the start jumps the level and slope. That step radiates spurs locked to the loop rate." },
  { q: "A captured transient cannot be made to hold an integer number of cycles. What is the practical fix to reduce the loop glitch?",
    options: [
      "Increase the amplitude until the step disappears.",
      "Lower the sample rate until the file fits.",
      "Apply a window that tapers the start and end toward a common value so the junction no longer takes a hard step.",
      "Store the waveform twice back to back."
    ],
    answer: 2,
    explain: "Windowing trades a sharp discontinuity for a gentle controlled transition. Use it when integer cycles are not achievable." }
] };</script>
