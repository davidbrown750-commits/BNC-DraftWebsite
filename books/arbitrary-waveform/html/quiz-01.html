<h1>Chapter 1 Quiz</h1><p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>
<div id="bnc-quiz"></div>
<script>window.QUIZ_DATA = { bookKey:"awg", chapterKey:"01", title:"Chapter 1 Quiz: Signal Generation Basics", questions:[
  { q:"A waveform is best described as a record of what?",
    options:["How current divides across a circuit","How voltage changes over time","How power is distributed across frequency","How impedance varies with temperature"],
    answer:1,
    explain:"A waveform plots voltage on the vertical axis against time on the horizontal axis. That curve is the complete description of the signal." },
  { q:"The period of a periodic waveform is equal to which of the following?",
    options:["The amplitude times the frequency","The peak-to-peak voltage divided by two","One divided by the frequency","The phase expressed in radians"],
    answer:2,
    explain:"Period is the time for one complete cycle, and it equals 1 divided by the frequency. A 1 kHz tone has a 1 ms period." },
  { q:"What fundamentally separates an arbitrary waveform generator from a function generator?",
    options:["The AWG can reach higher voltages","The AWG plays voltage samples from memory instead of using fixed shape circuits","The function generator cannot produce a sine wave","The AWG has no digital-to-analog converter"],
    answer:1,
    explain:"A function generator builds output from circuits tuned to specific shapes. An AWG reads voltage samples from memory, so it is not limited to a fixed menu." },
  { q:"Which task requires an arbitrary waveform generator rather than a basic function generator?",
    options:["Producing a clean 1 kHz sine tone","Outputting a fixed-frequency square clock","Replaying a real-world signal captured on an oscilloscope","Generating a simple linear ramp"],
    answer:2,
    explain:"Replaying a captured, arbitrary signal means loading its exact samples into memory and playing them back, which only an AWG can do." },
  { q:"Direct digital synthesis (DDS), which arrived in the 1970s and 1980s, generates a signal by doing what?",
    options:["Tuning an analog oscillator with a variable resistor","Stepping through a stored table of sine values with a digital accumulator and a DAC","Amplifying broadband noise through a narrow filter","Mixing two crystal oscillators to produce a beat frequency"],
    answer:1,
    explain:"DDS uses a digital accumulator to step through a stored sine table and feeds the result to a DAC, so frequency becomes a precisely settable number. It still assumes a sine, which is what the memory-based AWG later generalized." }
] };</script>
