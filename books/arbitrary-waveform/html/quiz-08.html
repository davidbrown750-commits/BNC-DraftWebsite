<script>window.QUIZ_DATA = { bookKey:"awg", chapterKey:"08", title:"Chapter 8 Quiz: Applications", questions:[
  {
    q: "In a pulsed radar scenario, what does the linear frequency modulated (LFM) chirp inside each pulse provide?",
    options: [
      "It lowers the carrier frequency to baseband",
      "It supplies pulse-compression range resolution, with compression gain tied to the time-bandwidth product",
      "It removes the need for any pulse repetition interval",
      "It eliminates receiver noise automatically"
    ],
    answer: 1,
    explain: "An LFM chirp sweeps frequency across the pulse, giving pulse-compression range resolution whose gain depends on the time-bandwidth product of the pulse."
  },
  {
    q: "Why does electronic warfare scenario generation place such a heavy demand on AWG memory depth?",
    options: [
      "Because each pulse needs its own DAC",
      "Because a long, dense threat environment must play without an audible repetition the receiver can lock onto",
      "Because memory sets the carrier frequency",
      "Because low noise is only available in large memories"
    ],
    answer: 1,
    explain: "Deep memory buys a longer non-repeating window, so a smart receiver under test cannot lock onto the scenario's repetition period."
  },
  {
    q: "Which specification most quietly limits two-qubit gate fidelity in a multi-channel quantum control setup?",
    options: [
      "Peak sample rate",
      "Total waveform memory",
      "Channel-to-channel timing skew",
      "Output connector type"
    ],
    answer: 2,
    explain: "A two-qubit gate depends on two pulses arriving in a precise temporal relationship, so picosecond-level channel skew limits fidelity before noise does."
  },
  {
    q: "What is the value of impaired-signal generation when testing a wireless or satcom receiver?",
    options: [
      "It guarantees the receiver passes every standard",
      "It reveals how the receiver copes with known, deliberate impairments like IQ imbalance, phase noise, or fading",
      "It reduces the required sample rate to zero",
      "It replaces the need for a clean reference signal"
    ],
    answer: 1,
    explain: "Adding known impairments shows how a receiver behaves under realistic stress, exposing weaknesses a clean compliance test would never reveal."
  },
  {
    q: "In semiconductor automated test equipment (ATE), which AWG characteristic translates most directly into production cost?",
    options: [
      "The maximum output voltage",
      "The number of front-panel buttons",
      "Waveform settling and switching time between test segments, multiplied by part volume",
      "The color of the display"
    ],
    answer: 2,
    explain: "In ATE every millisecond of test time is multiplied across millions of parts, so fast, repeatable waveform switching drives the real cost."
  }
] };</script>
