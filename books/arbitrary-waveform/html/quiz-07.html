<h1>Chapter 7 Quiz</h1><p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>
<div id="bnc-quiz"></div>
<script>window.QUIZ_DATA = { bookKey:"awg", chapterKey:"07", title:"Chapter 7 Quiz: Triggering, Synchronization, and Multi-Channel", questions:[
  {
    q: "What is the purpose of trigger holdoff?",
    options: [
      "It increases the output amplitude after a trigger",
      "It is a blanking interval after a valid trigger during which further triggers are ignored, preventing double-triggering on a noisy or bouncing edge",
      "It selects whether the instrument triggers on the rising or falling edge",
      "It sets the number of cycles played in burst mode"
    ],
    answer: 1,
    explain: "Holdoff blanks out additional triggers for a set interval after a valid one, so ringing or a bouncing edge cannot fire the instrument twice. Too short risks double-triggering; too long risks missing real events."
  },
  {
    q: "In which trigger mode does the AWG play its waveform exactly once on each trigger event and then return to the armed state?",
    options: [
      "Continuous mode",
      "Gated mode",
      "Triggered (single-shot) mode",
      "Internal mode"
    ],
    answer: 2,
    explain: "Single-shot mode arms the instrument, plays the record once on the trigger event, then re-arms to wait for the next event. It is the mode for one-time responses and single pulses."
  },
  {
    q: "A marker (sync output) is most useful because it is generated from the same clock and sample stream as the analog output. What does that let it do?",
    options: [
      "Replace the need for a sample clock entirely",
      "Provide a clean digital edge aligned to a precise sample position, ideal for triggering a scope or gating a device under test",
      "Increase the instrument's vertical resolution",
      "Convert the analog output into IQ baseband"
    ],
    answer: 1,
    explain: "Because the marker is tied to a defined sample index in the record, it carries the instrument's own timing precision and lands at the same point in the analog output every play, which makes it an excellent trigger or gate."
  },
  {
    q: "Why is a shared 10 MHz reference NOT the same as deterministic sample alignment between two instruments?",
    options: [
      "A 10 MHz reference cannot be distributed to more than one instrument",
      "The reference disciplines frequency so the instruments do not drift, but each instrument's clock divider can come up in a different phase, so they may sit hundreds of picoseconds or a full sample apart at start",
      "A shared reference forces both instruments to use the same waveform",
      "The reference only works for analog outputs, not digital markers"
    ],
    answer: 1,
    explain: "A shared reference gives frequency coherence (no long-term drift) but says nothing about which sample each instrument plays at a given instant. Sample-level alignment needs a shared clock plus a synchronization protocol that aligns the dividers and applies a common start trigger."
  },
  {
    q: "After establishing phase coherence across channels, what step turns a phase-coherent instrument into a phase-accurate one?",
    options: [
      "Raising the sample rate until skew disappears",
      "Switching every channel to continuous mode",
      "Calibrating skew: output the same signal on all channels, measure the offset on a fast scope, and apply a per-channel programmable delay until they align",
      "Removing the shared reference so the channels run independently"
    ],
    answer: 2,
    explain: "Phase coherence gives a fixed, stable relationship; accuracy requires measuring the residual fixed skew between channels and removing it with per-channel delay. The calibration holds until a cable or temperature change forces a redo."
  }
] };</script>
