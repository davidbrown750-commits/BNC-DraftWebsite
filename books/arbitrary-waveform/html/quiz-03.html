<h1>Chapter 3 Quiz</h1><p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>
<div id="bnc-quiz"></div>
<script>window.QUIZ_DATA = { bookKey:"awg", chapterKey:"03", title:"Chapter 3 Quiz: Key Specifications", questions:[
  {
    q: "An AWG runs at a 2 GSa/s update rate. Ignoring practical filter roll-off, what is the highest frequency it can in principle represent?",
    options: [
      "2 GHz, equal to the sample rate",
      "1 GHz, half the sample rate (the Nyquist limit)",
      "4 GHz, twice the sample rate",
      "500 MHz, one quarter of the sample rate"
    ],
    answer: 1,
    explain: "Nyquist sets the theoretical maximum output frequency at half the sample rate, so 2 GSa/s gives 1 GHz. In practice the usable bandwidth sits below this once reconstruction filtering is accounted for."
  },
  {
    q: "Using the ideal converter relation SNR = 6.02N + 1.76 dB, roughly how much dynamic range does each added bit of DAC resolution buy?",
    options: [
      "About 1.76 dB per bit",
      "About 3 dB per bit",
      "About 6 dB per bit",
      "About 20 dB per bit"
    ],
    answer: 2,
    explain: "The 6.02 coefficient means each additional bit adds roughly 6 dB of ideal SNR. That is why a 14-bit part reaches about 86 dB and a 16-bit part about 98 dB."
  },
  {
    q: "A generator stores 1,000,000 points and plays them at 20 GSa/s. How long is the unique playback before the waveform must repeat or refill?",
    options: [
      "50 microseconds",
      "20 microseconds",
      "1 millisecond",
      "500 nanoseconds"
    ],
    answer: 0,
    explain: "Playback time = memory depth / sample rate = 1e6 / 20e9 = 50 microseconds. Deep memory drains quickly at high sample rates, which is why long scenarios often rely on sequencing or streaming."
  },
  {
    q: "An AWG output stage has roughly 1 GHz of analog bandwidth. Using the rule of thumb, what is its approximate rise time?",
    options: [
      "35 ps",
      "350 ps",
      "3.5 ns",
      "35 ns"
    ],
    answer: 1,
    explain: "rise time is approximately 0.35 / bandwidth = 0.35 / 1e9 = 350 ps. Edges contain energy well above the fundamental, so fast edges need bandwidth headroom."
  },
  {
    q: "What does SFDR (spurious-free dynamic range) specifically measure?",
    options: [
      "The total integrated noise power across the whole band",
      "The amplitude gap, in dBc, between the fundamental and the single largest spur, harmonic or not",
      "The number of effective bits the DAC delivers at high frequency",
      "The short-term frequency instability of the sample clock"
    ],
    answer: 1,
    explain: "SFDR is the distance from the carrier to the worst single spectral line, expressed in dBc. That spur may be a harmonic or a non-harmonic artifact. SNR, by contrast, sums the whole noise floor."
  }
] };</script>
