<h1>Chapter 4 Quiz</h1><p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>
<div id="bnc-quiz"></div>
<script>window.QUIZ_DATA = { bookKey:"awg", chapterKey:"04", title:"Chapter 4 Quiz: Sampling Theory and Signal Fidelity", questions:[
  {
    q: "An AWG updates its DAC at a sample rate Fs. According to the Nyquist-Shannon sampling theorem, the highest frequency component it can represent must be:",
    options: [
      "Strictly less than Fs/2, the Nyquist frequency",
      "Exactly equal to Fs",
      "Strictly less than Fs, the full sample rate",
      "Equal to twice Fs"
    ],
    answer: 0,
    explain: "The theorem requires sampling at more than twice the highest frequency component, so that component must fall below Fs/2. In practice, engineers stay well under Fs/2 because of filtering and roll-off."
  },
  {
    q: "A 600 MHz frequency component is generated on a system sampling at 1000 MS/s. Where does it actually appear in the first Nyquist zone?",
    options: [
      "It stays at 600 MHz with no penalty",
      "It aliases to 400 MHz (Fs minus the tone)",
      "It is fully removed by the reconstruction filter",
      "It appears at 1600 MHz only"
    ],
    answer: 1,
    explain: "600 MHz is above Fs/2 (500 MHz), so it folds back, mirrored around Nyquist, and lands at 1000 - 600 = 400 MHz. No downstream filter can separate it from a real 400 MHz tone."
  },
  {
    q: "Because a DAC holds each sample value until the next clock edge (a zero-order hold), the output amplitude at the Nyquist frequency is attenuated by approximately:",
    options: [
      "0 dB, the hold has no effect",
      "1.76 dB",
      "3.9 dB relative to DC",
      "6 dB per bit"
    ],
    answer: 2,
    explain: "The zero-order hold imposes a sin(x)/x amplitude envelope. At Fs/2 it costs roughly 3.9 dB, about a 36 percent amplitude loss. Inverse-sinc (sinc) correction flattens this if needed."
  },
  {
    q: "What is the primary benefit of oversampling or digital interpolation in an AWG?",
    options: [
      "It increases the DAC's bit depth automatically",
      "It pushes the spectral images higher in frequency so a gentler reconstruction filter can be used",
      "It eliminates the need for any output filter",
      "It removes quantization noise entirely"
    ],
    answer: 1,
    explain: "Raising the effective update rate moves images away from the band of interest, relaxes the analog filter, and shifts the signal toward the flat part of the sin(x)/x curve. The cost is more memory, compute, and power."
  },
  {
    q: "Why is dither added to a signal before quantization?",
    options: [
      "To boost high-frequency amplitude lost to the zero-order hold",
      "To increase the number of DAC output levels",
      "To randomize quantization error so periodic spurs spread into a smooth noise floor",
      "To raise the sample rate of the DAC"
    ],
    answer: 2,
    explain: "When a periodic signal lines up with the sample grid, rounding error becomes periodic and produces discrete spurs. Dither breaks that correlation, trading a slightly higher broadband noise floor for the removal of those spurs."
  }
] };</script>
