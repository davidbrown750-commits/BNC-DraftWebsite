<h1>Chapter 9 Quiz</h1><p class="lead">Pick one answer per question, then check your score. Your answers are saved on this device, so you can come back to them.</p>
<div id="bnc-quiz"></div>
<script>window.QUIZ_DATA = { bookKey:"awg", chapterKey:"09", title:"Chapter 9 Quiz: Selecting an Arbitrary Waveform Generator", questions:[
  {
    q: "What should drive your AWG selection before you open any datasheet?",
    options: [
      "The price ceiling set by your budget",
      "A description of the worst-case signal you must produce",
      "The brand the rest of the lab already owns",
      "The instrument with the highest sample rate available"
    ],
    answer: 1,
    explain: "Start by describing the hardest signal you will ever ask the instrument to produce, then derive specifications from it. The signal is your real spec sheet."
  },
  {
    q: "If the highest meaningful frequency in your signal is 500 MHz, what is a sensible practical sample-rate target?",
    options: [
      "Exactly 1 GS/s, the Nyquist minimum",
      "500 MS/s, matching the frequency",
      "1.25 to 2.5 GS/s, for headroom above Nyquist",
      "20 GS/s, because more is always better"
    ],
    answer: 2,
    explain: "Nyquist sets a floor of just above 1 GS/s, but 2.5x to 5x the highest frequency gives the reconstruction filter room to work and the output stays clean."
  },
  {
    q: "Your output shows soft, rounded edges and amplitude that droops at the top of the band. Which specification is most likely the limit?",
    options: [
      "Memory depth",
      "Analog bandwidth",
      "Channel count",
      "Sample rate is too high"
    ],
    answer: 1,
    explain: "Rounded edges and high-frequency amplitude sag point to insufficient analog bandwidth. Aliasing (spurs that move with frequency) is the sample-rate failure mode instead."
  },
  {
    q: "When does 16-bit resolution matter more than raw sample rate?",
    options: [
      "When generating multi-GHz carriers by direct synthesis",
      "When you must reproduce a small signal cleanly beside a much larger one",
      "When the only goal is the fastest possible edges",
      "When memory is the binding constraint"
    ],
    answer: 1,
    explain: "More bits lower the quantization noise floor, which improves spurious-free dynamic range and lets a low-level signal sit cleanly next to a full-scale one. Edge-and-bandwidth problems favor speed over bits instead."
  },
  {
    q: "Why can a mid-tier AWG with strong sequencing beat a top-tier instrument with deep flat memory?",
    options: [
      "Sequencing increases the DAC resolution",
      "Most real scenarios repeat, so storing unique segments with loop counts uses far less memory than a flat waveform",
      "Sequencing removes the need for analog bandwidth",
      "Flat memory cannot be streamed"
    ],
    answer: 1,
    explain: "A scenario with structure stores one copy of each unique segment plus a step list with loop counts and jumps, so a burst repeated a thousand times costs one copy plus a counter, not a thousand copies."
  }
] };</script>
